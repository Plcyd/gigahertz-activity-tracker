*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Plus Jakarta Sans',sans-serif;color:var(--tx);min-height:100vh;overflow-x:hidden}
.bg-orbs{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:-1;overflow:hidden;pointer-events:none;background:var(--bg);transition:background 0.5s ease}
.bg-orbs::before,.bg-orbs::after{content:'';position:absolute;border-radius:50%;filter:blur(100px);opacity:0.5;animation:floatOrbs 25s infinite alternate ease-in-out;transition:background 0.8s ease}
.bg-orbs::before{width:60vw;height:60vw;background:var(--g2);top:-20vw;left:-10vw}
.bg-orbs::after{width:50vw;height:50vw;background:var(--g3);bottom:-10vw;right:-10vw;animation-delay:-12s}
@keyframes floatOrbs{0%{transform:translate(0,0) scale(1)}50%{transform:translate(5vw,10vh) scale(1.1)}100%{transform:translate(-10vw,-5vh) scale(0.9)}}
body.no-anim *,body.no-anim::before,body.no-anim::after{animation:none!important;transition:none!important}
input,select,button,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p);opacity:.5;border-radius:99px}
::placeholder{color:var(--tx3)}
.glass{background:var(--glass-bg);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border:1px solid var(--glass-border);border-top:1px solid rgba(255,255,255,0.25);box-shadow:0 10px 30px var(--shadow),inset 0 1px 1px rgba(255,255,255,0.08);transition:all 0.4s cubic-bezier(0.16,1,0.3,1)}
.glass:hover{box-shadow:0 15px 40px var(--shadow),inset 0 1px 1px rgba(255,255,255,0.12)}
.glass-solid{background:var(--wh);border:1px solid var(--bd);box-shadow:0 4px 15px var(--shadow);border-radius:20px;}
.btn{padding:12px 24px;border-radius:14px;font-weight:800;font-size:13px;cursor:pointer;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);border:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;letter-spacing:.02em}
.btn-primary{background:var(--p);color:#fff;box-shadow:0 4px 16px color-mix(in srgb,var(--p) 40%,transparent);}
.btn-primary:hover{filter:brightness(1.15);transform:translateY(-2px);box-shadow:0 8px 24px color-mix(in srgb,var(--p) 60%,transparent)}
.btn-primary:active{transform:translateY(1px) scale(0.98)}
.btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bd);}
.btn-ghost:hover{background:rgba(0,0,0,0.05);color:var(--tx);}
.btn-danger{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);}
.btn-danger:hover{background:#ef4444;color:#fff;}
.btn-ok{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3);}
.btn-ok:hover{background:#22c55e;color:#fff;}
.input{width:100%;background:rgba(0,0,0,0.02);border:1px solid var(--bd);border-radius:12px;padding:12px 16px;color:var(--tx);font-size:14px;font-weight:600;transition:all 0.3s cubic-bezier(0.16,1,0.3,1);}
.input:focus{background:rgba(0,0,0,0.05);border-color:var(--p);box-shadow:0 0 0 3px color-mix(in srgb,var(--p) 15%,transparent);}
.input-label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:8px}
select.input option{background-color:var(--wh);color:var(--tx)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes timerPulse{0%,100%{opacity:1}50%{opacity:0.6}}
.anim-fade{animation:fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both}
.anim-slide{animation:slideLeft 0.5s cubic-bezier(0.16,1,0.3,1) both}
.spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-nums{font-variant-numeric:tabular-nums}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:99px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
.badge-active{background:rgba(34,197,94,0.2);color:#10b981;border:1px solid rgba(34,197,94,0.4)}
.badge-idle{background:rgba(245,158,11,0.2);color:#f59e0b;border:1px solid rgba(245,158,11,0.4)}
.badge-absent{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid rgba(239,68,68,0.4)}
.tag-Admin{background:rgba(59,130,246,0.15);color:#3b82f6;}
.tag-Support{background:rgba(34,197,94,0.15);color:#22c55e;}
.tag-Dev{background:rgba(168,85,247,0.15);color:#a855f7;}
.tag-Meeting{background:rgba(249,115,22,0.15);color:#f97316;}
.tag-Operations{background:rgba(236,72,153,0.15);color:#ec4899;}
.modal-overlay{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn 0.3s ease}
.modal-box{background:var(--wh);border:1px solid var(--bd);border-radius:24px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;box-shadow:0 32px 80px rgba(0,0,0,0.4)}
.sidebar{width:280px;min-height:100vh;background:var(--wh);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);box-shadow:4px 0 24px var(--shadow)}
.sidebar.hidden{transform:translateX(-100%)}
.nav-item{display:flex;align-items:center;gap:14px;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s ease;color:var(--tx2);border:none;background:transparent;width:100%;text-align:left;margin-bottom:4px;}
.nav-item:hover{background:rgba(0,0,0,0.04);color:var(--tx);}
.nav-item.active{background:color-mix(in srgb,var(--p) 10%,transparent);color:var(--p);}
.nav-icon{width:24px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.mobile-nav{position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--wh);border-top:1px solid var(--bd);display:none;padding:12px 12px max(12px,env(safe-area-inset-bottom));box-shadow:0 -10px 40px rgba(0,0,0,0.1);overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;justify-content:flex-start;align-items:center;gap:8px;flex-wrap:nowrap}

const api = {
  _gasOk: null,
  async call(action, payload={}) {
    return new Promise(async (resolve) => {
      let gasAction = action;
      let gasPayload = { ...payload };

      if (action === 'registerEmployee') { gasAction = 'register'; gasPayload.empId = payload.employeeId; gasPayload.dept = DEPARTMENTS.find(d => d.id === payload.deptId)?.name || 'IT'; }
      else if (action === 'updateProfile') { gasAction = 'updateUserProfile'; gasPayload = { empId: payload.id || payload.employeeId, updates: payload }; }
      else if (action === 'logTask') { gasAction = 'addTask'; gasPayload.empId = payload.empId || payload.employeeId; }
      else if (action === 'login') { gasAction = 'loginUser'; }

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        if (typeof google.script.run[gasAction] === 'function') {
          google.script.run.withSuccessHandler(res => { api._gasOk = true; resolve(res); }).withFailureHandler(err => { api._gasOk = false; resolve(api._local(action, payload)); })[gasAction](gasPayload);
          return;
        }
      }

      if (GAS_URL && GAS_URL.startsWith("https://script.google.com/macros/s/")) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 8000);
          const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: gasAction, ...gasPayload }), headers: { 'Content-Type': 'text/plain;charset=utf-8' }, signal: controller.signal });
          clearTimeout(timeoutId);
          if (res.ok) { const data = await res.json(); api._gasOk = true; return resolve(data); }
        } catch (e) { api._gasOk = false; }
      }

      if (action === 'login') return resolve(api._localLogin(payload));
      resolve(api._local(action, payload));
    });
  },
  _localLogin(p){
    const id=(p.identifier||'').trim().toLowerCase();
    const pw=(p.password||'').trim();
    if(id==='rozi'&&pw==='hyacinth') return{success:true,user:{...ROZI_ACCOUNT}};
    const admin=ADMIN_ACCOUNTS.find(a=>((a.email||'').toLowerCase()===id||(a.employeeId||'').toLowerCase()===id)&&a.password===pw);
    if(admin)return{success:true,user:{...admin}};
    const emp=EMPLOYEES_INIT.find(e=>((e.email||'').toLowerCase()===id||(e.employeeId||'').toLowerCase()===id)&&e.password===pw);
    if(emp)return{success:true,user:{...emp}};
    return{success:false, error:'Invalid credentials.'};
  },
  _local(action,payload){
    return new Promise(r=>setTimeout(()=>{
      if(action==='logTask') r({success:true,taskId:'LOCAL-'+Date.now()});
      else if(action==='registerEmployee') r({success:true,employeeId:payload.employeeId||'GHZ'+Math.floor(Math.random()*9000+1000)});
      else if(action==='updateProfile') r({success:true});
      else if(action==='sync') r({success:true});
      else r({success:true,data:[]});
    },800));
  }
};

function calcDuration(start,end){
  if(!start||!end)return 0;
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  return Math.max(0,parseFloat(((eh*60+em-sh*60-sm)/60).toFixed(2)));
}

function validatePassword(pw){
  const checks={length:pw.length>=8,upper:/[A-Z]/.test(pw),lower:/[a-z]/.test(pw),num:/[0-9]/.test(pw)};
  const score=Object.values(checks).filter(Boolean).length;
  return{checks,score,valid:score===4};
}

function fmtSeconds(s){

}

function getUpcomingBirthdays(employees,days=30){
  const today=new Date();
  const results=[];
  (employees||[]).forEach(emp=>{
    if(!emp?.birthday)return;
    const [bm,bd]=emp.birthday.split('-').map(Number);
    if(isNaN(bm)||isNaN(bd))return;
    const thisYear=new Date(today.getFullYear(),bm-1,bd);
    if(thisYear<today)thisYear.setFullYear(today.getFullYear()+1);
    const diff=Math.ceil((thisYear-today)/(1000*60*60*24));
    if(diff<=days)results.push({...emp,daysUntil:diff,birthdayDate:thisYear});
  });
  return results.sort((a,b)=>a.daysUntil-b.daysUntil);
}

function geoDistance(lat1,lng1,lat2,lng2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

const DashboardView = ({ user, tasks, onSaveTask, showToast, onFocusLock }) => {
  const safeUser = user || {};
  const [t,setT]=useState(new Date());
  useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i)},[]);
  const [q]=useState(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)]||QUOTES[0]);

  const [activeTimer,setActiveTimer]=useState(null);
  const [queue,setQueue]=useState([]);
  const [elapsed,setElapsed]=useState(0);
  const [selectedTask,setSelectedTask]=useState('');
  const [customInput,setCustomInput]=useState('');
  const [category,setCategory]=useState('Admin');
  const intervalRef=useRef(null);

  useEffect(()=>{
    const saved=LS.load(`timer_${safeUser.id}`);
    if(saved){
      setActiveTimer(saved.activeTimer);
      setQueue(saved.queue||[]);
      if(saved.activeTimer&&saved.activeTimer.status==='running'){
        const extra=Math.floor((Date.now()-new Date(saved.activeTimer.lastResumeTime||saved.activeTimer.startTime).getTime())/1000);
        setElapsed((saved.activeTimer.elapsedSeconds||0)+extra);
      } else if(saved.activeTimer){
        setElapsed(saved.activeTimer.elapsedSeconds||0);
      }
    }
  },[safeUser.id]);

  useEffect(()=>{ if(activeTimer) LS.save(`timer_${safeUser.id}`,{activeTimer,queue}); },[activeTimer,queue]);

  useEffect(()=>{
    if(activeTimer&&activeTimer.status==='running'){ intervalRef.current=setInterval(()=>setElapsed(e=>e+1),1000); } 
    else { clearInterval(intervalRef.current); }
    return()=>clearInterval(intervalRef.current);
  },[activeTimer?.status]);

  const handleStartTimer = (isQueue = false) => {
    let taskName = selectedTask === '__custom__' ? customInput : selectedTask;
    if(!taskName || !taskName.trim()) { showToast('Please select or enter a task','warn'); return; }
    
    const now=new Date().toISOString();
    const newTask={taskName:taskName.trim(),category,startTime:now,lastResumeTime:now,elapsedSeconds:0,status:isQueue?'paused':'running'};
    
    if(isQueue) {
      setQueue(q=>[...q,newTask]);
      showToast(`Added to queue: "${taskName.slice(0,20)}"`,'success');
    } else {
      if(activeTimer&&activeTimer.status==='running'){
        const paused={...activeTimer,elapsedSeconds:elapsed,status:'paused'};
        setQueue(q=>[...q,paused]);
      }
      setActiveTimer(newTask);
      setElapsed(0);
      showToast(`Started: "${taskName.slice(0,30)}"`,'success');
    }
    setSelectedTask(''); setCustomInput('');
  };

  const stopAndSave=async()=>{
    if(!activeTimer)return;
    const hrs=parseFloat((elapsed/3600).toFixed(2));
    if(hrs<0.01){showToast('Task too short to save (<1 min)','warn');return;}
    const now=new Date().toISOString();
    const d=new Date(activeTimer.startTime);
    const task={
      id:Date.now(),empId:safeUser.id,
      taskName:activeTimer.taskName,category:activeTimer.category,
      date:d.toISOString().split('T')[0],
      startTime:`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,
      endTime:`${String(new Date().getHours()).padStart(2,'0')}:${String(new Date().getMinutes()).padStart(2,'0')}`,
      startTimestamp:activeTimer.startTime, endTimestamp:now,
      durationHours:hrs, remarks:'',month:d.getMonth()+1,year:d.getFullYear(),source:'System',
    };
    await api.call('logTask',task);
    onSaveTask(task);
    showToast(`Saved: "${activeTimer.taskName.slice(0,25)}" — ${hrs}h`,'success');
    setActiveTimer(null); setElapsed(0); LS.remove(`timer_${safeUser.id}`);
  };

  const resumeFromQueue=(idx)=>{
    const qTask=queue[idx];
    if(activeTimer){
      const paused={...activeTimer,elapsedSeconds:elapsed,status:'paused'};
      setQueue(q=>{const nq=[...q];nq.splice(idx,1);return[...nq,paused];});
    } else {
      setQueue(q=>{const nq=[...q];nq.splice(idx,1);return nq;});
    }
    const now=new Date().toISOString();
    setActiveTimer({...qTask,status:'running',lastResumeTime:now});
    setElapsed(qTask.elapsedSeconds||0);
  };
  const discardQueue=(idx)=>setQueue(q=>{const nq=[...q];nq.splice(idx,1);return nq;});

  const todayISO=new Date().toISOString().split('T')[0];
  const todayTasks=(tasks||[]).filter(x=>x.empId===safeUser.id&&x.date===todayISO);
  const loggedMinutes=Math.round(todayTasks.reduce((s,x)=>s+(x.durationHours||0),0)*60);
  const sessionMinutes=Math.floor(elapsed/60) + loggedMinutes;
  const effPct=sessionMinutes>0 ? Math.min(100, Math.round((loggedMinutes/sessionMinutes)*100)) : 0;

  return (
    <div className="anim-fade" style={{display:'flex',flexDirection:'column'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:16,marginBottom:16}}>
        <div>
          <h2 style={{fontSize:28,fontWeight:900,color:'var(--tx)',letterSpacing:'-.5px'}}>Dashboard</h2>
          <p style={{fontSize:14,color:'var(--tx3)',marginTop:4,fontWeight:600}}>Welcome back, {user.firstName} ({user.employeeId})</p>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:16}}>
          <div className="live-clock">{t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
          <div style={{background:'color-mix(in srgb,var(--p) 10%,transparent)',color:'var(--p)',padding:'8px 16px',borderRadius:12,fontSize:13,fontWeight:700,display:'flex',alignItems:'center',gap:8}}>
            <i className="fa-regular fa-calendar"></i> {t.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}
          </div>
        </div>
      </div>

      <QuoteBox />

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(250px,1fr))',gap:20,marginBottom:24}}>
        <div className="dash-card">
          <div className="dash-card-title"><i className="fa-regular fa-clock text-blue-500"></i> Session Time</div>
          <div className={`dash-card-value tab-nums ${activeTimer?.status==='running'?'text-blue-600':''}`}>{fmtSeconds(elapsed)}</div>
          <div className="dash-card-sub" style={{color:'#10b981'}}><i className="fa-solid fa-circle text-[8px]"></i> Since {activeTimer ? fmtTimestamp(activeTimer.startTime).split(',')[1] : 'Not started'}</div>
        </div>
        <div className="dash-card">
          <div className="dash-card-title"><i className="fa-solid fa-check-double text-green-500"></i> Tasks Logged</div>
          <div className="dash-card-value text-green-600">{todayTasks.length}</div>
          <div className="dash-card-sub">entries today • {(loggedMinutes/60).toFixed(1)}h tracked</div>
        </div>
        <div className="dash-card">
          <div className="dash-card-title"><i className="fa-solid fa-bolt text-purple-500"></i> Session Efficiency</div>
          <div className="dash-card-value text-purple-600">{effPct}%</div>
          <div className="dash-card-sub">All tasks: {(loggedMinutes/60).toFixed(1)}h / {(sessionMinutes/60).toFixed(1)}h</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(350px,1fr))',gap:20}}>
        <div className="dash-card">
          <div className="dash-card-title" style={{color:'var(--tx)',fontSize:14,marginBottom:6}}><i className="fa-solid fa-stopwatch"></i> Start Tracking</div>
          <p style={{fontSize:12,color:'var(--tx3)',marginBottom:20}}>Select a task or create a new one</p>
          
          <div style={{display:'flex',gap:12,marginBottom:16}}>
            <select className="input" style={{flex:1,background:'var(--bg)'}} value={selectedTask} onChange={e=>setSelectedTask(e.target.value)}>
              <option value="">— Select preset task —</option>
              {PRESET_TASKS.map((t,i)=><option key={i} value={t}>{t}</option>)}
              <option value="__custom__">Custom Task...</option>
            </select>
            {activeTimer && activeTimer.status === 'running' ? (
              <button className="btn btn-danger" style={{padding:'12px 20px'}} onClick={stopAndSave}>Stop</button>
            ) : (
              <button className="btn btn-primary" style={{padding:'12px 20px'}} onClick={()=>handleStartTimer(false)}><i className="fa-solid fa-play"></i> Start</button>
            )}
          </div>
          
          {selectedTask === '__custom__' && (
            <div style={{marginBottom:16}}>
              <p style={{fontSize:10,fontWeight:800,textTransform:'uppercase',color:'var(--tx3)',marginBottom:8}}>Custom Task Name</p>
              <input className="input" placeholder="Type here..." value={customInput} onChange={e=>setCustomInput(e.target.value)} />
            </div>
          )}

          <p style={{fontSize:10,fontWeight:800,textTransform:'uppercase',color:'var(--tx3)',marginBottom:8,marginTop:12}}>Select or Add Task to Queue</p>
          <div style={{display:'flex',gap:12}}>
            <select className="input" style={{flex:1,background:'var(--bg)'}} value={category} onChange={e=>setCategory(e.target.value)}>
              {TASK_CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
            <button className="btn" style={{background:'var(--bg)',color:'var(--tx)',border:'1px solid var(--bd)'}} onClick={()=>handleStartTimer(true)}>+ Queue</button>
          </div>
          <div style={{display:'flex',gap:12,marginTop:16}}>
             {activeTimer && activeTimer.status === 'running' && (
              <button className="btn btn-ghost" onClick={()=>setActiveTimer(t=>({...t,elapsedSeconds:elapsed,status:'paused'}))} style={{flex:1}}>
                <i className="fa-solid fa-pause"></i> Pause
              </button>
            )}
            {activeTimer && activeTimer.status === 'paused' && (
              <button className="btn btn-ok" onClick={()=>{const now=new Date().toISOString();setActiveTimer(t=>({...t,status:'running',lastResumeTime:now}));}} style={{flex:1}}>
                <i className="fa-solid fa-play"></i> Resume
              </button>
            )}
            {activeTimer && activeTimer.status === 'running' && (
              <button className="btn btn-ghost" onClick={()=>onFocusLock(activeTimer.taskName,elapsed)} style={{flex:1,color:'var(--p)',borderColor:'var(--p)'}}>
                <i className="fa-solid fa-lock"></i> Focus
              </button>
            )}
          </div>
        </div>

        <div className="dash-card">
          <div className="dash-card-title" style={{color:'var(--tx)',fontSize:14,marginBottom:6}}><i className="fa-solid fa-list-ul"></i> Task Queue</div>
          <p style={{fontSize:12,color:'var(--tx3)',marginBottom:16}}>Pending tasks ({queue.length})</p>
          
          <div style={{flex:1,overflowY:'auto',maxHeight:250}}>
            {queue.length === 0 ? (
              <div style={{height:'100%',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',opacity:.5,padding:'20px 0'}}>
                <i className="fa-solid fa-check-double" style={{fontSize:32,marginBottom:12}}></i>
                <p style={{fontWeight:800,fontSize:14,color:'var(--tx)'}}>No tasks queued</p>
                <p style={{fontSize:11,color:'var(--tx3)'}}>Add a task to get started 🚀</p>
              </div>
            ) : (
              <div>
                {queue.map((qt,i)=>(
                  <div key={i} className="task-queue-item">
                    <div style={{flex:1,overflow:'hidden'}}>
                      <p style={{fontSize:13,fontWeight:700,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{qt.taskName}</p>
                      <p style={{fontSize:11,color:'var(--tx3)',marginTop:4}}>
                        <span className={`badge tag-${qt.category}`} style={{fontSize:9,padding:'2px 8px'}}>{qt.category}</span>
                        <span style={{marginLeft:8,fontFamily:'Space Mono'}}>{fmtSeconds(qt.elapsedSeconds||0)}</span>
                      </p>
                    </div>
                    <button className="btn btn-ghost" style={{padding:'6px 12px',fontSize:12,color:'var(--p)',borderColor:'var(--p)'}} onClick={()=>resumeFromQueue(i)}><i className="fa-solid fa-play"></i></button>
                    <button className="btn btn-ghost" style={{padding:'6px 10px',fontSize:12,color:'var(--danger)'}} onClick={()=>discardQueue(i)}><i className="fa-solid fa-trash"></i></button>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(250px,1fr))',gap:20,marginTop:24}}>
        <div className="dash-card">
           <div className="dash-card-title" style={{color:'var(--tx)',fontSize:14,marginBottom:20}}>Category Breakdown</div>
           <DonutChart data={TASK_CATEGORIES.map(c => ({
              name: c, 
              hrs: tasks.filter(t => t.empId === safeUser.id && t.month === new Date().getMonth()+1 && t.year === new Date().getFullYear() && t.category === c).reduce((s,t)=>s+(t.durationHours||0),0)
           })).filter(c => c.hrs > 0)} />
        </div>
        <div className="dash-card">
           <MiniBarChart tasks={tasks.filter(t => t.empId === safeUser.id)} />
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
           <GeoWidget/>
           <BirthdayWidget employees={EMPLOYEES_INIT} />
        </div>
      </div>
    </div>
  );
};

const MyTasksView = ({user,tasks,showModal,showToast,onDeleteTask,onCloneTask}) => {

      <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:8}}>

      <div className="glass" style={{borderRadius:24,overflow:'hidden'}}>

const SettingsView = ({theme,setTheme,showToast,animations,setAnimations,isAdmin,employees,tasks,projects,onImport}) => {
  const [syncing,setSyncing]=useState(false);
  const handleSync=async()=>{setSyncing(true);showToast('Syncing...','info');const res=await api.call('sync',{});setSyncing(false);if(res.success)showToast('Synced!','success');else showToast('Sync failed','error');};
  const handleDownloadBackup=()=>{const data={employees,tasks,projects,exportDate:new Date().toISOString()};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='Gigahertz_Backup.json';
  a.click();
  showToast('Backup downloaded!','success');
};

  const handleImport=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.employees&&data.tasks){
          onImport(data);
          showToast('Backup imported successfully!','success');
        } else showToast('Invalid backup file.','error');
      }catch(err){showToast('Failed to parse file.','error');}

    reader.readAsText(file);

  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:20}}>
      <div><h2 style={{fontSize:28,fontWeight:900,color:'var(--tx)'}}>⚙️ Settings</h2><p style={{fontSize:13,color:'var(--tx3)',marginTop:4,fontWeight:600}}>System preferences and data management</p></div>

            <input type="checkbox" checked={animations} onChange={e=>{setAnimations(e.target.checked);LS.save('ghz_anim',e.target.checked);if(!e.target.checked)document.body.classList.add('no-anim');else document.body.classList.remove('no-anim');}}/>
            <span className="toggle-slider"></span>

        </div>
        <div style={{marginTop:16}}>
          <p style={{fontSize:14,fontWeight:800,color:'var(--tx)',marginBottom:12}}>Theme Accent</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:12}}>
            {THEMES.map(t=>(
              <button key={t.id} onClick={()=>{setTheme(t.id);LS.save('ghz_theme',t.id);}} style={{width:40,height:40,borderRadius:12,background:t.color,border:`3px solid ${theme===t.id?'#fff':'transparent'}`,boxShadow:theme===t.id?`0 0 15px ${t.color}`:'none',transition:'all .2s',cursor:'pointer'}} title={t.label}></button>
            ))}

      </div>

      <div className="glass" style={{borderRadius:24,padding:'24px 32px'}}>
        <h3 style={{fontSize:16,fontWeight:900,color:'var(--tx)',marginBottom:16}}>Data & Sync</h3>

          <button className="btn btn-primary" onClick={handleSync} disabled={syncing}><i className={`fa-solid fa-rotate ${syncing?'fa-spin':''}`}></i> {syncing?'Syncing...':'Force Sync Data'}</button>

const App = () => {
  const [theme, setTheme] = useState(() => LS.load('ghz_theme', 'gigahertz'));
  const [animations, setAnimations] = useState(() => LS.load('ghz_anim', true));
  const [user, setUser] = useState(null);
  const [showLanding, setShowLanding] = useState(true);
  
  const [activeTab, setActiveTab] = useState('dashboard');
  const [tasks, setTasks] = useState(() => LS.load('ghz_tasks', TASKS_INIT));
  const [employees, setEmployees] = useState(() => LS.load('ghz_emps', EMPLOYEES_INIT));
  const [projects, setProjects] = useState(() => LS.load('ghz_proj', PROJECTS_INIT));
  const [announcements, setAnnouncements] = useState(() => LS.load('ghz_ann', ANNOUNCEMENTS_INIT));
  const [leaveRequests, setLeaveRequests] = useState(() => LS.load('ghz_leaves', LEAVE_REQUESTS_INIT));
  
  const [toasts, setToasts] = useState([]);
  const [navOpen, setNavOpen] = useState(false);
  
  const [lastActivity, setLastActivity] = useState(Date.now());
  const [isAFK, setIsAFK] = useState(false);
  const [afkCountdown, setAfkCountdown] = useState(60); 
  const [focusLock, setFocusLock] = useState(null); 

  const [sessionStart] = useState(Date.now());
  const [showShiftSummary, setShowShiftSummary] = useState(false);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    if(!animations) document.body.classList.add('no-anim');
  }, [theme, animations]);

  useEffect(() => { LS.save('ghz_tasks', tasks); }, [tasks]);
  useEffect(() => { LS.save('ghz_emps', employees); }, [employees]);
  useEffect(() => { LS.save('ghz_proj', projects); }, [projects]);
  useEffect(() => { LS.save('ghz_ann', announcements); }, [announcements]);
  useEffect(() => { LS.save('ghz_leaves', leaveRequests); }, [leaveRequests]);

  useEffect(() => {
    if(!user || isAFK || focusLock) return;
    const resetTimer = () => setLastActivity(Date.now());
    window.addEventListener('mousemove', resetTimer);
    window.addEventListener('keypress', resetTimer);
    window.addEventListener('scroll', resetTimer);
    window.addEventListener('click', resetTimer);
    
    const checkInterval = setInterval(() => {
      if (Date.now() - lastActivity > AFK_TIMEOUT * 1000) {
        setIsAFK(true);
        setAfkCountdown(60);
      }
    }, 5000);

    return () => {
      window.removeEventListener('mousemove', resetTimer);
      window.removeEventListener('keypress', resetTimer);
      window.removeEventListener('scroll', resetTimer);
      window.removeEventListener('click', resetTimer);
      clearInterval(checkInterval);
    };
  }, [user, lastActivity, isAFK, focusLock]);

  useEffect(() => {
    if (!isAFK) return;
    if (afkCountdown <= 0) {
      handleLogout(true);
      return;
    }
    const timer = setTimeout(() => setAfkCountdown(c => c - 1), 1000);
    return () => clearTimeout(timer);
  }, [isAFK, afkCountdown]);

  useEffect(() => {
    if (!focusLock || !focusLock.isActive) return;
    if (focusLock.secondsLeft <= 0) {
      showToast('Focus Session Complete! Great job!', 'success');
      setFocusLock(null);
      return;
    }
    const timer = setTimeout(() => setFocusLock(f => ({...f, secondsLeft: f.secondsLeft - 1})), 1000);
    return () => clearTimeout(timer);
  }, [focusLock]);

  const showToast = useCallback((message, type='info') => {
    const id = Date.now() + Math.random();
    setToasts(prev => [...prev, { id, message, type }]);
  }, []);

  const removeToast = useCallback((id) => {
    setToasts(prev => prev.filter(t => t.id !== id));
  }, []);

  const handleLogin = (u) => {
    setUser(u);
    api.call('sync', { empId: u.id });
    showToast(`Welcome back, ${u.firstName}!`, 'success');
    setLastActivity(Date.now());
  };

  const handleLogoutReq = () => { setShowShiftSummary(true); };

  const handleLogout = (forced = false) => {
    if(forced) showToast('Auto-logged out due to inactivity.', 'warn');
    else showToast('Logged out successfully.', 'info');
    
    setUser(null);
    setShowShiftSummary(false);
    setActiveTab('dashboard');
    setIsAFK(false);
    setFocusLock(null);
    setShowLanding(true);
    
    if(user) {
      const savedTimer = LS.load(`timer_${user.id}`);
      if(savedTimer && savedTimer.activeTimer && savedTimer.activeTimer.status === 'running') {
        const extra = Math.floor((Date.now() - new Date(savedTimer.activeTimer.lastResumeTime).getTime())/1000);
        savedTimer.activeTimer.elapsedSeconds += extra;
        savedTimer.activeTimer.status = 'paused';
        LS.save(`timer_${user.id}`, savedTimer);
      }
    }
  };

  const handleSaveTask = (task) => { setTasks(prev => [task, ...prev]); };

  const handleFocusLock = (taskName, elapsedSecs) => {
    setFocusLock({ taskName, secondsLeft: POMODORO_DURATION, isActive: true });
  };

  const isAdmin = user?.role === 'ADMIN' || user?.role === 'Super Admin' || user?.role === 'Nexus Dev';
  
  const todayISO = new Date().toISOString().split('T')[0];
  const todayTasks = tasks.filter(t => t.empId === user?.id && t.date === todayISO);
  const loggedMinutes = todayTasks.reduce((s,t) => s + (t.durationHours||0)*60, 0);
  const sessionMinutes = Math.floor((Date.now() - sessionStart) / 60000);
  const productivityPct = sessionMinutes > 0 ? Math.min(100, (loggedMinutes / sessionMinutes) * 100) : 0;

  if (showLanding) return <LandingPage onEnter={() => setShowLanding(false)} theme={theme} setTheme={setTheme} />;
  if (!user) return <AuthPortal onLogin={handleLogin} theme={theme} setTheme={setTheme} />;

  return (
    <>
      <ToastSystem toasts={toasts} remove={removeToast} />
      
      {isAFK && <AFKOverlay secondsLeft={afkCountdown} onResume={() => { setIsAFK(false); setLastActivity(Date.now()); }} />}
      
      {focusLock && focusLock.isActive && (
        <FocusLockOverlay 
          taskName={focusLock.taskName} 
          secondsLeft={focusLock.secondsLeft}
          onBreak={() => { setFocusLock(null); showToast('Break time! Timer paused.', 'info'); }}
          onStop={() => { setFocusLock(null); showToast('Focus Lock ended.', 'warn'); }}
        />
      )}

      {showShiftSummary && (
        <ShiftSummaryModal 
          user={user}
          tasks={tasks}
          sessionStartTime={sessionStart}
          productivityPct={productivityPct}
          onCancel={() => setShowShiftSummary(false)}
          onConfirmLogout={() => handleLogout(false)}
        />
      )}

      <div className={`sidebar ${!navOpen ? 'desktop-only' : ''}`}>
        <div style={{padding: '24px', display: 'flex', alignItems: 'center', justifyContent:'center', borderBottom: '1px solid var(--bd)', marginBottom:12}}>
          <div style={{background:'var(--wh)',padding:'8px 16px',borderRadius:12,boxShadow:'0 2px 10px rgba(0,0,0,0.05)',border:'1px solid var(--bd)'}}>
             <h1 style={{fontSize: 18, fontWeight: 900, letterSpacing: '-.5px', color: 'var(--tx)', display:'flex', alignItems:'center', gap:8}}><img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" style={{width:24,height:24}}/> GIGAHERTZ</h1>
          </div>
        </div>

        <div style={{padding: '0 16px', flex: 1, overflowY: 'auto', display: 'flex', flexDirection: 'column'}}>
          <button className={`nav-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => {setActiveTab('dashboard'); setNavOpen(false);}}>
            <div className="nav-icon"><i className="fa-solid fa-table-cells-large"></i></div> Dashboard
          </button>
          <button className={`nav-item ${activeTab === 'mytasks' ? 'active' : ''}`} onClick={() => {setActiveTab('mytasks'); setNavOpen(false);}}>
            <div className="nav-icon"><i className="fa-solid fa-list-check"></i></div> Task Management
          </button>
          <button className={`nav-item`} onClick={() => {showToast('Analytics coming soon','warn');}}>
            <div className="nav-icon"><i className="fa-solid fa-chart-line"></i></div> Analytics
          </button>
          <button className={`nav-item ${activeTab === 'profile' ? 'active' : ''}`} onClick={() => {setActiveTab('profile'); setNavOpen(false);}}>
            <div className="nav-icon"><i className="fa-regular fa-user"></i></div> My Profile
          </button>

          <button className={`nav-item ${activeTab === 'leaves' ? 'active' : ''}`} style={{marginTop:16}} onClick={() => {setActiveTab('leaves'); setNavOpen(false);}}>
            <div className="nav-icon"><i className="fa-solid fa-umbrella-beach"></i></div> Leaves
          </button>
          <button className={`nav-item ${activeTab === 'leaderboard' ? 'active' : ''}`} onClick={() => {setActiveTab('leaderboard'); setNavOpen(false);}}>
            <div className="nav-icon"><i className="fa-solid fa-trophy"></i></div> Leaderboard
          </button>
          <button className={`nav-item ${activeTab === 'announcements' ? 'active' : ''}`} onClick={() => {setActiveTab('announcements'); setNavOpen(false);}}>
            <div className="nav-icon"><i className="fa-solid fa-bullhorn"></i></div> Alerts
          </button>

          {isAdmin && (
            <>
              <p style={{fontSize: 10, fontWeight: 800, textTransform: 'uppercase', letterSpacing: '.1em', color: 'var(--tx3)', marginLeft: 14, marginTop: 16, marginBottom: 4}}>Admin Controls</p>
              <button className={`nav-item ${activeTab === 'adminTracker' ? 'active' : ''}`} onClick={() => {setActiveTab('adminTracker'); setNavOpen(false);}}>
                <div className="nav-icon"><i className="fa-solid fa-satellite-dish"></i></div> Live Tracker
              </button>
              <button className={`nav-item ${activeTab === 'adminDirectory' ? 'active' : ''}`} onClick={() => {setActiveTab('adminDirectory'); setNavOpen(false);}}>
                <div className="nav-icon"><i className="fa-solid fa-users"></i></div> Directory
              </button>
              <button className={`nav-item ${activeTab === 'adminProjects' ? 'active' : ''}`} onClick={() => {setActiveTab('adminProjects'); setNavOpen(false);}}>
                <div className="nav-icon"><i className="fa-solid fa-diagram-project"></i></div> Projects
              </button>
              <button className={`nav-item ${activeTab === 'adminLeaves' ? 'active' : ''}`} onClick={() => {setActiveTab('adminLeaves'); setNavOpen(false);}}>
                <div className="nav-icon"><i className="fa-solid fa-calendar-check"></i></div> Appr. Leaves
              </button>
            </>
          )}

          <div style={{marginTop:32, padding:'0 12px'}}>
             <p style={{fontSize:10,fontWeight:800,textTransform:'uppercase',color:'var(--tx3)',marginBottom:12}}>Theme Color</p>
             <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
               {THEMES.map(t=>(
                 <button key={t.id} onClick={()=>setTheme(t.id)} style={{width:20,height:20,borderRadius:'50%',background:t.color,border:`2px solid ${theme===t.id?'var(--tx)':'transparent'}`,cursor:'pointer'}} title={t.label}></button>
               ))}
             </div>
          </div>

          <div style={{marginTop:24, background:'color-mix(in srgb,var(--p) 8%,transparent)', borderRadius:16, padding:'16px', display:'flex', alignItems:'center', gap:12, border:`1px solid color-mix(in srgb,var(--p) 20%,transparent)`}}>
             <Avatar emp={user} size="sm" />
             <div style={{overflow:'hidden'}}>
               <p style={{fontSize:13,fontWeight:800,color:'var(--tx)',whiteSpace:'nowrap',textOverflow:'ellipsis',overflow:'hidden'}}>{user.firstName} {user.lastName}</p>
               <p style={{fontSize:10,color:'var(--p)',fontWeight:700}}>{user.employeeId}</p>
               <p style={{fontSize:9,fontWeight:800,color:'var(--tx3)',textTransform:'uppercase',marginTop:2}}>{DEPARTMENTS.find(d=>d.id===user.deptId)?.name}</p>
             </div>
          </div>
          <button className={`nav-item`} style={{marginTop:16}} onClick={()=>{showToast('No new notifications','info')}}>
            <div className="nav-icon"><i className="fa-regular fa-bell"></i></div> Notifications <span style={{marginLeft:'auto',background:'var(--danger)',color:'#fff',fontSize:10,fontWeight:800,padding:'2px 6px',borderRadius:8}}>2</span>
          </button>
          <button className={`nav-item`} onClick={()=>{setTheme(theme==='dark'||theme==='titan'||theme==='midnight'||theme==='neon'||theme==='cyberpunk'||theme==='matrix'?'gigahertz':'titan');LS.save('ghz_theme',theme==='dark'||theme==='titan'||theme==='midnight'||theme==='neon'||theme==='cyberpunk'||theme==='matrix'?'gigahertz':'titan')}}>
            <div className="nav-icon"><i className="fa-regular fa-moon"></i></div> Dark Mode
          </button>
          <button className={`nav-item ${activeTab === 'settings' ? 'active' : ''}`} onClick={() => {setActiveTab('settings'); setNavOpen(false);}}>
            <div className="nav-icon"><i className="fa-solid fa-gear"></i></div> Settings
          </button>
        </div>

        <div style={{padding: '24px 16px'}}>
          <button className="btn btn-primary" style={{width: '100%', padding: '14px', fontSize: 14, borderRadius:16}} onClick={handleLogoutReq}>
             Log Out
          </button>
        </div>
      </div>

      <div className="mobile-nav">
        <button className={`mob-nav-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>
          <div className="mob-icon"><i className="fa-solid fa-house"></i></div><span>Dash</span>
        </button>
        <button className={`mob-nav-item ${activeTab === 'mytasks' ? 'active' : ''}`} onClick={() => setActiveTab('mytasks')}>
          <div className="mob-icon"><i className="fa-solid fa-list-check"></i></div><span>Tasks</span>
        </button>
        <button className={`mob-nav-item ${activeTab === 'profile' ? 'active' : ''}`} onClick={() => setActiveTab('profile')}>
          <div className="mob-icon"><Avatar emp={user} size="sm" /></div><span>Profile</span>
        </button>
        <button className="mob-nav-item" style={{color: 'var(--danger)'}} onClick={handleLogoutReq}>
          <div className="mob-icon" style={{background: 'rgba(239,68,68,0.1)'}}><i className="fa-solid fa-power-off"></i></div><span>Exit</span>
        </button>
      </div>

      <div className="main-content" style={{background:'var(--bg)'}}>
        <div style={{maxWidth:1200, margin:'0 auto'}}>
          {activeTab === 'dashboard' && <DashboardView user={user} tasks={tasks} onSaveTask={t=>setTasks(p=>[t,...p])} showToast={showToast} onFocusLock={handleFocusLock} />}
          {activeTab === 'mytasks' && <MyTasksView user={user} tasks={tasks} showModal={()=>{}} showToast={showToast} onDeleteTask={id=>setTasks(p=>p.filter(t=>t.id!==id))} onCloneTask={t=>{setTasks(p=>[{...t,id:Date.now()},...p]);showToast('Cloned!','success');}} />}
          {activeTab === 'profile' && <MyProfileView user={user} tasks={tasks} />}
          {activeTab === 'leaves' && <LeavesView user={user} leaveRequests={leaveRequests} showModal={()=>{}} />}
          {activeTab === 'leaderboard' && <LeaderboardView employees={employees} tasks={tasks} />}
          {activeTab === 'announcements' && <AnnouncementsView announcements={announcements} setAnnouncements={setAnnouncements} isAdmin={isAdmin} user={user} showToast={showToast} />}
          {activeTab === 'adminTracker' && <AdminTrackerView employees={employees} tasks={tasks} showToast={showToast} />}
          {activeTab === 'adminDirectory' && <AdminDirectoryView employees={employees} setEmployees={setEmployees} tasks={tasks} showToast={showToast} onLogTaskForEmp={()=>{}} />}
          {activeTab === 'adminProjects' && <ProjectsView projects={projects} setProjects={setProjects} showToast={showToast} isAdmin={isAdmin} />}
          {activeTab === 'adminLeaves' && <AdminLeavesView leaveRequests={leaveRequests} setLeaveRequests={setLeaveRequests} employees={employees} showToast={showToast} />}
          {activeTab === 'settings' && <SettingsView theme={theme} setTheme={setTheme} showToast={showToast} animations={animations} setAnimations={setAnimations} isAdmin={isAdmin} employees={employees} tasks={tasks} projects={projects} onImport={d=>{if(d.employees)setEmployees(d.employees);if(d.tasks)setTasks(d.tasks);if(d.projects)setProjects(d.projects);}} />}
        </div>
      </div>
    </>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
