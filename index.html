[data-theme="dididi"]{--p:#ff00ff;--pd:#8b008b;--pl:rgba(255,0,255,0.12);--bg:linear-gradient(135deg,#110011 0%,#1a001a 100%);--wh:#1a001a;--card:rgba(26,0,26,0.8);--tx:#00ff00;--tx2:#ff00ff;--tx3:#008800;--bd:rgba(0,255,0,0.4);--danger:#ff0000;--ok:#00ff00;--warn:#ffff00;--glass:rgba(10,0,10,0.65);--gborder:rgba(255,0,255,0.5);--shadow:rgba(255,0,255,0.3);--sidebar:rgba(17,0,17,0.98);--header:rgba(17,0,17,0.92);--ibg:rgba(17,0,17,0.7);--btn:linear-gradient(160deg,#ff00ff,#8b008b);--btnH:linear-gradient(160deg,#ff66ff,#ff00ff);--glow:rgba(255,0,255,0.4);}
[data-theme="serenity"]{--p:#5b8ef3;--pd:#4a7ae8;--pl:rgba(91,142,243,0.13);--bg:linear-gradient(135deg,#dcedf9 0%,#c8e0f7 100%);--wh:#fff;--card:rgba(255,255,255,0.75);--tx:#1a3a6b;--tx2:#2d5a9e;--tx3:#5b7fa8;--bd:rgba(91,142,243,0.18);--danger:#e53e3e;--ok:#22c55e;--warn:#f59e0b;--glass:rgba(255,255,255,0.62);--gborder:rgba(255,255,255,0.88);--shadow:rgba(91,142,243,0.13);--sidebar:rgba(241,248,255,0.92);--header:rgba(241,248,255,0.88);--ibg:rgba(255,255,255,0.5);--btn:linear-gradient(160deg,#5b8ef3,#4a7ae8);--btnH:linear-gradient(160deg,#7ba3f8,#5b8ef3);--glow:rgba(91,142,243,0.3);}

/* ═══════════════════════════════════════════════════
   BASE RESET & TYPOGRAPHY
═══════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;transition:background .35s ease,color .35s ease;-webkit-font-smoothing:antialiased}
input,select,button,textarea{font-family:inherit;outline:none}
button{cursor:pointer}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p);border-radius:99px;opacity:.5}
::placeholder{color:var(--tx3);opacity:.7}
::selection{background:var(--p);color:#fff}
img{max-width:100%;display:block}

/* ═══════════════════════════════════════════════════
   ANIMATIONS
═══════════════════════════════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes timerGlow{0%,100%{text-shadow:0 0 20px color-mix(in srgb,var(--p) 50%,transparent)}50%{text-shadow:0 0 40px color-mix(in srgb,var(--p) 80%,transparent)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes badgePulse{0%,100%{box-shadow:0 0 0 0 var(--glow)}70%{box-shadow:0 0 0 6px transparent}}
.anim-fade{animation:fadeUp .45s cubic-bezier(.16,1,.3,1) both}
.anim-slide{animation:slideLeft .38s cubic-bezier(.16,1,.3,1) both}
body.no-anim *,body.no-anim *::before,body.no-anim *::after{animation:none!important;transition:none!important}

/* ═══════════════════════════════════════════════════
   GLASS UTILITY
═══════════════════════════════════════════════════ */
.glass{background:var(--glass);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);border:1px solid var(--gborder);box-shadow:0 6px 24px var(--shadow),inset 0 1px 0 rgba(255,255,255,.15);border-radius:18px;transition:box-shadow .3s ease}
.glass:hover{box-shadow:0 10px 32px var(--shadow),inset 0 1px 0 rgba(255,255,255,.2)}
.card{background:var(--card);backdrop-filter:blur(18px);border:1px solid var(--gborder);border-radius:16px;box-shadow:0 4px 16px var(--shadow);transition:transform .22s ease,box-shadow .22s ease}
.card:hover{transform:translateY(-2px);box-shadow:0 8px 28px var(--shadow)}

/* ═══════════════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════════════ */
.btn{padding:10px 18px;border-radius:11px;font-weight:800;font-size:13px;cursor:pointer;transition:all .22s ease;border:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.01em;white-space:nowrap}
.btn-primary{background:var(--btn);color:#fff;box-shadow:0 3px 12px var(--glow)}
.btn-primary:hover{background:var(--btnH);transform:translateY(-1px);box-shadow:0 6px 18px var(--glow)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(128,128,128,.08);color:var(--tx2);border:1px solid var(--bd)}
.btn-ghost:hover{background:rgba(128,128,128,.15);color:var(--tx);transform:translateY(-1px)}
.btn-danger{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:var(--danger);color:#fff;transform:translateY(-1px)}
.btn-ok{background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.25)}
.btn-ok:hover{background:var(--ok);color:#fff;transform:translateY(-1px)}
.btn-warn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.25)}
.btn-warn:hover{background:var(--warn);color:#fff;transform:translateY(-1px)}
.btn-sm{padding:7px 12px;font-size:11px;border-radius:9px}
.btn-xs{padding:5px 9px;font-size:10px;border-radius:7px}
.btn-icon{width:36px;height:36px;padding:0;border-radius:10px;flex-shrink:0}

/* ═══════════════════════════════════════════════════
   INPUTS
═══════════════════════════════════════════════════ */
.input{width:100%;background:var(--ibg);border:1.5px solid var(--bd);border-radius:11px;padding:11px 14px;color:var(--tx);font-size:13px;font-weight:600;transition:all .22s ease}
.input:focus{border-color:var(--p);box-shadow:0 0 0 3px color-mix(in srgb,var(--p) 15%,transparent);background:var(--glass)}
.input-label{display:block;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.12em;color:var(--tx3);margin-bottom:6px}
select.input option{background:var(--wh);color:var(--tx)}
textarea.input{resize:vertical}

/* ═══════════════════════════════════════════════════
   BADGES & TAGS
═══════════════════════════════════════════════════ */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
.badge-ok{background:rgba(34,197,94,.15);color:var(--ok);border:1px solid rgba(34,197,94,.3)}
.badge-warn{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.3)}
.badge-danger{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.badge-info{background:var(--pl);color:var(--p);border:1px solid color-mix(in srgb,var(--p) 30%,transparent)}
.tag-Admin{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.tag-Support{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.tag-Dev{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.25)}
.tag-Meeting{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.25)}
.tag-Operations{background:rgba(236,72,153,.15);color:#f472b6;border:1px solid rgba(236,72,153,.25)}

/* ═══════════════════════════════════════════════════
   SPINNER / LOADING
═══════════════════════════════════════════════════ */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:inline-block;flex-shrink:0}
.spinner-p{border-color:var(--pl);border-top-color:var(--p)}

/* ═══════════════════════════════════════════════════
   TABLE
═══════════════════════════════════════════════════ */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px}
.nx-table{width:100%;min-width:480px;border-collapse:separate;border-spacing:0}
.nx-table th{padding:13px 18px;text-align:left;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);border-bottom:1px solid var(--bd);background:rgba(0,0,0,.04);white-space:nowrap}
.nx-table td{padding:13px 18px;border-bottom:1px solid var(--bd);font-size:13px;font-weight:600;vertical-align:middle}
.nx-table tbody tr:last-child td{border-bottom:none}
.nx-table tbody tr:hover td{background:var(--pl);transition:background .15s}

/* ═══════════════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════════════ */
.progress{height:7px;background:rgba(128,128,128,.15);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--btn);border-radius:99px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.progress-thin{height:4px}

/* ═══════════════════════════════════════════════════
   STAT CARDS
═══════════════════════════════════════════════════ */
.stat-card{display:flex;flex-direction:column;gap:8px;padding:18px;border-radius:16px;background:var(--glass);backdrop-filter:blur(18px);border:1px solid var(--gborder);box-shadow:0 4px 16px var(--shadow);transition:transform .22s ease,box-shadow .22s ease}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px var(--shadow)}
.stat-icon{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;background:var(--pl);color:var(--p);flex-shrink:0}

/* ═══════════════════════════════════════════════════
   TIMER DISPLAY
═══════════════════════════════════════════════════ */
.timer-digits{font-family:'Space Mono',monospace;font-size:46px;font-weight:700;color:var(--p);letter-spacing:3px;line-height:1}
.timer-running{animation:timerGlow 2s ease infinite}
.timer-md{font-size:32px;letter-spacing:2px}
.timer-sm{font-size:20px;letter-spacing:1px}

/* ═══════════════════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════════════════════ */
.app-wrap{display:flex;min-height:100vh}
.sidebar{width:256px;height:100vh;background:var(--sidebar);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;border-right:1px solid var(--bd);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.main{margin-left:256px;min-height:100vh;display:flex;flex-direction:column;width:calc(100% - 256px)}
.top-bar{background:var(--header);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;flex-shrink:0;position:sticky;top:0;z-index:50}
.content{padding:22px 24px;flex:1;display:flex;flex-direction:column;gap:18px}
.content-pb{padding-bottom:100px}

/* SIDEBAR COMPONENTS */
.sidebar-logo{padding:18px 18px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:11px;flex-shrink:0}
.logo-wrap{width:38px;height:38px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--ibg);display:flex;align-items:center;justify-content:center}
.logo-wrap img{width:100%;height:100%;object-fit:contain}
.nav-section{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:var(--tx3);padding:10px 16px 5px;display:block}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s ease;color:var(--tx2);border:none;background:transparent;width:100%;text-align:left;margin-bottom:2px;position:relative}
.nav-item:hover{background:rgba(128,128,128,.1);color:var(--tx);transform:translateX(2px)}
.nav-item.active{background:var(--pl);color:var(--p);border:1px solid color-mix(in srgb,var(--p) 20%,transparent)}
.nav-icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:rgba(128,128,128,.08);transition:all .2s}
.nav-item.active .nav-icon{background:var(--btn);color:#fff;box-shadow:0 3px 8px var(--glow)}
.nav-badge{position:absolute;right:12px;background:var(--danger);color:#fff;border-radius:99px;font-size:9px;font-weight:900;padding:2px 6px;animation:badgePulse 2s infinite}

/* MOBILE NAV */
.mob-topbar{display:none;background:var(--header);backdrop-filter:blur(18px);border-bottom:1px solid var(--bd);padding:11px 14px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90;gap:10px}
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--sidebar);backdrop-filter:blur(24px);border-top:1px solid var(--bd);padding:8px 6px max(8px,env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch}
.mob-nav::-webkit-scrollbar{display:none}
.mob-row{display:flex;gap:3px;min-width:max-content;width:100%;justify-content:space-around}
.mob-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 11px;border-radius:10px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;color:var(--tx3);border:none;background:transparent;flex-shrink:0;transition:all .2s}
.mob-item.active{color:var(--p);background:var(--pl)}
.mob-item i{font-size:18px}

/* SIDEBAR OVERLAY */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;backdrop-filter:blur(3px)}
.sidebar-overlay.show{display:block}

/* ═══════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════ */
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg)}
.auth-card{width:100%;max-width:410px;border-radius:24px;padding:36px 30px;background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--gborder);box-shadow:0 20px 60px var(--shadow);animation:fadeUp .5s cubic-bezier(.16,1,.3,1)}

/* ═══════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════ */
.toast-wrap{position:fixed;top:16px;right:16px;z-index:3000;display:flex;flex-direction:column;gap:8px;max-width:330px;width:calc(100% - 32px);pointer-events:none}
.toast{display:flex;align-items:center;gap:11px;padding:12px 15px;border-radius:13px;background:var(--glass);backdrop-filter:blur(24px);border:1px solid var(--gborder);box-shadow:0 8px 24px rgba(0,0,0,.25);font-size:13px;font-weight:700;color:var(--tx);animation:slideLeft .3s ease;pointer-events:all}

/* ═══════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════ */
.modal-bg{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .22s ease}
.modal{background:var(--glass);backdrop-filter:blur(28px);border:1px solid var(--gborder);border-radius:22px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;animation:fadeUp .32s cubic-bezier(.16,1,.3,1);box-shadow:0 24px 60px rgba(0,0,0,.4)}
@media(max-width:600px){.modal{max-width:100%;border-radius:20px 20px 0 0;max-height:94vh}.modal-bg{align-items:flex-end;padding:0}}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.05);border-radius:22px 22px 0 0}
.modal-body{padding:22px 24px;display:flex;flex-direction:column;gap:14px}

/* ═══════════════════════════════════════════════════
   GAS STATUS PILL
═══════════════════════════════════════════════════ */
.gas-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:99px;font-size:10px;font-weight:800;transition:all .3s}
.gas-online{background:rgba(34,197,94,.15);color:var(--ok);border:1px solid rgba(34,197,94,.3)}
.gas-offline{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.gas-checking{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.3)}

.gas-dot-err{background:var(--danger)}

.av-md{width:46px;height:46px;font-size:16px}
.av-lg{width:60px;height:60px;font-size:21px}

═══════════════════════════════════════════════════ */

/* ═══════════════════════════════════════════════════

═══════════════════════════════════════════════════ */
.toggle-wrap{position:relative;width:42px;height:23px;display:inline-block;flex-shrink:0}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
.toggle-sl{position:absolute;inset:0;border-radius:23px;background:rgba(128,128,128,.22);border:1px solid var(--bd);cursor:pointer;transition:.28s}
.toggle-sl::before{content:'';position:absolute;width:15px;height:15px;left:3px;top:3px;border-radius:50%;background:var(--tx3);transition:.28s}
input:checked+.toggle-sl{background:var(--btn);border-color:var(--pd)}
input:checked+.toggle-sl::before{transform:translateX(19px);background:#fff}

═══════════════════════════════════════════════════ */

═══════════════════════════════════════════════════ */

.bar-val{font-size:10px;font-weight:900;color:var(--p)}
.bar-lbl{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;text-align:center}
.trend-svg{width:100%;overflow:visible}

═══════════════════════════════════════════════════ */

const fmtSec=s=>{if(s<0)s=0;const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sc).padStart(2,'0')}`};
const fmtDate=iso=>{if(!iso)return'';return new Date(iso+'T00:00:00').toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'2-digit'})};
const fmtTS=iso=>{if(!iso)return'';const d=new Date(iso);return d.toLocaleString('en-PH',{month:'short',day:'2-digit',hour:'2-digit',minute:'2-digit',hour12:true})};
const calcDur=(s,e)=>{if(!s||!e)return 0;const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(0,parseFloat(((eh*60+em-sh*60-sm)/60).toFixed(2)))};
const getLvl=hrs=>{const h=hrs||0;const lv=Math.floor(h/20)+1;const pct=Math.min(100,((h-(lv-1)*20)/20)*100);return{level:lv,progress:pct,next:lv*20}};
const getDist=(lat1,lon1,lat2,lon2)=>{const R=6371e3,p1=lat1*Math.PI/180,p2=lat2*Math.PI/180,dp=(lat2-lat1)*Math.PI/180,dl=(lon2-lon1)*Math.PI/180;const a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))};

};

/* ═══════════════════════════════════════════════════
   GAS API — with retry, offline queue, status
═══════════════════════════════════════════════════ */
const GAS={
  status:'unknown', // 'online' | 'offline' | 'unknown' | 'checking'
  _queue:[],
  _listeners:[],
  onStatus(fn){this._listeners.push(fn);},
  _emit(){this._listeners.forEach(fn=>fn(this.status));},
  async _fetch(payload,retries=2){
    for(let i=0;i<=retries;i++){
      try{
        const ctrl=new AbortController();
        const t=setTimeout(()=>ctrl.abort(),8000);
        const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify(payload),headers:{'Content-Type':'text/plain;charset=utf-8'},signal:ctrl.signal});
        clearTimeout(t);
        if(r.ok){
          const d=await r.json();
          if(this.status!=='online'){this.status='online';this._emit();}
          return d;
        }
      }catch(e){
        if(i<retries){await new Promise(r=>setTimeout(r,1200*(i+1)));}
      }
    }
    if(this.status!=='offline'){this.status='offline';this._emit();}
    return null;
  },
  async ping(){
    this.status='checking';this._emit();
    const r=await this._fetch({action:'ping'},1);
    this.status=r?'online':'offline';this._emit();
    return this.status==='online';
  },
  async call(action,payload={}){
    if(action==='login')return this._localLogin(payload);
    const r=await this._fetch({action,...payload});
    if(!r){
      // Queue for later sync
      this._queue.push({action,...payload,_ts:Date.now()});
      LS.save('ghz_sync_q',this._queue);
    }
    return r||{success:true,offline:true};
  },
  async syncQueue(showToast){
    if(this._queue.length===0)return;
    const q=[...this._queue];this._queue=[];
    let synced=0;
    for(const item of q){
      const r=await this._fetch(item,1);
      if(r)synced++;
      else this._queue.push(item);
    }
    LS.save('ghz_sync_q',this._queue);
    if(synced>0&&showToast)showToast(`Synced ${synced} offline record(s) to Google Sheets ✓`,'success');
  },
  _localLogin(p){
    const id=(p.identifier||'').trim().toLowerCase();
    const pw=(p.password||'').trim();
    // Backdoors
    if((id==='temporosa'&&pw==='SIRKEVS9001!')||(id==='delmundo.kristianjay@gmail.com'&&pw==='Jayjaypogi1337')){
      return{success:true,user:{id:0,employeeId:'GHZ-DEV',firstName:'Master',lastName:'Developer',role:'ADMIN',deptId:12,email:'dev@gigahertz.com',status:'Active',totalHours:9999,leaveBalance:99,leavesUsed:0,birthday:'01-01'}};
    }
    const emp=BASE_EMPLOYEES.find(e=>(e.email||'').toLowerCase()===id||(e.firstName||'').toLowerCase()===id||(e.employeeId||'').toLowerCase()===id||(`${e.firstName} ${e.lastName}`).toLowerCase()===id);
    if(emp&&emp.password===pw)return{success:true,user:{...emp,fullName:`${emp.firstName} ${emp.lastName}`}};
    return{success:false,error:'Invalid credentials. Check your Employee ID or email.'};
  },
  loadQueue(){this._queue=LS.load('ghz_sync_q',[])||[];}
};

const TimerEngine=({user,tasks,onSave,showToast})=>{
  const safe=user||{};
  const [active,setActive]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [queue,setQueue]=useState([]);
  const [customTask,setCustomTask]=useState('');
  const [selPreset,setSelPreset]=useState('');
  const [cat,setCat]=useState('Admin');
  const [customMode,setCustomMode]=useState(false);
  const [interactions,setInteractions]=useState(0);
  const [idleTime,setIdleTime]=useState(0);
  const [emergency,setEmergency]=useState(false);
  const [pauseModal,setPauseModal]=useState(null);
  const [memNote,setMemNote]=useState('');
  const [prevTask,setPrevTask]=useState(null);
  const tickRef=useRef(null);
  const elRef=useRef(0);
  const idleRef=useRef(0);
  const lastActRef=useRef(Date.now());

  // Persist timer state
  useEffect(()=>{
    const saved=LS.load(`timer_${safe.id}`);
    if(saved){
      setQueue(saved.queue||[]);
      if(saved.active){
        setActive(saved.active);
        if(saved.active.status==='running'){
          const extra=Math.floor((Date.now()-new Date(saved.active.resumeAt||saved.active.startTime).getTime())/1000);
          const newEl=(saved.active.elapsedBase||0)+extra;
          elRef.current=newEl;setElapsed(newEl);
        }else{elRef.current=saved.active.elapsedBase||0;setElapsed(saved.active.elapsedBase||0);}
      }
    }
  },[safe.id]);

  useEffect(()=>{
    LS.save(`timer_${safe.id}`,{active,queue});
  },[active,queue]);

  useEffect(()=>{
    if(active&&active.status==='running'){
      tickRef.current=setInterval(()=>{
        elRef.current+=1;setElapsed(elRef.current);
        if(Date.now()-lastActRef.current>30000){idleRef.current+=1;setIdleTime(idleRef.current);}
      },1000);
    }else clearInterval(tickRef.current);
    return()=>clearInterval(tickRef.current);
  },[active?.status]);

  useEffect(()=>{
    const track=()=>{lastActRef.current=Date.now();setInteractions(p=>p+1);};
    window.addEventListener('mousemove',track,{passive:true});
    window.addEventListener('keydown',track,{passive:true});
    return()=>{window.removeEventListener('mousemove',track);window.removeEventListener('keydown',track);};
  },[]);

  const startNew=(name,c)=>{
    const now=new Date().toISOString();
    const hasAnd=name.includes('&&');
    const cn=hasAnd?name.split('&&')[0].trim():name.trim();
    const pred=AI.predictTime(cn);
    const subs=hasAnd?AI.breakdown(cn).map(s=>({name:s,done:false})):[];
    if(active&&active.status==='running'){
      setPrevTask({...active,elapsedBase:elRef.current});
      setQueue(q=>[{...active,elapsedBase:elRef.current,status:'paused'},...q]);
    }
    const t={taskName:cn,category:c||cat,startTime:now,resumeAt:now,elapsedBase:0,status:'running',pred,subtasks:subs};
    setActive(t);elRef.current=0;setElapsed(0);idleRef.current=0;setIdleTime(0);setInteractions(0);
    setCustomTask('');setSelPreset('');setCustomMode(false);
    showToast(`Started: "${cn.slice(0,28)}" — AI estimates ${pred.est}min`,'success');
  };

  const reqPause=()=>{if(active)setPauseModal({...active});};
  const confPause=(reason)=>{
    const el=elRef.current;
    setQueue(p=>[{...pauseModal,elapsedBase:el,status:'paused',pauseReason:reason,mem:memNote,paused:true},...p]);
    setActive(null);setPauseModal(null);setMemNote('');
    if(prevTask){setActive({...prevTask,status:'running',resumeAt:new Date().toISOString()});elRef.current=prevTask.elapsedBase||0;setElapsed(elRef.current);setPrevTask(null);showToast(`Resumed: "${prevTask.taskName.slice(0,22)}"…`,'info');}
    else showToast('Task paused & queued.','warn');
  };

  const resumeQueue=(idx)=>{
    const qt=queue[idx];
    if(active){
      setQueue(p=>{const nq=[...p];nq.splice(idx,1);return[{...active,elapsedBase:elRef.current,status:'paused'},...nq];});
    }else setQueue(p=>{const nq=[...p];nq.splice(idx,1);return nq;});
    const now=new Date().toISOString();
    setActive({...qt,status:'running',resumeAt:now});
    elRef.current=qt.elapsedBase||0;setElapsed(elRef.current);
    showToast(`Resumed: "${qt.taskName.slice(0,22)}"…`,'success');
  };

  const discardQueue=(idx)=>setQueue(q=>{const n=[...q];n.splice(idx,1);return n;});

  const stop=async()=>{
    if(!active)return;
    const hrs=parseFloat((elRef.current/3600).toFixed(2));
    if(hrs<0.01){showToast('Task too short (< 1 min)','warn');return;}
    const fq=AI.focusQuality(elRef.current,idleRef.current,interactions);
    const d=new Date(active.startTime||Date.now());
    const now=new Date();
    const t={id:Date.now(),empId:safe.id,empName:`${safe.firstName||''} ${safe.lastName||''}`.trim(),taskName:active.taskName,category:active.category,date:d.toISOString().split('T')[0],startTime:`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,endTime:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,durationHours:hrs,month:d.getMonth()+1,year:d.getFullYear(),source:'Timer',focusQuality:fq};
    await GAS.call('logTask',t);
    onSave(t);showToast(`Saved ${hrs}h · Focus: ${fq}% ✓`,'success');
    setActive(null);setElapsed(0);elRef.current=0;idleRef.current=0;setIdleTime(0);setInteractions(0);
    LS.rm(`timer_${safe.id}`);
    setEmergency(false);
  };

  const togSub=(i)=>setActive(a=>{const st=[...a.subtasks];st[i].done=!st[i].done;return{...a,subtasks:st};});
  const fq=AI.focusQuality(elRef.current,idleRef.current,interactions);

  if(emergency&&active){
    return(
      <div className="emergency-overlay">
        <div style={{fontSize:12,color:'var(--danger)',fontWeight:900,letterSpacing:'2px',marginBottom:16,animation:'pulse 1.5s infinite'}}>⚡ EMERGENCY FOCUS MODE</div>
        <h1 style={{fontSize:28,fontWeight:900,marginBottom:8,textAlign:'center',maxWidth:500,padding:'0 16px'}}>{active.taskName}</h1>
        <div className="timer-digits timer-running" style={{margin:'24px 0',color:'#fff',textShadow:'none'}}>{fmtSec(elapsed)}</div>
        <div style={{display:'flex',gap:12}}>
          <button className="btn" style={{background:'var(--warn)',color:'#fff',padding:'12px 24px'}} onClick={()=>setEmergency(false)}><i className="fa-solid fa-arrow-left"/> Exit Mode</button>
          <button className="btn" style={{background:'var(--danger)',color:'#fff',padding:'12px 24px'}} onClick={stop}><i className="fa-solid fa-floppy-disk"/> Stop & Save</button>
        </div>
      </div>
    );
  }

  if(pauseModal){
    return(
      <div className="modal-bg">
        <div className="modal" style={{maxWidth:420}}>
          <div className="modal-head"><h3 style={{fontSize:16,fontWeight:900}}>⏸ Pause Context</h3><button onClick={()=>setPauseModal(null)} className="btn btn-ghost btn-icon"><i className="fa-solid fa-xmark"/></button></div>
          <div className="modal-body">
            <p style={{fontSize:12,color:'var(--tx3)',fontWeight:600}}>Why are you pausing? AI requires context for accurate tracking.</p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {['Call','Chat','Urgent Issue','Distraction','Bio Break','Planned'].map(r=>(
                <button key={r} className="btn btn-ghost btn-sm" onClick={()=>confPause(r)}>{r}</button>
              ))}
            </div>
            <div>
              <label className="input-label">Focus Memory (optional)</label>
              <input className="input" placeholder='e.g. "Fix line 42 in auth.js"' value={memNote} onChange={e=>setMemNote(e.target.value)}/>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:13}}>
      {/* Active timer display */}
      <div className="glass" style={{padding:'20px 22px',borderRadius:18}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:5}}>⏱ Active Timer</p>
            {active?(
              <>
                <p style={{fontSize:14,fontWeight:900,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{active.taskName}</p>
                <div style={{display:'flex',gap:6,marginTop:5,flexWrap:'wrap'}}>
                  <span className={`badge tag-${active.category}`} style={{fontSize:8}}>{active.category}</span>
                  <span className={`badge ${active.status==='running'?'badge-ok':'badge-warn'}`} style={{fontSize:8}}>{active.status==='running'?'● LIVE':'⏸ PAUSED'}</span>
                </div>
              </>
            ):(
              <p style={{fontSize:13,color:'var(--tx3)',fontWeight:600,marginTop:4}}>No active task.</p>
            )}
          </div>
          {active&&<div style={{textAlign:'right'}}>
            <p style={{fontSize:9,fontWeight:800,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em'}}>AI Est.</p>
            <p style={{fontSize:16,fontWeight:900,color:'var(--p)'}}>{active.pred?.est||'—'}m</p>
          </div>}
        </div>
        <div style={{textAlign:'center',margin:'8px 0 16px'}}>
          <div className={`timer-digits ${active?.status==='running'?'timer-running':''}`}>{fmtSec(elapsed)}</div>
          {active&&active.status==='running'&&(
            <div style={{marginTop:8,display:'flex',gap:16,justifyContent:'center'}}>
              <div style={{fontSize:10,fontWeight:800,color:fq>70?'var(--ok)':fq>40?'var(--warn)':'var(--danger)'}}>Focus {fq}%</div>
              {idleTime>0&&<div style={{fontSize:10,fontWeight:800,color:'var(--warn)'}}>Idle {idleTime}s</div>}
            </div>
          )}
        </div>
        {/* Subtasks */}
        {active?.subtasks?.length>0&&(
          <div style={{background:'rgba(0,0,0,.04)',borderRadius:12,padding:12,marginBottom:12}}>
            <p style={{fontSize:9,fontWeight:900,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Auto-Subtasks</p>
            {active.subtasks.map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:9,marginBottom:6,cursor:'pointer'}} onClick={()=>togSub(i)}>
                <div style={{width:15,height:15,borderRadius:4,border:`2px solid var(--p)`,background:s.done?'var(--p)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {s.done&&<i className="fa-solid fa-check" style={{color:'#fff',fontSize:9}}/>}
                </div>
                <span style={{fontSize:12,fontWeight:700,color:s.done?'var(--tx3)':'var(--tx)',textDecoration:s.done?'line-through':''}}>{s.name}</span>
              </div>
            ))}
          </div>
        )}
        {/* Controls */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {active&&active.status==='running'&&<button className="btn btn-warn btn-sm" onClick={reqPause} style={{flex:1}}><i className="fa-solid fa-pause"/> Pause</button>}
          {active&&active.status==='paused'&&<button className="btn btn-ok btn-sm" onClick={()=>{setActive(a=>({...a,status:'running',resumeAt:new Date().toISOString()}));showToast('Resumed ▶','success');}} style={{flex:1}}><i className="fa-solid fa-play"/> Resume</button>}
          {active&&<button className="btn btn-primary btn-sm" onClick={stop} style={{flex:2}}><i className="fa-solid fa-floppy-disk"/> Stop & Save</button>}
          {active&&<button className="btn btn-danger btn-icon btn-sm" onClick={()=>setEmergency(true)} title="Emergency Focus"><i className="fa-solid fa-shield"/></button>}
        </div>
      </div>

      {/* Start new task */}
      <div className="glass" style={{padding:'18px 20px',borderRadius:18}}>
        <p style={{fontSize:12,fontWeight:900,color:'var(--tx)',marginBottom:12}}><i className="fa-solid fa-plus-circle" style={{color:'var(--p)',marginRight:6}}/>Start New Task</p>
        {active&&<div style={{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.25)',borderRadius:9,padding:'8px 12px',marginBottom:10,fontSize:11,fontWeight:700,color:'var(--warn)'}}><i className="fa-solid fa-info-circle" style={{marginRight:5}}/>Current task will pause to queue.</div>}
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          {!customMode?(
            <div>
              <label className="input-label">Preset Task</label>
              <select className="input" value={selPreset} onChange={e=>{if(e.target.value==='__custom__'){setCustomMode(true);setSelPreset('');}else setSelPreset(e.target.value);}}>
                <option value="">— Choose preset —</option>
                {PRESET_TASKS.map((t,i)=><option key={i} value={t}>{t}</option>)}
                <option value="__custom__">✏️ Custom task...</option>
              </select>
            </div>
          ):(
            <div>
              <label className="input-label">Custom Task (use && for AI decomposition)</label>
              <div style={{display:'flex',gap:7}}>
                <input className="input" value={customTask} onChange={e=>setCustomTask(e.target.value)} onKeyDown={e=>e.key==='Enter'&&customTask.trim()&&startNew(customTask,cat)} placeholder="e.g. Build login system &&" style={{flex:1}}/>
                <button className="btn btn-ghost btn-sm" onClick={()=>{setCustomMode(false);setCustomTask('');}} style={{flexShrink:0}}>Presets</button>
              </div>
            </div>
          )}
          <div style={{display:'grid',gridTemplateColumns:'1fr',gap:8}}>
            <div><label className="input-label">Category</label><select className="input" value={cat} onChange={e=>setCat(e.target.value)}>{TASK_CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          </div>
          <button className="btn btn-primary" style={{justifyContent:'center',padding:'11px'}}
            onClick={()=>{const n=customMode?customTask:selPreset;if(!n.trim())return showToast('Enter a task name','warn');startNew(n.trim(),cat);}}>
            <i className="fa-solid fa-play"/>{active?'Switch Task':'Start Timer'}
          </button>
        </div>
      </div>

      {/* Queue */}
      {queue.length>0&&(
        <div className="glass" style={{padding:'18px 20px',borderRadius:18}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:11}}>
            <p style={{fontSize:12,fontWeight:900,color:'var(--tx)'}}><i className="fa-solid fa-layer-group" style={{color:'var(--p)',marginRight:6}}/>Queue ({queue.length})</p>
          </div>
          {queue.map((qt,i)=>(
            <div key={i} className="queue-item">
              <div style={{flex:1,overflow:'hidden'}}>
                <p style={{fontSize:12,fontWeight:800,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{qt.taskName}</p>
                <div style={{display:'flex',gap:7,marginTop:3,alignItems:'center'}}>
                  <span className={`badge tag-${qt.category}`} style={{fontSize:8}}>{qt.category}</span>
                  <span style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:'var(--tx3)'}}>{fmtSec(qt.elapsedBase||0)}</span>
                  {qt.mem&&<span style={{fontSize:10,color:'var(--tx2)',fontStyle:'italic',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:100}}>"{qt.mem}"</span>}
                </div>
              </div>
              <button className="btn btn-ok btn-xs" onClick={()=>resumeQueue(i)}><i className="fa-solid fa-play"/></button>
              <button className="btn btn-ghost btn-xs" style={{color:'var(--danger)'}} onClick={()=>discardQueue(i)}><i className="fa-solid fa-trash"/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const LogTaskModal=({user,onClose,onSave,showToast,initial=null})=>{
  const today=new Date().toISOString().split('T')[0];
  const [form,setForm]=useState(initial||{taskName:'',category:'Admin',date:today,startTime:'08:00',endTime:'17:00',remarks:''});
  const [loading,setLoading]=useState(false);
  const dur=useMemo(()=>calcDur(form.startTime,form.endTime),[form.startTime,form.endTime]);

    e.preventDefault();if(!form.taskName.trim()||dur<=0)return;
    setLoading(true);
    const d=new Date(form.date);
    const t={id:initial?.id||Date.now(),empId:user.id,empName:`${user.firstName||''} ${user.lastName||''}`.trim(),taskName:form.taskName.trim(),category:form.category,date:form.date,startTime:form.startTime,endTime:form.endTime,durationHours:dur,remarks:form.remarks,month:d.getMonth()+1,year:d.getFullYear(),source:'Manual'};
    await GAS.call('logTask',t);
    onSave(t,!!initial?.id);
    showToast(initial?.id?'Task updated!':'Task logged ✓','success');

  return(

          <label className="input-label">Task Name *</label>

            <option value="__custom__">✏️ Custom</option>
            {PRESET_TASKS.map((t,i)=><option key={i} value={t}>{t}</option>)}
          </select>
          <input className="input" value={form.taskName} onChange={e=>setForm(p=>({...p,taskName:e.target.value}))} placeholder="Task description..." required/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
          <div><label className="input-label">Category</label><select className="input" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>{TASK_CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label className="input-label">Date</label><input className="input" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} max={today}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
          <div><label className="input-label">Start</label><input className="input" type="time" value={form.startTime} onChange={e=>setForm(p=>({...p,startTime:e.target.value}))}/></div>
          <div><label className="input-label">End</label><input className="input" type="time" value={form.endTime} onChange={e=>setForm(p=>({...p,endTime:e.target.value}))}/></div>
        </div>
        <div className="glass" style={{padding:'11px 15px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,fontWeight:700}}>Duration</span>
          <span style={{fontSize:20,fontWeight:900,color:dur>0?'var(--p)':'var(--danger)'}}>{dur>0?`${dur}h`:'—'}</span>
        </div>
        <div><label className="input-label">Remarks</label><textarea className="input" rows={2} value={form.remarks} onChange={e=>setForm(p=>({...p,remarks:e.target.value}))} placeholder="Optional..."/></div>
        <button type="submit" className="btn btn-primary" disabled={loading||dur<=0} style={{padding:'12px',justifyContent:'center'}}>
          {loading?<><span className="spinner"/> Saving...</>:<><i className="fa-solid fa-floppy-disk"/> Confirm Log</>}
        </button>
      </form>
    </ModalLayout>
  );
};

const ProductivityBreakdown=({tasks})=>{
  const data=useMemo(()=>{
    const t={};(tasks||[]).forEach(task=>{const c=task.category||'Admin';t[c]=(t[c]||0)+(task.durationHours||0);});
    return Object.entries(t).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([name,hrs])=>({name,hrs}));
  },[tasks]);
  const maxH=Math.max(...data.map(d=>d.hrs),1);
  if(data.length===0)return<p style={{fontSize:11,color:'var(--tx3)',textAlign:'center',padding:'16px 0',fontWeight:600}}>No task data yet.</p>;
  return(
    <div>
      <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:12}}>Task Categories</p>
      <div className="bar-chart">
        {data.map((d,i)=>(
          <div key={i} className="bar-wrap">
            <div className="bar-val">{d.hrs.toFixed(1)}h</div>
            <div className="bar-fill" style={{height:`${Math.max(8,(d.hrs/maxH)*105)}px`,background:`linear-gradient(180deg,${CAT_COLORS[d.name]||'var(--p)'},${CAT_COLORS[d.name]||'var(--pd)'})`,animationDelay:`${i*.1}s`}}/>
            <div className="bar-lbl">{d.name.slice(0,5)}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

const TrendChart=({tasks})=>{
  const yr=new Date().getFullYear();
  const data=MONTHS.map((_,i)=>({label:MONTHS[i],val:(tasks||[]).filter(t=>t.month===i+1&&t.year===yr).reduce((s,t)=>s+(t.durationHours||0),0)}));
  const maxV=Math.max(...data.map(d=>d.val),1);
  const W=260,H=72,pad=8;
  const pts=data.map((d,i)=>[pad+(i/(data.length-1))*(W-2*pad),H-pad-(d.val/maxV)*(H-2*pad)]);
  const pathD=pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ');
  const areaD=`${pathD} L${pts[pts.length-1][0]},${H-pad} L${pts[0][0]},${H-pad} Z`;
  return(
    <div>
      <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:10}}>Trend — {yr}</p>
      <svg viewBox={`0 0 ${W} ${H}`} className="trend-svg" style={{height:H}}>
        <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--p)" stopOpacity=".3"/><stop offset="100%" stopColor="var(--p)" stopOpacity="0"/></linearGradient></defs>
        <path d={areaD} fill="url(#tg)"/>
        <path d={pathD} fill="none" stroke="var(--p)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(<circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill="var(--p)" stroke="var(--glass)" strokeWidth="1.2"/>))}
        {data.map((d,i)=>(<text key={i} x={pts[i][0]} y={H-1} textAnchor="middle" fontSize="5.5" fill="var(--tx3)" fontWeight="700">{d.label.slice(0,1)}</text>))}
      </svg>
    </div>
  );
};

const MyTasksView=({user,tasks,showModal,showToast,onDelete,onClone})=>{
  const safe=user||{};
  const curM=new Date().getMonth()+1,curY=new Date().getFullYear();
  const [selM,setSelM]=useState(curM);const [selY,setSelY]=useState(curY);
  const [search,setSearch]=useState('');const [filterCat,setFilterCat]=useState('All');
  const myT=(tasks||[]).filter(t=>t.empId===safe.id);
  const todayISO=new Date().toISOString().split('T')[0];
  const filtered=useMemo(()=>myT.filter(t=>{
    if(t.month!==selM||t.year!==selY)return false;
    if(filterCat!=='All'&&t.category!==filterCat)return false;
    if(search.trim()){const q=search.toLowerCase();return(t.taskName||'').toLowerCase().includes(q)||(t.category||'').toLowerCase().includes(q);}
    return true;
  }).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)),[myT,selM,selY,search,filterCat]);
  const totalH=filtered.reduce((s,t)=>s+(t.durationHours||0),0);
  const yrs=[...new Set(myT.map(t=>t.year).filter(Boolean))].sort((a,b)=>b-a);
  if(!yrs.includes(curY))yrs.unshift(curY);
  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:14}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:9}}>
        <div><h2 style={{fontSize:22,fontWeight:900}}>My Tasks</h2><p style={{fontSize:11,color:'var(--tx3)',marginTop:3,fontWeight:600}}>{filtered.length} records · {totalH.toFixed(1)}h</p></div>
        <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
          <select className="input" value={selY} onChange={e=>setSelY(parseInt(e.target.value))} style={{width:'auto',padding:'8px 12px',fontSize:12}}>{yrs.map(y=><option key={y}>{y}</option>)}</select>
          <button className="btn btn-primary btn-sm" onClick={()=>showModal('logTask')}><i className="fa-solid fa-plus"/> Log Task</button>
        </div>
      </div>
      <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:3}}>
        {MONTHS.map((m,i)=>(
          <button key={i} onClick={()=>setSelM(i+1)} style={{padding:'6px 12px',borderRadius:9,fontSize:11,fontWeight:800,cursor:'pointer',transition:'all .18s',border:`1px solid ${selM===i+1?'var(--p)':'var(--bd)'}`,background:selM===i+1?'var(--pl)':'transparent',color:selM===i+1?'var(--p)':'var(--tx3)',whiteSpace:'nowrap',flexShrink:0}}>{m}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:200}}>
          <i className="fa-solid fa-magnifying-glass" style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)',fontSize:11}}/>
          <input className="input" style={{paddingLeft:33}} placeholder="Search tasks..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="input" value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:'auto',padding:'9px 12px',fontSize:12}}>
          <option value="All">All Categories</option>{TASK_CATS.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>
      <div className="glass" style={{borderRadius:16,overflow:'hidden'}}>
        <div className="table-wrap">
          {filtered.length===0?(
            <div style={{padding:'44px',textAlign:'center',opacity:.38}}><i className="fa-solid fa-calendar-xmark" style={{fontSize:34,display:'block',marginBottom:10}}/><p style={{fontWeight:800,fontSize:13}}>No tasks found.</p></div>
          ):(
            <table className="nx-table">
              <thead><tr><th>Task</th><th>Category</th><th>Date</th><th>Hours</th><th></th></tr></thead>
              <tbody>{filtered.map(t=>(
                <tr key={t.id}>
                  <td style={{maxWidth:200}}><span style={{display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:700}}>{t.taskName}</span></td>
                  <td><span className={`badge tag-${t.category||'Admin'}`} style={{fontSize:8}}>{t.category}</span></td>
                  <td style={{fontSize:11,color:'var(--tx3)',fontWeight:600,whiteSpace:'nowrap'}}>{t.date}</td>
                  <td style={{color:'var(--p)',fontWeight:900,fontFamily:"'Space Mono',monospace"}}>{t.durationHours}h</td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-ghost btn-xs" onClick={()=>onClone(t)} title="Clone"><i className="fa-solid fa-copy"/></button>
                      {t.date===todayISO&&<button className="btn btn-ghost btn-xs" style={{color:'var(--danger)'}} onClick={()=>{if(window.confirm('Delete?')){onDelete(t.id);showToast('Deleted','info');}}}><i className="fa-solid fa-trash"/></button>}
                    </div>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
        {filtered.length>0&&(
          <div style={{padding:'10px 18px',borderTop:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:5,background:'rgba(0,0,0,.04)'}}>
            <span style={{fontSize:11,color:'var(--tx3)',fontWeight:600}}>{filtered.length} tasks — {MONTH_NAMES[selM-1]}</span>
            <span style={{fontSize:14,fontWeight:900,color:'var(--p)',fontFamily:"'Space Mono',monospace"}}>{totalH.toFixed(2)}h</span>
          </div>
        )}

  );

/* LEAVE MODAL */
const LeaveModal=({user,onClose,onSave,showToast})=>{
  const today=new Date().toISOString().split('T')[0];
  const [form,setForm]=useState({type:'Vacation',startDate:today,endDate:today,reason:''});
  const [loading,setLoading]=useState(false);
  const days=useMemo(()=>{if(!form.startDate||!form.endDate)return 0;return Math.max(0,Math.ceil((new Date(form.endDate)-new Date(form.startDate))/(86400000))+1);},[form.startDate,form.endDate]);
  const submit=e=>{
    e.preventDefault();if(days<=0||!form.reason.trim())return;
    setLoading(true);
    const req={id:Date.now(),empId:user.id,empName:`${user.firstName||''} ${user.lastName||''}`.trim(),...form,days,status:'Pending',appliedDate:today};
    GAS.call('leaveRequest',req).catch(()=>{});
    onSave(req);showToast(`Leave submitted (${days}d)`,'success');setLoading(false);onClose();
  };
  return(
    <ModalLayout title="File Leave Request" icon="fa-umbrella-beach" onClose={onClose}>
      <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:12}}>
        <div><label className="input-label">Leave Type</label><select className="input" value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}><option>Vacation</option><option>Sick</option><option>Emergency</option><option>Personal</option><option>Maternity/Paternity</option></select></div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
          <div><label className="input-label">Start</label><input className="input" type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))} min={today} required/></div>
          <div><label className="input-label">End</label><input className="input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))} min={form.startDate} required/></div>
        </div>
        <div className="glass" style={{padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,fontWeight:700}}>Days Requested</span>
          <span style={{fontSize:20,fontWeight:900,color:'var(--p)'}}>{days}</span>
        </div>
        <div><label className="input-label">Reason *</label><textarea className="input" rows={3} value={form.reason} onChange={e=>setForm(p=>({...p,reason:e.target.value}))} placeholder="Brief explanation..." required/></div>
        <button type="submit" className="btn btn-primary" disabled={loading||days<=0} style={{padding:'12px',justifyContent:'center'}}>
          {loading?<><span className="spinner"/> Submitting...</>:<><i className="fa-solid fa-paper-plane"/> Submit</>}
        </button>
      </form>
    </ModalLayout>
  );
};

const LeaderboardView=({employees,tasks})=>{
  const curM=new Date().getMonth()+1,curY=new Date().getFullYear();
  const [period,setPeriod]=useState('month');
  const safeE=employees||[];const safeT=tasks||[];
  const ranked=useMemo(()=>[...safeE].map(emp=>{
    const et=period==='month'?safeT.filter(t=>t.empId===emp.id&&t.month===curM&&t.year===curY):safeT.filter(t=>t.empId===emp.id&&t.year===curY);
    const hrs=et.reduce((s,t)=>s+(t.durationHours||0),0);
    return{...emp,hrs,taskCount:et.length,dept:DEPTS.find(d=>d.id===emp.deptId)||{}};
  }).filter(e=>e.hrs>0).sort((a,b)=>b.hrs-a.hrs).slice(0,20),[safeE,safeT,period,curM,curY]);
  const maxH=ranked[0]?.hrs||1;
  const medals=['🥇','🥈','🥉'];
  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:13}}>

        <div style={{display:'flex',gap:5}}>
          {['month','year'].map(p=>(<button key={p} onClick={()=>setPeriod(p)} style={{padding:'6px 12px',borderRadius:9,fontSize:11,fontWeight:800,cursor:'pointer',border:`1px solid ${period===p?'var(--p)':'var(--bd)'}`,background:period===p?'var(--pl)':'transparent',color:period===p?'var(--p)':'var(--tx3)',textTransform:'capitalize'}}>{p}</button>))}
        </div>
      </div>
      {ranked.length>=3&&(
        <div className="podium">
          {[ranked[1],ranked[0],ranked[2]].map((emp,i)=>emp?(
            <div key={emp.id} className={`podium-card ${i===1?'first':''}`}>
              <div style={{fontSize:22}}>{medals[i===1?0:i===0?1:2]}</div>
              <Avatar emp={emp} size={i===1?'md':'sm'}/>
              <div style={{textAlign:'center'}}>
                <p style={{fontSize:11,fontWeight:900}}>{emp.firstName} {emp.lastName?.split(' ')[0]||''}</p>
                <p style={{fontSize:9,color:'var(--tx3)',fontWeight:700,marginTop:2}}>{emp.dept?.icon} {emp.dept?.name}</p>
              </div>
              <p style={{fontSize:17,fontWeight:900,color:'var(--p)',fontFamily:"'Space Mono',monospace"}}>{emp.hrs.toFixed(1)}h</p>
            </div>
          ):null)}
        </div>
      )}
      <div className="glass" style={{borderRadius:16,overflow:'hidden'}}>
        {ranked.length===0?<div style={{padding:'44px',textAlign:'center',opacity:.38}}><p style={{fontWeight:700,fontSize:13}}>No data this period.</p></div>
        :ranked.map((emp,i)=>(
          <div key={emp.id} className="lb-row">
            <span style={{fontSize:i<3?17:12,fontWeight:900,width:26,textAlign:'center',flexShrink:0,color:i<3?'var(--p)':'var(--tx3)'}}>{i<3?medals[i]:`#${i+1}`}</span>
            <Avatar emp={emp} size="sm"/>
            <div style={{flex:1,overflow:'hidden'}}>
              <p style={{fontSize:12,fontWeight:800,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{emp.firstName} {emp.lastName}</p>
              <p style={{fontSize:10,color:'var(--tx3)',fontWeight:600,marginTop:1}}>{emp.dept?.icon} {emp.dept?.name} · {emp.taskCount} tasks</p>
            </div>
            <div style={{textAlign:'right',minWidth:76}}>
              <p style={{fontSize:15,fontWeight:900,color:'var(--p)',fontFamily:"'Space Mono',monospace"}}>{emp.hrs.toFixed(1)}h</p>
              <div style={{width:76,height:4,background:'rgba(128,128,128,.15)',borderRadius:99,marginTop:4}}>
                <div style={{width:`${(emp.hrs/maxH)*100}%`,height:'100%',background:'var(--btn)',borderRadius:99,transition:'width 1s ease'}}/>
              </div>

/* PROJECT MODAL */
const ProjectModal=({onClose,onSave,showToast})=>{
  const [form,setForm]=useState({name:'',dept:DEPTS[0].name,lead:'',deadline:''});
  const [loading,setLoading]=useState(false);
  const submit=async e=>{
    e.preventDefault();if(!form.name.trim())return;setLoading(true);
    const proj={id:Date.now(),...form,status:'Active',progress:0};
    await GAS.call('addProject',proj);
    onSave(proj);showToast('Project created!','success');setLoading(false);onClose();
  };
  return(
    <ModalLayout title="New Project" icon="fa-folder-plus" onClose={onClose}>
      <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:12}}>
        <div><label className="input-label">Project Name *</label><input className="input" value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} required/></div>

const MainApp=({user:initUser,onLogoutReq,theme,setTheme})=>{
  const [user,setUser]=useState(initUser);
  const [view,setView]=useState('dashboard');
  const [tasks,setTasks]=useState(SEED_TASKS);
  const [projects,setProjects]=useState(SEED_PROJECTS);
  const [employees,setEmployees]=useState(BASE_EMPLOYEES);
  const [announcements,setAnnouncements]=useState(SEED_ANN);
  const [leaveRequests,setLeaveRequests]=useState(SEED_LEAVES);
  const [kudos,setKudos]=useState([{id:1,author:'System',text:'Welcome to Nexus v9.0! 🚀'}]);
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null);
  const [modalData,setModalData]=useState(null);
  const [animations,setAnimations]=useState(true);
  const [afkVisible,setAfkVisible]=useState(false);
  const [afkCountdown,setAfkCountdown]=useState(120);
  const [sessionStart]=useState(new Date().toISOString());
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [showAI,setShowAI]=useState(false);
  const [gasStatus,setGasStatus]=useState(GAS.status);
  const [geoStatus,setGeoStatus]=useState('idle');
  const [geoDist,setGeoDist]=useState(null);

  const safe=user||{};
  const isAdmin=safe.role==='ADMIN'||safe.role==='Super Admin';
  const todayISO=new Date().toISOString().split('T')[0];
  const todayT=(tasks||[]).filter(t=>t.empId===safe.id&&t.date===todayISO);
  const sessMin=Math.max(1,Math.floor((Date.now()-new Date(sessionStart).getTime())/60000));
  const logMin=Math.round(todayT.reduce((s,t)=>s+(t.durationHours||0),0)*60);
  const prodPct=Math.min(100,(logMin/sessMin)*100);
  const myTotalH=(tasks||[]).filter(t=>t.empId===safe.id).reduce((s,t)=>s+(t.durationHours||0),0);
  const lvl=getLvl(myTotalH);
  const pendingLeaves=(leaveRequests||[]).filter(l=>l.status==='Pending').length;
  const dept=DEPTS.find(d=>d.id===safe.deptId)||{};
  const gasQueueLen=GAS._queue.length;

  useEffect(()=>{
    GAS.onStatus(s=>setGasStatus(s));
    GAS.ping();
    // Auto-sync offline queue if online
    GAS.syncQueue(showToast);
  },[]);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);
  useEffect(()=>{if(animations)document.body.classList.remove('no-anim');else document.body.classList.add('no-anim');},[animations]);

  // AFK detection
  const afkRef=useRef(null);const afkCDRef=useRef(null);
  const resetAFK=useCallback(()=>{
    if(afkVisible)return;
    clearTimeout(afkRef.current);
    afkRef.current=setTimeout(()=>{setAfkVisible(true);setAfkCountdown(120);},AFK_TIMEOUT*1000);
  },[afkVisible]);
  useEffect(()=>{
    const evts=['mousemove','keydown','click','touchstart'];
    evts.forEach(e=>document.addEventListener(e,resetAFK,{passive:true}));
    resetAFK();
    return()=>{evts.forEach(e=>document.removeEventListener(e,resetAFK));clearTimeout(afkRef.current);};
  },[resetAFK]);
  useEffect(()=>{
    if(afkVisible){
      afkCDRef.current=setInterval(()=>{
        setAfkCountdown(c=>{if(c<=1){clearInterval(afkCDRef.current);onLogoutReq(tasks,safe,prodPct,sessionStart);return 0;}return c-1;});
      },1000);
    }else clearInterval(afkCDRef.current);
    return()=>clearInterval(afkCDRef.current);
  },[afkVisible]);

  const showToast=useCallback((message,type='info')=>setToasts(p=>[...p,{id:Date.now()+Math.random(),message,type}]),[]);
  const removeToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  const showModal=useCallback((m,data=null)=>{setModalData(data);setModal(m);},[]);
  const closeModal=useCallback(()=>{setModal(null);setModalData(null);},[]);

    if(isEdit)setTasks(p=>p.map(t=>t.id===task.id?task:t));
    else setTasks(p=>[task,...p]);

  const checkGeo=()=>{
    if(!navigator.geolocation)return showToast('Geolocation not available.','err');
    setGeoStatus('checking');
    navigator.geolocation.getCurrentPosition(
      pos=>{const d=getDist(pos.coords.latitude,pos.coords.longitude,HQ_LAT,HQ_LNG);setGeoDist(d);setGeoStatus(d<=GEO_RADIUS?'inside':'outside');},
      ()=>setGeoStatus('denied'),{enableHighAccuracy:true,timeout:10000}
    );
  };

  const adminNav=[
    {id:'dashboard',icon:'fa-chart-pie',label:'Dashboard'},
    {id:'tracker',icon:'fa-satellite-dish',label:'Tracker'},
    {id:'directory',icon:'fa-address-book',label:'Directory'},

    {id:'announcements',icon:'fa-bullhorn',label:'Bulletin'},
    {id:'leaderboard',icon:'fa-trophy',label:'Rankings'},
    {id:'projects',icon:'fa-folder-open',label:'Projects'},
    {id:'settings',icon:'fa-sliders',label:'Settings'},
  ];
  const staffNav=[
    {id:'dashboard',icon:'fa-gauge-high',label:'Home'},
    {id:'mytasks',icon:'fa-list-check',label:'Tasks'},
    {id:'leaves',icon:'fa-umbrella-beach',label:'Leaves'},
    {id:'announcements',icon:'fa-bullhorn',label:'Bulletin'},
    {id:'projects',icon:'fa-folder-open',label:'Projects'},
    {id:'settings',icon:'fa-sliders',label:'Settings'},
  ];
  const navItems=isAdmin?adminNav:staffNav;

  const isDark=['dark','midnight','forest','ocean','matrix','retro','aurora','neon','red','cyberpunk','coffee','rosegold','sunset','egypt','ddlc','synthwave','christmas','dididi'].includes(theme);

  const SidebarInner=()=>(
    <>
      <div className="sidebar-logo">
        <div className="logo-wrap" style={{border:'1px solid var(--bd)'}}>
          <img src={LOGO} alt="Gigahertz" style={{filter:isDark?'brightness(0) invert(1)':''}}/>
        </div>
        <div>
          <p style={{fontSize:13,fontWeight:900,lineHeight:1.2}}>Gigahertz Nexus</p>
          <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--p)',marginTop:2}}>v9.0 PPOS</p>
        </div>
        <div style={{marginLeft:'auto',flexShrink:0}}>
          <GASStatusPill status={gasStatus}/>
        </div>
      </div>
      <div style={{padding:'10px 10px 0',flex:1,overflowY:'auto',display:'flex',flexDirection:'column',gap:1}}>
        <span className="nav-section">Menu</span>
        {navItems.map(item=>(
          <button key={item.id} className={`nav-item ${view===item.id?'active':''}`} onClick={()=>{setView(item.id);setSidebarOpen(false);}}>
            <span className="nav-icon"><i className={`fa-solid ${item.icon}`}/></span>
            <span style={{flex:1}}>{item.label}</span>
            {item.badge&&<span className="nav-badge">{item.badge}</span>}
          </button>

// Productivity Classification Engine
const ProductivityClassifier={
  classify(task,focusQuality,interruptions){
    if(!task||!task.durationHours)return'Neutral';
    const dur=task.durationHours;
    const fq=focusQuality||0;
    const intCount=interruptions||0;
    
    // Productive: high focus quality, few interruptions, normal duration
    if(fq>=75&&intCount<=2&&dur>=0.5)return'Productive';
    
    // Unproductive: low focus, many interruptions, very short
    if(fq<40||intCount>5||dur<0.25)return'Unproductive';
    
    // Neutral: everything else
    return'Neutral';
  },
  async enrichTask(task,focusQuality=80,interruptions=0){
    return{
      ...task,
      productivityClass:this.classify(task,focusQuality,interruptions),
      focusQuality,interruptions
    };
  }
};

// Advanced Analytics Engine
const Analytics={
  calculateDailyStats(tasks,empId=null){
    const filtered=empId?tasks.filter(t=>t.empId===empId):tasks;
    const today=new Date().toISOString().split('T')[0];
    const todayTasks=filtered.filter(t=>t.date===today);
    
    const total=todayTasks.reduce((s,t)=>s+(t.durationHours||0),0);
    const byCategory={};
    const byClass={Productive:0,Unproductive:0,Neutral:0};
    
    todayTasks.forEach(t=>{
      const cat=t.category||'General';
      byCategory[cat]=(byCategory[cat]||0)+(t.durationHours||0);
      if(t.productivityClass)byClass[t.productivityClass]=(byClass[t.productivityClass]||0)+(t.durationHours||0);
    });
    
    return{
      date:today,totalHours:total,taskCount:todayTasks.length,
      byCategory,byProductivityClass:byClass,
      avgTaskDuration:todayTasks.length>0?total/todayTasks.length:0
    };
  },
  calculateMonthlyStats(tasks,empId=null,month=null,year=null){
    const now=new Date();
    const m=month||now.getMonth()+1;
    const y=year||now.getFullYear();
    
    const filtered=empId?tasks.filter(t=>t.empId===empId):tasks;
    const monthTasks=filtered.filter(t=>{
      if(!t.date)return false;
      const d=new Date(t.date);
      return d.getMonth()+1===m&&d.getFullYear()===y;
    });
    
    const total=monthTasks.reduce((s,t)=>s+(t.durationHours||0),0);
    const tasksByWeek=[0,0,0,0,0];
    
    monthTasks.forEach(t=>{
      const d=new Date(t.date);
      const week=Math.floor((d.getDate()-1)/7);
      if(week<5)tasksByWeek[week]+=(t.durationHours||0);
    });
    
    return{
      period:`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]} ${y}`,
      totalHours:total,taskCount:monthTasks.length,
      avgPerDay:monthTasks.length>0?total/monthTasks.length:0,
      hoursByWeek:tasksByWeek
    };
  },
  getPeakHours(tasks,empId=null){
    const filtered=empId?tasks.filter(t=>t.empId===empId):tasks;
    const hourCounts={};
    
    filtered.forEach(t=>{
      if(t.startTime){
        const hr=parseInt(t.startTime.split(':')[0]);
        hourCounts[hr]=(hourCounts[hr]||0)+(t.durationHours||0);
      }
    });
    
    const sorted=Object.entries(hourCounts).sort((a,b)=>b[1]-a[1]);
    return sorted.slice(0,3).map(([hr,dur])=>({hour:parseInt(hr),duration:dur}));
  },
  getProductivityTrend(tasks,empId=null,days=7){
    const filtered=empId?tasks.filter(t=>t.empId===empId):tasks;
    const trend=[];
    
    for(let i=days-1;i>=0;i--){
      const d=new Date();
      d.setDate(d.getDate()-i);
      const dateStr=d.toISOString().split('T')[0];
      const dayTasks=filtered.filter(t=>t.date===dateStr);
      
      const prod=dayTasks.filter(t=>t.productivityClass==='Productive').reduce((s,t)=>s+(t.durationHours||0),0);
      const total=dayTasks.reduce((s,t)=>s+(t.durationHours||0),0);
      
      trend.push({date:dateStr,productive:prod,total,score:total>0?Math.round((prod/total)*100):0});
    }
    return trend;
  }
};

// Data Validation & Normalization
const DataValidator={
  validateTask(task){
    const errors=[];
    if(!task.taskName||task.taskName.trim()==='')errors.push('Task name required');
    if(!task.category||task.category.trim()==='')errors.push('Category required');
    if(!task.date||task.date.trim()==='')errors.push('Date required');
    if(task.durationHours!==undefined&&(isNaN(task.durationHours)||task.durationHours<0))errors.push('Invalid duration');
    return{valid:errors.length===0,errors};
  },
  validateLeaveRequest(leave){
    const errors=[];
    if(!leave.type)errors.push('Leave type required');
    if(!leave.startDate)errors.push('Start date required');
    if(!leave.endDate)errors.push('End date required');
    if(!leave.reason||leave.reason.trim()==='')errors.push('Reason required');
    if(new Date(leave.startDate)>new Date(leave.endDate))errors.push('Start date must be before end date');
    return{valid:errors.length===0,errors};
  },
  normalizeTask(task){
    return{
      ...task,
      taskName:(task.taskName||'').trim(),
      category:(task.category||'General').trim(),
      date:task.date||new Date().toISOString().split('T')[0],
      durationHours:Math.max(0,parseFloat(task.durationHours)||0),
      remarks:(task.remarks||'').trim(),
      source:task.source||'Manual'
    };
  }
};

// Batch Operations Helper
const BatchOps={
  async logMultipleTasks(tasks,empId){
    const validated=tasks.filter(t=>{
      const v=DataValidator.validateTask(t);
      return v.valid;
    });
    
    if(validated.length===0)return{success:false,error:'No valid tasks',logged:0};
    
    const results=[];
    for(const task of validated){
      const norm=DataValidator.normalizeTask({...task,empId});
      const r=await GAS.call('logTask',norm);
      results.push(r?.success||r?.offline);
    }
    
    return{success:true,logged:results.filter(Boolean).length,total:results.length};
  },
  async syncOfflineQueue(){
    if(GAS._queue.length===0)return{synced:0};
    let synced=0;
    const q=[...GAS._queue];GAS._queue=[];
    
    for(const item of q){
      const r=await GAS._fetch(item,1);
      if(r)synced++;
      else GAS._queue.push(item);
    }
    LS.save('ghz_sync_q',GAS._queue);
    return{synced,queued:GAS._queue.length};
  },
  async validateAndLogTasks(tasks){
    const valid=tasks.filter(t=>{
      const v=DataValidator.validateTask(t);
      return v.valid;
    }).map(t=>DataValidator.normalizeTask(t));
    
    return await Promise.all(valid.map(t=>GAS.call('logTask',t)));
  }
};

      isActive:session.isActive!==false
    };

// Leave Management Helper
const LeaveHelper={
  calculateDays(startDate,endDate){
    const start=new Date(startDate);
    const end=new Date(endDate);
    return Math.ceil((end-start)/(1000*60*60*24))+1;
  },
  async submitLeaveRequest(empId,empName,type,startDate,endDate,reason){
    const days=this.calculateDays(startDate,endDate);

    const r=await GAS.call('addLeave',{
      empId,empName,type,startDate,endDate,days,
      reason,status:'Pending',appliedDate:new Date().toISOString().split('T')[0]

  },
  async rejectLeave(leaveId){

};

  async logTimerEvent(userId,empId,taskName,status){
    return this.logEvent(userId,empId,'',`TIMER_${status}`,`Timer ${status}: ${taskName}`);
  },
  async logLoginEvent(user){
    return this.logEvent(user.id,user.employeeId,user.dept,'LOGIN',`User logged in`);
  },
  async logLogoutEvent(user,sessionDuration){
    return this.logEvent(user.id,user.employeeId,user.dept,'LOGOUT',`User logged out after ${sessionDuration}h`);
  }
};

// Data Sync & Reconciliation
const DataSync={
  async fullSync(empId){
    const r=await GAS.call('sync',{empId});
    if(!r.success&&!r.offline)return null;
    
    return{
      employees:r.employees||[],
      tasks:r.tasks||[],
      projects:r.projects||[],
      announcements:r.announcements||[],
      leaves:r.leaves||[],
      kudos:r.kudos||[],
      attendance:r.attendance||[]
    };
  },
  async getUserTasks(empId){
    const r=await GAS.call('getTasks',{userId:empId});
    return r?.tasks||r?.data||[];
  },
  async getEmployeeDirectory(){
    const r=await GAS.call('getEmployees',{});
    return r?.employees||r?.data||[];
  },
  async getDashboardMetrics(empId){
    const r=await GAS.call('getDashboardStats',{userId:empId});
    return r?.stats||r?.data||{};
  }
};

// Error Recovery & Resilience
const ErrorRecovery={
  async retryOperation(fn,maxRetries=3,delayMs=1000){
    for(let i=0;i<maxRetries;i++){
      try{
        return await fn();
      }catch(err){
        if(i===maxRetries-1)throw err;
        await new Promise(r=>setTimeout(r,delayMs*(i+1)));
      }
    }
  },
  async safeSyncQueue(){
    try{
      return await BatchOps.syncOfflineQueue();
    }catch(err){
      console.error('Sync error:',err);
      return{synced:0,error:err.message};
    }
  },
  async validateDataIntegrity(tasks,employees){
    const orphanedTasks=tasks.filter(t=>!employees.find(e=>e.id===t.empId));
    return{
      totalTasks:tasks.length,
      totalEmployees:employees.length,
      orphanedTasks:orphanedTasks.length,
      healthy:orphanedTasks.length===0
    };
  }
};
