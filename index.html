<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Gigahertz Nexus — Activity Tracker v5.6</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ============================================================
   THEME SYSTEM — 10 THEMES
============================================================ */
:root {
  --p:#1a73e8; --pd:#1557b0; --pl:#e8f0fe;
  --bg:#f0f4ff; --wh:#ffffff; --card:#ffffff;
  --tx:#1e293b; --tx2:#475569; --tx3:#94a3b8;
  --bd:#e2e8f0; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  --g1:#f0f4ff; --g2:#dbeafe; --g3:#ede9fe;
  --glass-bg:rgba(255,255,255,0.82); --glass-border:rgba(255,255,255,0.9);
  --shadow:rgba(26,115,232,0.12);
}
[data-theme="dark"] {
  --p:#3b82f6; --pd:#2563eb; --pl:#1e3a8a;
  --bg:#0b1120; --wh:#111827; --card:#1e293b;
  --tx:#f8fafc; --tx2:#cbd5e1; --tx3:#64748b;
  --bd:#334155; --danger:#f87171; --ok:#4ade80; --warn:#fbbf24;
  --g1:#0b1120; --g2:#0f1f3d; --g3:#1a0b2e;
  --glass-bg:rgba(30,41,59,0.75); --glass-border:rgba(255,255,255,0.07);
  --shadow:rgba(59,130,246,0.2);
}
[data-theme="red"] {
  --p:#ef4444; --pd:#dc2626; --pl:#450a0a;
  --bg:#1a0505; --wh:#2d0a0a; --card:#3f0f0f;
  --tx:#fecaca; --tx2:#fca5a5; --tx3:#f87171;
  --bd:#7f1d1d; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  --g1:#1a0505; --g2:#2d0a0a; --g3:#3f0f0f;
  --glass-bg:rgba(69,10,10,0.75); --glass-border:rgba(239,68,68,0.12);
  --shadow:rgba(239,68,68,0.25);
}
[data-theme="lavender"] {
  --p:#7c3aed; --pd:#6d28d9; --pl:#ede9fe;
  --bg:#f5f3ff; --wh:#ffffff; --card:#ffffff;
  --tx:#1e1b4b; --tx2:#4c1d95; --tx3:#7c3aed;
  --bd:#ddd6fe; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  --g1:#f5f3ff; --g2:#ede9fe; --g3:#fce7f3;
  --glass-bg:rgba(255,255,255,0.85); --glass-border:rgba(124,58,237,0.15);
  --shadow:rgba(124,58,237,0.15);
}
[data-theme="forest"] {
  --p:#16a34a; --pd:#15803d; --pl:#dcfce7;
  --bg:#0a1f0f; --wh:#0f2d18; --card:#1a3a22;
  --tx:#dcfce7; --tx2:#86efac; --tx3:#4ade80;
  --bd:#166534; --danger:#f87171; --ok:#4ade80; --warn:#fbbf24;
  --g1:#0a1f0f; --g2:#0f2d18; --g3:#1a3a22;
  --glass-bg:rgba(10,31,15,0.8); --glass-border:rgba(22,163,74,0.2);
  --shadow:rgba(22,163,74,0.2);
}
[data-theme="sunset"] {
  --p:#f97316; --pd:#ea580c; --pl:#fff7ed;
  --bg:#1a0a00; --wh:#2d1200; --card:#3d1a00;
  --tx:#fed7aa; --tx2:#fdba74; --tx3:#fb923c;
  --bd:#7c2d12; --danger:#f87171; --ok:#4ade80; --warn:#fbbf24;
  --g1:#1a0a00; --g2:#2d1200; --g3:#3d1a00;
  --glass-bg:rgba(45,18,0,0.8); --glass-border:rgba(249,115,22,0.15);
  --shadow:rgba(249,115,22,0.25);
}
[data-theme="ocean"] {
  --p:#0ea5e9; --pd:#0284c7; --pl:#e0f2fe;
  --bg:#020d1a; --wh:#051929; --card:#0a2540;
  --tx:#e0f2fe; --tx2:#7dd3fc; --tx3:#38bdf8;
  --bd:#0c4a6e; --danger:#f87171; --ok:#4ade80; --warn:#fbbf24;
  --g1:#020d1a; --g2:#051929; --g3:#0a2540;
  --glass-bg:rgba(2,13,26,0.82); --glass-border:rgba(14,165,233,0.18);
  --shadow:rgba(14,165,233,0.25);
}
[data-theme="rosegold"] {
  --p:#c9748a; --pd:#a85570; --pl:#fce4ec;
  --bg:#1a0d11; --wh:#2a1118; --card:#3a1820;
  --tx:#fce4ec; --tx2:#f8bbd0; --tx3:#e57fa0;
  --bd:#7a2540; --danger:#f87171; --ok:#4ade80; --warn:#fbbf24;
  --g1:#1a0d11; --g2:#2a1520; --g3:#1e1028;
  --glass-bg:rgba(42,17,24,0.82); --glass-border:rgba(201,116,138,0.18);
  --shadow:rgba(201,116,138,0.28);
}
[data-theme="cyberpunk"] {
  --p:#d946ef; --pd:#c026d3; --pl:#fae8ff;
  --bg:#0f172a; --wh:#1e293b; --card:#0f172a;
  --tx:#fdf4ff; --tx2:#f5d0fe; --tx3:#e879f9;
  --bd:#4a044e; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  --g1:#0f172a; --g2:#2e1065; --g3:#4a044e;
  --glass-bg:rgba(15,23,42,0.85); --glass-border:rgba(217,70,239,0.3);
  --shadow:rgba(217,70,239,0.4);
}
[data-theme="coffee"] {
  --p:#a16207; --pd:#854d0e; --pl:#fefce8;
  --bg:#fefce8; --wh:#ffffff; --card:#ffffff;
  --tx:#422006; --tx2:#713f12; --tx3:#a16207;
  --bd:#fef08a; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  --g1:#fefce8; --g2:#fef9c3; --g3:#fde047;
  --glass-bg:rgba(255,255,255,0.9); --glass-border:rgba(161,98,7,0.2);
  --shadow:rgba(161,98,7,0.15);
}

/* ============================================================
   GLOBALS
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:radial-gradient(ellipse at 10% 20%,var(--g2) 0%,transparent 55%),
             radial-gradient(ellipse at 90% 80%,var(--g3) 0%,transparent 55%),
             var(--g1);
  background-attachment:fixed;
  color:var(--tx);
  min-height:100vh;
  overflow-x:hidden;
  transition:background-color .5s,color .4s;
}
input,select,button,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p);opacity:.4;border-radius:99px}
::placeholder{color:var(--tx3)}

.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  box-shadow:0 8px 32px var(--shadow);
  transition:all .3s;
}
.card{background:var(--card);border:1px solid var(--bd);border-radius:20px;transition:all .3s}
.btn{
  padding:10px 22px;border-radius:12px;font-weight:700;font-size:13px;
  cursor:pointer;transition:all .2s;border:none;display:inline-flex;
  align-items:center;gap:8px;letter-spacing:.02em;
}
.btn-primary{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;box-shadow:0 4px 16px var(--shadow)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 24px var(--shadow)}
.btn-primary:active{transform:translateY(1px)}
.btn-ghost{background:rgba(0,0,0,0.05);color:var(--tx2);border:1px solid var(--bd)}
.btn-ghost:hover{background:rgba(0,0,0,0.1);color:var(--tx)}
.btn-danger{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
.btn-danger:hover{background:#ef4444;color:#fff}
.btn-ok{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}
.btn-ok:hover{background:#22c55e;color:#fff}

.input{
  width:100%;background:rgba(0,0,0,0.06);
  border:1.5px solid var(--bd);border-radius:12px;
  padding:11px 14px;color:var(--tx);font-size:14px;font-weight:500;
  transition:all .2s;
}
.input:focus{background:rgba(0,0,0,0.04);border-color:var(--p);box-shadow:0 0 0 3px color-mix(in srgb,var(--p) 15%,transparent)}
.input-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:6px}

/* DROPDOWN FIX */
select.input option {
  background-color: var(--card);
  color: var(--tx);
}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bounceIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.anim-fade{animation:fadeUp .45s cubic-bezier(.4,0,.2,1) both}
.anim-slide{animation:slideLeft .35s cubic-bezier(.4,0,.2,1) both}
.anim-bounce{animation:bounceIn .4s cubic-bezier(.4,0,.2,1) both}
.floating{animation:float 4s ease-in-out infinite}
.spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite;display:inline-block}
.tab-nums{font-variant-numeric:tabular-nums}

.progress-bar{height:6px;background:rgba(0,0,0,0.1);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),#818cf8);border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.badge-active{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.badge-idle{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
.badge-absent{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.badge-leave{background:rgba(147,51,234,0.15);color:#c084fc;border:1px solid rgba(147,51,234,0.3)}

/* Tag categories */
.tag-Admin{background:rgba(59,130,246,0.15);color:#3b82f6;}
.tag-Support{background:rgba(34,197,94,0.15);color:#22c55e;}
.tag-Dev{background:rgba(168,85,247,0.15);color:#a855f7;}
.tag-Meeting{background:rgba(249,115,22,0.15);color:#f97316;}
.tag-Operations{background:rgba(236,72,153,0.15);color:#ec4899;}

.modal-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;animation:fadeIn .2s ease;
}
.modal-box{
  background:var(--glass-bg);backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);border-radius:24px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  animation:bounceIn .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 32px 80px rgba(0,0,0,0.5);
}
.modal-box-wide{max-width:700px}
@media(max-width:640px){
  .modal-box{max-width:100%;border-radius:20px 20px 0 0;margin-top:auto;max-height:92vh}
  .modal-overlay{align-items:flex-end;padding:0}
}

.sidebar{
  width:250px;min-height:100vh;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border-right:1px solid var(--glass-border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;z-index:100;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.sidebar.hidden{transform:translateX(-100%)}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:14px;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:all .2s;color:var(--tx2);border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:rgba(0,0,0,0.06);color:var(--tx)}
.nav-item.active{background:linear-gradient(135deg,color-mix(in srgb,var(--p) 15%,transparent),color-mix(in srgb,var(--pd) 10%,transparent));color:var(--p);border:1px solid color-mix(in srgb,var(--p) 20%,transparent)}
.nav-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(0,0,0,0.06);transition:all .2s}
.nav-item.active .nav-icon{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;box-shadow:0 4px 12px var(--shadow)}

/* MOBILE NAV FIX */
.mobile-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--glass-bg);backdrop-filter:blur(24px);
  border-top:1px solid var(--glass-border);
  display:none;padding:8px 0 max(8px,env(safe-area-inset-bottom));
  box-shadow:0 -8px 32px rgba(0,0,0,0.15);
  overflow-x: auto;
  overflow-y: hidden;
  white-space: nowrap;
  -webkit-overflow-scrolling: touch;
  justify-content: flex-start;
}
.mobile-nav::-webkit-scrollbar { display: none; }
.mob-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:12px;font-size:9px;font-weight:800;
  text-transform:uppercase;letter-spacing:.08em;cursor:pointer;
  color:var(--tx3);border:none;background:none;
  flex: 0 0 auto; min-width: 72px; transition:all .2s;
}
.mob-nav-item.active{color:var(--p)}
.mob-nav-item.active .mob-icon{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;box-shadow:0 4px 10px var(--shadow)}
.mob-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(0,0,0,0.06);transition:all .2s}

.main-content{margin-left:250px;min-height:100vh;padding:24px;transition:margin .35s}
@media(max-width:768px){
  .main-content{margin-left:0;padding:16px;padding-bottom:100px}
  .sidebar{display:none}
  .mobile-nav{display:flex}
  .desktop-only{display:none!important}
}

.toast-container{position:fixed;top:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:10px;max-width:360px;width:calc(100% - 48px)}
.toast{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-radius:16px;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  box-shadow:0 12px 40px rgba(0,0,0,0.25);
  animation:slideLeft .3s cubic-bezier(.4,0,.2,1);
  font-size:13px;font-weight:600;
}
@media(max-width:640px){.toast-container{top:auto;bottom:90px;right:12px;width:calc(100% - 24px)}}

.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden;border:2px solid var(--glass-border)}
.avatar img{width:100%;height:100%;object-fit:cover}
.av-sm{width:36px;height:36px;font-size:13px}
.av-md{width:44px;height:44px;font-size:16px}
.av-lg{width:64px;height:64px;font-size:24px}
.av-xl{width:88px;height:88px;font-size:32px}

.stat-card{transition:transform .25s,box-shadow .25s;cursor:default}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 20px 48px var(--shadow)}

.nx-table{width:100%;border-collapse:collapse}
.nx-table th{padding:12px 20px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);border-bottom:1px solid var(--bd)}
.nx-table td{padding:14px 20px;border-bottom:1px solid rgba(0,0,0,0.04);font-size:13px}
.nx-table tbody tr:hover td{background:rgba(0,0,0,0.03)}
[data-theme="dark"] .nx-table tbody tr:hover td,
[data-theme="red"] .nx-table tbody tr:hover td,
[data-theme="forest"] .nx-table tbody tr:hover td,
[data-theme="sunset"] .nx-table tbody tr:hover td,
[data-theme="ocean"] .nx-table tbody tr:hover td,
[data-theme="cyberpunk"] .nx-table tbody tr:hover td,
[data-theme="rosegold"] .nx-table tbody tr:hover td{background:rgba(255,255,255,0.03)}

.quote-box{
  background:linear-gradient(135deg,color-mix(in srgb,var(--p) 8%,transparent),color-mix(in srgb,var(--pd) 5%,transparent));
  border:1px solid color-mix(in srgb,var(--p) 20%,transparent);
  border-radius:20px;padding:20px 24px;
  position:relative;overflow:hidden;
}
.quote-box::before{
  content:'"';font-size:120px;font-weight:900;
  color:var(--p);opacity:.08;
  position:absolute;top:-20px;left:10px;line-height:1;
  font-family:Georgia,serif;
}

.month-tab{
  padding:7px 14px;border-radius:10px;font-size:11px;font-weight:700;
  cursor:pointer;border:1px solid var(--bd);background:rgba(0,0,0,0.04);
  color:var(--tx3);transition:all .2s;white-space:nowrap;
}
.month-tab.active{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border-color:transparent;box-shadow:0 4px 12px var(--shadow)}
.month-tab:hover:not(.active){border-color:var(--p);color:var(--p)}

.camera-container{border-radius:16px;overflow:hidden;background:#000;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;border:2px solid var(--bd)}
.camera-container video,.camera-container canvas,.camera-container img{width:100%;height:100%;object-fit:cover}

.pw-strength{height:4px;border-radius:99px;margin-top:6px;transition:all .4s}
.pw-msg{font-size:11px;font-weight:600;margin-top:4px}

.live-clock{
  position:fixed;bottom:24px;right:24px;z-index:50;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);border-radius:16px;
  padding:10px 18px;box-shadow:0 8px 28px var(--shadow);
  font-variant-numeric:tabular-nums;cursor:default;
  transition:transform .2s;
}
.live-clock:hover{transform:scale(1.04)}
@media(max-width:768px){.live-clock{display:none}}

.loading-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
}
.logo-pulse{animation:float 2s ease-in-out infinite}

.table-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px}

.theme-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .2s;border:2px solid transparent}
.theme-dot:hover{transform:scale(1.2)}
.theme-dot.active{border-color:var(--tx);transform:scale(1.15)}

.auth-bg{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 20% 30%,var(--g2),transparent 60%),
             radial-gradient(ellipse at 80% 70%,var(--g3),transparent 60%),
             var(--g1);
  padding:20px;
}

/* Bar chart styles */
.bar-chart-container{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px}
.bar-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-fill{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--p),var(--pd));min-height:4px;transition:height .8s cubic-bezier(.4,0,.2,1)}
.bar-label{font-size:9px;font-weight:700;color:var(--tx3);text-transform:uppercase}
.bar-val{font-size:9px;font-weight:900;color:var(--p)}

/* Announcement card */
.announce-card{
  background:linear-gradient(135deg,color-mix(in srgb,var(--p) 6%,transparent),color-mix(in srgb,var(--pd) 4%,transparent));
  border:1px solid color-mix(in srgb,var(--p) 18%,transparent);
  border-radius:16px;padding:16px 18px;position:relative;
}
.announce-pin{width:10px;height:10px;border-radius:50%;background:var(--p);flex-shrink:0;margin-top:4px;box-shadow:0 0 8px var(--p)}

/* Leave status */
.leave-bar{display:flex;height:8px;border-radius:99px;overflow:hidden;gap:2px}
.leave-seg{border-radius:99px}

/* Donut Chart */
.donut-chart {
  width: 140px; height: 140px;
  border-radius: 50%;
  position: relative;
  display: flex; align-items: center; justify-content: center;

const api = {
  _gasOk: null,
  async call(action, payload={}) {
    if(action!=='login'){
      try{
        const res = await Promise.race([
          fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...payload}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),
          new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000))
        ]);
        if(res.ok){const data=await res.json();api._gasOk=true;return data;}
      }catch(e){api._gasOk=false;}
      return api._local(action,payload);
    }
    const local = api._localLogin(payload);
    if(local.success) return local;
    try{
      const res = await Promise.race([
        fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'login',...payload}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
      ]);
      if(res.ok){const data=await res.json();api._gasOk=true;if(data.success)return data;}
    }catch(e){api._gasOk=false;}
    return {success:false,error:'Invalid credentials.'};
  },
  _localLogin(p){
    const id=(p.identifier||'').trim().toLowerCase();
    const pw=(p.password||'').trim();
    if((id===(ROZI_ACCOUNT.email||'').toLowerCase()||id===(ROZI_ACCOUNT.fullName||'').toLowerCase()||id===(ROZI_ACCOUNT.firstName||'').toLowerCase())&&pw===ROZI_ACCOUNT.password)
      return{success:true,user:{...ROZI_ACCOUNT}};
    const admin=ADMIN_ACCOUNTS.find(a=>((a.email||'').toLowerCase()===id||(a.fullName||'').toLowerCase()===id)&&a.password===pw);
    if(admin)return{success:true,user:{...admin}};
    const emp=EMPLOYEES_INIT.find(e=>((e.email||'').toLowerCase()===id||(e.fullName||'').toLowerCase()===id||(e.firstName||'').toLowerCase()===id||(e.employeeId||'').toLowerCase()===id)&&e.password===pw);
    if(emp)return{success:true,user:{...emp}};
    return{success:false};
  },
  _local(action,payload){
    return new Promise(r=>setTimeout(()=>{
      if(action==='logTask') r({success:true,taskId:'LOCAL-'+Date.now()});
      else if(action==='registerEmployee') r({success:true,employeeId:'GHZ-'+Math.floor(Math.random()*9000+1000)});
      else if(action==='updateProfile') r({success:true});
      else if(action==='addProject') r({success:true});
      else if(action==='sync') r({success:true});
      else r({success:true,data:[]});
    },800));
  },
  async ping(){
    try{
      const r=await Promise.race([fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'ping'}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),new Promise((_,rej)=>setTimeout(()=>rej(),4000))]);
      api._gasOk=r.ok;
    }catch{api._gasOk=false;}
    return api._gasOk;
  }
};

function calcDuration(start,end){
  if(!start||!end)return 0;
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  return Math.max(0,parseFloat(((eh*60+em-sh*60-sm)/60).toFixed(2)));
}

function validatePassword(pw){
  const checks={length:pw.length>=8,upper:/[A-Z]/.test(pw),lower:/[a-z]/.test(pw),num:/[0-9]/.test(pw)};
  const score=Object.values(checks).filter(Boolean).length;
  return{checks,score,valid:score===4};
}

function getUpcomingBirthdays(employees, days=30) {
  const today = new Date();
  const results = [];
  (employees||[]).forEach(emp => {
    if(!emp?.birthday) return;
    const [bm, bd] = emp.birthday.split('-').map(Number);
    if(isNaN(bm) || isNaN(bd)) return;
    const thisYear = new Date(today.getFullYear(), bm-1, bd);
    if(thisYear < today) thisYear.setFullYear(today.getFullYear()+1);
    const diff = Math.ceil((thisYear - today)/(1000*60*60*24));
    if(diff <= days) results.push({...emp, daysUntil: diff, birthdayDate: thisYear});
  });
  return results.sort((a,b)=>a.daysUntil-b.daysUntil);
}

const getLevelInfo = (totalHours) => {
  const hrs = totalHours || 0;
  const level = Math.floor(hrs / 20) + 1;
  const currentLvlBase = (level - 1) * 20;
  const nextLvlBase = level * 20;
  const progress = Math.min(100, Math.max(0, ((hrs - currentLvlBase) / 20) * 100));
  return { level, progress, nextLvlBase, hrs };
};

const MiniBarChart = ({tasks}) => {
  const curYear = new Date().getFullYear();
  const safeTasks = tasks || [];
  const data = MONTHS.map((m,i) => {
    const hrs = safeTasks.filter(t=>t.month===i+1&&t.year===curYear).reduce((s,t)=>s+(t.durationHours||0),0);
    return {label:m, val:hrs};
  });
  const maxVal = Math.max(...data.map(d=>d.val), 1);
  return(
    <div>
      <p style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:12}}>Monthly Hours — {curYear}</p>
      <div className="bar-chart-container">
        {data.map((d,i)=>(
          <div key={i} className="bar-item" title={`${d.label}: ${d.val.toFixed(1)}h`}>
            <div className="bar-val">{d.val>0?d.val.toFixed(0):''}</div>
            <div className="bar-fill" style={{height:`${(d.val/maxVal)*80}px`}}></div>
            <div className="bar-label">{d.label.slice(0,1)}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

const DonutChart = ({ data }) => {
  const total = Math.max(1, data.reduce((s, c) => s + c.hrs, 0));
  let cumulativePercent = 0;
  
  const conicStops = data.map(c => {
    const start = cumulativePercent;
    const end = cumulativePercent + (c.hrs / total) * 100;
    cumulativePercent = end;
    return `${CAT_COLORS[c.name]||'#888'} ${start}% ${end}%`;
  }).join(', ');

  const bg = data.length > 0 ? `conic-gradient(${conicStops})` : 'var(--bd)';

  return (
    <div style={{display:'flex', alignItems:'center', gap:20}}>
      <div className="donut-chart" style={{background: bg}}>
        <div className="donut-inner">
          <div style={{textAlign:'center'}}>
            <p style={{fontSize:20, color:'var(--tx)'}}>{total.toFixed(1)}</p>
            <p style={{fontSize:9, textTransform:'uppercase', color:'var(--tx3)'}}>Hours</p>
          </div>
        </div>
      </div>
      <div style={{flex:1, display:'flex', flexDirection:'column', gap:8}}>
        {data.length === 0 ? <p style={{fontSize:12, color:'var(--tx3)'}}>No data available.</p> : data.map(c => (
          <div key={c.name} style={{display:'flex', alignItems:'center', justifyContent:'space-between', fontSize:11, fontWeight:700}}>
            <div style={{display:'flex', alignItems:'center', gap:6}}>
              <span className="chart-legend-dot" style={{background: CAT_COLORS[c.name]||'#888'}}></span>
              <span style={{color:'var(--tx2)'}}>{c.name}</span>
            </div>
            <span style={{color:'var(--tx)'}}>{c.hrs.toFixed(1)}h</span>
          </div>
        ))}
      </div>
    </div>
  );
};

const LogTaskModal = ({user,onClose,onSave,showToast,initialData=null}) => {

const AdminDashView = ({employees,tasks,showModal,announcements,leaveRequests,showToast}) => {
  const safeEmp = employees || [];
  const safeTasks = tasks || [];
  const safeLeaves = leaveRequests || [];
  const safeAnn = announcements || [];

  const curMonth = new Date().getMonth() + 1;
  const curYear = new Date().getFullYear();
  const thisMonthTasks = safeTasks.filter(t => t.month === curMonth && t.year === curYear);

  const stats={
    total:safeEmp.length,
    active:safeEmp.filter(e=>e.status==='Active').length,
    idle:safeEmp.filter(e=>e.status==='Idle').length,
    absent:safeEmp.filter(e=>e.status==='Absent').length,
    totalHrs:safeTasks.reduce((s,t)=>s+(t.durationHours||0),0),
    todayLogs:safeTasks.filter(t=>t.date===new Date().toISOString().split('T')[0]).length,
    pendingLeaves:safeLeaves.filter(l=>l.status==='Pending').length,
  };
  const pinnedAnn=safeAnn.filter(a=>a.pinned);

  // Category breakdown
  const categoryData = useMemo(() => {
    return TASK_CATEGORIES.map(c => ({
      name: c,
      hrs: thisMonthTasks.filter(t => (t.category || 'Admin') === c).reduce((sum, t) => sum + (t.durationHours || 0), 0)
    })).filter(c => c.hrs > 0).sort((a,b)=>b.hrs-a.hrs);

const MyTasksView = ({user,tasks,showModal,showToast,onDeleteTask,onCloneTask}) => {
  const curMonth=new Date().getMonth()+1;

  const [selMonth,setSelMonth]=useState(curMonth);
  const [selYear,setSelYear]=useState(curYear);
  const [searchQuery,setSearchQuery]=useState('');

  const safeUser = user || {};
  const myTasks=(tasks||[]).filter(t=>t.empId===safeUser.id);
  const todayISO = new Date().toISOString().split('T')[0];
  
  const filtered=useMemo(()=>myTasks.filter(t=>{
    const matchMonth = t.month === selMonth && t.year === selYear;
    if(!matchMonth) return false;
    if(!searchQuery.trim()) return true;
    const q = searchQuery.toLowerCase();
    return (t.taskName||'').toLowerCase().includes(q) || (t.remarks||'').toLowerCase().includes(q) || (t.category||'').toLowerCase().includes(q);
  }).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)),[myTasks,selMonth,selYear,searchQuery]);

  const totalHrs=filtered.reduce((s,t)=>s+(t.durationHours||0),0);
  const years=[...new Set(myTasks.map(t=>t.year).filter(Boolean))].sort((a,b)=>b-a);
  if(!years.includes(curYear))years.unshift(curYear);

  const handleDelete = (id) => {
    if(window.confirm('Are you sure you want to delete this task?')) {
      onDeleteTask(id);
      showToast('Task deleted successfully.', 'success');
    }
  };

  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:16}}>

          <button className="btn btn-primary" onClick={()=>showModal('logTask')} style={{whiteSpace:'nowrap'}}>
            <i className="fa-solid fa-plus"></i> Log Task

          {filtered.length>0&&<button className="btn btn-ghost" onClick={()=>exportToCSV(filtered,safeUser)} style={{whiteSpace:'nowrap'}}>

const AnnouncementsView = ({announcements,setAnnouncements,isAdmin,user,showModal,showToast}) => {

const LeaderboardView = ({employees,tasks}) => {
  const curMonth=new Date().getMonth()+1;
  const curYear=new Date().getFullYear();
  const [period,setPeriod]=useState('month');

  const safeEmp = employees || [];
  const safeTasks = tasks || [];

  const ranked = useMemo(()=>{
    return [...safeEmp].map(emp=>{
      const empTasks = period==='month'
        ? safeTasks.filter(t=>t.empId===emp.id&&t.month===curMonth&&t.year===curYear)
        : safeTasks.filter(t=>t.empId===emp.id&&t.year===curYear);
      const hrs = empTasks.reduce((s,t)=>s+(t.durationHours||0),0);
      const dept=DEPARTMENTS.find(d=>d.id===emp.deptId) || {};
      return {...emp, hrs, taskCount:empTasks.length, dept};
    }).filter(e=>e.hrs>0).sort((a,b)=>b.hrs-a.hrs).slice(0,20);
  },[safeEmp,safeTasks,period,curMonth,curYear]);

  const maxHrs = ranked[0]?.hrs||1;
  const medals=['🥇','🥈','🥉'];

  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:900,color:'var(--tx)'}}>🏆 Leaderboard</h2>
          <p style={{fontSize:12,color:'var(--tx3)',marginTop:2}}>Top performers by logged hours</p>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className={`month-tab ${period==='month'?'active':''}`} onClick={()=>setPeriod('month')}>This Month</button>
          <button className={`month-tab ${period==='year'?'active':''}`} onClick={()=>setPeriod('year')}>This Year</button>
        </div>
      </div>

      {ranked.length>=3&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1.2fr 1fr',gap:12,marginBottom:8}}>
          {[ranked[1],ranked[0],ranked[2]].map((emp,i)=>{
            const rank=i===1?0:i===0?1:2;
            return(
              <div key={emp.id} className="glass" style={{borderRadius:18,padding:'16px 12px',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:8,order:i===1?-1:i}}>
                <div style={{fontSize:24}}>{medals[rank]}</div>
                <Avatar emp={emp} size={i===1?'md':'sm'}/>
                <div>
                  <p style={{fontSize:11,fontWeight:900,color:'var(--tx)'}}>{emp.firstName||'Unknown'} {emp.lastName?.split(' ')[0]||''}</p>
                  <p style={{fontSize:9,color:'var(--tx3)'}}>{emp.dept?.name||''}</p>
                </div>
                <p style={{fontSize:i===1?20:16,fontWeight:900,color:'var(--p)'}}>{emp.hrs.toFixed(1)}h</p>
              </div>
            );
          })}
        </div>
      )}

      <div className="glass" style={{borderRadius:20,overflow:'hidden'}}>
        {ranked.length===0?(
          <div style={{padding:'40px',textAlign:'center',opacity:.4}}>
            <i className="fa-solid fa-trophy" style={{fontSize:36,display:'block',marginBottom:8}}></i>
            <p style={{fontWeight:700,fontSize:12}}>No data for this period.</p>
          </div>
        ):(
          ranked.map((emp,i)=>(
            <div key={emp.id} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 20px',borderBottom:'1px solid var(--bd)'}}>
              <span style={{fontSize:i<3?18:14,fontWeight:900,width:28,textAlign:'center',color:i<3?'var(--p)':'var(--tx3)'}}>
                {i<3?medals[i]:`#${i+1}`}
              </span>
              <Avatar emp={emp} size="sm"/>
              <div style={{flex:1,overflow:'hidden'}}>
                <p style={{fontSize:13,fontWeight:700,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{emp.firstName||'Unknown'} {emp.lastName||''}</p>
                <p style={{fontSize:10,color:'var(--tx3)'}}>{emp.dept?.icon||''} {emp.dept?.name||''} • {emp.taskCount} tasks</p>
              </div>
              <div style={{textAlign:'right',minWidth:60}}>
                <p style={{fontSize:16,fontWeight:900,color:'var(--p)'}}>{emp.hrs.toFixed(1)}h</p>
                <div style={{width:80,height:4,background:'rgba(0,0,0,0.1)',borderRadius:99,marginTop:4}}>
                  <div style={{width:`${(emp.hrs/maxHrs)*100}%`,height:'100%',background:'linear-gradient(90deg,var(--p),var(--pd))',borderRadius:99,transition:'width 1s'}}></div>
                </div>
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
};

const SettingsView = ({theme,setTheme,showToast,isAdmin,employees,tasks,projects,onImport}) => {
  const [syncing, setSyncing] = useState(false);
  const handleSync = async () => {
    setSyncing(true); showToast('Syncing data to cloud...', 'info');
    const res = await api.call('sync', {}); setSyncing(false);
    if(res.success) showToast('Data synchronized successfully!', 'success');
    else showToast('Sync failed. Please check connection.', 'error');
  };

  const handleDownloadBackup = () => {
    const data = { employees, tasks, projects, exportDate: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Gigahertz_DB_Backup_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    showToast('Database backup downloaded!', 'success');
  };

  const handleImport = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (event) => {
      try {
        const data = JSON.parse(event.target.result);
        if(data.employees && data.tasks && data.projects) {
          onImport(data);
          showToast('Database restored successfully!', 'success');
        } else {
          throw new Error('Invalid JSON structure');
        }
      } catch(err) {
        showToast('Failed to restore. Invalid backup file.', 'error');
      }
    };
    reader.readAsText(file);
    e.target.value = ''; // reset input
  };

  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:20,maxWidth:600}}>
      <div><h2 style={{fontSize:22,fontWeight:900,color:'var(--tx)'}}>Settings</h2></div>
      
      {isAdmin && (
        <div className="glass" style={{borderRadius:20,padding:'20px 24px', borderLeft:'4px solid var(--danger)'}}>
          <h3 style={{fontSize:15,fontWeight:800,color:'var(--tx)',marginBottom:4}}><i className="fa-solid fa-shield-halved mr-2" style={{color:'var(--danger)'}}></i>Admin Tools</h3>
          <p style={{fontSize:12,color:'var(--tx3)',marginBottom:12}}>Backup or restore the entire system database.</p>
          <div style={{display:'flex', gap:10, flexWrap:'wrap'}}>
            <button className="btn btn-ghost" style={{fontSize:12, color:'var(--danger)', border:'1px solid var(--danger)'}} onClick={handleDownloadBackup}>
              <i className="fa-solid fa-download"></i> Backup Database
            </button>
            <label className="btn btn-ghost" style={{fontSize:12, cursor:'pointer'}}>
              <i className="fa-solid fa-upload"></i> Restore Backup
              <input type="file" accept=".json" onChange={handleImport} style={{display:'none'}} />
            </label>
          </div>
        </div>
      )}

      <div className="glass" style={{borderRadius:20,padding:'20px 24px'}}>
        <h3 style={{fontSize:15,fontWeight:800,color:'var(--tx)',marginBottom:4}}>🎨 Interface Theme</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:10, marginTop:12}}>
          {THEMES.map(t=>(
            <button key={t.id} onClick={()=>{setTheme(t.id);showToast(`Theme: ${t.label}`,'info');}}
              style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderRadius:14,border:`2px solid ${theme===t.id?'var(--p)':'var(--bd)'}`,background:theme===t.id?'color-mix(in srgb,var(--p) 8%,transparent)':'transparent',cursor:'pointer',textAlign:'left',transition:'all .2s'}}>
              <div style={{width:32,height:32,borderRadius:10,background:t.id==='rosegold'?'linear-gradient(135deg,#c9748a,#d4a96a)':t.color,flexShrink:0}}></div>
              <div><p style={{fontSize:13,fontWeight:700,color:'var(--tx)'}}>{t.label}</p><p style={{fontSize:10,color:'var(--tx3)'}}>{t.desc}</p></div>
              {theme===t.id&&<i className="fa-solid fa-check" style={{color:'var(--p)',marginLeft:'auto'}}></i>}
            </button>
          ))}
        </div>
      </div>
      <div className="glass" style={{borderRadius:20,padding:'20px 24px'}}>
        <h3 style={{fontSize:15,fontWeight:800,color:'var(--tx)',marginBottom:4}}>🔗 GAS Backend</h3>
        <div style={{fontFamily:'monospace',fontSize:11,padding:'10px 14px',borderRadius:10,background:'rgba(0,0,0,0.06)',border:'1px solid var(--bd)',wordBreak:'break-all',color:'var(--tx3)',marginBottom:12}}>{GAS_URL.slice(0,80)}...</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button className="btn btn-ghost" style={{fontSize:12}} onClick={async()=>{showToast('Testing GAS connection...','info');const ok=await api.ping();showToast(ok?'✅ GAS Online!':'⚠️ GAS Offline',ok?'success':'warn');}}><i className="fa-solid fa-rotate"></i> Test Connection</button>
          <button className="btn btn-primary" style={{fontSize:12}} onClick={handleSync} disabled={syncing}>{syncing ? <><span className="spinner"></span> Syncing...</> : <><i className="fa-solid fa-cloud-arrow-up"></i> Force Sync Data</>}</button>
        </div>
      </div>
      <div className="glass" style={{borderRadius:20,padding:'20px 24px'}}>
        <h3 style={{fontSize:15,fontWeight:800,color:'var(--tx)',marginBottom:4}}>ℹ️ Build Info</h3>
        <div style={{display:'flex',flexDirection:'column',gap:6,fontSize:12,color:'var(--tx3)',marginTop:8}}>
          <p>Version: <strong style={{color:'var(--tx)'}}>Gigahertz Nexus v5.6</strong></p><p>Year: <strong style={{color:'var(--tx)'}}>{new Date().getFullYear()}</strong></p>
          <p>Built with: <strong style={{color:'var(--tx)'}}>💙 for Gigahertz</strong></p>
        </div>
      </div>
    </div>
  );
};

const MainApp = ({user:initUser,onLogout,theme,setTheme}) => {
  const [user,setUser]=useState(initUser);
  const [view,setView]=useState('dashboard');
  const [tasks,setTasks]=useState(TASKS_INIT);
  const [projects,setProjects]=useState(PROJECTS_INIT);
  const [employees,setEmployees]=useState(EMPLOYEES_INIT);
  const [announcements,setAnnouncements]=useState(ANNOUNCEMENTS_INIT);
  const [leaveRequests,setLeaveRequests]=useState(LEAVE_REQUESTS_INIT);
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null);
  const [modalData, setModalData]=useState(null);

  const safeUser = user || {};
  const isAdmin=safeUser.role==='ADMIN'||safeUser.role==='Super Admin'||safeUser.role==='Nexus Dev';

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);

  const showToast = useCallback((message,type='info')=>{setToasts(p=>[...p,{id:Date.now(),message,type}]);},[]);
  const removeToast = useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  
  const showModal = useCallback((m, data=null) => {
    setModalData(data);
    setModal(m);
  }, []);

  const handleImportDatabase = (data) => {
    if(data.employees) setEmployees(data.employees);
    if(data.tasks) setTasks(data.tasks);
    if(data.projects) setProjects(data.projects);
  };

  const handleSaveTask = (task, isEdit) => {
    if(isEdit) {
      setTasks(p => p.map(t => t.id === task.id ? task : t));
    } else {
      setTasks(p => [task, ...p]);
    }
  };

  const deleteTask = useCallback((id) => setTasks(p => p.filter(t => t.id !== id)), []);

  const cloneTask = useCallback((t) => {
    const clonedData = {
      ...t,
      id: null,
      date: new Date().toISOString().split('T')[0] // Default to today
    };
    showModal('logTask', clonedData);
  }, [showModal]);

  const adminNavItems = [
    {id:'dashboard',icon:'fa-chart-pie',label:'Dashboard'},
    {id:'tracker',icon:'fa-satellite-dish',label:'Tracker'},
    {id:'directory',icon:'fa-address-book',label:'Directory'},
    {id:'leaves',icon:'fa-umbrella-beach',label:'Leaves'},
    {id:'announcements',icon:'fa-bullhorn',label:'Bulletin'},
    {id:'leaderboard',icon:'fa-trophy',label:'Rankings'},
    {id:'projects',icon:'fa-folder-open',label:'Projects'},
    {id:'settings',icon:'fa-sliders',label:'Settings'},
  ];
  const empNavItems = [
    {id:'dashboard',icon:'fa-gauge-high',label:'Home'},
    {id:'mytasks',icon:'fa-list-check',label:'My Tasks'},
    {id:'leaves',icon:'fa-umbrella-beach',label:'Leaves'},
    {id:'announcements',icon:'fa-bullhorn',label:'Bulletin'},
    {id:'projects',icon:'fa-folder-open',label:'Projects'},
    {id:'settings',icon:'fa-sliders',label:'Settings'},
  ];
  const navItems = isAdmin ? adminNavItems : empNavItems;
  const dept=DEPARTMENTS.find(d=>d.id===safeUser.deptId) || {};

  const pendingLeaves=leaveRequests.filter(l=>l.status==='Pending').length;
  const unreadCount = announcements.filter(a => (Date.now() - new Date(a.date||0).getTime()) < 259200000).length + (isAdmin ? pendingLeaves : 0);

  const cycleTheme = () => {
    const idx = THEMES.findIndex(t => t.id === theme);
    const next = THEMES[(idx + 1) % THEMES.length].id;
    setTheme(next);
  };

  const myTotalHrs = tasks.filter(t=>t.empId===safeUser.id).reduce((s,t)=>s+(t.durationHours||0),0);
  const userLevel = getLevelInfo(myTotalHrs).level;

  return(
    <>
      <ToastSystem toasts={toasts} remove={removeToast}/>
      <LiveClock/>

      <aside className="sidebar">
        <div style={{padding:'16px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:36,height:36,borderRadius:10,overflow:'hidden',background:'#fff',padding:3,flexShrink:0}}><img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" alt="Logo" style={{width:'100%',height:'100%',objectFit:'contain'}}/></div>
          <div><p style={{fontSize:12,fontWeight:900,color:'var(--tx)'}}>Gigahertz Nexus</p><p style={{fontSize:9,color:'var(--p)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em'}}>v5.6</p></div>
        </div>
        <nav style={{padding:'12px',flex:1,display:'flex',flexDirection:'column',gap:4,overflowY:'auto'}}>
          {navItems.map(item=>(
            <button key={item.id} className={`nav-item ${view===item.id?'active':''}`} onClick={()=>setView(item.id)}>
              <span className="nav-icon"><i className={`fa-solid ${item.icon}`}></i></span>
              <span style={{flex:1}}>{item.label}</span>
              {item.id==='leaves'&&isAdmin&&pendingLeaves>0&&(<span style={{background:'#f87171',color:'#fff',borderRadius:99,fontSize:9,fontWeight:900,padding:'2px 7px'}}>{pendingLeaves}</span>)}
            </button>

        </nav>
        <div style={{padding:'12px',borderTop:'1px solid var(--bd)'}}>
          <button className="nav-item" onClick={()=>showModal('profile')}>
            <span className="nav-icon" style={{background:'linear-gradient(135deg,var(--p),var(--pd))'}}>
              {safeUser.facePhoto?<img src={safeUser.facePhoto} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:10}} alt="face"/>:<span style={{color:'#fff',fontSize:12,fontWeight:900}}>{getInitials(safeUser)}</span>}
            </span>
            <div style={{overflow:'hidden',textAlign:'left'}}>
              <p style={{fontSize:12,fontWeight:700,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',gap:4}}>
                {safeUser.firstName} {safeUser.lastName}
                {isAdmin && <span style={{fontSize:8,background:'var(--p)',color:'#fff',padding:'1px 4px',borderRadius:4,lineHeight:1}}>Admin</span>}
              </p>
              <p style={{fontSize:9,color:'var(--tx3)'}}>{dept?.name||''} • LVL {userLevel}</p>
            </div>
          </button>
          <button className="nav-item" onClick={onLogout} style={{color:'#f87171',marginTop:4}}>
            <span className="nav-icon" style={{background:'rgba(239,68,68,0.1)'}}><i className="fa-solid fa-power-off" style={{color:'#f87171'}}></i></span> Sign Out

      </aside>

      <main className="main-content" style={{paddingTop:24}}>

            <div style={{width:36,height:36,borderRadius:10,overflow:'hidden',background:'#fff',padding:3}}><img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" alt="Logo" style={{width:'100%',height:'100%',objectFit:'contain'}}/></div>
            <div>
              <p style={{fontSize:16,fontWeight:900,color:'var(--tx)'}}>Gigahertz Nexus</p>
              <p style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>
                {safeUser.firstName} {safeUser.lastName} • {safeUser.employeeId} {isAdmin && <span style={{color:'var(--p)'}}>(Admin)</span>}
              </p>
            </div>
          </div>
          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <div className="badge" style={{background:'var(--p)', color:'#fff', padding:'5px 12px', fontSize:11}}>LVL {userLevel}</div>
            <button className="btn btn-ghost" onClick={cycleTheme} title="Switch Theme"><i className="fa-solid fa-palette"></i></button>
            <button className="btn btn-ghost relative" onClick={()=>showModal('notifications')}>
              <i className="fa-solid fa-bell"></i>

              <div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,var(--p),var(--pd))`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:900}}>{getInitials(safeUser)}</div> Profile
            </button>
          </div>
        </div>

        {view==='dashboard'&&isAdmin&&<AdminDashView employees={employees} tasks={tasks} showModal={showModal} announcements={announcements} leaveRequests={leaveRequests} showToast={showToast}/>}
        {view==='dashboard'&&!isAdmin&&<DashboardView user={safeUser} tasks={tasks} showModal={showModal} announcements={announcements} leaveRequests={leaveRequests} employees={employees} onDeleteTask={deleteTask} showToast={showToast} setView={setView}/>}
        {view==='tracker'&&isAdmin&&<AdminTrackerView employees={employees} tasks={tasks} showToast={showToast}/>}
        {view==='directory'&&isAdmin&&<AdminDirectoryView employees={employees} setEmployees={setEmployees} tasks={tasks} showToast={showToast} onLogTaskForEmp={emp=>showModal('logTaskAdmin', emp)}/>}
        {view==='mytasks'&&!isAdmin&&<MyTasksView user={safeUser} tasks={tasks} showModal={showModal} showToast={showToast} onDeleteTask={deleteTask} onCloneTask={cloneTask}/>}
        {view==='leaves'&&isAdmin&&<AdminLeavesView leaveRequests={leaveRequests} setLeaveRequests={setLeaveRequests} employees={employees} showToast={showToast}/>}
        {view==='leaves'&&!isAdmin&&<LeavesView user={safeUser} leaveRequests={leaveRequests} showModal={showModal} showToast={showToast}/>}
        {view==='announcements'&&<AnnouncementsView announcements={announcements} setAnnouncements={setAnnouncements} isAdmin={isAdmin} user={safeUser} showModal={showModal} showToast={showToast}/>}
        {view==='leaderboard'&&<LeaderboardView employees={employees} tasks={tasks}/>}
        {view==='projects'&&<ProjectsView projects={projects} setProjects={setProjects} showModal={showModal} showToast={showToast} isAdmin={isAdmin}/>}
        {view==='settings'&&<SettingsView theme={theme} setTheme={setTheme} showToast={showToast} isAdmin={isAdmin} employees={employees} tasks={tasks} projects={projects} onImport={handleImportDatabase}/>}
      </main>

      <nav className="mobile-nav">
        {navItems.map(item=>(
          <button key={item.id} className={`mob-nav-item ${view===item.id?'active':''}`} onClick={()=>setView(item.id)}>
            <span className="mob-icon" style={{position:'relative'}}>
              <i className={`fa-solid ${item.icon}`}></i>
              {item.id==='leaves'&&isAdmin&&pendingLeaves>0&&<span style={{position:'absolute',top:-4,right:-4,background:'#f87171',color:'#fff',borderRadius:99,fontSize:8,fontWeight:900,padding:'1px 5px'}}>{pendingLeaves}</span>}
            </span>
            {item.label}
          </button>
        ))}
        <button className="mob-nav-item relative" onClick={()=>showModal('notifications')}>
          <span className="mob-icon"><i className="fa-solid fa-bell"></i></span>
          {unreadCount > 0 && <span className="absolute top-1 right-2 bg-red-500 text-white text-[9px] font-bold px-1.5 py-0.5 rounded-full">{unreadCount}</span>}
          Alerts
        </button>
      </nav>

      {/* MODALS */}
      {modal==='profile'&&<MyProfileModal user={safeUser} onClose={()=>{setModal(null); setModalData(null);}} onSave={setUser} showToast={showToast} totalHours={myTotalHrs}/>}
      {modal==='logTask'&&<LogTaskModal user={safeUser} initialData={modalData} onClose={()=>{setModal(null); setModalData(null);}} onSave={handleSaveTask} showToast={showToast}/>}
      {modal==='editTask'&&modalData&&<LogTaskModal user={safeUser} initialData={modalData} onClose={()=>{setModal(null); setModalData(null);}} onSave={handleSaveTask} showToast={showToast}/>}
      {modal==='leaveRequest'&&<LeaveRequestModal user={safeUser} onClose={()=>{setModal(null); setModalData(null);}} onSave={r=>setLeaveRequests(p=>[r,...p])} showToast={showToast}/>}
      {modal==='announcement'&&<AnnouncementModal user={safeUser} onClose={()=>{setModal(null); setModalData(null);}} onSave={a=>setAnnouncements(p=>[a,...p])} showToast={showToast}/>}
      {modal==='addProject'&&<AddProjectModal onClose={()=>{setModal(null); setModalData(null);}} onSave={p=>setProjects(prev=>[p,...prev])} showToast={showToast}/>}
      {modal==='logTaskAdmin'&&modalData&&(<LogTaskModal user={modalData} onClose={()=>{setModal(null);setModalData(null);}} onSave={handleSaveTask} showToast={showToast}/>)}
      {modal==='notifications'&&<NotificationsModal onClose={()=>{setModal(null); setModalData(null);}} announcements={announcements} pendingLeaves={pendingLeaves} isAdmin={isAdmin} onClear={()=>{setAnnouncements([]); showToast('Notifications cleared');}} />}
    </>
  );
};

/* ================================================================
   ROOT
================================================================ */
const App = () => {
  const [user,setUser]=useState(null);
  const [theme,setTheme]=useState('dark');
  const [loading,setLoading]=useState(true);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);

  const changeTheme = t => {
    setTheme(t);
    document.documentElement.setAttribute('data-theme',t);
  };

  useEffect(()=>{const t=setTimeout(()=>setLoading(false),1200);return()=>clearTimeout(t);},[]);

  if(loading){
    return(
      <div className="loading-screen">
        <div className="logo-pulse" style={{width:80,height:80,borderRadius:20,overflow:'hidden',background:'#fff',padding:8,boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
          <img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" alt="Logo" style={{width:'100%',height:'100%',objectFit:'contain',borderRadius:12}}/>
        </div>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:22,fontWeight:900,color:'var(--tx)'}}>Gigahertz Nexus</p>
          <p style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--p)',marginTop:4}}>Activity Tracker v5.6</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:'var(--p)',animation:`pulse 1.2s ${i*.3}s infinite`}}></div>)}
        </div>
      </div>
    );
  }

  if(!user) return <AuthPortal onLogin={setUser} theme={theme} setTheme={changeTheme}/>;
  return <MainApp user={user} onLogout={()=>setUser(null)} theme={theme} setTheme={changeTheme}/>;
};
