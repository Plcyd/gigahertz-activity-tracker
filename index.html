<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════

const GAS_URL = "https://script.google.com/macros/s/AKfycbwjQ0cbf7yqwOAktjX_SIBem6ycoF1MloTI2u0esVKPb5u2Icwi-XlG_I2VDxrVG6S8/exec";

const LOGO = 'https://cdn.shopify.com/s/files/1/0564/4694/3414/files/Gigahertz_Logo_868265dd-6ac7-4363-bfa7-638c2a6cdece.png?v=1746761661';

const THEMES = [

];

// ═══════════════════════════════════════════════════

const AIEngine = {

      {msg}
    </div>
  );
};

// Distance Calculator for Geo-Fencing
const getDistance = (lat1, lon1, lat2, lon2) => {
  const R = 6371e3; // metres
  const p1 = lat1 * Math.PI/180;
  const p2 = lat2 * Math.PI/180;
  const dp = (lat2-lat1) * Math.PI/180;
  const dl = (lon2-lon1) * Math.PI/180;
  const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return Math.round(R * c);
};

// ═══════════════════════════════════════════════════
// LANDING PAGE
// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════
const Dashboard = ({ user, tasks, setTasks, showNotif, kudos, setKudos }) => {

  const [cat, setCat] = useState('Dev');
  const [aiChat, setAiChat] = useState(false);
  const [emergency, setEmergency] = useState(false);
  
  const [chatInput, setChatInput] = useState('');
  const [chatLog, setChatLog] = useState([{ s: 'ai', m: 'System online. Ready to optimize your workflow.' }]);
  
  const [geoStatus, setGeoStatus] = useState('idle'); // idle, checking, inside, outside, denied
  const [dist, setDist] = useState(null);
  const [newKudos, setNewKudos] = useState('');
  
  const last = useRef(Date.now());

  // Main Ticks
  useEffect(() => {
    const tt = setInterval(() => setSessTime(p => p + 1), 60000); // 1 min per tick for session
    if (!active || active.paused) return () => clearInterval(tt);
    
    const t = setInterval(() => {
      setEl(p => p + 1);
      if (Date.now() - last.current > 60000) setIdl(p => p + 1); // 1s idle penalty if afk for 1m
    }, 1000);
    
    const r = () => last.current = Date.now();
    window.addEventListener('mousemove', r);
    window.addEventListener('keydown', r);
    
    return () => {
      clearInterval(t); clearInterval(tt);
      window.removeEventListener('mousemove', r);
      window.removeEventListener('keydown', r);
    };
  }, [active]);

  // Geo-Fence Logic
  const checkGeo = () => {
    if (!navigator.geolocation) { setGeoStatus('denied'); return; }
    setGeoStatus('checking');
    navigator.geolocation.getCurrentPosition(
      pos => {
        const { latitude, longitude } = pos.coords;
        const d = getDistance(latitude, longitude, HQ_LAT, HQ_LNG);
        setDist(d);
        setGeoStatus(d <= GEO_RADIUS_METERS ? 'inside' : 'outside');
      },
      () => setGeoStatus('denied'),
      { enableHighAccuracy: true, timeout: 10000 }
    );
  };

  // Start Task (Feature 3: Breakdown, Feature 2: Predict)
  const start = (n) => {
    if (!n.trim()) return;
    if (geoStatus !== 'inside') { showNotif('Geo-Fence Warning: You are not in the designated zone!', 'warn'); }
    
    const m = n.includes('&&');
    const cn = m ? n.split('&&')[0].trim() : n.trim();
    
    if (active) setQueue(p => [{ ...active, el, idl, paused: true }, ...p]);
    
    const pred = AIEngine.predictTime(cn);
    const st = m ? AIEngine.breakdown(cn).map(s => ({ name: s, done: false })) : [];
    
    const d = new Date();
    const startTimeStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${d.toLocaleTimeString()}`;
    
    setActive({ id: Date.now(), name: cn, cat, start: d.toLocaleString(), startTimeStr, el: 0, idl: 0, paused: false, subtasks: st, pred, int: 0, mem: '' });
    setInput('');
    showNotif(`Task Started. AI predicts ${pred.est} mins.`, 'info');
  };

  // Dropdown Selection Start (Auto Pause current, start new, resume previous logic)
  const handleDropdownStart = (e) => {
    const val = e.target.value;
    if(val === '__create__') {
       document.getElementById('taskInput').focus();
    } else if(val !== '') {
       if (active) {
         setPreviousTask({...active, originalElapsed: el});
         setActive(null);
         start(val);
       } else {
         start(val);
       }
    }
    e.target.value = ''; // reset
  };

  // Resume Previous Task
  const resumePreviousTask = () => {
    if (!previousTask) return;
    setActive({...previousTask, paused: false});
    setEl(previousTask.originalElapsed);
    setPreviousTask(null);
    showNotif(`Resumed: "${previousTask.name}"`, 'success');
  };

  // Auto Resume (Feature 9) Queue
  const resumeQueue = (q) => {
    if (active) setQueue(p => [{ ...active, el, idl, paused: true }, ...p.filter(x => x.id !== q.id)]);
    else setQueue(p => p.filter(x => x.id !== q.id));
    
    setActive({ ...q, paused: false });
    setEl(q.el); setIdl(q.idl);
    showNotif(`Resumed: ${q.name}. Restoring context.`, 'info');
  };

  // Stop & Save
  const stop = () => {
    if (!active) return;
    const fq = AIEngine.analyzeFocus(el, idl, active.int);
    const d = new Date();
    const endTimeStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${d.toLocaleTimeString()}`;
    
    const newTask = {
      id: Date.now(), name: active.name, cat: active.cat, 
      mins: Math.max(1, Math.ceil(el/60)), fq, 
      date: d.toLocaleDateString(), mem: active.mem, 
      start: active.startTimeStr, end: endTimeStr
    };
    
    setTasks(p => [newTask, ...p]);
    showNotif(`Task saved. Focus Quality: ${fq}%`, 'success');
    
    // Simulate GAS sync
    fetch(GAS_URL, { method:'POST', body:JSON.stringify({action:'logTask', task:newTask}), mode:'no-cors' }).catch(()=>{});
    
    setActive(null); setEmergency(false);

    if (previousTask) {
        resumePreviousTask();
    }
  };

  const togSub = (i) => setActive(c => {
    const st = [...c.subtasks];
    st[i].done = !st[i].done;
    return { ...c, subtasks: st };
  });

  const sendChat = (e) => {
    if (e.key === 'Enter' && chatInput.trim()) {
      setChatLog(p => [...p, { s: 'user', m: chatInput }]);
      setTimeout(() => setChatLog(p => [...p, { s: 'ai', m: AIEngine.chat(chatInput) }]), 600);
      setChatInput('');
    }
  };

  const postKudos = () => {
    if (!newKudos.trim()) return;
    setKudos([{ id: Date.now(), author: user.name, text: newKudos }, ...kudos]);
    setNewKudos('');
    showNotif('Kudos posted!', 'success');
  };


  if (emergency) return (
    <div className="emergency-overlay">
      <h1 style={{ fontSize: 56, color: 'var(--danger)', fontWeight: 900, letterSpacing: '4px', marginBottom: 10, textShadow: '0 0 20px rgba(220,38,38,0.5)' }}>EMERGENCY FOCUS</h1>
      <p style={{ color: '#fff', fontSize: 16, fontWeight: 600, marginBottom: 40 }}>Distractions disabled. Task switching locked. Execute.</p>
      
      <div style={{ fontSize: 24, color: '#fff', fontWeight: 800, marginBottom: 20 }}>{active?.name}</div>
      <div className="timer-digits" style={{ fontSize: 100, color: '#fff', textShadow: 'none', marginBottom: 40 }}>
        {String(Math.floor(el/3600)).padStart(2,'0')}:{String(Math.floor((el%3600)/60)).padStart(2,'0')}:{String(el%60).padStart(2,'0')}
      </div>
      
      <button className="btn-aero" style={{ padding: '20px 40px', fontSize: 18, background: 'linear-gradient(180deg, #dc2626 0%, #991b1b 100%)', boxShadow: '0 0 30px rgba(220,38,38,0.5)' }} onClick={stop}>
        <i className="fa-solid fa-power-off mr-2"></i> Terminate & Save Protocol
      </button>
    </div>
  );

  const H = Math.floor(el/3600), M = Math.floor((el%3600)/60), S = el%60;
  const totM = tasks.reduce((s,t) => s + t.mins, 0) + (active ? Math.floor(el/60) : 0);
  const ba = AIEngine.suggestBreak(totM/60, active ? el/3600 : 0);
  
  // Calculate total session productivity (Tasks Logged Mins / Total Session Mins)
  const prodPct = sessTime > 0 ? Math.min(100, Math.round((totM / sessTime) * 100)) : 0;

  return (
    <div className="anim-fade" style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
      
      {/* Header */}
      <div style={{ display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 16, alignItems:'flex-end' }}>
        <div>
          <h1 style={{ fontSize: 32, fontWeight: 900, letterSpacing:'-0.5px' }}>Telemetry Core</h1>
          <p style={{ color: 'var(--tx3)', fontWeight: 700, marginTop:4 }}>System active. Welcome back, {user.name}.</p>
        </div>
        <div style={{ display: 'flex', gap: 12, alignItems:'center', flexWrap:'wrap' }}>
          
          {/* Geo-Fence Widget */}
          <div className="glass-box" style={{ padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 10, borderRadius: 12 }}>
            <span style={{ fontSize: 10, fontWeight: 800, color: 'var(--tx3)', textTransform: 'uppercase' }}>Geo-Fence:</span>
            {geoStatus === 'idle' && <button className="btn-aero" style={{ fontSize: 11, padding: '4px 10px', boxShadow:'none', background:'var(--ibg)', color:'var(--tx)', border:'1px solid var(--aero-border2)' }} onClick={checkGeo}>Verify Location</button>}
            {geoStatus === 'checking' && <span className="geo-badge" style={{background:'rgba(245,158,11,0.15)', color:'#fbbf24'}}><i className="fa-solid fa-spinner fa-spin"></i> Locating...</span>}
            {geoStatus === 'inside' && <span className="geo-badge geo-in"><i className="fa-solid fa-check"></i> HQ Verified ({dist}m)</span>}
            {geoStatus === 'outside' && <span className="geo-badge geo-out"><i className="fa-solid fa-xmark"></i> Remote/Outside ({dist}m)</span>}
            {geoStatus === 'denied' && <span className="geo-badge geo-out"><i className="fa-solid fa-ban"></i> Denied</span>}
          </div>

          <button className="btn-aero" style={{ background: 'linear-gradient(180deg, #ef4444 0%, #dc2626 100%)', boxShadow: '0 4px 16px rgba(239,68,68,0.4)', padding:'14px 20px' }} onClick={() => active ? setEmergency(true) : showNotif('Start a task first to lock focus.', 'err')}>
            <i className="fa-solid fa-lock mr-2"></i> Focus Lock
          </button>
        </div>
      </div>

      {/* Burnout Alert */}
      {ba && (
        <div className="glass-box" style={{ borderLeft: '4px solid var(--danger)', display: 'flex', gap: 16, alignItems: 'center' }}>
          <i className="fa-solid fa-triangle-exclamation" style={{ color: 'var(--danger)', fontSize: 24 }}></i>
          <div>
            <div style={{ fontWeight: 900, color: 'var(--danger)' }}>Anti-Burnout System Alert</div>
            <div style={{ fontSize: 13, fontWeight: 600 }}>{ba}</div>
          </div>
        </div>
      )}
      
      {/* Top Stats */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: 20 }}>
        <div className="glass-box stat-card" style={{ padding: 20 }}>
          <div className="stat-icon"><i className="fa-solid fa-brain"></i></div>
          <div>
            <div style={{ fontSize: 10, color: 'var(--tx3)', fontWeight: 800, textTransform:'uppercase' }}>Avg Focus Quality</div>
            <div style={{ fontSize: 28, fontWeight: 900 }}>{tasks.length ? Math.round(tasks.reduce((s,t)=>s+t.fq,0)/tasks.length) : 0}%</div>
          </div>
        </div>
        <div className="glass-box stat-card" style={{ padding: 20 }}>
          <div className="stat-icon" style={{ background: 'rgba(34,197,94,0.15)', color: 'var(--ok)' }}><i className="fa-solid fa-chart-line"></i></div>
          <div>
            <div style={{ fontSize: 10, color: 'var(--tx3)', fontWeight: 800, textTransform:'uppercase' }}>Session Productivity</div>
            <div style={{ fontSize: 28, fontWeight: 900 }}>{prodPct}%</div>
          </div>
        </div>
        <div className="glass-box" style={{ background: 'linear-gradient(135deg, var(--pl), transparent)', border: '1px solid var(--p)', padding: 20, display:'flex', flexDirection:'column', justifyContent:'center' }}>
          <div style={{ fontSize: 11, fontWeight: 900, color: 'var(--p)', marginBottom: 4 }}><i className="fa-solid fa-microchip mr-2"></i> AI Productivity Brain</div>
          <div style={{ fontSize: 13, fontWeight: 700 }}>Peak: {AIEngine.getPeakHours()}</div>
          <div style={{ fontSize: 11, fontWeight: 600, color: 'var(--tx2)', marginTop: 4 }}>{AIEngine.getTaskRecommendation()}</div>
        </div>
      </div>
      
      {/* Main Split */}
      <div style={{ display: 'grid', gridTemplateColumns: 'minmax(350px, 1.5fr) minmax(300px, 1fr)', gap: 24 }}>
        
        {/* Tracker Panel */}
        <div className="glass-box" style={{ display: 'flex', flexDirection: 'column' }}>
          <h3 style={{ fontSize: 18, fontWeight: 900, marginBottom: 20 }}><i className="fa-solid fa-stopwatch mr-2" style={{ color: 'var(--p)' }}></i> Smart Tracker</h3>
          
          {active ? (
            <div style={{ textAlign: 'center', flex: 1, display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
              <div style={{ color: 'var(--danger)', fontWeight: 900, fontSize: 12, letterSpacing: '2px', marginBottom: 12, animation: 'pulse 1.5s infinite' }}>● LIVE TELEMETRY</div>
              <div style={{ fontSize: 24, fontWeight: 900, color:'var(--tx)' }}>{active.name}</div>
              <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--p)', marginTop: 6, textTransform:'uppercase' }}>{active.cat} | Start: {active.start.split(' ')[1]}</div>
              
              <div className="timer-digits" style={{ margin: '24px 0' }}>
                {String(H).padStart(2,'0')}:{String(M).padStart(2,'0')}:{String(S).padStart(2,'0')}
              </div>
              
              <div style={{ display: 'flex', justifyContent: 'center', gap: 20, marginBottom: 24 }}>
                <div style={{ background: 'var(--ibg)', padding: '10px 16px', borderRadius: 12, border: '1px solid var(--aero-border2)' }}>
                  <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--tx3)', textTransform:'uppercase' }}>Est Focus Qlty</div>
                  <div style={{ fontSize: 18, fontWeight: 900, color: AIEngine.analyzeFocus(el, idl, active.int) > 70 ? 'var(--ok)' : 'var(--warn)' }}>{AIEngine.analyzeFocus(el, idl, active.int)}%</div>
                </div>
                <div style={{ background: 'var(--ibg)', padding: '10px 16px', borderRadius: 12, border: '1px solid var(--aero-border2)' }}>
                  <div style={{ fontSize: 10, fontWeight: 800, color: 'var(--tx3)', textTransform:'uppercase' }}>AI Predict</div>
                  <div style={{ fontSize: 18, fontWeight: 900, color: 'var(--p)' }}>{active.pred.est}m</div>
                </div>
              </div>

              {active.subtasks.length > 0 && (
                <div style={{ textAlign: 'left', background: 'rgba(0,0,0,0.03)', padding: 16, borderRadius: 16, marginBottom: 24 }}>
                  <div style={{ fontSize: 11, fontWeight: 900, color: 'var(--tx3)', marginBottom: 10 }}>AUTO-SUBTASKS</div>
                  {active.subtasks.map((s, i) => (
                    <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 8, cursor: 'pointer' }} onClick={() => togSub(i)}>
                      <div style={{ width: 16, height: 16, borderRadius: 4, border: '2px solid var(--p)', background: s.done ? 'var(--p)' : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                        {s.done && <i className="fa-solid fa-check" style={{ color: '#fff', fontSize: 10 }}></i>}
                      </div>
                      <span style={{ fontSize: 13, fontWeight: 700, color: s.done ? 'var(--tx3)' : 'var(--tx)', textDecoration: s.done ? 'line-through' : 'none' }}>{s.name}</span>
                    </div>
                  ))}
                </div>
              )}

              <div style={{ display: 'flex', gap: 12 }}>
                <button className="btn-aero" style={{ flex: 1, background: 'var(--ibg)', color: 'var(--tx)', border: '1px solid var(--aero-border2)', textShadow: 'none', boxShadow: 'none' }} onClick={()=>setActive(p=>({...p, paused:!p.paused}))}>
                  <i className="fa-solid fa-pause"></i> {active.paused ? 'Resume' : 'Pause'}
                </button>
                <button className="btn-aero" style={{ flex: 2 }} onClick={stop}>
                  <i className="fa-solid fa-floppy-disk"></i> Stop & Save Data
                </button>
              </div>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16, flex:1, justifyContent:'center' }}>
              <div style={{ fontSize: 12, color: 'var(--tx3)', fontWeight: 600 }}>
                Select a preset or type a new task. Add <code>&&</code> for Smart Decomposition (e.g. "Build UI &&").
              </div>
              
              <select className="glass-input" onChange={handleDropdownStart}>
                <option value="">— Select preset task —</option>
                <option value="__create__">Create Custom Task...</option>
                {['Financial Review', 'Client Escalation', 'System Audit', 'Marketing Sync', 'Code Deployment'].map(t => <option key={t} value={t}>{t}</option>)}
              </select>

              <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
                <input id="taskInput" className="glass-input" style={{flex:2}} placeholder="Or type task here..." value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && start(input)} />
                <select className="glass-input" value={cat} onChange={e => setCat(e.target.value)} style={{ flex: 1 }}>
                  {CATS.map(c => <option key={c}>{c}</option>)}
                </select>
              </div>
              <button className="btn-aero" style={{ width:'100%', padding:'14px' }} onClick={() => start(input)}>
                <i className="fa-solid fa-play mr-2"></i> Initialize Task Tracker
              </button>

              {/* Cross-App Telemetry Mock */}
              <div style={{ marginTop: 24, padding: 16, background: 'var(--ibg)', borderRadius: 16, border: '1px solid var(--aero-border2)' }}>
                <div style={{ fontSize: 11, fontWeight: 900, color: 'var(--tx3)', marginBottom: 12 }}><i className="fa-solid fa-network-wired mr-2"></i>CROSS-APP TELEMETRY DETECTED</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 12, fontWeight: 700 }}>
                    <i className="fa-brands fa-chrome" style={{ width: 16, color: '#3b82f6' }}></i> Chrome
                    <div style={{ flex: 1, height: 6, background: 'var(--aero-border2)', borderRadius: 99 }}><div style={{ width: '65%', height: '100%', background: '#3b82f6', borderRadius: 99 }}></div></div> 65%
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, fontSize: 12, fontWeight: 700 }}>
                    <i className="fa-solid fa-file-excel" style={{ width: 16, color: '#10b981' }}></i> Excel
                    <div style={{ flex: 1, height: 6, background: 'var(--aero-border2)', borderRadius: 99 }}><div style={{ width: '25%', height: '100%', background: '#10b981', borderRadius: 99 }}></div></div> 25%
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
        
        {/* Right Column: Queue, Kudos, DNA */}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
          
          {/* Smart Queue */}
          <div className="glass-box" style={{ flex: 1 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 }}>
              <h3 style={{ fontSize: 16, fontWeight: 900 }}>Smart Queue</h3>
              <span className="cat-badge">{queue.length}</span>
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
              {queue.length === 0 ? <p style={{ fontSize: 13, color: 'var(--tx3)', fontWeight: 600 }}>No tasks paused. Auto-optimizer active.</p> : queue.map((q, i) => (
                <div key={i} style={{ padding: 14, background: 'var(--ibg)', borderRadius: 16, border: '1px solid var(--aero-border2)', position: 'relative', overflow: 'hidden' }}>
                  <div style={{ position: 'absolute', top: 0, left: 0, bottom: 0, width: 4, background: 'var(--p)' }}></div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
                    <div>
                      <div style={{ fontWeight: 800, fontSize: 14, color: 'var(--tx)' }}>{q.name}</div>
                      <div style={{ fontSize: 11, color: 'var(--tx3)', fontWeight: 600, marginTop: 4 }}><i className="fa-solid fa-pause mr-1"></i> {Math.floor(q.el/60)}m elapsed</div>
                    </div>
                    <button className="btn-aero" style={{ padding: '6px 12px', fontSize: 11 }} onClick={() => resumeQueue(q)}>Resume</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
          
          {/* Peer-to-Peer Kudos Board */}
          <div className="glass-box" style={{ flex: 1, display: 'flex', flexDirection: 'column' }}>
            <h3 style={{ fontSize: 16, fontWeight: 900, marginBottom: 16 }}><i className="fa-solid fa-hands-clapping mr-2" style={{ color: 'var(--ok)' }}></i> Kudos Board</h3>
            <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
              <input className="glass-input" style={{ padding: '10px 14px', fontSize: 12 }} placeholder="Say thanks to someone..." value={newKudos} onChange={e => setNewKudos(e.target.value)} onKeyDown={e => e.key === 'Enter' && postKudos()} />
              <button className="btn-aero" style={{ padding: '10px 16px', fontSize: 12 }} onClick={postKudos}>Post</button>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', maxHeight: 180, display: 'flex', flexDirection: 'column', gap: 8 }}>
              {kudos.length === 0 ? <p style={{ fontSize: 12, color: 'var(--tx3)' }}>No kudos yet. Be the first!</p> : kudos.map(k => (
                <div key={k.id} className="kudos-card">
                  <span style={{ fontWeight: 800, color: 'var(--tx)' }}>{k.author}: </span><span style={{ color: 'var(--tx2)', fontWeight:600 }}>{k.text}</span>
                </div>
              ))}
            </div>
          </div>

          {/* DNA Profile */}
          <div className="glass-box" style={{ background: 'linear-gradient(135deg, var(--aero-glass), var(--pl))' }}>
            <h3 style={{ fontSize: 14, fontWeight: 900, marginBottom: 12 }}><i className="fa-solid fa-dna mr-2" style={{ color: 'var(--p)' }}></i> Productivity DNA</h3>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10 }}>
              <div><div style={{ fontSize: 9, fontWeight: 800, color: 'var(--tx3)' }}>FOCUS TYPE</div><div style={{ fontSize: 13, fontWeight: 800 }}>{AIEngine.getDNA().fType}</div></div>
              <div><div style={{ fontSize: 9, fontWeight: 800, color: 'var(--tx3)' }}>DISTRACTION</div><div style={{ fontSize: 13, fontWeight: 800 }}>{AIEngine.getDNA().dist}</div></div>
              <div><div style={{ fontSize: 9, fontWeight: 800, color: 'var(--tx3)' }}>RECOVERY</div><div style={{ fontSize: 13, fontWeight: 800 }}>{AIEngine.getDNA().rec}</div></div>
            </div>
          </div>
        </div>
      </div>

      {/* AI Chat Bubble Trigger */}
      <button className="btn-aero" style={{ position: 'fixed', bottom: 24, right: 24, borderRadius: '50%', width: 56, height: 56, fontSize: 20, zIndex: 1000, boxShadow: '0 10px 30px rgba(26,115,232,0.4)' }} onClick={() => setAiChat(!aiChat)}>
        <i className="fa-solid fa-robot"></i>
      </button>

      {/* AI Chat Interface */}
      {aiChat && (
        <div className="ai-bubble">
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16, borderBottom: '1px solid var(--aero-border2)', paddingBottom: 12 }}>
            <div style={{ fontWeight: 900, fontSize: 15 }}><i className="fa-solid fa-robot" style={{ color: 'var(--p)' }}></i> Nexus AI Assistant</div>
            <i className="fa-solid fa-xmark" style={{ cursor: 'pointer' }} onClick={() => setAiChat(false)}></i>
          </div>
          <div style={{ height: 250, overflowY: 'auto', display: 'flex', flexDirection: 'column', gap: 12, marginBottom: 16 }}>
            {chatLog.map((c, i) => (
              <div key={i} style={{ alignSelf: c.s === 'user' ? 'flex-end' : 'flex-start', background: c.s === 'user' ? 'var(--p)' : 'var(--ibg)', color: c.s === 'user' ? '#fff' : 'var(--tx)', padding: '10px 14px', borderRadius: 16, borderBottomRightRadius: c.s === 'user' ? 4 : 16, borderBottomLeftRadius: c.s === 'ai' ? 4 : 16, fontSize: 12, fontWeight: 600, maxWidth: '85%' }}>
                {c.m}
              </div>
            ))}
          </div>
          <input className="glass-input" placeholder="Ask AI (e.g. 'Why was I slow?')" value={chatInput} onChange={e => setChatInput(e.target.value)} onKeyDown={sendChat} style={{ padding: '12px 14px', fontSize: 12 }} />
        </div>
      )}
    </div>
  );
};

// ═══════════════════════════════════════════════════
// TIMELINE VIEW (Feature 10)
// ═══════════════════════════════════════════════════
const TimelineView = ({ tasks }) => (
  <div className="anim-fade" style={{ display: 'flex', flexDirection: 'column', gap: 24 }}>
    <div>
      <h1 style={{ fontSize: 32, fontWeight: 900 }}>Multi-Layer Timeline</h1>
      <p style={{ color: 'var(--tx3)', fontWeight: 700 }}>Deep analysis of your day's structure and focus cycles.</p>
    </div>
    <div className="glass-box">
      {tasks.length === 0 ? <p style={{ color: 'var(--tx3)' }}>No telemetry data recorded yet.</p> : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          {tasks.map((t, i) => (
            <div key={i} style={{ display: 'flex', gap: 20, alignItems: 'center' }}>
              <div style={{ width: 120, fontSize: 12, fontWeight: 800, color: 'var(--tx3)', textAlign: 'right' }}>
                <div>Task {tasks.length - i}</div>
                <div style={{fontSize:10}}>{t.start}</div>
              </div>
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 6 }}>
                <div style={{ position: 'relative', height: 44, background: 'rgba(0,0,0,0.05)', borderRadius: 8, overflow: 'hidden' }}>
                  <div style={{ position: 'absolute', height: '100%', borderRadius: 8, display: 'flex', alignItems: 'center', padding: '0 12px', fontSize: 12, fontWeight: 800, color: '#fff', width: `${Math.min(100, t.mins * 1.5)}%`, background: 'var(--p)' }}>
                    {t.name} ({t.mins}m)
                  </div>
                </div>
                <div style={{ position: 'relative', height: 20, background: 'rgba(0,0,0,0.05)', borderRadius: 8, overflow: 'hidden' }}>
                  <div style={{ position: 'absolute', height: '100%', borderRadius: 8, display: 'flex', alignItems: 'center', padding: '0 10px', fontSize: 11, fontWeight: 800, color: '#fff', width: `${t.fq}%`, background: t.fq > 75 ? 'var(--ok)' : t.fq > 40 ? 'var(--warn)' : 'var(--danger)' }}>
                    Focus Intensity: {t.fq}%
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  </div>
);

// ═══════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════
const Settings = ({ theme, setTheme }) => (
  <div className="anim-fade glass-box" style={{ maxWidth: 1200 }}>
    <h2 style={{ fontSize: 28, fontWeight: 900, marginBottom: 8 }}>Aero Themes Engine</h2>
    <p style={{ fontSize: 14, color: 'var(--tx3)', fontWeight: 600, marginBottom: 32 }}>Select your optimized working environment (27 Unique Themes).</p>
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(200px, 1fr))', gap: 16 }}>
      {THEMES.map(t => (
        <div key={t} onClick={() => setTheme(t)} style={{ padding: 20, borderRadius: 16, cursor: 'pointer', transition: 'all .3s', border: `2px solid ${theme === t ? 'var(--p)' : 'var(--aero-border2)'}`, background: theme === t ? 'var(--pl)' : 'var(--ibg)', fontWeight: 800, textTransform: 'capitalize', textAlign: 'center', color: 'var(--tx)' }}>
          {t}
        </div>
      ))}
    </div>
  </div>
);

// ═══════════════════════════════════════════════════
// ROOT APP
// ═══════════════════════════════════════════════════
const App = () => {
  const [user, setUser] = useState(null); 
  const [view, setView] = useState('landing'); 
  const [theme, setTheme] = useState('gigahertz'); 
  const [tasks, setTasks] = useState([]); 
  const [notif, setNotif] = useState(null);
  const [kudos, setKudos] = useState([{id:1, author:'System Admin', text:'Welcome to Nexus v7.0! Huge kudos to the dev team.'}]);
  
  useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);
  const showNotif = (msg, type) => { setNotif({msg, type}); };
  
  if (view === 'landing') return <LandingPage onGoToAuth={(v) => { setView(v) }} />;
  if (!user) return (
    <>
      <Auth onLogin={setUser} theme={theme} setTheme={setTheme} initialTab={view} />
      {notif && <Notif msg={notif.msg} type={notif.type} onDone={() => setNotif(null)} />}
    </>
  );
  
  return (
    <div className="layout glass">
      {notif && <Notif msg={notif.msg} type={notif.type} onDone={() => setNotif(null)} />}
      
      <aside className="sidebar glass">
        <div style={{ padding: 24, display: 'flex', alignItems: 'center', gap: 12, borderBottom: '1px solid var(--aero-border2)' }}>
          <div style={{ width: 44, height: 44, borderRadius: 14, background: 'var(--aero-btn)', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22, boxShadow: '0 4px 12px var(--aero-glow)' }}>
            <i className="fa-solid fa-bolt"></i>
          </div>
          <div>
            <div style={{ fontWeight: 900, fontSize: 20 }}>Gigahertz</div>
            <div style={{ fontSize: 10, color: 'var(--p)', fontWeight: 900, letterSpacing: '1px', textTransform: 'uppercase' }}>NEXUS V7.0 PPOS</div>
          </div>
        </div>
        <nav style={{ padding: 24, flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
          <div className={`nav-item ${view === 'dash' ? 'active' : ''}`} onClick={() => setView('dash')}><div className="nav-icon"><i className="fa-solid fa-microchip"></i></div> Telemetry Core</div>
          <div className={`nav-item ${view === 'time' ? 'active' : ''}`} onClick={() => setView('time')}><div className="nav-icon"><i className="fa-solid fa-layer-group"></i></div> Timeline Analytics</div>
          <div className={`nav-item ${view === 'set' ? 'active' : ''}`} onClick={() => setView('set')}><div className="nav-icon"><i className="fa-solid fa-palette"></i></div> Visual Themes</div>
        </nav>
        <div style={{ padding: 24 }}>
          <div className="nav-item" onClick={() => setUser(null)} style={{ color: 'var(--danger)', background: 'var(--dl)', border: '1px solid rgba(239,68,68,0.3)', margin: 0 }}>
            <div className="nav-icon" style={{ background: 'transparent' }}><i className="fa-solid fa-power-off"></i></div> Terminate Session
          </div>
        </div>
      </aside>

      <main className="main">
        <div className="page">
          {view === 'dash' && <Dashboard user={user} tasks={tasks} setTasks={setTasks} showNotif={showNotif} kudos={kudos} setKudos={setKudos} />}
          {view === 'time' && <TimelineView tasks={tasks} />}
          {view === 'set'  && <Settings theme={theme} setTheme={setTheme} />}
        </div>
      </main>

      <nav className="mobile-nav glass">
        <div className={`mob-btn ${view === 'dash' ? 'active' : ''}`} onClick={() => setView('dash')}><i className="fa-solid fa-microchip mob-icon"></i> Core</div>
        <div className={`mob-btn ${view === 'time' ? 'active' : ''}`} onClick={() => setView('time')}><i className="fa-solid fa-layer-group mob-icon"></i> Timeline</div>
        <div className={`mob-btn ${view === 'set' ? 'active' : ''}`} onClick={() => setView('set')}><i className="fa-solid fa-palette mob-icon"></i> Themes</div>
        <div className="mob-btn" onClick={() => setUser(null)} style={{ color: 'var(--danger)' }}><i className="fa-solid fa-power-off mob-icon"></i> Exit</div>
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
