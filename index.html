<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
    <title>Gigahertz Nexus v4.4 — Titan Hub</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbPTtZwom3B0ZLIJZNusjlFz3ougRMWPHITQ&s">

    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ══ 2026 THEME VARIABLES (ORIGINAL AERO & ADAPTIVE) ══ */
        :root {
            --p:#1a3af5; --pd:#1228d4; --pl:#eef1ff;
            --sb: rgba(255, 255, 255, 0.85); 
            --sbh: rgba(26, 58, 245, 0.08);
            --sb-border: rgba(0,0,90,0.06);
            --sb-tx: #0d1533; --sb-tx2: #4a5270; --sb-tx3: #8890aa;
            --bg:#e8ecf8; --wh:#fff; --card:rgba(255,255,255,0.9);
            --tx:#0d1533; --tx2:#4a5270; --tx3:#8890aa;
            --bd:#dde2f0; --danger:#ef4444; --ok:#16a34a; --warn:#d97706;
            --sh:0 4px 24px rgba(26,58,245,.06);
            --shl:0 12px 48px rgba(26,58,245,.12);
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        [data-theme="dark"] {
            --p:#4d6fff; --pd:#3d5de8; --pl:#1a2348;
            --sb: rgba(10, 15, 30, 0.85); 
            --sbh: rgba(255, 255, 255, 0.06);
            --sb-border: rgba(255,255,255,0.04);
            --sb-tx: #dde4f5; --sb-tx2: #7d8eaa; --sb-tx3: #485268;
            --bg:#090e1e; --wh:#111827; --card:rgba(19,29,48,0.9);
            --tx:#dde4f5; --tx2:#7d8eaa; --tx3:#485268;
            --bd:#1e2a44; --sh:0 4px 24px rgba(0,0,0,.4);
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* Additional Themes Integrated into Settings */
        [data-theme="lavender"] { --p:#7c3aed; --pd:#6d28d9; --pl:#ede9fe; --bg:#f5f3ff; --tx:#1e1b4b; }
        [data-theme="forest"] { --p:#16a34a; --pd:#15803d; --pl:#dcfce7; --bg:#0a1f0f; --tx:#dcfce7; }
        [data-theme="sunset"] { --p:#f97316; --pd:#ea580c; --pl:#fff7ed; --bg:#1a0a00; --tx:#fed7aa; }
        [data-theme="ocean"] { --p:#0ea5e9; --pd:#0284c7; --pl:#e0f2fe; --bg:#020d1a; --tx:#e0f2fe; }
        [data-theme="ruby"] { --p:#ef4444; --pd:#dc2626; --pl:#450a0a; --bg:#1a0505; --tx:#fecaca; }
        [data-theme="cyberpunk"] { --p:#f0abfc; --pd:#d946ef; --pl:#4a044e; --bg:#020617; --tx:#f5d0fe; }
        [data-theme="midnight"] { --p:#6366f1; --pd:#4338ca; --pl:#1e1b4b; --bg:#030712; --tx:#f9fafb; }
        [data-theme="gold"] { --p:#eab308; --pd:#ca8a04; --pl:#422006; --bg:#1c1917; --tx:#fef08a; }

        /* ══ GLOBALS ══ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--tx); min-height: 100vh; transition: background .3s, color .3s; overflow-x: hidden; }
        
        /* ══ ORIGINAL SIDEBAR UI ══ */
        .sidebar { 
            width: 270px; height: 100vh; background: var(--sb); 
            position: fixed; left: 0; top: 0; z-index: 100;
            border-right: 1.5px solid var(--sb-border);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column;
        }

        .main-content { margin-left: 270px; padding: 30px 40px; min-height: 100vh; }
        @media (max-width: 1024px) { 
            .sidebar { display: none; } 
            .main-content { margin-left: 0; padding: 20px; padding-bottom: 100px; }
        }

        /* ══ ROBLOX DASHBOARD UI ELEMENTS ══ */
        .roblox-row { display: flex; overflow-x: auto; gap: 18px; padding: 15px 5px; scroll-snap-type: x mandatory; }
        .roblox-row::-webkit-scrollbar { display: none; }
        
        .roblox-card { 
            min-width: 210px; width: 210px; height: 260px; border-radius: 16px; 
            background: var(--card); border: 1.5px solid var(--bd); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; 
            overflow: hidden; display: flex; flex-direction: column; 
            box-shadow: var(--sh);
        }
        .roblox-card:hover { transform: translateY(-10px) scale(1.03); border-color: var(--p); box-shadow: var(--shl); }
        .roblox-card-img { height: 160px; background: var(--pl); display: flex; align-items: center; justify-content: center; font-size: 40px; color: var(--p); position: relative; }
        .roblox-card-body { padding: 12px; }
        .roblox-card-title { font-weight: 800; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--tx); }
        .roblox-card-sub { font-size: 11px; color: var(--tx3); font-weight: 600; margin-top: 4px; text-transform: uppercase; }

        /* ══ FLOATING WIDGET ══ */
        .titan-portal-widget {
            position: fixed; bottom: 100px; right: 30px; 
            width: 75px; height: 75px; z-index: 5000;
            background: #fff; border-radius: 20px; padding: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .titan-portal-widget:hover {
            transform: translateY(-20px) scale(1.15);
            box-shadow: 0 0 40px var(--p);
            filter: brightness(1.1);
        }
        .titan-portal-widget img { width: 100%; height: 100%; object-fit: contain; }

        /* ══ AUTH ══ */
        .auth-card { background: var(--wh); border-radius: 24px; padding: 45px; width: 440px; box-shadow: var(--shl); border: 1px solid var(--bd); }
        .input-titan { width: 100%; padding: 13px 16px; border-radius: 12px; border: 1.5px solid var(--bd); background: var(--bg); color: var(--tx); outline: none; font-weight: 600; }
        .input-titan:focus { border-color: var(--p); box-shadow: 0 0 0 4px var(--pl); }

        /* ══ ANIMATIONS ══ */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.5s ease-out both; }
        
        .timer-active-ring { transition: stroke-dashoffset 0.5s linear; transform: rotate(-90deg); transform-origin: 50% 50%; }

        /* ══ MOBILE NAV ══ */
        .mobile-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; height: 75px; 
            background: var(--sb); backdrop-filter: blur(25px); 
            border-top: 1.5px solid var(--sb-border); display: none;
            justify-content: space-around; align-items: center; z-index: 1000;
        }
        @media (max-width: 1024px) { .mobile-nav { display: flex; } }

        .m-nav-link { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--tx3); font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .m-nav-link.active { color: var(--p); }

        /* Achievement Badges */
        .badge-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
        .achievement-card { padding: 15px; border-radius: 16px; text-align: center; border: 1.5px solid var(--bd); transition: 0.2s; }
        .achievement-card.locked { opacity: 0.4; grayscale: 1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- TITAN UTILITIES ---
        const formatID = (val) => {
            const clean = val.replace(/[^GHTZ0-9]/gi, '').toUpperCase();
            if (clean.startsWith('GHTZ')) {
                const nums = clean.slice(4).slice(0, 4);
                return nums ? `GHTZ-${nums}` : `GHTZ-`;
            }
            return clean.slice(0, 4);
        };

        const validateID = (id) => /^GHTZ-\d{4}$/.test(id);

        // --- COMPONENTS ---

        const FloatingPortal = () => (
            <div className="titan-portal-widget shadow-p" onClick={() => window.open('https://www.gigahertz.com.ph/', '_blank')}>
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRurHiRjhAqL8xPFzjXHWgjpxNtpGagJSOG7A&s" alt="Portal" />
            </div>
        );

        const Toast = ({ msg, type, onDone }) => {
            useEffect(() => { const t = setTimeout(onDone, 3000); return () => clearTimeout(t); }, []);
            const color = type === 'success' ? '#16a34a' : '#ef4444';
            return (
                <div className="fixed top-6 right-6 z-[10000] glass px-6 py-4 rounded-2xl flex items-center gap-4 shadow-2xl fade-in" style={{ borderLeft: `6px solid ${color}`, background: 'var(--wh)' }}>
                    <i className={`fa-solid ${type === 'success' ? 'fa-check-circle text-green-600' : 'fa-circle-exclamation text-red-600'} text-xl`}></i>
                    <span className="font-bold text-sm text-slate-800">{msg}</span>
                </div>
            );
        };

        // --- AUTH SECTION ---
        const LoginPage = ({ onLogin, setPage, theme, setTheme }) => {
            const [form, setForm] = useState({ empId: '', password: '' });
            const [err, setErr] = useState('');

            const handleLogin = () => {
                if (!validateID(form.empId)) return setErr('Invalid ID format. Use GHTZ-####');
                onLogin({ ...form, name: "Nexus User", dept: "Operations" });
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100 dark:bg-slate-900">
                    <div className="auth-card fade-in">
                        <div className="text-center mb-10">
                            <img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" className="w-20 mx-auto mb-6 rounded-2xl shadow-lg" />
                            <h1 className="text-2xl font-black tracking-tight text-slate-800 dark:text-white">Titan Hub Login</h1>
                            <p className="text-xs font-bold uppercase tracking-widest opacity-50 mt-2">Internal Tracking System</p>
                        </div>
                        {err && <p className="bg-red-50 text-red-500 p-3 rounded-xl text-xs font-bold mb-4 border border-red-100">{err}</p>}
                        <div className="space-y-4">
                            <div>
                                <label className="text-[10px] font-black uppercase opacity-50 ml-1">Employee ID</label>
                                <input className="input-titan mt-1" placeholder="GHTZ-0000" value={form.empId} onChange={e => setForm({...form, empId: formatID(e.target.value)})}/>
                            </div>
                            <div>
                                <label className="text-[10px] font-black uppercase opacity-50 ml-1">Password</label>
                                <input className="input-titan mt-1" type="password" placeholder="••••••••" value={form.password} onChange={e => setForm({...form, password: e.target.value})}/>
                            </div>
                            <button className="btn-nexus btn-p w-full justify-center mt-4" onClick={handleLogin}>Sign In to Titan</button>
                            <p className="text-center text-xs font-bold opacity-50 pt-6 cursor-pointer" onClick={() => setPage('register')}>New here? Register GHTZ ID</p>
                        </div>
                    </div>
                </div>
            );
        };

        const RegisterPage = ({ onLogin, setPage }) => {
            const [step, setStep] = useState(1);
            const [form, setForm] = useState({ empId: '', name: '', password: '', dept: 'IT' });
            const [photo, setPhoto] = useState(null);
            const videoRef = useRef(null);

            const startCamera = async () => {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                if (videoRef.current) videoRef.current.srcObject = s;
            };

            const capture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                setPhoto(canvas.toDataURL('image/jpeg'));
                videoRef.current.srcObject.getTracks().forEach(t => t.stop());
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-100 dark:bg-slate-900">
                    <div className="auth-card fade-in">
                        <div className="text-center mb-8">
                            <h1 className="text-2xl font-black">Titan Registration</h1>
                            <p className="text-xs font-bold opacity-40 uppercase tracking-widest mt-1">Step {step} of 2</p>
                        </div>

                        {step === 1 ? (
                            <div className="space-y-4">
                                <input className="input-titan" placeholder="GHTZ-####" value={form.empId} onChange={e => setForm({...form, empId: formatID(e.target.value)})}/>
                                <input className="input-titan" placeholder="Full Employee Name" value={form.name} onChange={e => setForm({...form, name: e.target.value})}/>
                                <select className="input-titan" value={form.dept} onChange={e => setForm({...form, dept: e.target.value})}>
                                    {DEPARTMENTS.map(d => <option key={d}>{d}</option>)}
                                </select>
                                <input className="input-titan" type="password" placeholder="Create Secure Password" value={form.password} onChange={e => setForm({...form, password: e.target.value})}/>
                                <button className="btn-nexus btn-p w-full justify-center" onClick={() => validateID(form.empId) ? setStep(2) : alert("Invalid ID format")}>
                                    Continue to Face ID
                                </button>
                                <p className="text-center text-xs font-bold opacity-50 pt-4 cursor-pointer" onClick={() => setPage('login')}>Back to Login</p>
                            </div>
                        ) : (
                            <div className="space-y-6 text-center">
                                <div className="w-full aspect-square bg-black rounded-3xl overflow-hidden border-2 border-blue-500 shadow-2xl relative">
                                    {!photo ? <video ref={videoRef} className="w-full h-full object-cover" autoPlay playsInline muted /> : <img src={photo} className="w-full h-full object-cover" />}
                                </div>
                                {!photo ? (
                                    <div className="flex flex-col gap-3">
                                        <button className="btn-nexus btn-p justify-center" onClick={startCamera}>Start Camera</button>
                                        {videoRef.current?.srcObject && <button className="btn-nexus bg-white text-black justify-center shadow-lg font-black" onClick={capture}>Capture Identity</button>}
                                    </div>
                                ) : (
                                    <div className="flex gap-2">
                                        <button className="btn-nexus btn-p flex-1 justify-center" onClick={() => onLogin({...form, photo})}>Complete Setup</button>
                                        <button className="btn-nexus bg-slate-500 text-white" onClick={() => { setPhoto(null); startCamera(); }}>Retake</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- MAIN APPLICATION ---
        const TitanApp = ({ user, onLogout, theme, setTheme }) => {
            const [tab, setTab] = useState('home');
            const [tasks, setTasks] = useState([]);
            const [queue, setQueue] = useState([]);
            const [timer, setTimer] = useState({ active: false, seconds: 0, task: '', priority: 'med', paused: false });
            const [toast, setToast] = useState(null);
            const [idlePopup, setIdlePopup] = useState(false);
            const [lastMove, setLastMove] = useState(Date.now());

            useEffect(() => {
                const handleMove = () => setLastMove(Date.now());
                window.addEventListener('mousemove', handleMove);
                const check = setInterval(() => {
                    if (Date.now() - lastMove > 300000 && timer.active && !timer.paused) {
                        setTimer(p => ({...p, paused: true}));
                        setIdlePopup(true);
                    }
                }, 30000);
                return () => { window.removeEventListener('mousemove', handleMove); clearInterval(check); };
            }, [lastMove, timer.active]);

            useEffect(() => {
                let interval;
                if (timer.active && !timer.paused) {
                    interval = setInterval(() => setTimer(p => ({ ...p, seconds: p.seconds + 1 })), 1000);
                }
                return () => clearInterval(interval);
            }, [timer.active, timer.paused]);

            const triggerToast = (msg, type = 'success') => setToast({ msg, type });

            const startShift = (name, prio = 'med') => {
                if (!name) return;
                setTimer({ active: true, seconds: 0, task: name, priority: prio, paused: false });
                triggerToast(`Shift Active: ${name}`);
            };

            const endShift = () => {
                const entry = { id: Date.now(), name: timer.task, duration: Math.ceil(timer.seconds / 60), date: new Date().toLocaleDateString(), prio: timer.priority };
                setTasks([entry, ...tasks]);
                setTimer({ active: false, seconds: 0, task: '', paused: false });
                triggerToast("Work logs synchronized.");
            };

            const efficiency = useMemo(() => {
                const total = tasks.reduce((s, t) => s + t.duration, 0);
                return Math.min(100, Math.round((total / 2400) * 100));
            }, [tasks]);

            // --- RENDERERS ---

            const renderHome = () => (
                <div className="space-y-10 fade-in">
                    {/* Hero Stat Panel */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 glass p-8 rounded-[40px] flex flex-col justify-between relative overflow-hidden">
                            <div className="relative z-10">
                                <p className="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500 mb-4">Operations Engine</p>
                                <h2 className="text-4xl font-black tracking-tighter mb-4">Productivity Pulse: {efficiency}%</h2>
                                <div className="w-full bg-slate-200 dark:bg-slate-800 h-3 rounded-full overflow-hidden mb-6">
                                    <div className="h-full bg-gradient-to-r from-blue-600 to-indigo-500 transition-all duration-1000" style={{ width: `${efficiency}%` }}></div>
                                </div>
                                <p className="text-xs font-bold opacity-60">You've logged {Math.floor(tasks.reduce((s,t)=>s+t.duration,0)/60)}h of your 40h weekly quota.</p>
                            </div>
                            <i className="fa-solid fa-bolt absolute -right-4 -bottom-4 text-[180px] opacity-5"></i>
                        </div>
                        <div className="glass p-8 rounded-[40px] flex flex-col items-center justify-center text-center">
                            <p className="text-[10px] font-black uppercase tracking-widest opacity-40 mb-6">Shift Achievements</p>
                            <div className="w-20 h-20 bg-amber-500/10 rounded-full flex items-center justify-center text-amber-500 text-3xl mb-4"><i className="fa-solid fa-award"></i></div>
                            <p className="font-black text-sm uppercase">Titan Elite</p>
                            <p className="text-[10px] opacity-50 font-bold mt-1">Status: Active</p>
                        </div>
                    </div>

                    {/* Roblox-Inspired "Continue Tracking" Row */}
                    <div>
                        <div className="flex justify-between items-end mb-4 px-2">
                            <div>
                                <h3 className="text-xl font-black tracking-tight">Stage New Shifts</h3>
                                <p className="text-[10px] font-bold opacity-40 uppercase tracking-widest mt-1">Quick queue tasks from Roblox UI concept</p>
                            </div>
                            <button className="text-xs font-black text-blue-500 hover:underline uppercase">See All Staged</button>
                        </div>
                        <div className="roblox-row">
                            {queue.map(q => (
                                <div key={q.id} className="roblox-card" onClick={() => { startShift(q.name); setQueue(queue.filter(x => x.id !== q.id)); }}>
                                    <div className="roblox-card-img"><i className="fa-solid fa-play"></i></div>
                                    <div className="roblox-card-body">
                                        <p className="roblox-card-title">{q.name}</p>
                                        <p className="roblox-card-sub">Queued Shift</p>
                                    </div>
                                </div>
                            ))}
                            <div className="roblox-card border-dashed flex flex-col items-center justify-center opacity-40" onClick={() => { const n = prompt("What's next?"); if(n) setQueue([...queue, {id: Date.now(), name: n}]); }}>
                                <i className="fa-solid fa-plus text-3xl mb-4"></i>
                                <span className="text-[10px] font-black uppercase tracking-widest">Stage Next Task</span>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                        {/* Live Timer Control */}
                        <div className="lg:col-span-8">
                            <div className="glass p-12 rounded-[48px] text-center relative overflow-hidden">
                                {timer.active ? (
                                    <div className="space-y-8">
                                        <div className="relative inline-block">
                                            <svg width="240" height="240">
                                                <circle cx="120" cy="120" r="110" fill="none" stroke="rgba(0,0,0,0.05)" strokeWidth="12" />
                                                <circle cx="120" cy="120" r="110" fill="none" stroke="var(--p)" strokeWidth="12" 
                                                        strokeDasharray="691.15" strokeDashoffset={691.15 - (691.15 * (timer.seconds % 60)) / 60} 
                                                        className="timer-active-ring" strokeLinecap="round" />
                                            </svg>
                                            <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                <span className="text-5xl font-black font-mono tracking-tighter">
                                                    {Math.floor(timer.seconds / 3600).toString().padStart(2,'0')}:
                                                    {Math.floor((timer.seconds % 3600) / 60).toString().padStart(2,'0')}:
                                                    {(timer.seconds % 60).toString().padStart(2,'0')}
                                                </span>
                                                <span className="text-[10px] font-black uppercase opacity-40 mt-3 tracking-[0.3em] text-blue-500">Live Pulse</span>
                                            </div>
                                        </div>
                                        <div>
                                            <h3 className="text-3xl font-black mb-2">{timer.task}</h3>
                                            <div className="flex justify-center gap-3">
                                                <span className={`priority-badge badge-${timer.priority}`}>{timer.priority} Priority</span>
                                                <span className="text-[10px] font-bold uppercase opacity-40 tracking-widest mt-1">GHTZ Core Syncing...</span>
                                            </div>
                                        </div>
                                        <div className="flex gap-4 max-w-sm mx-auto">
                                            <button onClick={() => setTimer({...timer, paused: !timer.paused})} className="btn-nexus bg-amber-500/10 text-amber-500 flex-1 justify-center">
                                                <i className={`fa-solid ${timer.paused ? 'fa-play' : 'fa-pause'}`}></i> {timer.paused ? 'Resume' : 'Break'}
                                            </button>
                                            <button onClick={endShift} className="btn-nexus btn-p flex-1 justify-center shadow-p"><i className="fa-solid fa-check"></i> Complete Shift</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="py-16 space-y-10">
                                        <div className="w-24 h-24 bg-blue-600/10 rounded-[32px] flex items-center justify-center mx-auto text-4xl text-blue-600 anim-float">
                                            <i className="fa-solid fa-clock-rotate-left"></i>
                                        </div>
                                        <div>
                                            <h2 className="text-4xl font-black tracking-tight text-slate-800 dark:text-white">Begin Session</h2>
                                            <p className="opacity-60 font-bold text-sm mt-3 max-w-xs mx-auto leading-relaxed">Choose a staged task or launch a live entry to track your shift performance.</p>
                                        </div>
                                        <div className="flex gap-3 max-w-md mx-auto">
                                            <input id="qInput" className="input-titan" placeholder="Task description..." onKeyDown={e => e.key === 'Enter' && startShift(e.target.value)}/>
                                            <button className="btn-nexus btn-p" onClick={() => startShift(document.getElementById('qInput').value)}>Launch</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* Side Ledger Summary */}
                        <div className="lg:col-span-4 space-y-8">
                            <div className="glass p-8 rounded-[40px]">
                                <h3 className="font-black text-lg mb-6">Colleague Status</h3>
                                <div className="space-y-5">
                                    {[
                                        {n: "Richie P.", s: "Active", d: "Operations", i: "https://via.placeholder.com/40"},
                                        {n: "Kyla C.", s: "Active", d: "Accounting", i: "https://via.placeholder.com/40"},
                                        {n: "Miyamura I.", s: "Away", d: "Product", i: "https://via.placeholder.com/40"},
                                    ].map((m, i) => (
                                        <div key={i} className="flex items-center justify-between">
                                            <div className="flex items-center gap-3">
                                                <div className="relative">
                                                    <div className="w-10 h-10 rounded-full bg-slate-200 border-2 border-white overflow-hidden"><img src={m.i}/></div>
                                                    <div className={`absolute bottom-0 right-0 w-3 h-3 border-2 border-white rounded-full ${m.s === 'Active' ? 'bg-green-500' : 'bg-slate-400'}`}></div>
                                                </div>
                                                <div>
                                                    <p className="text-xs font-black">{m.n}</p>
                                                    <p className="text-[9px] font-bold opacity-40 uppercase">{m.d}</p>
                                                </div>
                                            </div>
                                            <span className="text-[10px] font-black opacity-30">{m.s}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="glass p-8 rounded-[40px] bg-gradient-to-br from-blue-600 to-indigo-700 text-white border-none shadow-xl">
                                <h3 className="font-black text-lg mb-2">Shift Insights</h3>
                                <p className="text-xs font-medium opacity-80 leading-relaxed italic">&ldquo;{QUOTES[Math.floor(Math.random()*QUOTES.length)]}&rdquo;</p>
                            </div>
                        </div>
                    </div>
                </div>
            );

            const renderLedger = () => (
                <div className="glass rounded-[48px] overflow-hidden fade-in">
                    <div className="p-10 border-b border-white/5 flex justify-between items-center bg-white/5">
                        <div>
                            <h3 className="font-black text-2xl tracking-tighter text-blue-500">History Ledger</h3>
                            <p className="text-xs font-bold opacity-40 uppercase tracking-widest mt-1">Audit Trail Pack</p>
                        </div>
                        <button className="btn-nexus bg-white text-black px-6 py-3 shadow-lg" onClick={() => alert("CSV Generation Started...")}>
                            <i className="fa-solid fa-file-csv"></i> Download CSV
                        </button>
                    </div>
                    <div className="p-6 overflow-x-auto">
                        <table className="w-full text-left">
                            <thead>
                                <tr className="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 border-b border-white/5">
                                    <th className="px-8 py-6">Operation</th>
                                    <th className="px-8 py-6">Priority</th>
                                    <th className="px-8 py-6">Minutes</th>
                                    <th className="px-8 py-6">Verification</th>
                                </tr>
                            </thead>
                            <tbody className="text-sm font-bold">
                                {tasks.map(t => (
                                    <tr key={t.id} className="border-b border-white/5 hover:bg-white/5 transition-all">
                                        <td className="px-8 py-8 font-black">{t.name}</td>
                                        <td className="px-8 py-8">
                                            <span className={`priority-badge badge-${t.prio}`}>{t.prio}</span>
                                        </td>
                                        <td className="px-8 py-8">
                                            <span className="text-blue-500 font-mono">{t.duration}m</span>
                                        </td>
                                        <td className="px-8 py-8">
                                            <i className="fa-solid fa-shield-check text-green-500 mr-2 opacity-60"></i>
                                            <span className="text-[10px] uppercase opacity-40 tracking-widest">{t.date}</span>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {tasks.length === 0 && <p className="text-center py-24 opacity-20 font-black uppercase">No Ledger Entries</p>}
                    </div>
                </div>
            );

            const renderSettings = () => (
                <div className="max-w-3xl mx-auto space-y-12 fade-in">
                    <div className="glass p-12 rounded-[56px] shadow-shl">
                        <h2 className="text-3xl font-black mb-4 tracking-tighter">Titan Visual Matrix</h2>
                        <p className="opacity-40 font-bold mb-10 text-sm uppercase tracking-widest">Toggle UI Themes</p>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-6">
                            {THEMES.map(t => (
                                <div key={t.id} onClick={() => setTheme(t.id)} 
                                     className={`theme-dot ${theme === t.id ? 'active' : ''}`} 
                                     style={{ background: t.col, height: '60px', width: 'auto' }} title={t.n}>
                                    {theme === t.id && <i className="fa-solid fa-check text-white text-lg"></i>}
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="glass p-12 rounded-[56px] space-y-8">
                        <h2 className="text-3xl font-black tracking-tighter">Shift Preferences</h2>
                        <div className="flex justify-between items-center p-6 bg-slate-500/5 rounded-3xl border border-white/5">
                            <div>
                                <p className="font-black text-lg">Shift Summary</p>
                                <p className="text-xs font-bold opacity-40 uppercase mt-1">Automatic end-of-day report</p>
                            </div>
                            <div className="w-14 h-7 bg-blue-600 rounded-full flex items-center px-1"><div className="w-5 h-5 bg-white rounded-full ml-auto shadow-md"></div></div>
                        </div>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen">
                    {toast && <Toast {...toast} onDone={() => setToast(null)} />}
                    <FloatingPortal />

                    {/* ORIGINAL SIDEBAR */}
                    <aside className="sidebar glass">
                        <div className="p-8 border-b border-slate-200 dark:border-slate-800 flex items-center justify-center gap-4">
                            <img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" className="w-10 rounded-lg" />
                            <span className="font-black text-2xl tracking-tighter">TITAN</span>
                        </div>
                        <nav className="p-6 flex-1 space-y-3">
                            <div onClick={() => setTab('home')} className={`p-4 rounded-2xl cursor-pointer flex items-center gap-4 font-bold transition-all ${tab === 'home' ? 'bg-blue-600 text-white' : 'opacity-50 hover:bg-slate-500/10'}`}>
                                <i className="fa-solid fa-house"></i> Overview
                            </div>
                            <div onClick={() => setTab('tasks')} className={`p-4 rounded-2xl cursor-pointer flex items-center gap-4 font-bold transition-all ${tab === 'tasks' ? 'bg-blue-600 text-white' : 'opacity-50 hover:bg-slate-500/10'}`}>
                                <i className="fa-solid fa-layer-group"></i> Shift Ledger
                            </div>
                            <div onClick={() => setTab('settings')} className={`p-4 rounded-2xl cursor-pointer flex items-center gap-4 font-bold transition-all ${tab === 'settings' ? 'bg-blue-600 text-white' : 'opacity-50 hover:bg-slate-500/10'}`}>
                                <i className="fa-solid fa-sliders"></i> Configuration
                            </div>
                        </nav>
                        <div className="p-6 border-t border-slate-200 dark:border-slate-800 space-y-6">
                            <div className="glass px-6 py-4 rounded-2xl text-center">
                                <p className="text-[10px] font-black uppercase opacity-40 mb-1">Session Duration</p>
                                <p className="text-xl font-black font-mono text-blue-600">02:14:48</p>
                            </div>
                            <button onClick={onLogout} className="w-full btn-nexus bg-red-500/10 text-red-500 justify-center">
                                <i className="fa-solid fa-power-off"></i> Logout Session
                            </button>
                        </div>
                    </aside>

                    {/* MAIN CONTENT AREA */}
                    <main className="main-content">
                        <header className="flex justify-between items-end mb-12 fade-in">
                            <div>
                                <h1 className="text-5xl font-black tracking-tighter text-blue-600">{tab === 'home' ? 'Nexus Terminal' : tab === 'tasks' ? 'Operational Ledger' : 'System Setup'}</h1>
                                <div className="flex items-center gap-3 mt-4">
                                    <span className="text-[10px] font-black uppercase tracking-widest bg-blue-500/10 text-blue-500 px-4 py-1 rounded-full">ID: {user.empId}</span>
                                    <span className="text-[10px] font-black uppercase tracking-widest bg-green-500/10 text-green-500 px-4 py-1 rounded-full">Titan v4.4.2</span>
                                </div>
                            </div>
                            <div className="hidden lg:block">
                                <div className="glass px-8 py-5 rounded-[32px] text-right">
                                    <p className="text-2xl font-black font-mono leading-none text-blue-600">{new Date().toLocaleTimeString()}</p>
                                    <p className="text-[10px] font-black uppercase opacity-40 mt-1">{new Date().toLocaleDateString(undefined, {weekday:'long', month:'short', day:'numeric'})}</p>
                                </div>
                            </div>
                        </header>

                        {tab === 'home' && renderHome()}
                        {tab === 'tasks' && renderLedger()}
                        {tab === 'settings' && renderSettings()}
                    </main>

                    {/* MOBILE NAV */}
                    <nav className="mobile-nav">
                        <div onClick={() => setTab('home')} className={`m-nav-link ${tab === 'home' ? 'active' : ''}`}>
                            <i className="fa-solid fa-home"></i>
                            <span>Hub</span>
                        </div>
                        <div onClick={() => setTab('tasks')} className={`m-nav-link ${tab === 'tasks' ? 'active' : ''}`}>
                            <i className="fa-solid fa-database"></i>
                            <span>Audit</span>
                        </div>
                        <div className="relative -top-10">
                            <div onClick={() => {const n=prompt("Log Shift?"); if(n) startShift(n);}} className="w-16 h-16 rounded-full bg-blue-600 shadow-[0_10px_30px_rgba(26,115,232,0.5)] flex items-center justify-center text-white text-3xl border-4 border-[#090e1e] anim-float">
                                <i className="fa-solid fa-plus"></i>
                            </div>
                        </div>
                        <div onClick={() => setTab('settings')} className={`m-nav-link ${tab === 'settings' ? 'active' : ''}`}>
                            <i className="fa-solid fa-sliders"></i>
                            <span>Cfg</span>
                        </div>
                        <div onClick={() => window.open('https://www.gigahertz.com.ph/')} className="m-nav-link opacity-40">
                            <i className="fa-solid fa-bag-shopping"></i>
                            <span>Shop</span>
                        </div>
                    </nav>

                    {/* IDLE MODAL */}
                    {idlePopup && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-8 glass-dark backdrop-blur-3xl">
                            <div className="glass p-14 rounded-[56px] max-w-sm text-center shadow-[0_40px_120px_rgba(0,0,0,0.5)] fade-in">
                                <div className="w-24 h-24 bg-amber-500 text-white rounded-[32px] flex items-center justify-center text-4xl mx-auto mb-10 shadow-2xl">
                                    <i className="fa-solid fa-mug-hot"></i>
                                </div>
                                <h2 className="text-4xl font-black mb-4 tracking-tighter">Still Tracking?</h2>
                                <p className="opacity-60 font-bold mb-10 leading-relaxed text-sm">Nexus Core detected inactivity. Shift timer paused to ensure data integrity.</p>
                                <button className="btn-nexus btn-p w-full justify-center py-5 text-lg" onClick={() => { setIdlePopup(false); setTimer(p => ({...p, paused: false})); setLastMove(Date.now()); }}>
                                    Resume Session
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const RootApp = () => {
            const [user, setUser] = useState(null);
            const [page, setPage] = useState('login');
            const [theme, setTheme] = useState('dark');
            const [loading, setLoading] = useState(true);

            useEffect(() => { 
                document.documentElement.setAttribute('data-theme', theme);
                setTimeout(() => setLoading(false), 2000);
            }, [theme]);

            if (loading) return <SplashScreen loading={true} />;

            if (!user) {
                return page === 'login' ? 
                    <LoginPage onLogin={setUser} setPage={setPage} theme={theme} setTheme={setTheme} /> : 
                    <RegisterPage onLogin={setUser} setPage={setPage} />;
            }

            return <TitanApp user={user} onLogout={() => setUser(null)} theme={theme} setTheme={setTheme} />;
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<RootApp />);
    </script>
</body>
</html>

<!-- Pedro Basura Man Signature Titan v4.4.2 Hub -->
