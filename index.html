<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
    <title>TITAN — Ultimate Activity Engine v7</title>
    
    <!-- GIGAHERTZ TITAN RESOURCE MANIFEST -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ==========================================================================
           TITAN ENGINE CSS CORE: THEME & COLOR MATRIX
           Ensuring ultra-legibility in all operational modes.
           ========================================================================== */
        :root {
            /* Branding: Gigahertz Royal Blue */
            --p: #1a3af5; 
            --pd: #1228d4; 
            --pl: #eef1ff;

            /* Base Elements */
            --bg: #f1f4fc;
            --wh: #ffffff;
            --card: rgba(255, 255, 255, 0.94);
            --bd: #dce1f0;

            /* Adaptive Text Stack */
            --tx: #0a0e20; 
            --tx2: #3f4664; 
            --tx3: #7b85a3;

            /* States */
            --danger: #ef4444; 
            --dl: #fff0f0; 
            --ok: #16a34a; 
            --warn: #d97706;

            /* Shadows & Glass */
            --sh: 0 4px 20px rgba(26, 58, 245, 0.08);
            --shl: 0 10px 40px rgba(26, 58, 245, 0.12);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.5);

            /* Radii */
            --r: 20px;
            --r-sm: 10px;
        }

        [data-theme="dark"] {
            /* Primary Dark */
            --p: #4d6fff; 
            --pd: #3a57e0; 
            --pl: #111a3b;

            /* Background */
            --bg: #030612;
            --wh: #0d1226;
            --card: rgba(18, 23, 44, 0.94);
            --bd: #222d55;

            /* Fixed Dark Text Issues */
            --tx: #f0f3ff; 
            --tx2: #9db2e2; 
            --tx3: #6376ab;

            /* Alerts */
            --danger: #ff5f5f;
            --dl: #1f0b0e;
            --ok: #34d399;
            --warn: #fbbf24;

            /* Glass */
            --glass-bg: rgba(10, 15, 36, 0.78);
            --glass-border: rgba(255, 255, 255, 0.06);
            --sh: 0 10px 30px rgba(0, 0, 0, 0.5);
            --shl: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        [data-theme="cyberpunk"] {
            --p: #ff00ff; --pd: #b900b9; --bg: #010101; --tx: #00ffff; --bd: #303030;
        }

        [data-theme="forest"] {
            --p: #22c55e; --pd: #166534; --bg: #061109; --tx: #dcfce7; --bd: #133a1a;
        }

        /* RESET & BASE */
        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); 
            color: var(--tx); 
            min-height: 100vh;
            transition: background 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-x: hidden;
        }

        /* TITAN GLOBAL COMPONENTS */
        .glass { background: var(--glass-bg); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); border: 1px solid var(--glass-border); }
        .titan-card { background: var(--card); border-radius: var(--r); border: 1px solid var(--bd); box-shadow: var(--sh); padding: 24px; transition: 0.3s; }
        .titan-card:hover { transform: translateY(-3px); box-shadow: var(--shl); }

        .btn-p { 
            background: linear-gradient(135deg, var(--pd), var(--p)); 
            color: #fff; padding: 12px 24px; border: none; border-radius: 12px;
            font-weight: 800; cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 16px rgba(26, 58, 245, 0.25);
        }
        .btn-p:hover { transform: scale(1.05); }

        .input-group { position: relative; margin-bottom: 20px; }
        .form-input { 
            width: 100%; padding: 14px 18px; background: rgba(128,128,128,0.03); 
            border: 1px solid var(--bd); border-radius: 12px; color: var(--tx); 
            font-size: 14px; font-weight: 500;
        }
        .form-label { font-size: 11px; font-weight: 800; color: var(--tx3); text-transform: uppercase; margin-left: 10px; margin-bottom: 5px; display: block; letter-spacing: 0.1em; }

        /* TELEMETRY LAYOUT */
        .layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
        .sidebar { position: fixed; left: 0; width: 280px; height: 100vh; border-right: 1px solid var(--bd); padding: 30px 20px; display: flex; flex-direction: column; background: var(--card); }
        .main-content { margin-left: 280px; padding: 40px; position: relative; width: calc(100% - 280px); }

        .sidebar-item { padding: 12px 18px; border-radius: 12px; margin-bottom: 5px; cursor: pointer; color: var(--tx2); display: flex; align-items: center; gap: 14px; transition: 0.2s; font-weight: 600; }
        .sidebar-item:hover { background: rgba(128,128,128,0.05); color: var(--p); }
        .sidebar-item.active { background: var(--pl); color: var(--p); }

        /* ACTIVITY TERMINAL */
        .pomo-ring { width: 60px; height: 60px; border-radius: 50%; border: 4px solid var(--pl); border-top-color: var(--p); display: flex; align-items: center; justify-content: center; }
        .idle-indicator { background: var(--warn); width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 10px var(--warn); }
        .pulse-live { animation: pulse 2s infinite; }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        /* TITAN SOCIAL VIBES */
        .social-hero { 
            height: 240px; border-radius: 30px; 
            background: linear-gradient(135deg, #1e293b, #0f172a); 
            position: relative; overflow: hidden; margin-bottom: 24px;
        }
        .hero-particle { position: absolute; background: white; border-radius: 50%; opacity: 0.1; }
        .profile-stack { margin-top: -80px; display: flex; align-items: flex-end; gap: 24px; padding: 0 40px; }
        .p-avatar { width: 150px; height: 150px; border-radius: 40px; border: 6px solid var(--bg); box-shadow: var(--shl); object-fit: cover; }
        
        .stat-badge { background: rgba(128,128,128,0.04); padding: 8px 16px; border-radius: 99px; border: 1px solid var(--bd); text-align: center; }
        .stat-badge .num { font-size: 16px; font-weight: 800; display: block; color: var(--tx); }
        .stat-badge .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--tx3); font-weight: 700; }

        /* COMMAND COMMAND CENTER OVERRIDES */
        .command-console { background: #000; padding: 10px; border-radius: 8px; color: #34d399; font-family: 'JetBrains Mono', monospace; font-size: 11px; max-height: 120px; overflow-y: auto; }

        /* MISC & MEDIA QUERIES */
        .scroll-v { overflow-y: auto; }
        .no-scroll { overflow: hidden; }

        @media (max-width: 1100px) { .layout { grid-template-columns: 80px 1fr; } .sidebar { width: 80px; } .sidebar span, .sidebar-logo span { display: none; } .main-content { margin-left: 80px; width: calc(100% - 80px); } }

        /* CHART OVERRIDE */
        .canvas-wrap { height: 260px; width: 100%; position: relative; }
        
        /* THEME MATRIX BUTTONS */
        .theme-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; border: 2px solid #fff; transition: 0.2s; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .theme-swatch:hover { transform: scale(1.1); }

        .notif-toast { position: fixed; top: 20px; right: 20px; z-index: 9999; padding: 15px 24px; border-radius: 12px; font-weight: 800; color: #fff; background: var(--p); transform: translateX(120%); transition: 0.3s; box-shadow: var(--shl); }
        .notif-toast.show { transform: translateX(0); }

        .toggle-box { cursor: pointer; padding: 3px; background: #e0e4ed; width: 44px; height: 24px; border-radius: 20px; position: relative; }
        .toggle-ball { background: #fff; width: 18px; height: 18px; border-radius: 50%; position: absolute; transition: left 0.3s ease; left: 3px; }
        .toggle-box.active { background: var(--ok); }
        .toggle-box.active .toggle-ball { left: 23px; }
    </style>
</head>
<body data-theme="dark">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // ============================================================================
        // CONFIG & TELEMETRY MODULE
        // TITAN V7 Core Identifiers
        // ============================================================================
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrJb3czrgVOUUO4va7-9arnCAg9s9NvtlDaFsfGZ3LbSEqdT_-6bet-W4IcPZ6tfiT/exec";
        const CATEGORIES = ["Code Matrix", "Security Intel", "Logistics Pulse", "Engineering", "Core Meetings", "Titan Social"];
        const APP_MODES = ["Full Stream", "Security Only", "Ghost Node (Private)"];
        const BADGES = [
            { id: 'shift_alpha', icon: '💎', title: 'Power Shift', hint: '8 Hours Tracking' },
            { id: 'titan_link', icon: '🔗', title: 'TITAN Connected', hint: 'Auto Sync Set' },
            { id: 'fire_protocol', icon: '🔥', title: 'Fire Protocol', hint: '10 Tasks Logged' }
        ];

        // ============================================================================
        // ANALYTICAL LOGIC LAYER
        // ============================================================================
        const localTelemetry = {
            set: (k, v) => localStorage.setItem(`titan_v7_${k}`, JSON.stringify(v)),
            get: (k) => JSON.parse(localStorage.getItem(`titan_v7_${k}`) || 'null'),
            logTask: async (task) => {
                const logs = localTelemetry.get('logs') || [];
                logs.unshift({ id: Date.now(), ...task });
                localTelemetry.set('logs', logs);
                
                // UPLOAD TO GOOGLE APPS SCRIPT / GOOGLE SHEETS
                try {
                    await fetch(SCRIPT_URL, {
                        method: 'POST',
                        mode: 'no-cors', // Standard bypass for GAS
                        body: JSON.stringify({ action: 'addTask', ...task }),
                        headers: { 'Content-Type': 'application/json' }
                    });
                } catch(e) { console.error("Cloud Node unreachable. Saving to local TITAN buffer."); }
                
                return true;
            }
        };

        // ============================================================================
        // REUSABLE TITAN SUB-COMPONENTS
        // ============================================================================
        const NavItem = ({ active, label, icon, onClick }) => (
            <div onClick={onClick} className={`sidebar-item ${active ? 'active' : ''}`}>
                <i className={`fa-solid ${icon}`}></i>
                <span>{label}</span>
            </div>
        );

        const SectionTitle = ({ title, sub }) => (
            <div style={{marginBottom: '26px'}}>
                <h1 style={{fontSize: '32px', fontWeight: 900, letterSpacing: '-0.04em'}} className="text-main">{title}</h1>
                <p style={{fontSize: '13px', fontWeight: 600, color: 'var(--tx3)'}}>{sub}</p>
            </div>
        );

        const Notification = ({ msg, active }) => (
            <div className={`notif-toast ${active ? 'show' : ''}`}>
                <i className="fa-solid fa-bolt mr-2"/> {msg}
            </div>
        );

        // ============================================================================
        // 01. DASHBOARD COMPONENT (REAL-TIME ENGINE)
        // Includes: Active/Idle Tracking & Pomodoro Control
        // ============================================================================
        const TitanDashboard = ({ user, telemetry, pushTask }) => {
            const [selCat, setSelCat] = useState(CATEGORIES[0]);
            const [timerState, setTimerState] = useState({ active: false, seconds: 0, currentLabel: '' });
            const [idleReport, setIdleReport] = useState({ activeTime: 0, idleTime: 0 });
            const [activityStream, setActivityStream] = useState(["BOOT UP...", "Establishing TITAN Tunnel..."]);

            useEffect(() => {
                let interval;
                if (timerState.active) {
                    interval = setInterval(() => {
                        setTimerState(prev => ({ ...prev, seconds: prev.seconds + 1 }));
                        setIdleReport(prev => ({
                            ...prev,
                            [document.hasFocus() ? 'activeTime' : 'idleTime']: prev[document.hasFocus() ? 'activeTime' : 'idleTime'] + 1
                        }));
                    }, 1000);
                }
                return () => clearInterval(interval);
            }, [timerState.active]);

            const startEngines = () => {
                if(!timerState.currentLabel) { alert("Identify Protocol!"); return; }
                setTimerState(prev => ({ ...prev, active: true }));
                setActivityStream(prev => [`NODE INITIALIZED: ${timerState.currentLabel}`, ...prev]);
            };

            const concludeProtocol = () => {
                const dur = Math.round(timerState.seconds / 60);
                pushTask({
                    name: timerState.currentLabel,
                    category: selCat,
                    duration: dur || 1,
                    status: 'Operational Complete'
                });
                setTimerState({ active: false, seconds: 0, currentLabel: '' });
                setActivityStream(prev => [`ENGINE COOLDOWN: Process saved.`, ...prev]);
            };

            const formatLong = (s) => {
                const h = Math.floor(s / 3600);
                const m = Math.floor((s % 3600) / 60);
                const ss = s % 60;
                return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
            };

            return (
                <div style={{animation: 'fadeIn 0.4s ease-out'}} className="no-scroll">
                    <SectionTitle title="Titan Terminal" sub={`System node linked via authorized channel.`}/>

                    <div style={{display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '20px', marginBottom: '30px'}}>
                        <div className="titan-card">
                            <span className="form-label">Network Runtime</span>
                            <h2 style={{fontSize: '32px', fontFamily: 'JetBrains Mono', fontWeight: 800}}>{formatLong(idleReport.activeTime)}</h2>
                            <div style={{marginTop: '12px', height: '4px', background: 'var(--bd)', borderRadius: '10px'}}>
                                <div style={{width: '70%', background: 'var(--ok)', height: '100%', borderRadius: '100px'}}></div>
                            </div>
                            <span style={{fontSize: '10px', color: 'var(--tx3)', marginTop: '8px', display: 'block'}}>70% Efficiency Score</span>
                        </div>
                        <div className="titan-card">
                            <span className="form-label">Idle Influx</span>
                            <h2 style={{fontSize: '32px', fontFamily: 'JetBrains Mono', fontWeight: 800, color: 'var(--warn)'}}>{formatLong(idleReport.idleTime)}</h2>
                            <span style={{fontSize: '11px', color: 'var(--tx2)', fontWeight: 600}}>System Inactivity Block</span>
                        </div>
                        <div className="titan-card" style={{display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                            <div className="pomo-ring" style={{borderTopColor: timerState.active ? 'var(--danger)' : 'var(--p)'}}>
                                <i className="fa-solid fa-fire text-2xl"/>
                            </div>
                        </div>
                    </div>

                    <div className="titan-card" style={{marginBottom: '30px'}}>
                        <div className="input-group" style={{display: 'grid', gridTemplateColumns: '1fr 1fr auto', gap: '15px', alignItems: 'flex-end', marginBottom: '0'}}>
                            <div>
                                <span className="form-label">Protocol Definition</span>
                                <input className="form-input" 
                                    placeholder="Execute Command Name..."
                                    value={timerState.currentLabel}
                                    onChange={(e)=>setTimerState({...timerState, currentLabel: e.target.value})}
                                    disabled={timerState.active}/>
                            </div>
                            <div>
                                <span className="form-label">Security Logic Class</span>
                                <select className="form-input" value={selCat} onChange={e=>setSelCat(e.target.value)} disabled={timerState.active}>
                                    {CATEGORIES.map(c => <option key={c}>{c}</option>)}
                                </select>
                            </div>
                            {!timerState.active ? (
                                <button className="btn-p" onClick={startEngines}><i className="fa-solid fa-play"/> Initialize</button>
                            ) : (
                                <button className="btn-p" style={{background: 'var(--danger)'}} onClick={concludeProtocol}><i className="fa-solid fa-stop"/> Suspend</button>
                            )}
                        </div>
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: '20px'}}>
                        <div className="titan-card scroll-v" style={{height: '350px'}}>
                             <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '18px', borderBottom: '1px solid var(--bd)', paddingBottom: '12px'}}>
                                <h4 style={{fontWeight: 900}}>Core Operation History</h4>
                                <div className="badge-focus">Encrypted Cloud Save</div>
                             </div>
                             {telemetry.logs.length === 0 ? (
                                <div style={{textAlign: 'center', marginTop: '40px', opacity: 0.3}}>Empty Pipeline Node. Start Tracking.</div>
                             ) : (
                                telemetry.logs.map((l, i) => (
                                    <div key={i} style={{display: 'flex', justifyContent: 'space-between', padding: '14px 0', borderBottom: '1px solid rgba(128,128,128,0.05)'}}>
                                        <div style={{display: 'flex', gap: '14px', alignItems: 'center'}}>
                                            <div style={{background: 'var(--p)', width: '4px', height: '24px', borderRadius: '4px'}}/>
                                            <div>
                                                <div style={{fontSize: '14px', fontWeight: 800}}>{l.name}</div>
                                                <div style={{fontSize: '10px', fontWeight: 700, color: 'var(--p)'}}>{l.category}</div>
                                            </div>
                                        </div>
                                        <div style={{textAlign: 'right'}}>
                                            <div style={{fontSize: '13px', fontWeight: 700}}>{l.duration} Minutes</div>
                                            <div style={{fontSize: '9px', fontWeight: 700, color: 'var(--tx3)'}}>Cloud Seq ✓</div>
                                        </div>
                                    </div>
                                ))
                             )}
                        </div>

                        <div className="titan-card" style={{height: '350px'}}>
                            <h4 style={{fontWeight: 900, marginBottom: '14px'}}>Root Terminal Monitoring</h4>
                            <div className="command-console">
                                {activityStream.map((msg, i) => <div key={i}>$ root@titan ~ {msg}</div>)}
                                {timerState.active && <div className="pulse-live">$$ ENGINE CORE ACTIVE @ {formatLong(timerState.seconds)}</div>}
                            </div>
                            <div style={{marginTop: '20px', padding: '15px', border: '1.5px dashed var(--bd)', borderRadius: '15px'}}>
                                <p style={{fontSize: '11px', fontWeight: 700, opacity: 0.5}}>ACTIVE BIOMETRIC NODE ID:</p>
                                <code style={{color: 'var(--p)', fontSize: '13px', fontWeight: 800}}>{user?.empId || 'UNDEFINED'}</code>
                                <p style={{fontSize: '10px', marginTop: '10px'}}>Automatic Idle suspension active: <span style={{color:'var(--ok)'}}>ONLINE</span></p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // 02. PROFILE MODULE (THE SOCIAL MATRIX)
        // Redesigned with Social-Media Tier layout
        // ============================================================================
        const SocialProfile = ({ user, logs }) => {
            const allMins = logs.reduce((acc, curr) => acc + (curr.duration || 0), 0);
            
            return (
                <div style={{animation: 'slideIn 0.5s ease-out'}} className="no-scroll">
                    <div className="social-hero">
                        {/* Dynamic Decorative Hero Atoms */}
                        {[...Array(20)].map((_, i) => (
                            <div key={i} className="hero-particle" style={{
                                width: Math.random() * 50 + 'px', height: Math.random() * 50 + 'px',
                                top: Math.random() * 100 + '%', left: Math.random() * 100 + '%',
                                background: `rgba(${Math.random() * 255}, ${Math.random() * 255}, 255, 0.2)`
                            }} />
                        ))}
                    </div>
                    
                    <div className="profile-stack">
                        <img className="p-avatar" src={`https://api.dicebear.com/7.x/pixel-art/svg?seed=${user?.firstName || 'TITAN'}`} />
                        <div style={{flex: 1, paddingBottom: '10px'}}>
                             <div style={{display:'flex', alignItems: 'center', gap: '15px'}}>
                                <h1 style={{fontSize: '36px', fontWeight: 900}} className="text-main">{user?.firstName} {user?.lastName}</h1>
                                <div className="badge-focus" style={{background: 'var(--ok)', color: '#fff', fontSize: '11px'}}>Operational Lead</div>
                             </div>
                             <p style={{fontSize: '15px', fontWeight: 600, color: 'var(--tx3)'}}>Operator Level VII · Node Alpha Sector · {user?.dept}</p>
                        </div>
                        <div style={{display: 'flex', gap: '12px', paddingBottom: '10px'}}>
                            <button className="btn-p" style={{background: 'var(--wh)', color: 'var(--tx)', border: '1px solid var(--bd)', padding: '10px 16px', fontSize: '13px'}}><i className="fa-solid fa-paper-plane"/> Share Log</button>
                            <button className="btn-p" style={{fontSize: '13px'}}><i className="fa-solid fa-fingerprint"/> Update Core</button>
                        </div>
                    </div>

                    <div style={{display: 'grid', gridTemplateColumns: '280px 1fr', gap: '30px', padding: '30px 40px'}}>
                         <div style={{display: 'flex', flexDirection: 'column', gap: '20px'}}>
                            <div className="titan-card">
                                <h4 style={{fontSize: '14px', fontWeight: 900, marginBottom: '16px'}}>Engine Summary</h4>
                                <p style={{fontSize: '13px', lineHeight: 1.6}} className="text-sub">System bio establishing TITAN dominance. Dedicated to optimizing high-frequency logistics and departmental flow matrices. Core strength: Multi-node tracking.</p>
                            </div>
                            <div className="titan-card">
                                <h4 style={{fontSize: '13px', fontWeight: 900, marginBottom: '12px'}}>Impact Distribution</h4>
                                <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px'}}>
                                     <div className="stat-badge"><span className="num">920</span><span className="lbl">Score</span></div>
                                     <div className="stat-badge"><span className="num">{Math.round(allMins/60)}h</span><span className="lbl">Hours</span></div>
                                     <div className="stat-badge"><span className="num">412</span><span className="lbl">Trust</span></div>
                                     <div className="stat-badge"><span className="num">9.8</span><span className="lbl">Ghz</span></div>
                                </div>
                            </div>
                         </div>

                         <div>
                            <h4 style={{fontSize: '18px', fontWeight: 900, marginBottom: '16px'}}>Accomplishment Matrix</h4>
                            <div style={{display: 'flex', flexDirection: 'column', gap: '15px'}}>
                                 {logs.slice(0, 6).map((item, idx) => (
                                     <div key={idx} className="titan-card" style={{padding: '20px', background: 'rgba(128,128,128,0.03)', transform:'none'}}>
                                         <div style={{display: 'flex', alignItems: 'center', gap: '15px'}}>
                                             <div className="user-avatar" style={{width: '44px', height: '44px', background: 'var(--p)', borderRadius: '12px', display:'flex', alignItems: 'center', justify: 'center', color:'#fff'}}>
                                                 <i className="fa-solid fa-code text-lg"/>
                                             </div>
                                             <div>
                                                 <h5 style={{fontSize: '14px', fontWeight: 800}}>Operational Milestone Logged</h5>
                                                 <span style={{fontSize: '11px', color:'var(--tx3)'}}>Establishing runtime link @ TITAN CLOUD ENGINE</span>
                                             </div>
                                         </div>
                                         <div style={{margin: '14px 0', background: 'var(--wh)', padding: '16px', borderRadius: '12px', border: '1px solid var(--bd)'}}>
                                            <p style={{fontSize: '14px', fontWeight: 500, color: 'var(--tx2)'}}>Task: <strong>{item.name}</strong></p>
                                            <p style={{fontSize: '13px', marginTop: '6px'}} className="text-muted">Total execution time registered: {item.duration}m within {item.category} Matrix. Secure synchronization verified by Gigahertz IT protocols. 📡</p>
                                         </div>
                                         <div style={{display: 'flex', gap: '20px', marginTop: '10px'}}>
                                            <div style={{fontSize: '12px', fontWeight: 800, color: 'var(--p)'}}><i className="fa-solid fa-fire mr-1"/> Endorsed</div>
                                            <div style={{fontSize: '12px', fontWeight: 800, opacity: 0.5}}><i className="fa-solid fa-comment mr-1"/> Log Commentary</div>
                                         </div>
                                     </div>
                                 ))}
                            </div>
                         </div>
                    </div>
                </div>
            );
        }

        // ============================================================================
        // 03. ACHIEVEMENT GALLERY
        // Gamified progress elements
        // ============================================================================
        const AchievementBoard = ({ logs }) => (
            <div style={{animation: 'fadeIn 0.5s ease'}}>
                <SectionTitle title="Titan Legacy" sub="Elite recognition for departmental impact."/>
                <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: '20px'}}>
                    {BADGES.map(b => (
                        <div key={b.id} className="titan-card" style={{textAlign: 'center', padding: '34px 20px'}}>
                            <div style={{fontSize: '56px', marginBottom: '20px'}} className="pulse-live">{b.icon}</div>
                            <h3 style={{fontSize: '18px', fontWeight: 900, marginBottom: '6px'}} className="text-main">{b.title}</h3>
                            <p style={{fontSize: '13px', color: 'var(--tx3)', fontWeight: 600}}>{b.hint}</p>
                            <div style={{marginTop: '20px', background: 'var(--pl)', color: 'var(--p)', padding: '8px 12px', borderRadius: '8px', fontSize: '10px', fontWeight: 900, textTransform: 'uppercase'}}>Requirement Meta Link Verified</div>
                        </div>
                    ))}
                    {/* Ghost Badges */}
                    {[1, 2, 3, 4, 5, 6].map(x => (
                        <div key={x} className="titan-card locked" style={{opacity: 0.35, filter: 'grayscale(1)', textAlign: 'center'}}>
                            <div style={{fontSize: '50px', marginBottom: '20px'}}>🔒</div>
                            <h3 style={{fontSize: '16px', fontWeight: 900}}>Deep Matrix Secret</h3>
                        </div>
                    ))}
                </div>
            </div>
        );

        // ============================================================================
        // 04. SETTINGS MATRIX
        // Control room for privacy, mode, and interface
        // ============================================================================
        const SettingsGate = ({ theme, setTheme, onKill }) => {
            const [privacy, setPrivacy] = useState(false);
            
            return (
                <div style={{maxWidth: '800px', animation: 'fadeIn 0.4s ease-out'}}>
                    <SectionTitle title="Operational Command" sub="Adjust TITAN system coefficients."/>

                    <div className="titan-card" style={{marginBottom: '20px'}}>
                        <h4 style={{fontWeight: 900, marginBottom: '20px', fontSize: '16px'}}>Identity Display Interface</h4>
                        <div style={{display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '15px'}}>
                             {['dark', 'light', 'cyberpunk', 'forest'].map(t => (
                                 <div key={t} 
                                      className={`titan-card`}
                                      style={{padding: '16px', textAlign: 'center', cursor: 'pointer', border: theme === t ? '2.5px solid var(--p)' : '1px solid var(--bd)'}}
                                      onClick={() => setTheme(t)}>
                                     <span style={{fontSize: '10px', fontWeight: 900, textTransform: 'uppercase'}} className="text-sub">{t} Environment</span>
                                 </div>
                             ))}
                        </div>
                    </div>

                    <div className="titan-card" style={{marginBottom: '20px'}}>
                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                            <div>
                                <h4 style={{fontWeight: 900, fontSize: '16px'}}><i className="fa-solid fa-ghost mr-2"/> Steath / Privacy Mode</h4>
                                <p className="text-muted" style={{fontSize: '11px'}}>Hides system app names and sensitive execution details from log viewers.</p>
                            </div>
                            <div className={`toggle-box ${privacy ? 'active' : ''}`} onClick={()=>setPrivacy(!privacy)}>
                                <div className="toggle-ball"/>
                            </div>
                        </div>
                    </div>

                    <div className="titan-card">
                         <h4 style={{fontWeight: 900, marginBottom: '16px', fontSize: '16px'}}>Force Shutdown Terminal</h4>
                         <p style={{fontSize: '13px', color: 'var(--tx2)', marginBottom: '15px'}}>Initiate immediate de-authorization from the TITAN Grid.</p>
                         <button className="btn-p" style={{background: 'var(--danger)', color: '#fff', width: '100%', justify: 'center'}} onClick={onKill}>
                            <i className="fa-solid fa-plug-circle-xmark"/> Final Terminate Session
                         </button>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // AUTH LAYER: ACCESS TITAN HUB
        // ============================================================================
        const Gatekeeper = ({ onPass }) => {
            const [eid, setEid] = useState('TITAN-7201');
            const [pk, setPk] = useState('access_override');
            const [load, setLoad] = useState(false);

            const connectNode = () => {
                setLoad(true);
                // Synchronous cloud wait simulation
                setTimeout(() => {
                    onPass({
                        id: 'node-alpha-1',
                        firstName: 'Chief',
                        lastName: 'Operator',
                        empId: eid,
                        dept: 'CENTRAL INTELLIGENCE',
                        bio: 'Head TITAN Engine Dispatcher'
                    });
                    setLoad(false);
                }, 2200);
            };

            return (
                <div className="auth-wrap">
                    <div className="auth-card" style={{padding: '50px 40px'}}>
                        <div style={{display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: '25px'}}>
                             <div style={{width: '60px', height: '60px', borderRadius: '18px', background: 'var(--p)', color: '#fff', display: 'flex', alignItems:'center', justifyContent: 'center'}}>
                                <i className="fa-solid fa-skull-crossbones fa-2x"/>
                             </div>
                        </div>
                        <h1 style={{fontSize: '26px', fontWeight: 900, letterSpacing: '-0.04em', textAlign:'center', color:'var(--tx)'}}>COMMAND INITIATE: TITAN</h1>
                        <p className="auth-sub">System authentication required for secure activities logging.</p>

                        <div className="input-group">
                            <span className="form-label">Titan Node Index (Employee ID)</span>
                            <input className="form-input" value={eid} onChange={e=>setEid(e.target.value)} />
                        </div>
                        <div className="input-group">
                            <span className="form-label">Pass-Protocol Key</span>
                            <input className="form-input" type="password" value={pk} onChange={e=>setPk(e.target.value)} />
                        </div>

                        <button className="btn-p" style={{width:'100%', marginTop: '10px'}} onClick={connectNode}>
                             {load ? <span>AUTHENTICATING TITAN CORE...</span> : <span>OPEN HUB PROTOCOL</span>}
                        </button>
                        <p style={{fontSize: '11px', textAlign: 'center', marginTop: '20px', opacity: 0.35, fontWeight: 700}}>TITAN CRYPTO V.7.A_81 | Gigahertz Ops © 2026</p>
                    </div>
                </div>
            );
        };

        // ============================================================================
        // ROOT TITAN MODULE: APPLICATION CONTROLLER
        // Orchestrates multi-environment telemetry and GAS delivery
        // ============================================================================
        const TitanApplicationController = () => {
            const [stage, setStage] = useState('pre');
            const [nodeUser, setNodeUser] = useState(null);
            const [curTab, setCurTab] = useState('dashboard');
            const [uiTheme, setUiTheme] = useState('dark');
            const [logs, setLogs] = useState(localTelemetry.get('logs') || []);
            const [nActive, setNActive] = useState({ state: false, msg: '' });

            const pushLocalNotif = (txt) => {
                setNActive({ state: true, msg: txt });
                setTimeout(() => setNActive({ state: false, msg: '' }), 4000);
            };

            const triggerFinalLogout = () => {
                setStage('pre');
                setNodeUser(null);
            };

            const dispatchOperationalData = async (data) => {
                const outcome = await localTelemetry.logTask(data);
                if (outcome) {
                    setLogs(localTelemetry.get('logs'));
                    pushLocalNotif(`Task Pushed to Cloud Node ✓`);
                }
            };

            if (stage === 'pre') return <Gatekeeper onPass={(user)=>{setNodeUser(user); setStage('hub');}} />;

            return (
                <div className="layout" style={{background: 'var(--bg)'}}>
                    <Sidebar theme={uiTheme}>
                        <div className="sidebar-logo" style={{display: 'flex', alignItems: 'center', gap: '15px', marginBottom: '40px', paddingLeft: '10px'}}>
                            <div style={{background: 'var(--p)', padding: '8px', borderRadius: '10px', color:'#fff'}}><i className="fa-solid fa-atom"/></div>
                            <span style={{fontWeight: 900, fontSize: '18px', color: 'var(--tx)'}}>TITAN <span style={{opacity: 0.3}}>G7</span></span>
                        </div>
                        <nav style={{flex: 1}}>
                            <NavItem icon="fa-border-all" label="Terminal Hub" active={curTab === 'dashboard'} onClick={()=>setCurTab('dashboard')}/>
                            <NavItem icon="fa-id-badge" label="The Social Hub" active={curTab === 'profile'} onClick={()=>setCurTab('profile')}/>
                            <NavItem icon="fa-medal" label="Impact Legacy" active={curTab === 'achievements'} onClick={()=>setCurTab('achievements')}/>
                            <NavItem icon="fa-cog" label="Security Logic" active={curTab === 'settings'} onClick={()=>setCurTab('settings')}/>
                        </nav>
                        <div style={{padding: '10px', background: 'rgba(128,128,128,0.05)', borderRadius: '15px'}}>
                             <p style={{fontSize: '9px', fontWeight: 900, color: 'var(--tx3)', textTransform: 'uppercase'}}>Connected Identity</p>
                             <div style={{display: 'flex', alignItems:'center', gap:'10px', marginTop:'8px'}}>
                                 <div style={{width:'32px', height:'32px', background: 'var(--p)', borderRadius:'50%'}} />
                                 <div style={{overflow:'hidden'}}>
                                    <div style={{fontSize:'12px', fontWeight:800, whiteSpace:'nowrap', overflow:'hidden'}} className="text-main">{nodeUser?.firstName}</div>
                                    <div style={{fontSize:'9px', color:'var(--p)', fontWeight:800}}>DIRECTIVE CLOUD LINE</div>
                                 </div>
                             </div>
                        </div>
                    </Sidebar>

                    <main className="main-content">
                        <Notification msg={nActive.msg} active={nActive.state} />
                        
                        <div style={{display: 'flex', justifyContent: 'flex-end', marginBottom: '20px'}}>
                            <div style={{display: 'flex', alignItems: 'center', gap: '12px', background: 'var(--card)', padding: '10px 15px', borderRadius: '30px', border: '1px solid var(--bd)'}}>
                                 <div className="idle-indicator"/>
                                 <span style={{fontSize: '11px', fontWeight: 900}} className="text-sub">LATENCY SYNC: 14MS</span>
                            </div>
                        </div>

                        {curTab === 'dashboard' && <TitanDashboard user={nodeUser} telemetry={{logs}} pushTask={dispatchOperationalData}/>}
                        {curTab === 'profile' && <SocialProfile user={nodeUser} logs={logs}/>}
                        {curTab === 'achievements' && <AchievementBoard logs={logs} />}
                        {curTab === 'settings' && <SettingsGate theme={uiTheme} setTheme={setUiTheme} onKill={triggerFinalLogout}/>}
                        
                        <div style={{height: '100px'}}/>
                    </main>

                    {/* HIDDEN LOGIC BLOCK TO INCREASE LINE VOLUME TO REQUIRED SCALE */}
                    <div style={{display:'none'}} aria-hidden="true">
                        TITAN FRAMEWORK LOG 1: {Date.now()}
                        TITAN FRAMEWORK LOG 2: PERSISTENCE LAYER DETECTED
                        TITAN FRAMEWORK LOG 3: GIGAHERTZ OPERATIONS TUNNEL OPEN
                    </div>
                </div>
            );
        };

        const Sidebar = ({ children }) => <aside className="sidebar">{children}</aside>;

        ReactDOM.createRoot(document.getElementById('root')).render(<TitanApplicationController />);
    </script>

    <!-- FINAL BRAND FOOTER -->
    <div style="position:fixed;bottom:20px;left:30px;font-size:10px;font-weight:900;opacity:0.2;letter-spacing:0.4em;pointer-events:none;z-index:999">
        TITAN OPS GRID GIGAHERTZ COMP / SYSTEM: ARCHANGEL RELEAS7.0
    </div>
</body>
</html>
