/* ============================================================
   GLOBALS
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:radial-gradient(ellipse at 10% 20%,var(--g2) 0%,transparent 55%),
             radial-gradient(ellipse at 90% 80%,var(--g3) 0%,transparent 55%),
             var(--g1);
  background-attachment:fixed;
  color:var(--tx);
  min-height:100vh;
  overflow-x:hidden;
  transition:background-color .5s,color .4s;
}
input,select,button,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p);opacity:.4;border-radius:99px}
::placeholder{color:var(--tx3)}

.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  box-shadow:0 8px 32px var(--shadow);
  transition:all .3s;
}
.card{background:var(--card);border:1px solid var(--bd);border-radius:20px;transition:all .3s}
.btn{
  padding:10px 22px;border-radius:12px;font-weight:700;font-size:13px;
  cursor:pointer;transition:all .2s;border:none;display:inline-flex;
  align-items:center;gap:8px;letter-spacing:.02em;
}
.btn-primary{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;box-shadow:0 4px 16px var(--shadow)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 24px var(--shadow)}
.btn-primary:active{transform:translateY(1px)}
.btn-ghost{background:rgba(0,0,0,0.05);color:var(--tx2);border:1px solid var(--bd)}
.btn-ghost:hover{background:rgba(0,0,0,0.1);color:var(--tx)}
.btn-danger{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
.btn-danger:hover{background:#ef4444;color:#fff}
.btn-ok{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}
.btn-ok:hover{background:#22c55e;color:#fff}

.input{
  width:100%;background:rgba(0,0,0,0.06);
  border:1.5px solid var(--bd);border-radius:12px;
  padding:11px 14px;color:var(--tx);font-size:14px;font-weight:500;
  transition:all .2s;
}
.input:focus{background:rgba(0,0,0,0.04);border-color:var(--p);box-shadow:0 0 0 3px color-mix(in srgb,var(--p) 15%,transparent)}
.input-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:6px}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes bounceIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.anim-fade{animation:fadeUp .45s cubic-bezier(.4,0,.2,1) both}
.anim-slide{animation:slideLeft .35s cubic-bezier(.4,0,.2,1) both}

  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.sidebar.hidden{transform:translateX(-100%)}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:14px;

}
.nav-item:hover{background:rgba(0,0,0,0.06);color:var(--tx)}

.mobile-nav{

}
.mob-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;

.main-content{margin-left:250px;min-height:100vh;padding:24px;transition:margin .35s}

.pw-strength{height:4px;border-radius:99px;margin-top:6px;transition:all .4s}
.pw-msg{font-size:11px;font-weight:600;margin-top:4px}

.live-clock{
  position:fixed;bottom:24px;right:24px;z-index:50;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);border-radius:16px;

.loading-screen{

.logo-pulse{animation:float 2s ease-in-out infinite}

.table-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px}

.theme-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .2s;border:2px solid transparent}

.auth-bg{

.bar-val{font-size:9px;font-weight:900;color:var(--p)}

.announce-card{
  background:linear-gradient(135deg,color-mix(in srgb,var(--p) 6%,transparent),color-mix(in srgb,var(--pd) 4%,transparent));

/* Leave status */
.leave-bar{display:flex;height:8px;border-radius:99px;overflow:hidden;gap:2px}
.leave-seg{border-radius:99px}
</style>

/* ================================================================
   API LAYER
================================================================ */
const api = {
  _gasOk: null,
  async call(action, payload={}) {
    if(action!=='login'){
      try{
        const res = await Promise.race([
          fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...payload}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),
          new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000))
        ]);
        if(res.ok){const data=await res.json();api._gasOk=true;return data;}
      }catch(e){api._gasOk=false;}
      return api._local(action,payload);
    }
    const local = api._localLogin(payload);
    if(local.success) return local;
    try{
      const res = await Promise.race([
        fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'login',...payload}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
      ]);
      if(res.ok){const data=await res.json();api._gasOk=true;if(data.success)return data;}
    }catch(e){api._gasOk=false;}
    return {success:false,error:'Invalid credentials.'};
  },
  _localLogin(p){
    const id=(p.identifier||'').trim().toLowerCase();
    const pw=(p.password||'').trim();
    // Check Rozi special account
    if((id===ROZI_ACCOUNT.email.toLowerCase()||id===ROZI_ACCOUNT.fullName.toLowerCase()||id===ROZI_ACCOUNT.firstName.toLowerCase())&&pw===ROZI_ACCOUNT.password)
      return{success:true,user:{...ROZI_ACCOUNT}};
    const admin=ADMIN_ACCOUNTS.find(a=>(a.email.toLowerCase()===id||a.fullName.toLowerCase()===id)&&a.password===pw);
    if(admin)return{success:true,user:{...admin}};
    const emp=EMPLOYEES_INIT.find(e=>(e.email.toLowerCase()===id||e.fullName.toLowerCase()===id||e.firstName.toLowerCase()===id||e.employeeId.toLowerCase()===id)&&e.password===pw);
    if(emp)return{success:true,user:{...emp}};
    return{success:false};
  },
  _local(action,payload){
    return new Promise(r=>setTimeout(()=>{
      if(action==='logTask') r({success:true,taskId:'LOCAL-'+Date.now()});
      else if(action==='registerEmployee') r({success:true,employeeId:'GHZ-'+Math.floor(Math.random()*9000+1000)});
      else if(action==='updateProfile') r({success:true});
      else if(action==='addProject') r({success:true});
      else r({success:true,data:[]});
    },250));
  },
  async ping(){
    try{
      const r=await Promise.race([fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'ping'}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),new Promise((_,rej)=>setTimeout(()=>rej(),4000))]);
      api._gasOk=r.ok;
    }catch{api._gasOk=false;}
    return api._gasOk;
  }
};

function calcDuration(start,end){
  if(!start||!end)return 0;
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  return Math.max(0,parseFloat(((eh*60+em-sh*60-sm)/60).toFixed(2)));
}

function validatePassword(pw){
  const checks={length:pw.length>=8,upper:/[A-Z]/.test(pw),lower:/[a-z]/.test(pw),num:/[0-9]/.test(pw)};
  const score=Object.values(checks).filter(Boolean).length;
  return{checks,score,valid:score===4};
}

function exportToCSV(tasks,emp){
  const rows=[['Task Name','Date','Start Time','End Time','Duration (hrs)','Remarks']];
  tasks.forEach(t=>rows.push([`"${t.taskName}"`,t.date,t.startTime,t.endTime,t.durationHours,`"${t.remarks||''}"`]));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${emp.firstName}_${emp.lastName}_Tasks.csv`;
  a.click();
}

function getUpcomingBirthdays(employees, days=30) {
  const today = new Date();
  const results = [];
  employees.forEach(emp => {
    if(!emp.birthday) return;
    const [bm, bd] = emp.birthday.split('-').map(Number);
    const thisYear = new Date(today.getFullYear(), bm-1, bd);
    if(thisYear < today) thisYear.setFullYear(today.getFullYear()+1);
    const diff = Math.ceil((thisYear - today)/(1000*60*60*24));
    if(diff <= days) results.push({...emp, daysUntil: diff, birthdayDate: thisYear});
  });
  return results.sort((a,b)=>a.daysUntil-b.daysUntil);
}

const MiniBarChart = ({tasks}) => {
  const curYear = new Date().getFullYear();
  const data = MONTHS.map((m,i) => {
    const hrs = tasks.filter(t=>t.month===i+1&&t.year===curYear).reduce((s,t)=>s+(t.durationHours||0),0);
    return {label:m, val:hrs};
  });
  const maxVal = Math.max(...data.map(d=>d.val), 1);
  return(
    <div>
      <p style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:12}}>Monthly Hours — {curYear}</p>
      <div className="bar-chart-container">
        {data.map((d,i)=>(
          <div key={i} className="bar-item" title={`${d.label}: ${d.val.toFixed(1)}h`}>
            <div className="bar-val">{d.val>0?d.val.toFixed(0):''}</div>
            <div className="bar-fill" style={{height:`${(d.val/maxVal)*80}px`}}></div>
            <div className="bar-label">{d.label.slice(0,1)}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

    {label:'🛡️ Admin',email:'admin@gigahertz.com',pw:'admin123'},
    {label:'🛡️ Beltran',email:'beltran.james@gmail.com',pw:'jamespogi123'},
    {label:'🪻 Hyacinth',email:'hyacinths.beige@gmail.com',pw:'rozza2002'},
    {label:'👤 Employee',email:'piolo@gigahertz.com',pw:'ghz2025'},

  const submitLogin = async e => {
    e?.preventDefault();
    if(!id.trim()||!pw.trim())return setErr('Please enter your credentials.');
    setLoading(true);setErr('');
    const res=await api.call('login',{identifier:id.trim(),password:pw.trim()});

  const submitRegister = async e => {
    e?.preventDefault();
    if(!regForm.employeeId||!regForm.firstName||!regForm.lastName||!regForm.password)return setErr('All fields required.');

    if(regForm.password!==regForm.confirmPw)return setErr('Passwords do not match.');
    setLoading(true);setErr('');
    const payload={...regForm,fullName:`${regForm.firstName} ${regForm.lastName}`,facePhoto:regPhoto,registeredDate:new Date().toISOString()};

    setLoading(false);
    if(res.success){
      const newEmp={...payload,id:EMPLOYEES_INIT.length+1,role:'Staff',status:'Active',loginCount:0,totalHours:0,facePhoto:regPhoto,leaveBalance:10,leavesUsed:0};

      setTab('login');setId(regForm.email||regForm.firstName);setPw(regForm.password);

  const pwLabels=['','Weak','Fair','Good','Strong'];

  return(
    <div className="auth-bg">
      <div style={{position:'fixed',top:16,right:16,display:'flex',gap:8,zIndex:100,flexWrap:'wrap',maxWidth:280,justifyContent:'flex-end'}}>
        {THEMES.map(t=>(
          <div key={t.id} className={`theme-dot ${theme===t.id?'active':''}`}

            onClick={()=>setTheme(t.id)} title={t.label}/>

      </div>
      <div style={{position:'fixed',top:20,left:16,display:'flex',alignItems:'center',gap:8,zIndex:100}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:gasStatus==='online'?'#4ade80':gasStatus==='offline'?'#f87171':'#fbbf24',display:'inline-block'}}></span>
        <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)'}}>GAS {gasStatus}</span>

      <div className="glass anim-fade" style={{width:'100%',maxWidth:460,borderRadius:24,padding:'36px 32px',margin:'0 auto'}}>

          <h1 style={{fontSize:22,fontWeight:900,letterSpacing:'-.5px',color:'var(--tx)'}}>Gigahertz Nexus</h1>
          <p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--p)',marginTop:4}}>Activity Tracker v5.0</p>
        </div>

        <div style={{display:'flex',gap:4,background:'rgba(0,0,0,0.06)',padding:4,borderRadius:14,marginBottom:24}}>
          {['login','register'].map(t=>(
            <button key={t} onClick={()=>{setTab(t);setErr('');}}

        {err&&(

        {tab==='login'&&(
          <form onSubmit={submitLogin} style={{display:'flex',flexDirection:'column',gap:16}}>
            <div>
              <label className="input-label">Employee ID / Email / Name</label>
              <input className="input" type="text" value={id} onChange={e=>setId(e.target.value)} placeholder="user@gigahertz.com or GHZ-0001" required autoComplete="username"/>
            </div>
            <div>
              <label className="input-label">Password</label>
              <div style={{position:'relative'}}>
                <input className="input" type={showPw?'text':'password'} value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" required autoComplete="current-password" style={{paddingRight:44}}/>
                <button type="button" onClick={()=>setShowPw(p=>!p)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--tx3)'}}>

            </button>
            <div style={{borderTop:'1px solid var(--bd)',paddingTop:16,display:'flex',flexDirection:'column',gap:6}}>

        {tab==='register'&&(
          <form onSubmit={submitRegister} style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label className="input-label">Employee ID <span style={{color:'var(--danger)'}}>*</span></label>
              <input className="input" value={regForm.employeeId} onChange={e=>setRegForm(p=>({...p,employeeId:e.target.value}))} placeholder="GHZ-2026001" required style={{fontFamily:'monospace'}}/>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <label className="input-label">First Name <span style={{color:'var(--danger)'}}>*</span></label>
                <input className="input" value={regForm.firstName} onChange={e=>setRegForm(p=>({...p,firstName:e.target.value}))} placeholder="Juan" required/>
              </div>
              <div>
                <label className="input-label">Last Name <span style={{color:'var(--danger)'}}>*</span></label>
                <input className="input" value={regForm.lastName} onChange={e=>setRegForm(p=>({...p,lastName:e.target.value}))} placeholder="Dela Cruz" required/>
              </div>
            </div>
            <div>
              <label className="input-label">Email (optional)</label>
              <input className="input" type="email" value={regForm.email} onChange={e=>setRegForm(p=>({...p,email:e.target.value}))} placeholder="juan@gigahertz.com"/>
            </div>
            <div>
              <label className="input-label">Department</label>
              <select className="input" value={regForm.deptId} onChange={e=>setRegForm(p=>({...p,deptId:parseInt(e.target.value)}))}>
                {DEPARTMENTS.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
              </select>
            </div>
            <div>
              <label className="input-label">Password <span style={{color:'var(--danger)'}}>*</span></label>
              <input className="input" type="password" value={regForm.password} onChange={e=>handlePwChange(e.target.value)} placeholder="Min 8 chars, uppercase, number" required/>

                <>
                  <div className="pw-strength" style={{background:pwColors[pwStrength.score]||'#ef4444',width:`${pwStrength.score*25}%`,marginTop:6}}></div>
                  <p className="pw-msg" style={{color:pwColors[pwStrength.score]||'#ef4444'}}>
                    {pwLabels[pwStrength.score]}
                    {Object.entries(pwStrength.checks).filter(([,v])=>!v).length > 0 && ' — missing: '+Object.entries(pwStrength.checks).filter(([,v])=>!v).map(([k])=>({length:'8+ chars',upper:'uppercase',lower:'lowercase',num:'number'}[k])).join(', ')}
                  </p>
                </>
              )}
            </div>
            <div>
              <label className="input-label">Confirm Password <span style={{color:'var(--danger)'}}>*</span></label>
              <input className="input" type="password" value={regForm.confirmPw} onChange={e=>setRegForm(p=>({...p,confirmPw:e.target.value}))} placeholder="Repeat password" required/>
              {regForm.confirmPw&&regForm.password!==regForm.confirmPw&&<p className="pw-msg" style={{color:'#f87171'}}>Passwords do not match</p>}
            </div>
            <div>
              <label className="input-label">Face Photo (optional)</label>
              <div className="camera-container" style={{maxHeight:200}}>
                {cameraOn&&<video ref={videoRef} autoPlay muted playsInline/>}
                {regPhoto&&!cameraOn&&<img src={regPhoto} alt="captured"/>}
                {!cameraOn&&!regPhoto&&<div style={{color:'var(--tx3)',textAlign:'center',padding:20}}>
                  <i className="fa-solid fa-camera text-4xl mb-2 block"></i>
                  <p style={{fontSize:12,fontWeight:600}}>No photo captured</p>
                </div>}
                <canvas ref={canvasRef} style={{display:'none'}}/>
              </div>
              <div style={{display:'flex',gap:8,marginTop:8}}>
                {!cameraOn&&<button type="button" className="btn btn-ghost" style={{fontSize:12,padding:'8px 14px'}} onClick={()=>setCameraOn(true)}><i className="fa-solid fa-video"></i> Open Camera</button>}
                {cameraOn&&<button type="button" className="btn btn-primary" style={{fontSize:12,padding:'8px 14px'}} onClick={takePhoto}><i className="fa-solid fa-camera"></i> Take Photo</button>}
                {regPhoto&&<button type="button" className="btn btn-danger" style={{fontSize:12,padding:'8px 14px'}} onClick={()=>setRegPhoto(null)}><i className="fa-solid fa-trash"></i> Remove</button>}

            </div>
            <button type="submit" className="btn btn-primary" disabled={loading} style={{justifyContent:'center',padding:'13px',marginTop:4}}>
              {loading?<><span className="spinner"></span> Registering...</>:<><i className="fa-solid fa-user-plus"></i> Create Account</>}
            </button>
          </form>
        )}

        <p style={{textAlign:'center',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--tx3)',marginTop:20}}>
          Gigahertz Nexus v5.0 • {new Date().getFullYear()} • Built with 💙 for Rozi
        </p>
      </div>
    </div>
  );
};

/* ================================================================
   MY PROFILE MODAL
================================================================ */
const MyProfileModal = ({user,onClose,onSave,showToast}) => {
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({firstName:user.firstName,lastName:user.lastName,email:user.email||''});
  const [photo,setPhoto]=useState(user.facePhoto||null);
  const [cameraOn,setCameraOn]=useState(false);
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);

  useEffect(()=>{
    if(!cameraOn)return;
    navigator.mediaDevices?.getUserMedia({video:true})
      .then(s=>{streamRef.current=s;if(videoRef.current){videoRef.current.srcObject=s;videoRef.current.play();}})
      .catch(()=>setCameraOn(false));
    return()=>{if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}};
  },[cameraOn]);

  const takePhoto=()=>{
    const v=videoRef.current;const c=canvasRef.current;
    c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    setPhoto(c.toDataURL('image/jpeg',0.8));
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    setCameraOn(false);
  };

  const save = async()=>{
    const updated={...user,...form,fullName:`${form.firstName} ${form.lastName}`,facePhoto:photo};
    await api.call('updateProfile',updated);
    onSave(updated);
    showToast('Profile updated!','success');
    onClose();
  };

  const dept=DEPARTMENTS.find(d=>d.id===user.deptId);
  const myTasks=TASKS_INIT.filter(t=>t.empId===user.id);
  const totalHrs=myTasks.reduce((s,t)=>s+(t.durationHours||0),0);
  const leaveUsed=user.leavesUsed||0;
  const leaveBalance=user.leaveBalance||10;

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">
        <div style={{padding:'24px 28px',borderBottom:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:18,fontWeight:900,color:'var(--tx)'}}>👤 My Profile</h2>
          <button onClick={onClose} className="btn btn-ghost" style={{padding:'6px 10px'}}><i className="fa-solid fa-xmark"></i></button>
        </div>
        <div style={{padding:28,display:'flex',flexDirection:'column',gap:20}}>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{width:80,height:80,borderRadius:'50%',overflow:'hidden',border:'3px solid var(--p)',flexShrink:0}}>
              {photo?<img src={photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt="face"/>
                :<div style={{width:'100%',height:'100%',background:`linear-gradient(135deg,var(--p),var(--pd))`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,fontWeight:900,color:'#fff'}}>{getInitials(user)}</div>}
            </div>
            <div>
              <p style={{fontSize:18,fontWeight:900,color:'var(--tx)'}}>{user.firstName} {user.lastName}</p>
              <p style={{fontSize:11,fontWeight:700,color:'var(--p)',textTransform:'uppercase',letterSpacing:'.1em'}}>{user.employeeId}</p>
              <p style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>{dept?.icon} {dept?.name} • {user.role}</p>
              {user.birthday&&<p style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>🎂 Birthday: {user.birthday}</p>}
            </div>
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
            {[{label:'Sessions',val:myTasks.length},{label:'Total Hours',val:totalHrs.toFixed(1)+'h'},{label:'Status',val:user.status}].map(s=>(
              <div key={s.label} className="glass" style={{padding:'12px',borderRadius:14,textAlign:'center'}}>
                <p style={{fontSize:18,fontWeight:900,color:'var(--p)'}}>{s.val}</p>
                <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--tx3)',marginTop:2}}>{s.label}</p>
              </div>
            ))}
          </div>

          {/* Leave balance */}
          <div className="glass" style={{borderRadius:14,padding:'14px 18px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <span style={{fontSize:12,fontWeight:700,color:'var(--tx)'}}>🏖️ Leave Balance</span>
              <span style={{fontSize:12,fontWeight:900,color:'var(--p)'}}>{leaveBalance - leaveUsed} / {leaveBalance} days left</span>
            </div>
            <div className="progress-bar">
              <div className="progress-fill" style={{width:`${((leaveBalance-leaveUsed)/leaveBalance)*100}%`,background:'linear-gradient(90deg,#4ade80,#22c55e)'}}></div>
            </div>
            <p style={{fontSize:10,color:'var(--tx3)',marginTop:6}}>{leaveUsed} day(s) used this year</p>
          </div>

          {editing?(
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <label className="input-label">First Name</label>
                  <input className="input" value={form.firstName} onChange={e=>setForm(p=>({...p,firstName:e.target.value}))}/>
                </div>
                <div>
                  <label className="input-label">Last Name</label>
                  <input className="input" value={form.lastName} onChange={e=>setForm(p=>({...p,lastName:e.target.value}))}/>
                </div>
              </div>
              <div>
                <label className="input-label">Email</label>
                <input className="input" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/>
              </div>
              <div>
                <label className="input-label">Update Face Photo</label>
                <div className="camera-container" style={{maxHeight:180}}>
                  {cameraOn&&<video ref={videoRef} autoPlay muted playsInline/>}
                  {photo&&!cameraOn&&<img src={photo} alt="face"/>}
                  {!cameraOn&&!photo&&<div style={{color:'var(--tx3)',textAlign:'center',padding:16}}><i className="fa-solid fa-camera text-3xl block mb-1"></i><p style={{fontSize:11}}>No photo</p></div>}
                  <canvas ref={canvasRef} style={{display:'none'}}/>
                </div>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  {!cameraOn&&<button type="button" className="btn btn-ghost" style={{fontSize:11,padding:'7px 12px'}} onClick={()=>setCameraOn(true)}><i className="fa-solid fa-video"></i> Camera</button>}
                  {cameraOn&&<button type="button" className="btn btn-primary" style={{fontSize:11,padding:'7px 12px'}} onClick={takePhoto}><i className="fa-solid fa-camera"></i> Capture</button>}
                  {photo&&<button type="button" className="btn btn-danger" style={{fontSize:11,padding:'7px 12px'}} onClick={()=>setPhoto(null)}><i className="fa-solid fa-trash"></i> Remove</button>}
                </div>
              </div>
              <div style={{display:'flex',gap:10,marginTop:4}}>
                <button className="btn btn-primary" onClick={save} style={{flex:1,justifyContent:'center'}}><i className="fa-solid fa-floppy-disk"></i> Save Changes</button>
                <button className="btn btn-ghost" onClick={()=>setEditing(false)}>Cancel</button>
              </div>
            </div>
          ):(
            <button className="btn btn-primary" onClick={()=>setEditing(true)} style={{justifyContent:'center'}}>
              <i className="fa-solid fa-pen"></i> Edit Profile
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

/* ================================================================
   LOG TASK MODAL
================================================================ */
const LogTaskModal = ({user,onClose,onSave,showToast}) => {
  const today = new Date().toISOString().split('T')[0];
  const [form,setForm]=useState({taskName:'',date:today,startTime:'08:00',endTime:'17:00',remarks:''});
  const [loading,setLoading]=useState(false);
  const duration = useMemo(()=>calcDuration(form.startTime,form.endTime),[form.startTime,form.endTime]);

  const QUICK_TASKS = [
    'Processed and verified financial documents.',
    'Conducted departmental review meeting.',
    'Customer support and escalation handling.',
    'Prepared monthly report.',
    'System maintenance and diagnostics.',
  ];

  const submit = async e => {
    e.preventDefault();
    if(!form.taskName.trim())return;
    setLoading(true);
    const d=new Date(form.date);
    const newTask={
      id:Date.now(),
      empId:user.id,
      taskName:form.taskName.trim(),
      date:form.date,
      startTime:form.startTime,
      endTime:form.endTime,
      durationHours:duration,
      remarks:form.remarks||'',
      month:d.getMonth()+1,
      year:d.getFullYear(),
      source:'Self-Log',
    };
    TASKS_INIT.unshift(newTask);
    await api.call('logTask',newTask);
    setLoading(false);
    onSave(newTask);
    showToast(`Task "${form.taskName.slice(0,30)}..." logged (${duration}h)!`,'success');
    onClose();
  };

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">
        <div style={{padding:'24px 28px',borderBottom:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:18,fontWeight:900,color:'var(--tx)'}}>⏱️ Log Task</h2>
          <button onClick={onClose} className="btn btn-ghost" style={{padding:'6px 10px'}}><i className="fa-solid fa-xmark"></i></button>
        </div>
        <form onSubmit={submit} style={{padding:28,display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <label className="input-label">Task Name <span style={{color:'var(--danger)'}}>*</span></label>
            <input className="input" value={form.taskName} onChange={e=>setForm(p=>({...p,taskName:e.target.value}))} placeholder="e.g. Processed monthly financial reports" required/>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}}>
              {QUICK_TASKS.map((qt,i)=>(
                <button key={i} type="button" onClick={()=>setForm(p=>({...p,taskName:qt}))}
                  style={{fontSize:10,padding:'4px 10px',borderRadius:8,border:'1px solid var(--bd)',background:'rgba(0,0,0,0.04)',color:'var(--tx3)',cursor:'pointer',transition:'all .2s',fontWeight:600}}>
                  {qt.slice(0,30)}...
                </button>
              ))}
            </div>
          </div>
          <div>
            <label className="input-label">Date</label>
            <input className="input" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} max={today}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              <label className="input-label">Start Time</label>
              <input className="input" type="time" value={form.startTime} onChange={e=>setForm(p=>({...p,startTime:e.target.value}))}/>
            </div>
            <div>
              <label className="input-label">End Time</label>
              <input className="input" type="time" value={form.endTime} onChange={e=>setForm(p=>({...p,endTime:e.target.value}))}/>
            </div>
          </div>
          <div className="glass" style={{borderRadius:14,padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--tx3)'}}>Auto-calculated Duration</span>
            <span style={{fontSize:24,fontWeight:900,color:duration>0?'var(--p)':'var(--danger)'}}>{duration > 0 ? duration+'h' : '—'}</span>
          </div>
          <div>
            <label className="input-label">Remarks</label>
            <textarea className="input" rows={3} value={form.remarks} onChange={e=>setForm(p=>({...p,remarks:e.target.value}))} placeholder="Additional notes..." style={{resize:'vertical'}}/>
          </div>
          <button type="submit" className="btn btn-primary" disabled={loading||duration<=0} style={{justifyContent:'center',padding:'13px'}}>
            {loading?<><span className="spinner"></span> Saving...</>:<><i className="fa-solid fa-clock"></i> Log Task</>}
          </button>
        </form>
      </div>
    </div>
  );

/* ================================================================
   LEAVE REQUEST MODAL
================================================================ */
const LeaveRequestModal = ({user,onClose,onSave,showToast}) => {
  const today = new Date().toISOString().split('T')[0];
  const [form,setForm]=useState({type:'Vacation',startDate:today,endDate:today,reason:''});
  const [loading,setLoading]=useState(false);

  const days = useMemo(()=>{
    if(!form.startDate||!form.endDate)return 0;
    const diff=(new Date(form.endDate)-new Date(form.startDate))/(1000*60*60*24)+1;
    return Math.max(0,diff);
  },[form.startDate,form.endDate]);

  const submit = e => {
    e.preventDefault();
    if(days<=0)return;
    setLoading(true);
    const req={
      id:Date.now(),
      empId:user.id,
      empName:user.fullName||`${user.firstName} ${user.lastName}`,
      ...form,
      days,
      status:'Pending',
      appliedDate:today,
    };
    LEAVE_REQUESTS_INIT.unshift(req);
    onSave(req);
    showToast(`Leave request submitted (${days} day${days>1?'s':''})`,'success');
    setLoading(false);
    onClose();
  };

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">
        <div style={{padding:'24px 28px',borderBottom:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:18,fontWeight:900,color:'var(--tx)'}}>🏖️ File Leave Request</h2>
          <button onClick={onClose} className="btn btn-ghost" style={{padding:'6px 10px'}}><i className="fa-solid fa-xmark"></i></button>
        </div>
        <form onSubmit={submit} style={{padding:28,display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <label className="input-label">Leave Type</label>
            <select className="input" value={form.type} onChange={e=>setForm(p=>({...p,type:e.target.value}))}>
              <option>Vacation</option>
              <option>Sick</option>
              <option>Emergency</option>
              <option>Personal</option>
              <option>Maternity/Paternity</option>
            </select>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              <label className="input-label">Start Date</label>
              <input className="input" type="date" value={form.startDate} onChange={e=>setForm(p=>({...p,startDate:e.target.value}))} min={today} required/>
            </div>
            <div>
              <label className="input-label">End Date</label>
              <input className="input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))} min={form.startDate} required/>
            </div>
          </div>
          <div className="glass" style={{borderRadius:14,padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--tx3)'}}>Total Days</span>
            <span style={{fontSize:24,fontWeight:900,color:'var(--p)'}}>{days} day{days!==1?'s':''}</span>
          </div>
          <div>
            <label className="input-label">Reason <span style={{color:'var(--danger)'}}>*</span></label>
            <textarea className="input" rows={3} value={form.reason} onChange={e=>setForm(p=>({...p,reason:e.target.value}))} placeholder="Brief reason for leave..." required style={{resize:'vertical'}}/>
          </div>
          <div className="glass" style={{borderRadius:12,padding:'10px 14px'}}>
            <p style={{fontSize:11,color:'var(--tx3)',fontWeight:600}}>
              Remaining balance: <strong style={{color:'var(--ok)'}}>{(user.leaveBalance||10) - (user.leavesUsed||0)} days</strong>
            </p>
          </div>
          <button type="submit" className="btn btn-primary" disabled={loading||days<=0} style={{justifyContent:'center',padding:'13px'}}>
            {loading?<><span className="spinner"></span> Submitting...</>:<><i className="fa-solid fa-paper-plane"></i> Submit Request</>}
          </button>
        </form>
      </div>
    </div>
  );
};

const AnnouncementsView = ({announcements,setAnnouncements,isAdmin,user,showModal,showToast}) => {
  const priorityColor = p => p==='high'?'#f87171':p==='medium'?'#fbbf24':'#4ade80';
  const priorityLabel = p => p==='high'?'🔴 Urgent':p==='medium'?'🟡 Medium':'🟢 Info';

  const deleteAnn = id => {
    setAnnouncements(prev=>prev.filter(a=>a.id!==id));
    showToast('Announcement removed','info');
  };

  const sorted = [...announcements].sort((a,b)=>{
    if(a.pinned&&!b.pinned)return -1;
    if(!a.pinned&&b.pinned)return 1;
    return new Date(b.date)-new Date(a.date);
  });

  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:12}}>

        </div>
        {isAdmin&&<button className="btn btn-primary" onClick={()=>showModal('announcement')}>
          <i className="fa-solid fa-bullhorn"></i> Post Announcement
        </button>}
      </div>

      {sorted.length===0&&(
        <div style={{textAlign:'center',padding:'60px',opacity:.4}}>
          <i className="fa-solid fa-bullhorn" style={{fontSize:40,display:'block',marginBottom:12}}></i>
          <p style={{fontWeight:700,fontSize:13}}>No announcements yet.</p>
        </div>
      )}

      {sorted.map(ann=>(
        <div key={ann.id} className="announce-card" style={{borderLeft:`4px solid ${priorityColor(ann.priority)}`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:10}}>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap',marginBottom:8}}>
                {ann.pinned&&<span style={{fontSize:10,fontWeight:800,color:'var(--p)'}}>📌 PINNED</span>}
                <span style={{fontSize:10,fontWeight:700,color:priorityColor(ann.priority)}}>{priorityLabel(ann.priority)}</span>
                <span style={{fontSize:10,color:'var(--tx3)',fontWeight:600}}>{ann.date}</span>
              </div>
              <h3 style={{fontSize:15,fontWeight:900,color:'var(--tx)',marginBottom:8}}>{ann.title}</h3>
              <p style={{fontSize:13,color:'var(--tx2)',lineHeight:1.6}}>{ann.body}</p>
              <p style={{fontSize:11,color:'var(--tx3)',marginTop:10,fontWeight:600}}>— {ann.author}</p>
            </div>
            {isAdmin&&<button className="btn btn-danger" style={{padding:'6px 10px',fontSize:11,flexShrink:0}} onClick={()=>deleteAnn(ann.id)}>
              <i className="fa-solid fa-trash"></i>

================================================================ */
const LeaderboardView = ({employees,tasks}) => {
  const curMonth=new Date().getMonth()+1;
  const curYear=new Date().getFullYear();
  const [period,setPeriod]=useState('month');

  const ranked = useMemo(()=>{
    return [...employees].map(emp=>{
      const empTasks = period==='month'
        ? tasks.filter(t=>t.empId===emp.id&&t.month===curMonth&&t.year===curYear)
        : tasks.filter(t=>t.empId===emp.id&&t.year===curYear);
      const hrs = empTasks.reduce((s,t)=>s+(t.durationHours||0),0);
      const dept=DEPARTMENTS.find(d=>d.id===emp.deptId);
      return {...emp, hrs, taskCount:empTasks.length, dept};
    }).filter(e=>e.hrs>0).sort((a,b)=>b.hrs-a.hrs).slice(0,20);
  },[employees,tasks,period,curMonth,curYear]);

  const maxHrs = ranked[0]?.hrs||1;
  const medals=['🥇','🥈','🥉'];

  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:900,color:'var(--tx)'}}>🏆 Leaderboard</h2>
          <p style={{fontSize:12,color:'var(--tx3)',marginTop:2}}>Top performers by logged hours</p>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className={`month-tab ${period==='month'?'active':''}`} onClick={()=>setPeriod('month')}>This Month</button>
          <button className={`month-tab ${period==='year'?'active':''}`} onClick={()=>setPeriod('year')}>This Year</button>
        </div>
      </div>

      {/* Top 3 podium */}
      {ranked.length>=3&&(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1.2fr 1fr',gap:12,marginBottom:8}}>
          {[ranked[1],ranked[0],ranked[2]].map((emp,i)=>{
            const rank=i===1?0:i===0?1:2;
            const heights=['h-28','h-36','h-24'];
            return(
              <div key={emp.id} className="glass" style={{borderRadius:18,padding:'16px 12px',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:8,order:i===1?-1:i}}>
                <div style={{fontSize:24}}>{medals[rank]}</div>
                <Avatar emp={emp} size={i===1?'md':'sm'}/>
                <div>
                  <p style={{fontSize:11,fontWeight:900,color:'var(--tx)'}}>{emp.firstName} {emp.lastName.split(' ')[0]}</p>
                  <p style={{fontSize:9,color:'var(--tx3)'}}>{emp.dept?.name}</p>
                </div>
                <p style={{fontSize:i===1?20:16,fontWeight:900,color:'var(--p)'}}>{emp.hrs.toFixed(1)}h</p>
              </div>
            );
          })}
        </div>
      )}

      {/* Full list */}
      <div className="glass" style={{borderRadius:20,overflow:'hidden'}}>
        {ranked.length===0?(
          <div style={{padding:'40px',textAlign:'center',opacity:.4}}>
            <i className="fa-solid fa-trophy" style={{fontSize:36,display:'block',marginBottom:8}}></i>
            <p style={{fontWeight:700,fontSize:12}}>No data for this period.</p>
          </div>
        ):(
          ranked.map((emp,i)=>(
            <div key={emp.id} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 20px',borderBottom:'1px solid var(--bd)'}}>
              <span style={{fontSize:i<3?18:14,fontWeight:900,width:28,textAlign:'center',color:i<3?'var(--p)':'var(--tx3)'}}>
                {i<3?medals[i]:`#${i+1}`}

const AdminDirectoryView = ({employees,setEmployees,tasks,showToast,onLogTaskForEmp}) => {
  const [search,setSearch]=useState('');
  const [deptFilter,setDeptFilter]=useState('ALL');
  const [statusFilter,setStatusFilter]=useState('ALL');

  const filtered=useMemo(()=>{
    let list=employees;
    if(deptFilter!=='ALL')list=list.filter(e=>e.deptId===parseInt(deptFilter));
    if(statusFilter!=='ALL')list=list.filter(e=>e.status===statusFilter);
    if(search.trim()){const q=search.toLowerCase();list=list.filter(e=>e.fullName.toLowerCase().includes(q)||e.email.toLowerCase().includes(q)||e.employeeId.toLowerCase().includes(q));}
    return list;
  },[employees,deptFilter,statusFilter,search]);

  const updateStatus=(id,status)=>{
    setEmployees(prev=>prev.map(e=>e.id===id?{...e,status}:e));
    showToast(`Status updated to ${status}`,'success');
  };

  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-end',flexWrap:'wrap',gap:12}}>
        <div>
          <h2 style={{fontSize:22,fontWeight:900,color:'var(--tx)'}}>Employee Directory</h2>
          <p style={{fontSize:12,color:'var(--tx3)',marginTop:2}}>{employees.length} personnel across {DEPARTMENTS.length} departments</p>
        </div>
      </div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:180}}>
          <i className="fa-solid fa-magnifying-glass" style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)',fontSize:12}}></i>
          <input className="input" style={{paddingLeft:36}} placeholder="Search name, email, ID..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="input" value={deptFilter} onChange={e=>setDeptFilter(e.target.value)} style={{width:'auto',padding:'10px 14px'}}>
          <option value="ALL">All Departments</option>
          {DEPARTMENTS.map(d=><option key={d.id} value={d.id}>{d.icon} {d.name}</option>)}
        </select>
        <select className="input" value={statusFilter} onChange={e=>setStatusFilter(e.target.value)} style={{width:'auto',padding:'10px 14px'}}>
          <option value="ALL">All Statuses</option>
          <option>Active</option><option>Idle</option><option>Absent</option><option>Leave</option>
        </select>
      </div>
      <div className="glass" style={{borderRadius:18,overflow:'hidden'}}>
        <div className="table-wrapper">
          <table className="nx-table" style={{minWidth:750}}>
            <thead><tr><th>Employee</th><th>ID</th><th>Department</th><th>Hours</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody>
              {filtered.length===0?<tr><td colSpan="6" style={{textAlign:'center',padding:40,opacity:.4,fontWeight:700}}>No employees found.</td></tr>
              :filtered.map(emp=>{
                const dept=DEPARTMENTS.find(d=>d.id===emp.deptId);
                const hrs=tasks.filter(t=>t.empId===emp.id).reduce((s,t)=>s+(t.durationHours||0),0);
                return(
                  <tr key={emp.id}>
                    <td>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <Avatar emp={emp} size="sm"/>
                        <div>
                          <p style={{fontWeight:700,fontSize:13}}>{emp.firstName} {emp.lastName}</p>
                          <p style={{fontSize:11,color:'var(--tx3)'}}>{emp.email}</p>
                        </div>
                      </div>
                    </td>
                    <td><span style={{fontFamily:'monospace',fontSize:11,background:'rgba(0,0,0,0.05)',padding:'3px 8px',borderRadius:6,border:'1px solid var(--bd)'}}>{emp.employeeId}</span></td>
                    <td><span style={{fontSize:12,fontWeight:600}}>{dept?.icon} {dept?.name}</span></td>
                    <td><span style={{color:'var(--p)',fontWeight:900}}>{hrs.toFixed(1)}</span><span style={{fontSize:10,color:'var(--tx3)',marginLeft:3}}>hrs</span></td>
                    <td>
                      <select value={emp.status}
                        onChange={e=>updateStatus(emp.id,e.target.value)}
                        style={{background:'transparent',border:'1px solid var(--bd)',borderRadius:8,padding:'4px 8px',fontSize:11,fontWeight:700,color:'var(--tx)',cursor:'pointer'}}>
                        <option>Active</option><option>Idle</option><option>Absent</option><option>Leave</option>
                      </select>
                    </td>
                    <td>
                      <button className="btn btn-ghost" style={{padding:'6px 10px',fontSize:11}} onClick={()=>onLogTaskForEmp(emp)}>
                        <i className="fa-solid fa-clock" style={{color:'var(--p)'}}></i> Log
                      </button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
};

      {modal==='leaveRequest'&&<LeaveRequestModal user={user} onClose={()=>setModal(null)} onSave={r=>setLeaveRequests(p=>[r,...p])} showToast={showToast}/>}
      {modal==='announcement'&&<AnnouncementModal user={user} onClose={()=>setModal(null)} onSave={a=>setAnnouncements(p=>[a,...p])} showToast={showToast}/>}
      {modal==='addProject'&&<AddProjectModal onClose={()=>setModal(null)} onSave={p=>setProjects(prev=>[p,...prev])} showToast={showToast}/>}
      {modal==='logTaskAdmin'&&logTaskTarget&&(
        <LogTaskModal user={logTaskTarget} onClose={()=>{setModal(null);setLogTaskTarget(null);}} onSave={t=>setTasks(p=>[t,...p])} showToast={showToast}/>
      )}
    </>
  );
};

/* ================================================================
   ROOT
================================================================ */
const App = () => {
  const [user,setUser]=useState(null);
  const [theme,setTheme]=useState('dark');
  const [loading,setLoading]=useState(true);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);

  const changeTheme = t => {
    setTheme(t);
    document.documentElement.setAttribute('data-theme',t);
  };

  useEffect(()=>{const t=setTimeout(()=>setLoading(false),1200);return()=>clearTimeout(t);},[]);

  if(loading){
    return(
      <div className="loading-screen">
        <div className="logo-pulse" style={{width:80,height:80,borderRadius:20,overflow:'hidden',background:'#fff',padding:8,boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
          <img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" alt="Logo" style={{width:'100%',height:'100%',objectFit:'contain',borderRadius:12}}/>
        </div>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:22,fontWeight:900,color:'var(--tx)'}}>Gigahertz Nexus</p>
          <p style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--p)',marginTop:4}}>Activity Tracker v5.0</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:'var(--p)',animation:`pulse 1.2s ${i*.3}s infinite`}}></div>)}
        </div>
      </div>
    );
  }

  if(!user) return <AuthPortal onLogin={setUser} theme={theme} setTheme={changeTheme}/>;
  return <MainApp user={user} onLogout={()=>setUser(null)} theme={theme} setTheme={changeTheme}/>;
};

// Sidebar desktop fix
const style = document.createElement('style');
style.textContent = `
  @media(min-width:769px){
    .sidebar{transform:none!important;display:flex!important}
    .main-content{margin-left:250px!important}
    .mobile-nav{display:none!important}
  }
  @media(max-width:768px){
    .sidebar{display:none!important}
    .main-content{margin-left:0!important;padding-top:20px!important}
    .mobile-nav{display:flex!important}
  }
`;
document.head.appendChild(style);

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
