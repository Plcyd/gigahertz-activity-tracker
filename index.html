<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Gigahertz TITAN — Activity Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Arimo:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ══════════════════════════════════════════
   TITAN ACTIVITY TRACKER v6.0
   Glassmorphism · GAS Sync · Full Featured
   Built for Gigahertz · Rozi 💙
══════════════════════════════════════════ */

/* ── THEME VARIABLES ── */
:root {
  --p:#6366f1;--pd:#4f46e5;--ps:#818cf8;--pl:rgba(99,102,241,.15);
  --sb:rgba(15,15,30,0.85);--sbh:rgba(99,102,241,0.1);--sb-border:rgba(255,255,255,0.06);
  --sb-tx:#e2e8f0;--sb-tx2:#94a3b8;--sb-tx3:#475569;
  --bg:#050814;--wh:rgba(15,20,40,0.95);--card:rgba(255,255,255,0.04);
  --tx:#e2e8f0;--tx2:#94a3b8;--tx3:#475569;
  --bd:rgba(255,255,255,0.08);--danger:#ef4444;--dl:rgba(239,68,68,.12);
  --ok:#22c55e;--warn:#f59e0b;
  --sh:0 4px 32px rgba(0,0,0,.5);--shl:0 8px 64px rgba(99,102,241,.2);
  --rsm:12px;--rlg:20px;--ibg:rgba(255,255,255,0.05);
  --glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.1);
  --glass-shadow:0 8px 32px rgba(0,0,0,.4);
  --mesh1:#6366f1;--mesh2:#8b5cf6;--mesh3:#06b6d4;
}
[data-theme="light"]{
  --p:#6366f1;--pd:#4f46e5;--ps:#818cf8;--pl:rgba(99,102,241,.1);
  --sb:rgba(255,255,255,0.9);--sbh:rgba(99,102,241,0.07);--sb-border:rgba(0,0,0,0.06);
  --sb-tx:#0f172a;--sb-tx2:#475569;--sb-tx3:#94a3b8;
  --bg:#f1f5f9;--wh:#fff;--card:rgba(255,255,255,0.8);
  --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
  --bd:rgba(0,0,0,0.08);--danger:#ef4444;--dl:rgba(239,68,68,.08);
  --ok:#16a34a;--warn:#d97706;
  --sh:0 4px 24px rgba(99,102,241,.08);--shl:0 8px 48px rgba(99,102,241,.15);
  --ibg:rgba(255,255,255,0.8);
  --glass:rgba(255,255,255,0.6);--glass-border:rgba(255,255,255,0.8);
  --glass-shadow:0 8px 32px rgba(99,102,241,.1);
}
[data-theme="cyberpunk"]{--p:#f0abfc;--pd:#d946ef;--ps:#e879f9;--pl:rgba(240,171,252,.12);--bg:#02030d;--wh:rgba(10,5,20,.95);--tx:#f5d0fe;--tx2:#c084fc;--tx3:#7c3aed;--bd:rgba(240,171,252,0.1);--sb:rgba(5,2,15,.9);--sb-border:rgba(240,171,252,.06);--sb-tx:#f5d0fe;--ibg:rgba(240,171,252,0.05);--glass:rgba(240,171,252,0.04);--mesh1:#d946ef;--mesh2:#7c3aed;--mesh3:#06b6d4;}
[data-theme="forest"]{--p:#22c55e;--pd:#16a34a;--ps:#4ade80;--pl:rgba(34,197,94,.12);--bg:#020f07;--wh:rgba(5,20,10,.95);--tx:#dcfce7;--tx2:#86efac;--tx3:#166534;--bd:rgba(34,197,94,0.1);--sb:rgba(2,10,5,.9);--sb-border:rgba(34,197,94,.06);--sb-tx:#dcfce7;--ibg:rgba(34,197,94,0.05);--glass:rgba(34,197,94,0.04);--mesh1:#22c55e;--mesh2:#0d9488;--mesh3:#16a34a;}
[data-theme="sunset"]{--p:#f97316;--pd:#ea580c;--ps:#fb923c;--pl:rgba(249,115,22,.12);--bg:#0d0500;--wh:rgba(20,8,0,.95);--tx:#fed7aa;--tx2:#fb923c;--tx3:#7c2d12;--bd:rgba(249,115,22,0.1);--sb:rgba(13,5,0,.9);--sb-border:rgba(249,115,22,.06);--sb-tx:#fed7aa;--ibg:rgba(249,115,22,0.05);--glass:rgba(249,115,22,0.04);--mesh1:#f97316;--mesh2:#ef4444;--mesh3:#fbbf24;}
[data-theme="lavender"]{--p:#7c3aed;--pd:#6d28d9;--ps:#a78bfa;--pl:#ede9fe;--bg:#f5f3ff;--wh:#fff;--tx:#1e1b4b;--tx2:#4c1d95;--tx3:#7c3aed;--bd:#ddd6fe;--sb:rgba(245,243,255,0.92);--sb-border:rgba(124,58,237,0.12);--sb-tx:#1e1b4b;--card:rgba(255,255,255,0.92);--ibg:#fff;--mesh1:#7c3aed;--mesh2:#8b5cf6;--mesh3:#a78bfa;}
[data-theme="ocean"]{--p:#0ea5e9;--pd:#0284c7;--ps:#38bdf8;--pl:#e0f2fe;--bg:#020d1a;--wh:#031525;--tx:#e0f2fe;--tx2:#7dd3fc;--tx3:#0ea5e9;--bd:#0c2a42;--sb:rgba(2,13,26,0.92);--sb-border:rgba(14,165,233,0.15);--sb-tx:#e0f2fe;--card:rgba(3,21,37,0.92);--ibg:#031525;--mesh1:#0ea5e9;--mesh2:#0284c7;--mesh3:#38bdf8;}
[data-theme="ruby"]{--p:#ef4444;--pd:#dc2626;--ps:#f87171;--pl:#450a0a;--bg:#1a0505;--wh:#200808;--tx:#fecaca;--tx2:#f87171;--tx3:#ef4444;--bd:#3d0c0c;--sb:rgba(26,5,5,0.92);--sb-border:rgba(239,68,68,0.15);--sb-tx:#fecaca;--card:rgba(32,8,8,0.92);--ibg:#200808;--mesh1:#ef4444;--mesh2:#dc2626;--mesh3:#f87171;}
[data-theme="midnight"]{--p:#6366f1;--pd:#4338ca;--ps:#818cf8;--pl:#1e1b4b;--bg:#030712;--wh:#080f20;--tx:#f9fafb;--tx2:#c7d2fe;--tx3:#818cf8;--bd:#1e293b;--sb:rgba(3,7,18,0.92);--sb-border:rgba(99,102,241,0.12);--sb-tx:#f9fafb;--card:rgba(8,15,32,0.92);--ibg:#080f20;--mesh1:#6366f1;--mesh2:#4338ca;--mesh3:#818cf8;}
[data-theme="gold"]{--p:#eab308;--pd:#ca8a04;--ps:#facc15;--pl:#422006;--bg:#1c1917;--wh:#231f1c;--tx:#fef08a;--tx2:#fbbf24;--tx3:#eab308;--bd:#3a3028;--sb:rgba(28,25,23,0.92);--sb-border:rgba(234,179,8,0.12);--sb-tx:#fef08a;--card:rgba(35,31,28,0.92);--ibg:#231f1c;--mesh1:#eab308;--mesh2:#ca8a04;--mesh3:#facc15;}

/* ── GLOBAL ── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Arimo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .35s,color .35s;overflow-x:hidden;}
input,select,button,textarea{font-family:'Arimo',sans-serif;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px;}
*:focus-visible{outline:2px solid var(--p);outline-offset:2px;border-radius:4px;}

/* ── MESH BACKGROUND ── */
.mesh-bg{position:fixed;inset:0;z-index:-1;overflow:hidden;pointer-events:none;}
.mesh-bg::before{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,var(--mesh1) 0%,transparent 70%);opacity:.08;top:-200px;left:-200px;animation:meshFloat1 20s ease-in-out infinite;}
.mesh-bg::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,var(--mesh2) 0%,transparent 70%);opacity:.06;bottom:-100px;right:-100px;animation:meshFloat2 25s ease-in-out infinite;}
.mesh-bg-accent{position:fixed;inset:0;z-index:-1;pointer-events:none;}
.mesh-bg-accent::before{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,var(--mesh3) 0%,transparent 70%);opacity:.05;top:40%;left:50%;transform:translateX(-50%);animation:meshFloat3 18s ease-in-out infinite;}
@keyframes meshFloat1{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(60px,40px) scale(1.1);}}
@keyframes meshFloat2{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-40px,-60px) scale(1.15);}}
@keyframes meshFloat3{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.2);}}

/* ── GLASSMORPHISM ── */
.glass{background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);box-shadow:var(--glass-shadow);}
.glass-strong{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);}
.glass-card{background:var(--card);border:1px solid var(--bd);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:var(--rlg);box-shadow:var(--sh);padding:22px 24px;transition:transform .2s,box-shadow .2s,border-color .2s;}
.glass-card:hover{transform:translateY(-2px);box-shadow:var(--shl);border-color:rgba(99,102,241,.3);}

/* ── AUTH ── */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;}
.auth-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(99,102,241,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(139,92,246,.1) 0%,transparent 50%),radial-gradient(ellipse at 50% 80%,rgba(6,182,212,.08) 0%,transparent 50%);}
.auth-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:28px;padding:44px 40px;width:100%;max-width:440px;box-shadow:0 24px 80px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.1);position:relative;z-index:1;max-height:92vh;overflow-y:auto;}
.auth-logo{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px;}
.auth-logo-badge{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:.1em;color:var(--p);line-height:1;}
.auth-logo-sub{font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:.25em;color:var(--tx3);text-transform:uppercase;}
.auth-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--tx);text-align:center;margin-bottom:6px;}
.auth-sub{font-size:13px;color:var(--tx2);text-align:center;margin-bottom:24px;}
.form-label{font-size:10px;font-weight:700;color:var(--tx3);margin-bottom:6px;display:block;letter-spacing:.08em;text-transform:uppercase;}
.form-input{width:100%;padding:12px 14px;border:1px solid var(--bd);border-radius:var(--rsm);font-size:13px;color:var(--tx);background:var(--ibg);outline:none;transition:all .2s;backdrop-filter:blur(8px);}
.form-input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.form-input::placeholder{color:var(--tx3);}
.form-group{margin-bottom:13px;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border-radius:var(--rsm);border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;transition:all .2s;letter-spacing:.02em;}
.btn-p{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;width:100%;box-shadow:0 4px 20px rgba(99,102,241,.3);}
.btn-p:hover{transform:translateY(-1px);box-shadow:0 8px 30px rgba(99,102,241,.4);}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none;}
.btn-ghost{background:var(--ibg);color:var(--tx2);border:1px solid var(--bd);}
.btn-ghost:hover{background:var(--glass);color:var(--tx);border-color:var(--p);}
.btn-danger{background:rgba(239,68,68,.1);color:var(--danger);border:1px solid rgba(239,68,68,.2);}
.btn-danger:hover{background:rgba(239,68,68,.2);}
.auth-link{font-size:12px;color:var(--tx2);text-align:center;margin-top:14px;}
.auth-link a{color:var(--p);font-weight:700;cursor:pointer;}
.err-box{background:var(--dl);color:var(--danger);border:1px solid rgba(239,68,68,.25);padding:10px 13px;border-radius:var(--rsm);font-size:12px;margin-bottom:13px;}
.pw-wrapper{position:relative;display:flex;width:100%;}
.pw-toggle-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--tx3);display:flex;padding:4px;}
.pw-toggle-btn:hover{color:var(--tx);}
.pwd-strength-bar{height:3px;background:var(--bd);border-radius:99px;margin-top:7px;overflow:hidden;}
.pwd-strength-fill{height:100%;transition:width .3s,background .3s;border-radius:99px;}
.terms-box{background:var(--ibg);border:1px solid var(--bd);border-radius:var(--rsm);padding:11px 14px;margin-bottom:13px;max-height:110px;overflow-y:auto;font-size:11px;color:var(--tx2);line-height:1.55;}
.terms-box h4{font-size:10px;text-transform:uppercase;color:var(--tx);letter-spacing:.06em;margin-bottom:5px;}
.terms-box p{margin-bottom:6px;}
/* CAM */
.face-section{margin-bottom:18px;display:flex;flex-direction:column;align-items:center;}
.cam-vp{position:relative;width:100%;height:230px;background:var(--ibg);border-radius:var(--rsm);overflow:hidden;border:1px solid var(--bd);}
.cam-idle{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--tx3);font-size:12px;font-weight:600;gap:10px;}
.cam-status{font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;margin-top:10px;}
.cam-dot{width:9px;height:9px;border-radius:50%;background:var(--ok);}
.cam-dot.wait{background:var(--warn);animation:pulse 1s infinite;}
.cam-dot.off{background:var(--tx3);}
.cam-btns{display:flex;gap:10px;justify-content:center;margin-top:12px;width:100%;}
.cam-btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 18px;border-radius:99px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:.2s;flex:1;font-family:'Arimo',sans-serif;}
.cam-btn-capture{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;}
.cam-btn-capture:hover{transform:translateY(-1px);}
.cam-btn-retry,.cam-btn-retake{background:var(--ibg);color:var(--tx2);border:1px solid var(--bd);}

/* ── LAYOUT ── */
.layout{display:flex;min-height:100vh;}
.sidebar{width:268px;min-height:100vh;background:var(--sb);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:200;border-right:1px solid var(--sb-border);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);transition:all .3s;}
.main{margin-left:268px;flex:1;min-height:100vh;}
.page{padding:28px 34px;max-width:1160px;margin:0 auto;}
.page-hdr{margin-bottom:22px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;}
.page-title{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;color:var(--tx);letter-spacing:-.03em;}
.page-sub{font-size:12px;color:var(--tx2);margin-top:3px;}

/* ── SIDEBAR ── */
.sb-logo{padding:20px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--sb-border);}
.sb-logo-name{font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:.12em;color:var(--sb-tx);}
.sb-logo-badge{font-size:9px;font-weight:700;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;padding:2px 7px;border-radius:99px;letter-spacing:.06em;}
.sb-nav{flex:1;padding:16px 12px;display:flex;flex-direction:column;gap:2px;overflow-y:auto;}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:11px;cursor:pointer;color:var(--sb-tx2);font-size:12.5px;font-weight:600;transition:all .22s;border:1px solid transparent;position:relative;}
.nav-item::before{content:'';position:absolute;left:0;top:0;height:100%;width:3px;background:var(--p);transform:translateX(-3px);transition:.22s;border-radius:0 2px 2px 0;}
.nav-item:hover{background:var(--sbh);color:var(--sb-tx);}
.nav-item.active{background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(99,102,241,.06));color:var(--p);border-color:rgba(99,102,241,.2);font-weight:700;}
.nav-item.active::before{transform:translateX(0);}
.nav-item svg{flex-shrink:0;width:17px;height:17px;stroke-width:2.2;}
.sb-bottom{padding:14px 12px;border-top:1px solid var(--sb-border);display:flex;flex-direction:column;gap:9px;}
.session-wrap{padding:12px 13px;background:linear-gradient(135deg,rgba(99,102,241,.14),rgba(99,102,241,.05));border:1px solid rgba(99,102,241,.2);border-radius:12px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:.2s;}
.session-wrap:hover{transform:translateY(-1px);}
.session-wrap svg{width:15px;height:15px;color:var(--p);flex-shrink:0;margin-top:1px;}
.session-content{flex:1;}
.session-lbl{font-size:8px;font-weight:800;color:var(--sb-tx3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:3px;display:block;}
.session-time{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--p);line-height:1;}
.session-since{font-size:9px;color:var(--sb-tx3);margin-top:2px;}
.sb-user{padding:10px 11px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.12);border-radius:11px;display:flex;align-items:center;gap:9px;cursor:pointer;transition:.2s;}
.sb-user:hover{background:rgba(99,102,241,.1);}
.user-avatar-sm{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:800;flex-shrink:0;box-shadow:0 3px 12px rgba(99,102,241,.3);}
.user-info{flex:1;min-width:0;}
.user-name-sm{display:block;color:var(--sb-tx);font-size:11.5px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.user-detail-tag{font-size:7.5px;font-weight:700;padding:2px 6px;border-radius:4px;background:rgba(99,102,241,.15);color:var(--p);display:inline-block;margin-top:2px;}
.icon-btn{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;color:var(--sb-tx2);font-size:12px;font-weight:600;background:transparent;border:1px solid transparent;width:100%;transition:.22s;}
.icon-btn:hover{background:var(--sbh);color:var(--sb-tx);border-color:rgba(99,102,241,.1);}
.icon-btn svg{flex-shrink:0;width:15px;height:15px;}
.logout-btn{display:flex;align-items:center;justify-content:center;border-radius:50%;cursor:pointer;color:#fff;background:rgba(239,68,68,.8);border:1px solid rgba(239,68,68,.5);width:38px;height:38px;flex-shrink:0;transition:.2s;margin:0 auto;}
.logout-btn:hover{transform:scale(1.1);box-shadow:0 4px 16px rgba(239,68,68,.4);}
.notif-panel{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);width:268px;background:var(--wh);border:1px solid var(--bd);border-radius:12px;box-shadow:0 16px 64px rgba(0,0,0,.4);padding:12px;display:none;max-height:280px;overflow-y:auto;z-index:1001;backdrop-filter:blur(20px);}
.icon-btn:focus .notif-panel,.icon-btn:focus-within .notif-panel{display:block;}
.notif-item{font-size:11px;padding:8px;border-bottom:1px solid var(--bd);color:var(--tx);line-height:1.5;}
.notif-item:last-child{border-bottom:none;}
.notif-time{font-size:9px;color:var(--tx3);margin-top:3px;}
.notif-badge{position:absolute;top:6px;right:6px;background:var(--danger);color:#fff;font-size:8px;font-weight:800;border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;}

/* ── STAT GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:22px;}
.stat-card{background:var(--card);border:1px solid var(--bd);border-radius:var(--rlg);padding:20px 22px;transition:.2s;backdrop-filter:blur(16px);position:relative;overflow:hidden;}
.stat-card:hover{transform:translateY(-2px);border-color:rgba(99,102,241,.3);box-shadow:var(--shl);}
.stat-card::before{content:'';position:absolute;top:0;right:0;width:100px;height:100px;border-radius:50%;opacity:.04;pointer-events:none;}
.stat-icon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:11px;}
.stat-lbl{font-size:10.5px;color:var(--tx3);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
.stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--p);line-height:1;letter-spacing:-.02em;}
.stat-sub{font-size:11px;color:var(--tx3);margin-top:5px;font-weight:500;}
.stat-clock{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;color:var(--p);line-height:1;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--ok);animation:pulse 1.4s ease infinite;display:inline-block;margin-right:5px;}
.live-dot.idle{background:var(--warn);}

/* ── TRACKER ── */
.track-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;color:var(--tx);margin-bottom:4px;}
.track-sub{font-size:11.5px;color:var(--tx2);margin-bottom:14px;}
.track-row{display:flex;gap:9px;align-items:center;}
.track-select{flex:1;padding:10px 13px;border:1px solid var(--bd);border-radius:var(--rsm);font-size:13px;color:var(--tx);background:var(--ibg);outline:none;cursor:pointer;font-weight:500;font-family:'Arimo',sans-serif;}
.track-select:focus{border-color:var(--p);}
.start-btn{padding:10px 18px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border:none;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:6px;transition:.2s;box-shadow:0 4px 16px rgba(99,102,241,.3);font-family:'Syne',sans-serif;}
.start-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.4);}
.custom-row{display:flex;gap:9px;margin-top:10px;align-items:center;}
.custom-input{flex:1;padding:10px 13px;border:1px solid var(--bd);border-radius:var(--rsm);font-size:13px;color:var(--tx);background:var(--ibg);outline:none;transition:.2s;font-family:'Arimo',sans-serif;}
.custom-input:focus{border-color:var(--p);}
.custom-input::placeholder{color:var(--tx3);}
.add-btn{padding:9px 16px;background:transparent;border:1px solid var(--p);color:var(--p);border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;font-family:'Syne',sans-serif;}
.add-btn:hover{background:var(--pl);}

/* ── ACTIVE TIMER ── */
.timer-active{background:linear-gradient(135deg,rgba(10,10,30,.9),rgba(5,5,20,.95));border-radius:var(--rlg);padding:22px 24px;position:relative;overflow:hidden;border:1px solid rgba(99,102,241,.25);box-shadow:0 10px 40px rgba(0,0,0,.5);}
.timer-active::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(99,102,241,.3) 0%,transparent 55%);pointer-events:none;}
.timer-lbl{font-size:10px;font-weight:800;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.15em;margin-bottom:7px;}
.timer-task{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;margin-bottom:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.timer-digits-row{display:flex;align-items:flex-end;gap:3px;margin-bottom:5px;}
.timer-digits{font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;color:#fff;line-height:1;font-variant-numeric:tabular-nums;}
.timer-digits.paused{color:rgba(255,255,255,.35);}
.timer-unit{font-size:9px;font-weight:700;color:rgba(255,255,255,.35);margin-bottom:7px;letter-spacing:.08em;}
.timer-sep{font-size:38px;font-weight:300;color:rgba(255,255,255,.25);line-height:1;margin-bottom:3px;}
.timer-meta{display:flex;align-items:center;gap:7px;margin-bottom:12px;}
.timer-dot{width:7px;height:7px;background:#4ade80;border-radius:50%;flex-shrink:0;}
.timer-dot.active{animation:pulse 1.3s ease infinite;}
.timer-dot.paused{background:#fbbf24;}
.timer-meta-txt{font-size:11px;font-weight:700;color:rgba(255,255,255,.45);}
.timer-bar-wrap{width:100%;height:3px;background:rgba(255,255,255,.08);border-radius:99px;margin-bottom:12px;overflow:hidden;}
.timer-bar{height:100%;background:linear-gradient(90deg,var(--p),#22c55e);border-radius:99px;transition:width 1s linear;}
.timer-bar.paused{background:#fbbf24;}
.timer-actions{display:flex;gap:9px;}
.pause-btn{flex:1;padding:10px;background:rgba(255,255,255,.08);color:#fff;border:1px solid rgba(255,255,255,.15);border-radius:var(--rsm);font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.2s;font-family:'Syne',sans-serif;}
.pause-btn:hover{background:rgba(255,255,255,.15);}
.stop-btn{flex:2;padding:10px;background:rgba(239,68,68,.8);color:#fff;border:none;border-radius:var(--rsm);font-size:12.5px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:.2s;box-shadow:0 4px 16px rgba(239,68,68,.3);font-family:'Syne',sans-serif;}
.stop-btn:hover{filter:brightness(.9);transform:translateY(-1px);}
.timer-hint{font-size:10px;color:rgba(255,255,255,.25);text-align:center;margin-top:7px;}

/* ── QUEUE ── */
.queue-item{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;background:var(--pl);border-radius:var(--rsm);border:1px solid rgba(99,102,241,.15);margin-bottom:7px;}
.queue-task-name{font-size:12.5px;font-weight:700;color:var(--p);}
.queue-start-btn{padding:5px 12px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;transition:.2s;}
.queue-start-btn:hover{opacity:.9;}
.queue-start-btn:disabled{opacity:.35;cursor:not-allowed;}
.queue-del-btn{background:none;border:none;cursor:pointer;color:var(--tx3);padding:4px 6px;margin-left:3px;border-radius:4px;font-size:12px;}
.queue-del-btn:hover{color:var(--danger);background:var(--dl);}

/* ── ROBLOX ROW ── */
.roblox-row{display:flex;overflow-x:auto;gap:14px;padding:7px 4px 12px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
.roblox-row::-webkit-scrollbar{height:3px;}
.roblox-row::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px;}
.roblox-card{min-width:170px;width:170px;border-radius:16px;background:var(--card);border:1px solid var(--bd);transition:.28s cubic-bezier(.4,0,.2,1);cursor:pointer;overflow:hidden;display:flex;flex-direction:column;box-shadow:var(--sh);scroll-snap-align:start;backdrop-filter:blur(12px);}
.roblox-card:hover{transform:translateY(-7px) scale(1.03);border-color:var(--p);box-shadow:var(--shl);}
.roblox-card-img{height:100px;background:linear-gradient(135deg,var(--pl),rgba(99,102,241,.05));display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--p);position:relative;}
.roblox-card-body{padding:10px 12px;}
.roblox-card-title{font-weight:800;font-size:11.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx);font-family:'Syne',sans-serif;}
.roblox-card-sub{font-size:9.5px;color:var(--tx3);font-weight:700;margin-top:2px;text-transform:uppercase;letter-spacing:.04em;}

/* ── RECENT ── */
.recent-section{padding:0;overflow:hidden;backdrop-filter:blur(16px);}
.sec-hdr{padding:15px 20px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.02);border-radius:var(--rlg) var(--rlg) 0 0;}
.sec-title{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:800;color:var(--tx);}
.search-recent{padding:6px 11px;border-radius:100px;border:1px solid var(--bd);background:var(--ibg);font-size:11px;outline:none;color:var(--tx);min-width:170px;font-family:'Arimo',sans-serif;}
.search-recent:focus{border-color:var(--p);}
.recent-list{max-height:340px;overflow-y:auto;}
.task-row{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--bd);transition:.18s;}
.task-row:last-child{border-bottom:none;}
.task-row:hover{background:var(--pl);}
.task-cat-dot{width:9px;height:9px;border-radius:50%;margin-right:11px;flex-shrink:0;}
.task-info{display:flex;align-items:center;flex:1;}
.task-name{font-size:13px;font-weight:700;color:var(--tx);margin-bottom:2px;font-family:'Syne',sans-serif;}
.task-time{font-size:11px;color:var(--tx2);font-weight:500;}
.dur-badge{background:var(--pl);color:var(--p);padding:4px 11px;border-radius:99px;font-size:11px;font-weight:800;white-space:nowrap;font-family:'JetBrains Mono',monospace;}

/* ── TASK TABLE ── */
.tm-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:9px;}
.total-badge{display:inline-flex;align-items:center;gap:5px;background:var(--pl);color:var(--p);padding:7px 14px;border-radius:99px;font-size:12.5px;font-weight:800;box-shadow:var(--sh);font-family:'Syne',sans-serif;}
.date-filter{display:flex;align-items:center;gap:7px;background:var(--card);padding:7px 12px;border-radius:var(--rsm);border:1px solid var(--bd);backdrop-filter:blur(12px);}
.date-filter input{border:none;outline:none;font-size:12.5px;color:var(--tx);background:transparent;font-family:'Arimo',sans-serif;font-weight:700;}
.table-wrap{padding:0;max-height:calc(100vh - 270px);overflow-y:auto;backdrop-filter:blur(16px);}
.gh-table{width:100%;border-collapse:collapse;}
.gh-table th{position:sticky;top:0;z-index:10;background:var(--bg);padding:12px 18px;text-align:left;font-size:10px;font-weight:800;color:var(--tx2);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bd);}
.gh-table td{padding:12px 18px;font-size:13px;color:var(--tx);border-bottom:1px solid var(--bd);font-weight:500;}
.gh-table tr:last-child td{border-bottom:none;}
.gh-table tr:hover td{background:var(--pl);}

/* ── ANALYTICS ── */
.chart-card{padding:20px;backdrop-filter:blur(16px);}
.chart-title{font-family:'Syne',sans-serif;font-size:13.5px;font-weight:800;color:var(--tx);margin-bottom:3px;}
.chart-sub{font-size:11px;color:var(--tx2);margin-bottom:16px;font-weight:500;}
.insight-box{background:var(--pl);border-left:3px solid var(--p);padding:13px 16px;border-radius:0 var(--rsm) var(--rsm) 0;margin-bottom:18px;backdrop-filter:blur(8px);}
.insight-title{font-family:'Syne',sans-serif;font-weight:800;color:var(--tx);margin-bottom:9px;display:flex;align-items:center;gap:7px;font-size:13px;}
.insight-item{font-size:12px;color:var(--tx2);margin-bottom:6px;line-height:1.5;display:flex;gap:9px;align-items:flex-start;}
.goal-hdr{display:flex;justify-content:space-between;font-size:11.5px;font-weight:700;color:var(--tx);margin-bottom:7px;}
.goal-bar-bg{width:100%;height:7px;background:var(--bd);border-radius:99px;overflow:hidden;}
.goal-bar-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--ps));border-radius:99px;transition:width 1s;}
.heatmap-wrap{display:flex;gap:5px;overflow-x:auto;padding:6px 0;}
.heatmap-col{display:flex;flex-direction:column;gap:5px;}
.heatmap-day{font-size:8.5px;font-weight:700;color:var(--tx3);text-align:center;margin-bottom:3px;text-transform:uppercase;}
.heatmap-cell{width:16px;height:16px;border-radius:3px;background:var(--bd);transition:.15s;cursor:default;}
.heatmap-cell:hover{transform:scale(1.25);z-index:10;}
.heatmap-cell[data-level="1"]{background:rgba(99,102,241,.2);}
.heatmap-cell[data-level="2"]{background:rgba(99,102,241,.45);}
.heatmap-cell[data-level="3"]{background:rgba(99,102,241,.72);}
.heatmap-cell[data-level="4"]{background:var(--p);}
.benchmark-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--bd);align-items:center;}
.benchmark-row:last-child{border-bottom:none;}
.bm-rank{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--tx3);width:22px;}
.bm-name{font-size:12.5px;font-weight:700;color:var(--tx);flex:1;}
.bm-score{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:800;color:var(--p);background:var(--pl);padding:3px 9px;border-radius:99px;}

/* ── ACTIVE/IDLE TRACKING ── */
.activity-bar{height:24px;background:var(--bd);border-radius:99px;overflow:hidden;display:flex;margin-bottom:10px;}
.activity-bar-active{background:linear-gradient(90deg,var(--ok),#16a34a);height:100%;transition:width 1s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;}
.activity-bar-idle{background:linear-gradient(90deg,var(--warn),#d97706);height:100%;display:flex;align-items:center;justify-content:flex-start;padding-left:8px;font-size:10px;font-weight:700;color:#fff;white-space:nowrap;}

/* ── POMODORO ── */
.pomodoro-ring{position:relative;display:inline-flex;align-items:center;justify-content:center;}
.pomo-inner{position:absolute;text-align:center;}
.pomo-time{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:700;color:var(--tx);line-height:1;}
.pomo-label{font-size:10px;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-top:4px;}
.pomo-sessions{display:flex;gap:6px;justify-content:center;margin-top:10px;}
.pomo-dot{width:10px;height:10px;border-radius:50%;background:var(--bd);}
.pomo-dot.done{background:var(--p);}

/* ── PROFILE SOCIAL ── */
.profile-banner{height:180px;border-radius:var(--rlg) var(--rlg) 0 0;background:linear-gradient(135deg,var(--p),var(--pd),var(--ps));position:relative;overflow:hidden;}
.profile-banner-img{width:100%;height:100%;object-fit:cover;}
.profile-banner::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.6),rgba(139,92,246,.4),rgba(6,182,212,.3));mix-blend-mode:overlay;}
.profile-avatar-wrap{position:relative;margin:-56px auto 0;width:112px;text-align:center;}
.profile-avatar{width:112px;height:112px;border-radius:50%;border:4px solid var(--bg);object-fit:cover;background:linear-gradient(135deg,var(--p),var(--pd));box-shadow:0 8px 32px rgba(99,102,241,.4);}
.profile-avatar-edit{position:absolute;bottom:4px;right:0;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border:2px solid var(--bg);border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shl);transition:.2s;}
.profile-avatar-edit:hover{transform:scale(1.1);}
.profile-social-card{background:var(--card);border:1px solid var(--bd);border-radius:0 0 var(--rlg) var(--rlg);padding:0 24px 24px;backdrop-filter:blur(16px);text-align:center;}
.profile-name{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--tx);margin-top:14px;}
.profile-title{font-size:13px;color:var(--tx2);margin-top:3px;}
.profile-location{font-size:12px;color:var(--tx3);margin-top:5px;display:flex;align-items:center;gap:5px;justify-content:center;}
.profile-stats-row{display:flex;justify-content:center;gap:0;margin:16px 0;border:1px solid var(--bd);border-radius:14px;overflow:hidden;}
.profile-stat{flex:1;padding:14px 0;text-align:center;border-right:1px solid var(--bd);background:var(--ibg);}
.profile-stat:last-child{border-right:none;}
.profile-stat-n{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--p);}
.profile-stat-l{font-size:10px;color:var(--tx3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.profile-badges{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:14px 0;}
.profile-badge-chip{padding:4px 12px;border-radius:99px;font-size:11px;font-weight:700;background:var(--pl);color:var(--p);border:1px solid rgba(99,102,241,.2);}
.profile-follow-btn{width:100%;padding:11px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border:none;border-radius:var(--rsm);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;box-shadow:0 4px 16px rgba(99,102,241,.3);}
.profile-follow-btn:hover{transform:translateY(-1px);}
.post-card{background:var(--card);border:1px solid var(--bd);border-radius:16px;padding:18px 20px;margin-bottom:12px;backdrop-filter:blur(12px);transition:.2s;}
.post-card:hover{border-color:rgba(99,102,241,.3);transform:translateY(-1px);}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.post-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--pd));display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;flex-shrink:0;}
.post-meta{flex:1;}
.post-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:var(--tx);}
.post-time{font-size:10.5px;color:var(--tx3);}
.post-body{font-size:13px;color:var(--tx);line-height:1.6;margin-bottom:12px;}
.post-actions{display:flex;gap:16px;}
.post-action{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--tx3);cursor:pointer;font-weight:600;transition:.15s;}
.post-action:hover{color:var(--p);}
.post-action.liked{color:var(--danger);}

/* ── ACHIEVEMENTS ── */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.ach-card{padding:18px;border-radius:16px;text-align:center;border:1px solid var(--bd);transition:.2s;background:var(--card);backdrop-filter:blur(12px);}
.ach-card.unlocked{border-color:var(--p);background:linear-gradient(135deg,var(--pl),var(--card));}
.ach-card.locked{opacity:.3;filter:grayscale(1);}

/* ── SETTINGS ── */
.theme-dot{width:44px;height:44px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;border:2px solid transparent;transition:.2s;flex-shrink:0;}
.theme-dot.active{border-color:#fff;box-shadow:0 0 0 3px var(--p);}
.toggle-switch{width:46px;height:24px;background:var(--p);border-radius:99px;position:relative;cursor:pointer;flex-shrink:0;transition:.2s;}
.toggle-switch.off{background:var(--bd);}
.toggle-knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.toggle-switch:not(.off) .toggle-knob{left:25px;}

/* ── IDLE OVERLAY ── */
.idle-overlay{position:fixed;inset:0;background:rgba(0,0,30,.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;z-index:9000;animation:fadeIn .2s;}
.idle-card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:28px;padding:36px 32px;width:400px;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.6);animation:popIn .3s cubic-bezier(.34,1.56,.64,1);}
.idle-icon{width:68px;height:68px;background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(245,158,11,.1));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:32px;border:1px solid rgba(245,158,11,.3);}
.idle-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--tx);margin-bottom:7px;}
.idle-msg{font-size:13px;color:var(--tx2);line-height:1.6;margin-bottom:5px;}
.idle-time{font-family:'JetBrains Mono',monospace;font-size:38px;font-weight:700;color:var(--warn);margin:9px 0 17px;line-height:1;}
.idle-btns{display:flex;gap:10px;}
.idle-here{flex:1;padding:12px;background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border:none;border-radius:var(--rsm);font-size:13px;font-weight:700;cursor:pointer;transition:.2s;font-family:'Syne',sans-serif;}
.idle-here:hover{transform:translateY(-1px);}
.idle-out{flex:1;padding:12px;background:var(--ibg);color:var(--tx2);border:1px solid var(--bd);border-radius:var(--rsm);font-size:12px;font-weight:700;cursor:pointer;transition:.2s;font-family:'Syne',sans-serif;}
.idle-out:hover{background:var(--bd);}
.idle-prog-wrap{width:100%;height:3px;background:var(--bd);border-radius:99px;margin-top:16px;overflow:hidden;}
.idle-prog-fill{height:100%;border-radius:99px;transition:width 1s linear;}

/* ── PRIVACY MODE ── */
.privacy-banner{background:linear-gradient(135deg,rgba(239,68,68,.12),rgba(239,68,68,.06));border:1px solid rgba(239,68,68,.25);border-radius:12px;padding:10px 16px;display:flex;align-items:center;gap:10px;margin-bottom:16px;}
.privacy-dot{width:8px;height:8px;border-radius:50%;background:var(--danger);animation:pulse 1s infinite;}

/* ── FLOAT WIDGET ── */

/* ── GAS SYNC INDICATOR ── */
.gas-indicator{display:flex;align-items:center;gap:6px;font-size:10.5px;font-weight:700;padding:5px 10px;border-radius:99px;background:rgba(34,197,94,.1);color:var(--ok);border:1px solid rgba(34,197,94,.2);}
.gas-indicator.syncing{background:rgba(245,158,11,.1);color:var(--warn);border-color:rgba(245,158,11,.2);}
.gas-indicator.error{background:var(--dl);color:var(--danger);border-color:rgba(239,68,68,.2);}
.gas-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.gas-dot.syncing{animation:pulse .8s infinite;}

/* ── NOTIF TOAST ── */
.notif{position:fixed;bottom:22px;right:22px;padding:12px 18px;border-radius:var(--rsm);font-size:13px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,.4);z-index:9999;animation:notifIn .3s cubic-bezier(.34,1.56,.64,1);backdrop-filter:blur(20px);border:1px solid;}
.notif.success{background:rgba(34,197,94,.15);color:#4ade80;border-color:rgba(34,197,94,.3);}
.notif.error{background:rgba(239,68,68,.15);color:#f87171;border-color:rgba(239,68,68,.3);}
.notif.info{background:rgba(99,102,241,.15);color:var(--ps);border-color:rgba(99,102,241,.3);}

/* ── MISC ── */
.empty-state{text-align:center;padding:44px 20px;color:var(--tx2);}
.empty-state p{font-size:13px;font-weight:600;margin-top:11px;}
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
.gh-logo{object-fit:contain;mix-blend-mode:screen;}
.badge-chip{display:inline-flex;align-items:center;padding:3px 9px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;}
.badge-high{background:rgba(239,68,68,.12);color:#ef4444;}
.badge-med{background:rgba(245,158,11,.12);color:#f59e0b;}
.badge-low{background:rgba(34,197,94,.12);color:#22c55e;}
.section-divider{height:1px;background:var(--bd);margin:20px 0;}
.page-date-pill{font-size:11.5px;font-weight:600;background:var(--pl);color:var(--p);padding:4px 11px;border-radius:99px;display:inline-flex;align-items:center;gap:5px;}

/* ── KEYFRAMES ── */
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes notifIn{from{transform:translateY(18px) scale(.9);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.82)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse-logo{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:.85}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* ── SPLASH ── */
.splash-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:22px;position:relative;}
.splash-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(99,102,241,.15) 0%,transparent 60%);}

/* ── REPORT CARD ── */
.report-section{background:var(--card);border:1px solid var(--bd);border-radius:var(--rlg);overflow:hidden;backdrop-filter:blur(16px);}
.report-hdr{padding:18px 22px;background:rgba(99,102,241,.06);border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}

/* ── RESPONSIVE ── */
@media(max-width:1024px){

  .main{margin-left:0;}
  .stat-grid{grid-template-columns:1fr 1fr;}
}
@media print{
  .sidebar,.auth-wrap,.timer-active,.idle-overlay,.notif,.float-widget{display:none!important;}
  .main{margin-left:0!important;}
}

/* ══════════════════════════
   GAS SYNC
══════════════════════════ */
const gasSync = {
  async push(action, data) {
    try {
      const payload = { action, data, timestamp: new Date().toISOString() };
      const res = await fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      return { success: true };
    } catch(e) {
      console.warn('[TITAN GAS] Sync failed:', e.message);
      // Queue for retry
      const queue = JSON.parse(localStorage.getItem('titan_gas_queue')||'[]');
      queue.push({ action, data, timestamp: new Date().toISOString() });
      localStorage.setItem('titan_gas_queue', JSON.stringify(queue.slice(-50)));
      return { success: false, queued: true };
    }
  },
  async flush() {
    const queue = JSON.parse(localStorage.getItem('titan_gas_queue')||'[]');
    if (!queue.length) return;
    for (const item of queue) {
      try {
        await fetch(GAS_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body:JSON.stringify(item) });
      } catch(e) { break; }
    }
    localStorage.setItem('titan_gas_queue', '[]');
  }
};

  async register({empId,firstName,lastName,password,dept,photoBase64}){if(!dept)return{success:false,error:'Select department.'};const u=ldb.getUsers();if(u.find(x=>x.empId===empId))return{success:false,error:'ID already registered.'};const id=ldb.uid();const newUser={id,empId,firstName,lastName,password,dept,photoBase64:photoBase64||'',bio:'',createdAt:new Date().toISOString(),followers:0,following:0,coverPhoto:''};u.push(newUser);ldb.saveUsers(u);await gasSync.push('REGISTER',{empId,firstName,lastName,dept});return{success:true,user:{id,empId,firstName,lastName,dept,photoBase64,bio:'',followers:0,following:0}};},
  async getTasks({userId}){const t=ldb.getTasks().filter(x=>x.userId===userId);t.sort((a,b)=>b.date.localeCompare(a.date)||(b.startTime||'').localeCompare(a.startTime||''));return{success:true,tasks:t};},
  async getAllTasks(){return{success:true,tasks:ldb.getTasks()};},
  async addTask(task){const tasks=ldb.getTasks(),id=ldb.uid(),t={id,...task,createdAt:new Date().toISOString()};tasks.push(t);ldb.saveTasks(tasks);await gasSync.push('ADD_TASK',{id,empId:task.empId,taskName:task.taskName,date:task.date,startTime:task.startTime,endTime:task.endTime,durationMinutes:task.durationMinutes,source:task.source||'manual'});return{success:true,task:t};},
  async logActivity(data){const logs=ldb.getActivityLog();logs.push({id:ldb.uid(),timestamp:new Date().toISOString(),...data});ldb.saveActivityLog(logs);await gasSync.push('ACTIVITY_LOG',data);return{success:true};},
  async updateProfile({userId,photoBase64,bio,coverPhoto}){const u=ldb.getUsers(),i=u.findIndex(x=>x.id===userId);if(i>=0){if(photoBase64!==undefined)u[i].photoBase64=photoBase64;if(bio!==undefined)u[i].bio=bio;if(coverPhoto!==undefined)u[i].coverPhoto=coverPhoto;ldb.saveUsers(u);await gasSync.push('UPDATE_PROFILE',{empId:u[i].empId});return{success:true};}return{success:false};},
  async syncIdlePeriod({userId,empId,idleSecs,activeSecs}){const entry={id:ldb.uid(),userId,empId,idleSecs,activeSecs,date:new Date().toISOString().split('T')[0],timestamp:new Date().toISOString()};await gasSync.push('IDLE_PERIOD',entry);return{success:true};},
  async getPosts(){return{success:true,posts:ldb.getPosts()};},

const fmtDate12 = d=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});};
const fmt12     = t=>{if(!t)return'';const[h,m]=t.split(':').map(Number);return`${h%12||12}:${String(m).padStart(2,'0')} ${h>=12?'PM':'AM'}`;};
const getCatColor=name=>{const n=name.toLowerCase();if(/code|dev|sql/i.test(n))return'#3b82f6';if(/bug|fix|error/i.test(n))return'#ef4444';if(/meet|call|client/i.test(n))return'#10b981';if(/doc|write|report/i.test(n))return'#8b5cf6';if(/test|qa|audit/i.test(n))return'#f59e0b';if(/design|ui|ux/i.test(n))return'#ec4899';if(/train|learn/i.test(n))return'#06b6d4';return'var(--p)';};
const exportCSV=(headers,rows,fn)=>{const csv=[headers.join(','),...rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(','))].join('\n');const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([csv],{type:'text/csv'})),download:fn});a.click();};
const timeAgo=ts=>{const s=Math.floor((Date.now()-new Date(ts))/1000);if(s<60)return'Just now';if(s<3600)return`${Math.floor(s/60)}m ago`;if(s<86400)return`${Math.floor(s/3600)}h ago`;return`${Math.floor(s/86400)}d ago`;};

/* ══════════════════════════
   HOOKS
══════════════════════════ */
const useLiveClock=start=>{const[s,setS]=useState(start?Math.floor((Date.now()-new Date(start))/1000):0);useEffect(()=>{if(!start){setS(0);return;}const t=setInterval(()=>setS(Math.floor((Date.now()-new Date(start))/1000)),1000);return()=>clearInterval(t);},[start]);return s;};
const useRealClock=()=>{const[t,setT]=useState(new Date());useEffect(()=>{const i=setInterval(()=>setT(new Date()),1000);return()=>clearInterval(i);},[]);return t.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};
const useActiveIdle=()=>{
  const[activeSecs,setActiveSecs]=useState(0);const[idleSecs,setIdleSecs]=useState(0);const[isActive,setIsActive]=useState(true);
  const lastActRef=useRef(Date.now());const IDLE_THRESHOLD=30000;
  useEffect(()=>{
    const onAct=()=>{lastActRef.current=Date.now();if(!isActive)setIsActive(true);};
    ['mousemove','keydown','click','touchstart','scroll'].forEach(e=>window.addEventListener(e,onAct,{passive:true}));
    const ticker=setInterval(()=>{const idled=Date.now()-lastActRef.current>IDLE_THRESHOLD;if(idled){setIsActive(false);setIdleSecs(p=>p+1);}else{setIsActive(true);setActiveSecs(p=>p+1);}},1000);
    return()=>{['mousemove','keydown','click','touchstart','scroll'].forEach(e=>window.removeEventListener(e,onAct));clearInterval(ticker);};
  },[]);
  return{activeSecs,idleSecs,isActive};
};

  return(

      <button onClick={()=>setTheme(theme==='dark'?'light':'dark')} style={{position:'absolute',top:16,right:18,background:'rgba(255,255,255,.1)',border:'1px solid rgba(255,255,255,.12)',cursor:'pointer',padding:'7px 9px',borderRadius:9,color:'var(--tx)',fontSize:17,backdropFilter:'blur(8px)'}}>

/* ══════════════════════════

══════════════════════════ */
const RegisterStep1=({onNext,onLogin})=>{
  const[form,setForm]=useState({empId:'',firstName:'',lastName:'',dept:'',password:'',confirm:''});
  const[err,setErr]=useState('');const[showPw,setShowPw]=useState(false);const[showCpw,setShowCpw]=useState(false);const[terms,setTerms]=useState(false);
  const upd=k=>e=>setForm(p=>({...p,[k]:e.target.value}));
  const getPwStr=pw=>{let s=0;if(!pw)return 0;if(pw.length>8)s+=20;if(pw.length>=12)s+=10;if(/[A-Z]/.test(pw))s+=20;if(/[a-z]/.test(pw))s+=20;if(/[0-9]/.test(pw))s+=15;if(/[^A-Za-z0-9]/.test(pw))s+=15;return Math.min(100,s);};
  const str=getPwStr(form.password);const sCol=str<50?'var(--danger)':str<85?'var(--warn)':'var(--ok)';
  const submit=()=>{const{empId,firstName,lastName,dept,password,confirm}=form;if(!empId||!firstName||!lastName||!dept||!password||!confirm){setErr('All fields required.');return;}if(password!==confirm){setErr('Passwords do not match.');return;}if(password.length<8){setErr('Password must be 8+ chars.');return;}if(!/[A-Z]/.test(password)||!/[a-z]/.test(password)||!/[0-9]/.test(password)||!/[^A-Za-z0-9]/.test(password)){setErr('Password needs uppercase, lowercase, number & symbol.');return;}if(!terms){setErr('Agree to Terms of Service.');return;}setErr('');onNext(form);};
  return(
    <div className="auth-wrap"><div className="auth-card">
      <div className="auth-logo"><Logo size={48}/><div className="auth-logo-badge">TITAN</div><div className="auth-logo-sub">Step 1 of 2 · Account Details</div></div>

      <ErrBox msg={err}/>
      <div className="two-col"><div className="form-group"><label className="form-label">First Name</label><input className="form-input" placeholder="First" value={form.firstName} onChange={upd('firstName')}/></div><div className="form-group"><label className="form-label">Last Name</label><input className="form-input" placeholder="Last" value={form.lastName} onChange={upd('lastName')}/></div></div>
      <div className="form-group"><label className="form-label">Employee ID</label><input className="form-input" placeholder="GHZ-1024" value={form.empId} onChange={upd('empId')} style={{textTransform:'uppercase'}}/></div>
      <div className="form-group"><label className="form-label">Department</label><select className="form-input" value={form.dept} onChange={upd('dept')}><option value="">— Select —</option>{DEPARTMENTS.map(d=><option key={d}>{d}</option>)}</select></div>
      <div className="form-group"><label className="form-label">Password</label><div className="pw-wrapper"><input className="form-input" type={showPw?'text':'password'} placeholder="Min 8 chars" value={form.password} onChange={upd('password')} style={{paddingRight:38}}/><button type="button" className="pw-toggle-btn" onClick={()=>setShowPw(p=>!p)}>{showPw?<EyeOffIcon/>:<EyeIcon/>}</button></div>{form.password.length>0&&<><div className="pwd-strength-bar"><div className="pwd-strength-fill" style={{width:`${str}%`,backgroundColor:sCol}}/></div><div style={{fontSize:10,fontWeight:700,color:sCol,textAlign:'right',marginTop:3,textTransform:'uppercase',letterSpacing:'.05em'}}>{str<50?'Weak':str<85?'Good':'Strong'}</div></>}</div>
      <div className="form-group"><label className="form-label">Confirm Password</label><div className="pw-wrapper"><input className="form-input" type={showCpw?'text':'password'} placeholder="Repeat" value={form.confirm} onChange={upd('confirm')} onKeyDown={e=>e.key==='Enter'&&submit()} style={{paddingRight:38}}/><button type="button" className="pw-toggle-btn" onClick={()=>setShowCpw(p=>!p)}>{showCpw?<EyeOffIcon/>:<EyeIcon/>}</button></div></div>
      <div className="terms-box"><h4>TITAN Terms of Service</h4><p><strong>1. Data Collection:</strong> Work hours, tasks, and activity metrics recorded for internal auditing.</p><p><strong>2. Authentication:</strong> Do not share credentials. Unauthorized access attempts are logged and synced.</p><p><strong>3. Productivity:</strong> Data used for performance reviews and workload management.</p><p><strong>4. GAS Sync:</strong> All activity data is pushed to Google Sheets for admin reporting.</p></div>

/* ══════════════════════════
   REGISTER STEP 2 (CAMERA)
══════════════════════════ */
const RegisterStep2=({formData,onRegister,onLogin})=>{
  const vRef=useRef(null),cRef=useRef(null),sRef=useRef(null);
  const[camState,setCamState]=useState('idle');const[errType,setErrType]=useState('');
  const[photo,setPhoto]=useState(null);const[loading,setLoading]=useState(false);const[regErr,setRegErr]=useState('');
  const stop=()=>{if(sRef.current){sRef.current.getTracks().forEach(t=>t.stop());sRef.current=null;}};
  const startCam=async()=>{stop();setPhoto(null);setCamState('requesting');setErrType('');if(!navigator.mediaDevices?.getUserMedia){setCamState('error');setErrType('notfound');return;}try{const s=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:640},height:{ideal:480},facingMode:'user'},audio:false});sRef.current=s;if(vRef.current){vRef.current.srcObject=s;vRef.current.onloadedmetadata=()=>{vRef.current.play().catch(()=>{});setCamState('live');};}}catch(e){stop();setErrType(e.name==='NotAllowedError'?'permission':e.name==='NotFoundError'?'notfound':'unknown');setCamState('error');}};
  const capture=()=>{if(!vRef.current||!cRef.current)return;const v=vRef.current,c=cRef.current;c.width=v.videoWidth||640;c.height=v.videoHeight||480;const ctx=c.getContext('2d');ctx.translate(c.width,0);ctx.scale(-1,1);ctx.drawImage(v,0,0);setPhoto(c.toDataURL('image/jpeg',.85));setCamState('captured');stop();};
  const retake=()=>{setPhoto(null);startCam();};
  useEffect(()=>{startCam();return()=>stop();},[]);
  const submit=async()=>{if(camState!=='captured'&&camState!=='live'){setRegErr('Capture photo first.');return;}setLoading(true);setRegErr('');
    const r=await api.register({empId:formData.empId.toUpperCase(),firstName:formData.firstName,lastName:formData.lastName,password:formData.password,dept:formData.dept,photoBase64:photo||''});
    setLoading(false);if(r.success){if(photo&&r.user?.id)localStorage.setItem(`titan_photo_${r.user.id}`,photo);onRegister(r.user);}else setRegErr(r.error||'Registration failed.');};
  const errMsg={permission:'Camera denied — allow in browser.',notfound:'No camera found.',unknown:'Camera error — try refreshing.'};
  return(
    <div className="auth-wrap"><div className="auth-card" style={{textAlign:'center'}}>
      <div className="auth-logo"><Logo size={48}/><div className="auth-logo-badge">TITAN</div><div className="auth-logo-sub">Step 2 of 2 · Face Capture</div></div>
      <h1 className="auth-title">Verify Identity</h1>
      <ErrBox msg={regErr}/>
      <div className="face-section">
        <div className="cam-vp">
          <canvas ref={cRef} style={{display:'none'}}/>
          {(camState==='live'||camState==='requesting')&&<video ref={vRef} autoPlay muted playsInline style={{width:'100%',height:'100%',objectFit:'cover',transform:'scaleX(-1)',display:camState==='live'?'block':'none'}}/>}
          {camState==='requesting'&&<div className="cam-idle"><div className="spinner" style={{borderTopColor:'var(--p)',borderColor:'rgba(99,102,241,.2)',width:30,height:30}}/><p>Starting…</p></div>}
          {camState==='captured'&&photo&&<img src={photo} alt="Captured" style={{width:'100%',height:'100%',objectFit:'cover'}}/>}
          {camState==='idle'&&<div className="cam-idle"><i className="fa-solid fa-camera" style={{fontSize:32,opacity:.25}}/><p>Click Start Camera</p></div>}
          {camState==='error'&&<div className="cam-idle"><i className="fa-solid fa-triangle-exclamation" style={{fontSize:28,color:'#f87171'}}/><p style={{color:'#f87171',fontSize:11,maxWidth:200}}>{errMsg[errType]||errMsg.unknown}</p></div>}
          {camState==='captured'&&<div style={{position:'absolute',top:7,right:7,background:'var(--ok)',borderRadius:99,width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center'}}><i className="fa-solid fa-check" style={{color:'#fff',fontSize:11}}/></div>}
        </div>
        <div className="cam-status" style={{color:camState==='live'||camState==='captured'?'var(--ok)':camState==='requesting'?'var(--warn)':'var(--tx2)'}}>
          <div className={`cam-dot${camState==='live'||camState==='captured'?'':camState==='requesting'?' wait':' off'}`}/>
          {{'idle':'Not started','requesting':'Requesting…','live':'Live · Ready','captured':'Captured ✓','error':'Unavailable'}[camState]}
        </div>
        <div className="cam-btns">
          {(camState==='idle'||camState==='error')&&<button className="cam-btn cam-btn-retry" onClick={startCam}><i className="fa-solid fa-rotate-right"/>{camState==='error'?'Retry':'Start Camera'}</button>}
          {camState==='live'&&<button className="cam-btn cam-btn-capture" onClick={capture}><i className="fa-solid fa-circle"/>Capture</button>}
          {camState==='captured'&&<button className="cam-btn cam-btn-retake" onClick={retake}><i className="fa-solid fa-rotate-left"/>Retake</button>}
        </div>
      </div>
      <button className="btn btn-p" onClick={submit} disabled={loading||(camState!=='captured'&&camState!=='live')}>{loading?<span className="spinner"/>:'Confirm & Register'}</button>
      <p className="auth-link">Have an account? <a onClick={onLogin}>Login</a></p>
    </div></div>
  );
};

/* ══════════════════════════
   IDLE WATCHER
══════════════════════════ */
const IdleWatcher=({user,onIdleOut})=>{
  const[idleSecs,setIdleSecs]=useState(0);const[show,setShow]=useState(false);const[popSecs,setPopSecs]=useState(0);
  const lastAct=useRef(Date.now());
  const reset=useCallback(()=>{lastAct.current=Date.now();if(!show)setIdleSecs(0);},[show]);
  useEffect(()=>{const evts=['mousemove','mousedown','keydown','touchstart','click','scroll'];evts.forEach(e=>window.addEventListener(e,reset,{passive:true}));return()=>evts.forEach(e=>window.removeEventListener(e,reset));},[reset]);
  useEffect(()=>{const t=setInterval(()=>{const s=Math.floor((Date.now()-lastAct.current)/1000);setIdleSecs(s);if(s>=IDLE_WARN&&!show){setShow(true);setPopSecs(0);}},(1000));return()=>clearInterval(t);},[show]);
  useEffect(()=>{if(!show)return;const t=setInterval(()=>setPopSecs(p=>{const n=p+1;if(n>=IDLE_MAX-IDLE_WARN){clearInterval(t);setShow(false);onIdleOut&&onIdleOut(idleSecs);}return n;}),1000);return()=>clearInterval(t);},[show]);
  const here=()=>{setShow(false);setIdleSecs(0);lastAct.current=Date.now();api.logActivity({userId:user.id,empId:user.empId,action:'IDLE_DISMISSED',details:`Idle ${Math.round(idleSecs/60)}min`});};
  const out=()=>{setShow(false);setIdleSecs(0);lastAct.current=Date.now();api.logActivity({userId:user.id,empId:user.empId,action:'IDLE_OUT',details:`Idle ${Math.round(idleSecs/60)}min`});onIdleOut&&onIdleOut(idleSecs);};
  const grace=IDLE_MAX-IDLE_WARN,pct=Math.min(100,(popSecs/grace)*100);
  const mm=String(Math.floor(idleSecs/60)).padStart(2,'0'),ss2=String(idleSecs%60).padStart(2,'0');
  if(!show)return null;
  return(
    <div className="idle-overlay">
      <div className="idle-card">
        <div className="idle-icon">⏰</div>
        <div className="idle-title">Still there?</div>
        <div className="idle-msg">No activity for <strong>{Math.round(idleSecs/60)} min</strong>.<br/>Your session is still running.</div>
        <div className="idle-time">{mm}:{ss2}</div>
        <div className="idle-btns"><button className="idle-here" onClick={here}>👋 I'm here</button><button className="idle-out" onClick={out}>🚶 Stepped away</button></div>
        <div className="idle-prog-wrap"><div className="idle-prog-fill" style={{width:`${pct}%`,background:pct>70?'var(--danger)':'var(--warn)'}}/></div>
        <p style={{fontSize:10,color:'var(--tx3)',marginTop:8,fontWeight:600}}>Auto-dismiss in {grace-popSecs}s</p>
      </div>
    </div>
  );
};

const DashboardPage=({user,tasks,onTasksChanged,activeTimer,setActiveTimer,elapsed,setElapsed,loginTime,pushNotif,privacyMode,setPrivacyMode})=>{
  const[selTask,setSelTask]=useState('');const[customTask,setCustomTask]=useState('');const[taskSearch,setTaskSearch]=useState('');
  const[pendingQueue,setPendingQueue]=useState(()=>ldb.getPending().filter(p=>p.userId===user.id));
  const secs=useLiveClock(loginTime);const currentTime=useRealClock();
  const{activeSecs,idleSecs,isActive}=useActiveIdle();
  const[quote]=useState(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)]);
  const todayTasks=tasks.filter(t=>t.date===todayStr());
  const filteredTasks=todayTasks.filter(t=>t.taskName.toLowerCase().includes(taskSearch.toLowerCase()));
  const totalMins=todayTasks.reduce((s,t)=>s+Number(t.durationMinutes||0),0);
  const d=new Date();d.setDate(d.getDate()-7);const weekStart=d.toISOString().split('T')[0];
  const weekMins=tasks.filter(t=>t.date>=weekStart).reduce((s,t)=>s+Number(t.durationMinutes||0),0);
  const prodScore=Math.min(100,Math.round((weekMins/2400)*100));
  const totalActiveH=(activeSecs/3600).toFixed(1);const totalIdleH=(idleSecs/3600).toFixed(1);
  const activePercent=activeSecs+idleSecs>0?Math.round((activeSecs/(activeSecs+idleSecs))*100):0;

  useEffect(()=>{if(activeTimer)localStorage.setItem('titan_active_timer',JSON.stringify(activeTimer));else localStorage.removeItem('titan_active_timer');},[activeTimer]);
  useEffect(()=>{const s=localStorage.getItem('titan_active_timer');if(s&&!activeTimer)setActiveTimer(JSON.parse(s));},[]);

  const saveQueue=updated=>{setPendingQueue(updated);const all=ldb.getPending().filter(p=>p.userId!==user.id);ldb.savePending([...all,...updated]);};
  const addToQueue=()=>{const name=customTask.trim();if(!name)return;const nq=[...pendingQueue,{id:ldb.uid(),userId:user.id,taskName:name,prio:'med',addedAt:new Date().toISOString()}];saveQueue(nq);setCustomTask('');pushNotif(`Staged: "${name}"`, 'success');};
  const startFromQueue=q=>{saveQueue(pendingQueue.filter(t=>t.id!==q.id));startTimer(q.taskName,q.prio);};

  const startTimer=async(name,prio='med')=>{if(!name.trim())return;const ss=nowHHMM();setActiveTimer({taskName:name.trim(),startStr:ss,timerId:ldb.uid(),isPaused:false,priority:prio});setElapsed(0);pushNotif(`▶ Started: "${name.trim()}"`, 'success');api.logActivity({userId:user.id,empId:user.empId,action:'TIMER_START',details:`Started: "${name.trim()}"`});};
  const togglePause=()=>{if(!activeTimer)return;const p=!activeTimer.isPaused;setActiveTimer(x=>({...x,isPaused:p}));};
  const stopTimer=async()=>{if(!activeTimer)return;const endStr=nowHHMM(),mins=elapsed<60?1:Math.round(elapsed/60);
    await api.addTask({userId:user.id,empId:user.empId,taskName:activeTimer.taskName,date:todayStr(),startTime:activeTimer.startStr,endTime:endStr,durationMinutes:mins,source:'timer'});
    api.logActivity({userId:user.id,empId:user.empId,action:'TASK_SAVED',details:`"${activeTimer.taskName}" — ${mins}m`});
    const h=Math.floor(elapsed/3600),m=Math.floor((elapsed%3600)/60),s=elapsed%60;
    pushNotif(`✓ "${activeTimer.taskName}" saved — ${h>0?h+'h ':''} ${m>0?m+'m ':''} ${s}s`,'success');
    setActiveTimer(null);setElapsed(0);await onTasksChanged();};
  const H=Math.floor(elapsed/3600),M=Math.floor((elapsed%3600)/60),S=elapsed%60;

  return(
    <div className="page">
      <div className="page-hdr">
        <div><h1 className="page-title">Dashboard{user?.dept==='HR'&&<span style={{fontSize:12,fontWeight:800,padding:'2px 10px',borderRadius:99,background:'var(--pl)',color:'var(--p)',marginLeft:9,fontFamily:"'Syne',sans-serif"}}>HR</span>}</h1><p className="page-sub">Welcome back, {user?.firstName} · {user?.empId}</p></div>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          {privacyMode&&<div className="privacy-banner" style={{marginBottom:0,padding:'5px 12px'}}><div className="privacy-dot"/><span style={{fontSize:11,fontWeight:700,color:'var(--danger)'}}>Privacy Mode Active</span></div>}
          <span style={{fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:700,color:'var(--tx)'}}>{currentTime}</span>
          <div className="page-date-pill"><i className="fa-regular fa-calendar" style={{fontSize:11}}/>{new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>
        </div>
      </div>

      {/* QUOTE BANNER */}
      <div style={{padding:'10px 15px',background:'linear-gradient(135deg,var(--pl),rgba(99,102,241,.04))',color:'var(--p)',borderRadius:12,fontSize:12,fontWeight:600,marginBottom:20,border:'1px solid rgba(99,102,241,.15)',display:'flex',alignItems:'center',gap:9}}>
        <span style={{fontSize:16}}>💡</span><span>"{quote}"</span>
      </div>

      {/* STAT CARDS */}
      <div className="stat-grid">
        <div className="stat-card">
          <div style={{position:'absolute',top:0,right:0,width:90,height:90,borderRadius:'50%',background:'rgba(99,102,241,.06)',pointerEvents:'none'}}/>
          <div className="stat-icon" style={{background:'rgba(99,102,241,.12)'}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--p)" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
          <div className="stat-lbl">Session Time</div><div className="stat-clock">{fmtHHMMSS(secs)}</div>
          <div style={{display:'flex',alignItems:'center',gap:5,marginTop:5}}><span className={`live-dot${!isActive?' idle':''}`}/><span style={{fontSize:10.5,color:'var(--tx2)',fontWeight:600}}>{isActive?'Active':'Idle'} · Since {loginTime?new Date(loginTime).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}):''}</span></div>
        </div>
        <div className="stat-card">
          <div style={{position:'absolute',top:0,right:0,width:90,height:90,borderRadius:'50%',background:'rgba(34,197,94,.06)',pointerEvents:'none'}}/>
          <div className="stat-icon" style={{background:'rgba(34,197,94,.12)'}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" strokeWidth="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
          <div className="stat-lbl">Tasks Logged</div><div className="stat-val" style={{color:'var(--ok)'}}>{todayTasks.length}</div>
          <div className="stat-sub">{todayTasks.length===1?'entry':'entries'} today · {fmtMins(totalMins)} tracked</div>
        </div>
        <div className="stat-card">
          <div style={{position:'absolute',top:0,right:0,width:90,height:90,borderRadius:'50%',background:'rgba(139,92,246,.06)',pointerEvents:'none'}}/>
          <div className="stat-icon" style={{background:'rgba(139,92,246,.12)'}}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" strokeWidth="2.5"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></div>
          <div className="stat-lbl">Productivity Pulse</div><div className="stat-val" style={{color:'#8b5cf6'}}>{prodScore}%</div>
          <div className="stat-sub">Weekly: {fmtMins(weekMins)} / 40h</div>
        </div>
      </div>

      {/* ACTIVE vs IDLE BAR */}
      <div className="glass-card" style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>🖥️ Active Time vs Idle Time</div>
          <div style={{display:'flex',gap:14}}>
            <span style={{fontSize:11,fontWeight:700,color:'var(--ok)'}}>Active: {totalActiveH}h</span>
            <span style={{fontSize:11,fontWeight:700,color:'var(--warn)'}}>Idle: {totalIdleH}h</span>
          </div>
        </div>
        <div className="activity-bar">
          <div className="activity-bar-active" style={{width:`${activePercent}%`,minWidth:activePercent>5?'auto':0}}>
            {activePercent>10&&`Active ${activePercent}%`}
          </div>
          <div className="activity-bar-idle" style={{width:`${100-activePercent}%`}}>
            {(100-activePercent)>10&&`Idle ${100-activePercent}%`}
          </div>
        </div>
        <div style={{display:'flex',gap:20,marginTop:10}}>
          <span style={{fontSize:11,color:'var(--tx3)',fontWeight:600}}>⌨️ Keyboard/mouse activity detected in real-time</span>
          <button onClick={()=>setPrivacyMode(p=>!p)} style={{marginLeft:'auto',background:'none',border:`1px solid ${privacyMode?'var(--danger)':'var(--bd)'}`,color:privacyMode?'var(--danger)':'var(--tx3)',borderRadius:99,padding:'3px 10px',cursor:'pointer',fontSize:11,fontWeight:700}}>
            {privacyMode?'🔒 Privacy ON':'🔓 Privacy OFF'}
          </button>
        </div>
      </div>

      {/* ROBLOX QUEUE ROW */}
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:9}}>
          <div><div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:14}}>Staged Activities</div><div style={{fontSize:9.5,fontWeight:700,opacity:.4,textTransform:'uppercase',letterSpacing:'.1em',marginTop:2}}>Quick-launch queue</div></div>
          {pendingQueue.length>0&&<button style={{background:'none',border:'none',color:'var(--tx3)',fontSize:10.5,cursor:'pointer',fontWeight:700}} onClick={()=>{saveQueue([]);pushNotif('Queue cleared','info');}}>✕ Clear All</button>}
        </div>
        <div className="roblox-row">
          {pendingQueue.map(q=>(
            <div key={q.id} className="roblox-card" onClick={()=>!activeTimer&&startFromQueue(q)} style={{opacity:activeTimer?.taskName?0.5:1}}>
              <div className="roblox-card-img"><i className="fa-solid fa-play" style={{fontSize:24}}/><div style={{position:'absolute',top:7,right:7,background:'var(--p)',color:'#fff',borderRadius:5,padding:'1px 6px',fontSize:8,fontWeight:900}}>READY</div></div>
              <div className="roblox-card-body"><div className="roblox-card-title">{q.taskName}</div><div className="roblox-card-sub">Tap to launch</div></div>
            </div>
          ))}
          <div className="roblox-card" style={{borderStyle:'dashed',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',opacity:.35}}>
            <i className="fa-solid fa-plus" style={{fontSize:22,marginBottom:7,color:'var(--p)'}}/><span style={{fontSize:9.5,fontWeight:900,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--tx)',textAlign:'center',padding:'0 8px'}}>Stage below</span>
          </div>
        </div>
      </div>

      {/* TIMER + QUEUE GRID */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18,marginBottom:20,alignItems:'start'}}>
        <div>
          {activeTimer?(
            <div className="timer-active">
              {activeTimer.isPaused&&<div style={{position:'absolute',top:11,right:12,background:'rgba(245,158,11,.9)',color:'#fff',padding:'5px 11px',borderRadius:99,fontSize:9.5,fontWeight:900,animation:'pulse 1.2s ease-in-out infinite',zIndex:10,display:'flex',alignItems:'center',gap:4}}>⏸ PAUSED</div>}
              <div className="timer-lbl">{activeTimer.isPaused?'⏸ PAUSED':'🔴 LIVE SESSION'}</div>
              <div className="timer-task" title={activeTimer.taskName}>{activeTimer.taskName}</div>
              <div className="timer-digits-row">
                {H>0&&<><div><div className={`timer-digits${activeTimer.isPaused?' paused':''}`}>{String(H).padStart(2,'0')}</div><div className="timer-unit">HRS</div></div><div className="timer-sep">:</div></>}
                <div><div className={`timer-digits${activeTimer.isPaused?' paused':''}`}>{String(M).padStart(2,'0')}</div><div className="timer-unit">MIN</div></div>
                <div className="timer-sep">:</div>
                <div><div className={`timer-digits${activeTimer.isPaused?' paused':''}`} style={{color:(!activeTimer.isPaused&&S%2===0)?'#fff':'rgba(255,255,255,.5)',transition:'color .5s'}}>{String(S).padStart(2,'0')}</div><div className="timer-unit">SEC</div></div>
              </div>
              <div className="timer-meta"><div className={`timer-dot${activeTimer.isPaused?' paused':' active'}`}/><span className="timer-meta-txt">{activeTimer.isPaused?'Paused':`Started ${activeTimer.startStr}`}</span></div>
              <div className="timer-bar-wrap"><div className={`timer-bar${activeTimer.isPaused?' paused':''}`} style={{width:`${Math.min(100,(elapsed/3600)%1*100)}%`}}/></div>
              <div className="timer-actions">
                <button className="pause-btn" onClick={togglePause}>{activeTimer.isPaused?'▶ Resume':'⏸ Pause'}</button>
                <button className="stop-btn" onClick={stopTimer}><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>Stop & Save</button>
              </div>
              <div className="timer-hint">💾 Rounded minutes saved & synced to Google Sheets</div>
            </div>
          ):(
            <div className="glass-card">
              <div className="track-title">⏱ Start Activity</div>
              <div className="track-sub">Select a preset or type a custom task</div>
              <div className="track-row">
                <select className="track-select" value={selTask} onChange={e=>setSelTask(e.target.value)}>
                  <option value="">— Select preset —</option>
                  {PRESET.map(t=><option key={t}>{t}</option>)}
                </select>
                <button className="start-btn" onClick={()=>selTask&&startTimer(selTask)}><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>Start</button>
              </div>
              <div style={{marginTop:16,marginBottom:7,fontSize:10,fontWeight:700,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.06em'}}>Or stage custom</div>
              <div className="custom-row" style={{marginTop:0}}>
                <input className="custom-input" placeholder="Type activity…" value={customTask} onChange={e=>setCustomTask(e.target.value)} onKeyDown={e=>e.key==='Enter'&&addToQueue()}/>
                <button className="add-btn" onClick={addToQueue}>+ Stage</button>
              </div>
              <p style={{marginTop:7,fontSize:10,color:'var(--tx3)'}}>💡 Staged tasks appear in the row above</p>
            </div>
          )}
        </div>
        <div className="glass-card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:11}}>
            <div><div className="track-title">📋 Queue</div><div className="track-sub" style={{marginBottom:0}}>Pending ({pendingQueue.length})</div></div>
            {pendingQueue.length>0&&<button style={{background:'none',border:'none',color:'var(--tx3)',fontSize:10.5,cursor:'pointer',fontWeight:700}} onClick={()=>{saveQueue([]);}}>✕ Clear</button>}
          </div>
          {pendingQueue.length===0?<div className="empty-state" style={{padding:'24px 0'}}><i className="fa-solid fa-list-check" style={{fontSize:34,opacity:.15}}/><p>No tasks staged yet</p></div>:(
            <div style={{maxHeight:230,overflowY:'auto'}}>
              {pendingQueue.map((q,i)=>(
                <div key={q.id} className="queue-item" style={{animation:'slideIn .3s ease'}}>
                  <div style={{display:'flex',alignItems:'center',gap:9,flex:1}}>
                    <div style={{width:20,height:20,background:'var(--p)',color:'#fff',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:900,flexShrink:0}}>{i+1}</div>
                    <div><div className="queue-task-name">{q.taskName}</div><span style={{fontSize:9.5,color:'var(--tx3)',fontWeight:600}}>{new Date(q.addedAt).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span></div>
                  </div>
                  <div style={{display:'flex',gap:3}}>
                    <button className="queue-start-btn" onClick={()=>startFromQueue(q)} disabled={!!activeTimer}>▶</button>
                    <button className="queue-del-btn" onClick={()=>saveQueue(pendingQueue.filter(t=>t.id!==q.id))}>✕</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* TODAY'S TASKS */}
      <div className="glass-card recent-section" style={{padding:0}}>
        <div className="sec-hdr">
          <span className="sec-title">📝 Today's Activities ({todayTasks.length})</span>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <input type="text" className="search-recent" placeholder="🔍 Search…" value={taskSearch} onChange={e=>setTaskSearch(e.target.value)}/>
            <span style={{fontSize:11,color:'var(--tx2)',fontWeight:600}}>{filteredTasks.length} showing</span>
          </div>
        </div>
        <div className="recent-list">
          {filteredTasks.length===0?<div className="empty-state" style={{padding:'32px 0'}}><i className="fa-regular fa-calendar-xmark" style={{fontSize:34,opacity:.15}}/><p>{taskSearch?'No matches':'No activities yet today'}</p></div>
          :filteredTasks.map((t,i)=>(
            <div key={t.id} className="task-row" style={{animation:`slideIn .3s ease ${i*18}ms`,animationFillMode:'both'}}>
              <div className="task-info"><div className="task-cat-dot" style={{background:getCatColor(t.taskName)}}/><div><div className="task-name">{t.taskName}</div><div className="task-time"><span style={{fontWeight:700}}>{fmt12(t.startTime)}</span><span style={{margin:'0 4px'}}>→</span><span>{fmt12(t.endTime)}</span></div></div></div>
              <span className="dur-badge">{fmtMins(Number(t.durationMinutes)||0)}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════
   ACTIVITY LOG (LIVE)
