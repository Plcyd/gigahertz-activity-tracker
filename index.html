      <script>
        (function() {
          const updateFavicon = () => {
            const theme = document.documentElement.getAttribute("data-theme") || "sapphire";
            const lightThemes = ["light", "classic", "lavender", "rose-quartz", "sapphire-light"];
            const isLight = lightThemes.includes(theme);
            
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
              link = document.createElement("link");
              link.rel = "icon";
              document.head.appendChild(link);
            }
            const src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRIQLVcXIFS2902i6rjCRTxBPoxYJXvM6EIlg&s";
            
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = function() {
                const canvas = document.createElement("canvas");
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
                let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    if (brightness > 200) {
                        data[i+3] = 0; 
                    } else {
                        if (isLight) {
                            data[i] = 26; data[i+1] = 111; data[i+2] = 212;
                        } else {
                            data[i] = 255; data[i+1] = 255; data[i+2] = 255;
                        }
                    }
                }
                ctx.putImageData(imgData, 0, 0);
                link.href = canvas.toDataURL("image/png");
            };
            img.onerror = function() {
              link.href = src;
            };
            img.src = src;
          };

          const updateSkeumorphism = () => {
            const theme = document.documentElement.getAttribute("data-theme") || "sapphire";
            const lightThemes = ["light", "classic", "lavender", "rose-quartz", "sapphire-light"];
            const isLight = lightThemes.includes(theme);
            
            let style = document.getElementById("skeu-override");
            if (!style) {
              style = document.createElement("style");
              style.id = "skeu-override";
              document.head.appendChild(style);
            }
            
            let css = "";
            if (isLight) {
              css = "\n.glass-panel, .card, .widget, .dashboard-card, .btn, .gh-card, .attendance-card, .task-card {\n   border-top: 1px solid rgba(255, 255, 255, 0.9) !important;\n   border-left: 1px solid rgba(255, 255, 255, 0.8) !important;\n   border-bottom: 1px solid rgba(0, 0, 0, 0.1) !important;\n   border-right: 1px solid rgba(0, 0, 0, 0.1) !important;\n   box-shadow: inset 1px 1px 3px rgba(255,255,255,0.8),\n               inset -1px -1px 3px rgba(0,0,0,0.02),\n               0 8px 16px rgba(0,0,0,0.08) !important;\n}\n";
            } else {
              css = "\n.glass-panel, .card, .widget, .dashboard-card, .btn, .gh-card, .attendance-card, .task-card {\n   border-top: 1px solid rgba(255, 255, 255, 0.15) !important;\n   border-left: 1px solid rgba(255, 255, 255, 0.1) !important;\n   border-bottom: 1px solid rgba(0, 0, 0, 0.4) !important;\n   border-right: 1px solid rgba(0, 0, 0, 0.3) !important;\n   box-shadow: inset 1px 1px 2px rgba(255,255,255,0.1),\n               inset -1px -1px 2px rgba(0,0,0,0.2),\n               0 10px 20px rgba(0,0,0,0.3) !important;\n}\n";
            }
            style.innerHTML = css;
          };

          const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
              if (mutation.attributeName === "data-theme") {
                updateFavicon();
                updateSkeumorphism();
              }
            });
          });
          
          window.addEventListener("DOMContentLoaded", () => {
            updateFavicon();
            updateSkeumorphism();
            observer.observe(document.documentElement, { attributes: true });
          });
        })();
      </script>

            gap: 20px;
          }
          .dashboard-grid > *:nth-child(1) { grid-column: span 2; }
        }

        @media (min-width: 1025px) {
           .dashboard-grid {
              grid-template-columns: repeat(3, 1fr) !important; /* Desktop 3-column */
              gap: 24px;
           }
           .main-content {
              padding: 32px !important;
           }
           .dashboard-grid > *:nth-child(1) { grid-column: span 2; }
           .dashboard-grid > *:nth-child(2) { grid-column: span 1; }
        }
        
        .dashboard-grid > * {
          height: 100%;
        }
        .card {
          min-height: 250px;
        }
        canvas {
          min-height: 200px !important;
        }

        @keyframes switchBootZoom {
          0% { transform: scale(1.05); opacity: 0; }
          30% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 20px var(--p)); }
          70% { transform: scale(1); opacity: 1; filter: drop-shadow(0 0 10px var(--p)); }
          100% { transform: scale(1.5); opacity: 0; filter: blur(10px); }
        }
        .switch-boot-anim {
          animation: switchBootZoom 1.2s ease-in-out forwards !important;
        }

        @keyframes dataUpdatePulse {
          0% { transform: scale(1); filter: brightness(1); }
          50% { transform: scale(1.02); filter: brightness(1.1); text-shadow: 0 0 8px var(--p); }
          100% { transform: scale(1); filter: brightness(1); }
        }
        .data-update-anim {
          animation: dataUpdatePulse 0.5s ease-out;
        }

        .dept-dot {
          width: 20px;
          height: 20px;
          background: var(--btn);
          border: 3px solid #ffffff;
          border-radius: 4px;
          box-shadow: 0 0 12px var(--glow);
          transform: rotate(45deg);
        }
        .locus-dot {
          width: 16px;
          height: 16px;
          background: var(--p, #38bdf8);
          border: 2px solid #ffffff;
          border-radius: 50%;
          box-shadow: 0 0 10px var(--glow), 0 0 0 4px rgba(255,255,255,0.2);
          animation: locusPulse 2s infinite;
        }
        @keyframes locusPulse {
          0% { box-shadow: 0 0 10px var(--glow), 0 0 0 0px var(--glow); }
          70% { box-shadow: 0 0 10px var(--glow), 0 0 0 12px rgba(0,0,0,0); }
          100% { box-shadow: 0 0 10px var(--glow), 0 0 0 0px rgba(0,0,0,0); }
        }

        @keyframes bootDownZoom {
          0% { transform: scale(1); opacity: 1; filter: blur(0) brightness(1); }
          10% { transform: scale(0.95); opacity: 1; filter: blur(0) brightness(1.2); }
          100% { transform: scale(3); opacity: 0; filter: blur(20px) brightness(0); }
        }
        .boot-down-animation {
          animation: bootDownZoom 0.8s cubic-bezier(0.86, 0, 0.07, 1) forwards !important;
        }

        @keyframes glitchLines {
           0% { opacity: 0; }
           10% { opacity: 1; }
           20% { opacity: 0; }
           30% { opacity: 1; }
           100% { opacity: 0; }
        }
        .boot-glitch {
           position: fixed; inset: 0; 
           background: repeating-linear-gradient(0deg, rgba(255,255,255,0.05) 0, rgba(255,255,255,0.05) 1px, transparent 1px, transparent 2px);
           z-index: 99999;
           pointer-events: none;
           animation: glitchLines 1.5s ease forwards;
        }
        /* Global Aero Glass Enhancements */
        .card, .auth-card, .sidebar, .stat-card, .weather-card, .setting-card, .page-hdr {
          backdrop-filter: blur(40px) saturate(200%) !important;
          -webkit-backdrop-filter: blur(40px) saturate(200%) !important;
          border: 1px solid rgba(255, 255, 255, 0.2) !important;
          box-shadow: 0 12px 40px rgba(0,0,0,0.15), inset 0 1px 2px rgba(255,255,255,0.2) !important;
        }
