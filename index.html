            <div style={{fontSize:28,fontWeight:800,color:'#9333ea',marginBottom:8}}>{breakdown.neutral}%</div>
            <div style={{fontSize:12,fontWeight:600,color:'var(--tx2)',marginBottom:4}}>Neutral</div>
            <div style={{fontSize:11,color:'var(--tx3)'}}>{fmtMins(breakdown.neutralMins)}</div>
          </div>
        </div>
        <div style={{marginTop:16,padding:12,background:'rgba(255,255,255,0.05)',borderRadius:8}}>
          <div style={{fontSize:11,color:'var(--tx3)'}}>📊 Efficiency = System tools, CRM, code, dev, design, research | Neutral = All other activities</div>
        </div>
      </div>

      {/* Trend in History of Efficiency */}
      <div className="chart-card" style={{marginBottom:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>
          <div>
            <div className="chart-title">Trend in History of Efficiency</div>
            <div className="chart-sub">Daily efficiency % for each day of the current month</div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <div style={{width:12,height:12,borderRadius:'50%',background:'var(--p)'}}></div>
              <span style={{fontSize:11,color:'var(--tx2)',fontWeight:600}}>Efficiency %</span>
            </div>
          </div>
        </div>
        <div style={{height:260}}><canvas ref={trendRef}/></div>

        {peakHours.length > 0 && (
          <div style={{marginTop:20,paddingTop:20,borderTop:'1px solid var(--bd)'}}>
            <div style={{fontSize:13,fontWeight:700,color:'var(--tx)',marginBottom:12}}>⏰ Peak Productivity Hours</div>
            <div style={{display:'grid',gridTemplateColumns:`repeat(${Math.min(3,peakHours.length)},1fr)`,gap:12}}>
              {peakHours.map((p,i) => (
                <div key={i} style={{padding:12,background:'var(--pl)',borderRadius:8,border:'1px solid var(--p)'}}>
                  <div style={{fontSize:13,fontWeight:800,color:'var(--p)',marginBottom:4}}>{p.hour}:00 — {String(parseInt(p.hour)+1).padStart(2,'0')}:00</div>
                  <div style={{fontSize:11,color:'var(--tx2)'}}>{(p.mins/60).toFixed(1)}h logged</div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const ProfilePage = ({ user, tasks, onUpdateUser, pushNotif, toggleMenu }) => {
  const fileInputRef = useRef(null);
  const [loading, setLoading]     = useState(false);

  // Password Change State
  const [showPwModal, setShowPwModal] = useState(false);
  const [pwData, setPwData] = useState({ current: '', newPw: '', confirm: '' });
  const [pwLoading, setPwLoading] = useState(false);

  const allMins    = tasks.reduce((s,t) => s + Number(t.durationMinutes||0), 0);
  const totalHours = (allMins / 60).toFixed(1);
  const uDays      = [...new Set(tasks.map(t => cStr(t.date)))].length;

  // ── Time & Attendance Today ──────────────────────────────────
  // Fixed break constants
  const LUNCH_BREAK_MINS   = 60;  // 1 hr lunch
  const COFFEE_BREAK_MINS  = 15;  // 15 min coffee
  const YOSI_BREAK_MINS    = 15;  // 15 min yosi
  const TOTAL_FIXED_BREAKS = LUNCH_BREAK_MINS + COFFEE_BREAK_MINS + YOSI_BREAK_MINS; // 90 min

  const getTimeAttendance = () => {
    const todayTasks = tasks.filter(t => cStr(t.date) === todayStr());
    const lunchM = todayTasks.filter(t => /lunch/i.test(t.taskName)).reduce((s,t) => s + Number(t.durationMinutes || 0), 0);
    const coffeeM = todayTasks.filter(t => /coffee/i.test(t.taskName)).reduce((s,t) => s + Number(t.durationMinutes || 0), 0);
    const yosiM = todayTasks.filter(t => /yosi/i.test(t.taskName)).reduce((s,t) => s + Number(t.durationMinutes || 0), 0);
    const totalSpentBreaks = lunchM + coffeeM + yosiM;

    // Rule 1 & 2: No tasks at all → no login, no breaks, no totals
    if (todayTasks.length === 0) {
      return {
        hasLogin:    false,
        hasLogout:   false,
        loginTime:   null,
        logoutTime:  null,
        totalWorked: null,
        overtime:    null,
        status:      'No data today'
      };
    }

    const sorted    = [...todayTasks].sort((a,b) => cStr(a.startTime).localeCompare(cStr(b.startTime)));
    const rawLogin  = cStr(sorted[0].startTime);
    const rawLogout = cStr(sorted[sorted.length - 1].endTime);

    // Rule 2: logout exists only if endTime of last task is a non-empty real value
    const hasLogin  = !!rawLogin  && rawLogin  !== '--:--' && rawLogin  !== '';
    const hasLogout = !!rawLogout && rawLogout !== '--:--' && rawLogout !== '';

    // Rules 3 & 4: totals only when BOTH login AND logout exist
    let totalWorked = null;
    let overtime    = null;
    if (hasLogin && hasLogout) {
      const todayMins  = todayTasks.reduce((s,t) => s + Number(t.durationMinutes||0), 0);
      const workedMins = Math.max(0, todayMins - totalSpentBreaks);
      const stdMins    = 8 * 60;
      totalWorked      = fmtMins(workedMins);
      overtime         = fmtMins(Math.max(0, workedMins - stdMins));
      const onTrack    = workedMins >= stdMins;
      return {
        hasLogin, hasLogout,
        loginTime:  fmt12(rawLogin),
        logoutTime: fmt12(rawLogout),
        totalWorked,
        overtime,
        status: onTrack ? '✓ On Track' : '⚠ Under Target',
        lunchM, coffeeM, yosiM
      };
    }

    // Has login but NO logout yet
    return {
      hasLogin, hasLogout,
      loginTime:  hasLogin ? fmt12(rawLogin) : null,
      logoutTime: null,
      totalWorked: null,
      overtime:    null,
      status: '🕐 In Progress',
      lunchM, coffeeM, yosiM
    };
  };
  const attendance = getTimeAttendance();

  // CHECK PHOTO LOCK
  let canChangePhoto = true;
  let daysLeftToChange = 0;
  if (user?.lastPhotoUpdate) {
    const daysSince = (Date.now() - new Date(user.lastPhotoUpdate).getTime()) / (1000 * 60 * 60 * 24);
    if (daysSince < 30) {
      canChangePhoto = false;
      daysLeftToChange = Math.ceil(30 - daysSince);
    }
  }

  const handlePhotoChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
   
    setLoading(true);
    const reader = new FileReader();
   
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = async () => {
        // Resize and compress the image using Canvas
        const canvas = document.createElement('canvas');
        const MAX_SIZE = 150;
        let width = img.width;
        let height = img.height;

        if (width > height) {
          if (width > MAX_SIZE) {
            height *= MAX_SIZE / width;
            width = MAX_SIZE;
          }
        } else {
          if (height > MAX_SIZE) {
            width *= MAX_SIZE / height;
            height = MAX_SIZE;
          }
        }

        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
       
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);

        // Compress to JPEG at 60% quality
        const b64 = canvas.toDataURL('image/jpeg', 0.6);
       
        if (b64.length > 45000) {
            pushNotif('Image is too complex. Try a simpler or smaller picture.', 'error');
            setLoading(false);
            return;
        }

        // Store photo locally in localStorage
        window.safeStorage.setItem('gh_user_photo', b64);
        setLoading(false);
       
        // Update user object with photo
        const updatedUser = { ...user, photoBase64:b64 };
        onUpdateUser(updatedUser);
        window.safeStorage.setItem('gh_user', JSON.stringify(updatedUser));
       
        pushNotif('Profile photo updated!', 'success');
        window.ActivityTracker.photoUpdated();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const handlePwSubmit = async () => {
    if (!pwData.current || !pwData.newPw || !pwData.confirm) return pushNotif('All fields are required.', 'error');
    if (pwData.newPw !== pwData.confirm) return pushNotif('New passwords do not match.', 'error');
    if (pwData.newPw.length < 8) return pushNotif('Password must be at least 8 characters.', 'error');
   
    // Password changes must be made in the ACCOUNT sheet directly
    // This is a security feature - only the sheet owner can modify credentials
    setPwLoading(false);
    pushNotif('To change your password, please update the ACCOUNT sheet (Column D) directly. Only the sheet owner can do this for security.', 'info');
    setShowPwModal(false);
    setPwData({ current: '', newPw: '', confirm: '' });
  };

  const defaultAvatar = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%238890aa'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z'/%3E%3C/svg%3E";

  return (
    <div className="page">
      {/* Password Modal */}
      {showPwModal && (
        <div className="modal-overlay">
          <div className="modal-card">
            <h2 style={{fontSize: 18, fontWeight: 800, marginBottom: 20}}>Change Password</h2>
            <div className="form-group">
              <label className="form-label">Current Password</label>
              <input type="password" className="form-input" value={pwData.current} onChange={e=>setPwData({...pwData, current: e.target.value})} />
            </div>
            <div className="form-group">
              <label className="form-label">New Password</label>
              <input type="password" className="form-input" value={pwData.newPw} onChange={e=>setPwData({...pwData, newPw: e.target.value})} />
            </div>
            <div className="form-group" style={{marginBottom: 24}}>
              <label className="form-label">Confirm New Password</label>
              <input type="password" className="form-input" value={pwData.confirm} onChange={e=>setPwData({...pwData, confirm: e.target.value})} />
            </div>
            <div style={{display:'flex', gap: 10}}>
              <button className="btn btn-ghost" style={{flex: 1}} onClick={()=>setShowPwModal(false)}>Cancel</button>
              <button className="btn btn-p" style={{flex: 1}} onClick={handlePwSubmit} disabled={pwLoading}>{pwLoading ? 'Saving...' : 'Update Password'}</button>
            </div>
          </div>
        </div>
      )}

      <div className="page-hdr">
        <div style={{display:'flex', alignItems:'center', gap:10}}>
          <button className="mobile-toggle" onClick={toggleMenu}>☰</button>
          <div><h1 className="page-title">My Profile</h1><p className="page-sub">Manage your account and view your stats</p></div>
        </div>
      </div>
      <div className="profile-grid">
        <div className="stat-card" style={{textAlign:'center',padding:'40px 24px'}}>
          <div className="avatar-wrapper">
            <img src={user?.photoBase64 || window.safeStorage.getItem(`gh_photo_${user?.id}`) || defaultAvatar} className="avatar-img" alt="Profile"/>
           
            {loading ? (
              <div className="avatar-btn" style={{cursor:'wait'}}><span className="spinner" style={{width:16,height:16,borderWidth:2}}/></div>
            ) : canChangePhoto ? (
              <button onClick={()=>fileInputRef.current.click()} className="avatar-btn" title="Change Photo">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              </button>
            ) : (
              <button className="avatar-btn locked" title={`Locked. You can change your photo again in ${daysLeftToChange} days.`} onClick={()=>pushNotif(`Locked. You can change your photo again in ${daysLeftToChange} days.`, 'error')}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              </button>
            )}
            <input type="file" accept="image/*" ref={fileInputRef} style={{display:'none'}} onChange={handlePhotoChange} disabled={loading || !canChangePhoto}/>
          </div>
          <h2 style={{fontSize:20,fontWeight:800,color:'var(--tx)',marginBottom:6}}>{user?.firstName} {user?.lastName}</h2>
          <p style={{fontSize:13.5,color:'var(--tx2)',marginBottom:16,fontWeight:500}}>{user?.empId}</p>
          <div style={{display:'flex',justifyContent:'center',gap:8,flexWrap:'wrap', marginBottom: 20}}>
            {user?.dept && <span className="dur-badge" style={{padding:'6px 14px',fontSize:12}}>{user.dept}</span>}
          </div>
         
          <button className="btn btn-ghost" style={{width: '100%', fontSize: 13}} onClick={()=>setShowPwModal(true)}>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{marginRight: 6}}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Change Password
          </button>
        </div>
        <div>
          <div className="stat-grid" style={{gridTemplateColumns:'1fr 1fr'}}>
            <div className="stat-card"><div className="stat-lbl">Total Tasks Logged</div><div className="stat-val">{tasks.length}</div></div>
            <div className="stat-card"><div className="stat-lbl">Total Hours</div><div className="stat-val">{totalHours}<span style={{fontSize:15,color:'var(--tx3)'}}> hrs</span></div></div>
            <div className="stat-card"><div className="stat-lbl">Active Days</div><div className="stat-val">{uDays}</div></div>
            <div className="stat-card"><div className="stat-lbl">Avg. Hours / Day</div><div className="stat-val">{uDays?(totalHours/uDays).toFixed(1):0}<span style={{fontSize:15,color:'var(--tx3)'}}> hrs</span></div></div>
          </div>

          {/* Time & Attendance Today */}
          <div className="stat-card" style={{padding:'24px',marginTop:20}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:18,flexWrap:'wrap'}}>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" style={{color:'var(--p)',flexShrink:0}}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              <h3 style={{fontSize:14,fontWeight:800,color:'var(--tx)'}}>Time &amp; Attendance Today</h3>
              <span style={{
                fontSize:11,fontWeight:700,marginLeft:'auto',padding:'4px 10px',borderRadius:4,
                color: attendance.status.includes('Track') ? 'var(--ok)' : attendance.status.includes('Progress') ? 'var(--p)' : 'var(--warn)',
                background: attendance.status.includes('Track') ? 'rgba(34,197,94,0.1)' : attendance.status.includes('Progress') ? 'rgba(250,204,21,0.12)' : 'rgba(245,158,11,0.1)'
              }}>{attendance.status}</span>
            </div>

            {/* Rule 1: No login yet */}
            {!attendance.hasLogin ? (
              <div style={{textAlign:'center',padding:'28px 20px',background:'rgba(255,255,255,0.04)',borderRadius:12,border:'1px dashed var(--bd)'}}>
                <div style={{fontSize:32,marginBottom:10}}>🔐</div>
                <div style={{fontSize:13,fontWeight:700,color:'var(--tx2)',marginBottom:4}}>Breaks not yet available</div>
                <div style={{fontSize:11,color:'var(--tx3)'}}>Login time must be recorded before attendance data can be displayed.</div>
              </div>
            ) : (
              <>
                {/* Login row — always show once login exists */}
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
                  <div style={{padding:14,background:'var(--pl)',borderRadius:10,border:'1px solid var(--bd)'}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',marginBottom:6,textTransform:'uppercase'}}>Login Time</div>
                    <div style={{fontSize:20,fontWeight:800,color:'var(--p)',fontVariantNumeric:'tabular-nums'}}>{attendance.loginTime}</div>
                  </div>
                  {/* Rule 2: Logout only when actually logged out */}
                  <div style={{padding:14,background: attendance.hasLogout ? 'var(--pl)' : 'rgba(255,255,255,0.04)',borderRadius:10,border:`1px solid ${attendance.hasLogout ? 'var(--bd)' : 'rgba(255,255,255,0.1)'}`}}>
                    <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',marginBottom:6,textTransform:'uppercase'}}>Logout Time</div>
                    {attendance.hasLogout
                      ? <div style={{fontSize:20,fontWeight:800,color:'var(--p)',fontVariantNumeric:'tabular-nums'}}>{attendance.logoutTime}</div>
                      : <div style={{fontSize:13,fontWeight:600,color:'var(--tx3)',fontStyle:'italic'}}>Not yet logged out</div>
                    }
                  </div>
                </div>

                {/* Rule 3: Totals only when BOTH login & logout present */}
                {attendance.hasLogout ? (
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:14}}>
                    <div style={{padding:14,background:'rgba(34,197,94,0.1)',borderRadius:10,border:'1px solid rgba(34,197,94,0.3)'}}>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',marginBottom:6,textTransform:'uppercase'}}>Total Hours Worked</div>
                      <div style={{fontSize:18,fontWeight:800,color:'var(--ok)',fontVariantNumeric:'tabular-nums'}}>{attendance.totalWorked}</div>
                      <div style={{fontSize:10,color:'var(--tx3)',marginTop:4}}>After break deductions</div>
                    </div>
                    <div style={{padding:14,background:'rgba(147,51,234,0.1)',borderRadius:10,border:'1px solid rgba(147,51,234,0.3)'}}>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',marginBottom:6,textTransform:'uppercase'}}>Overtime</div>
                      <div style={{fontSize:18,fontWeight:800,color:'#9333ea',fontVariantNumeric:'tabular-nums'}}>{attendance.overtime}</div>
                      <div style={{fontSize:10,color:'var(--tx3)',marginTop:4}}>Beyond 8h standard</div>
                    </div>
                  </div>
                ) : (
                  <div style={{padding:14,marginBottom:14,background:'rgba(250,204,21,0.06)',borderRadius:10,border:'1px dashed rgba(250,204,21,0.3)',display:'flex',alignItems:'center',gap:10}}>
                    <span style={{fontSize:20}}>⏳</span>
                    <div>
                      <div style={{fontSize:12,fontWeight:700,color:'var(--tx2)'}}>Total hours &amp; overtime pending</div>
                      <div style={{fontSize:11,color:'var(--tx3)'}}>Will be calculated after logout is recorded.</div>
                    </div>
                  </div>
                )}

                {/* Rule 4: Break allowances only shown after login */}
                <div style={{marginBottom:14}}>
                  <div style={{fontSize:11,fontWeight:800,color:'var(--tx2)',textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:10}}>Break Usage (Spent Today)</div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
                    <div style={{padding:12,background:'rgba(245,158,11,0.1)',borderRadius:10,border:'1px solid rgba(245,158,11,0.3)',textAlign:'center'}}>
                      <div style={{fontSize:18}}>🍱</div>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',margin:'4px 0',textTransform:'uppercase'}}>Lunch Break</div>
                      <div style={{fontSize:15,fontWeight:800,color:attendance.lunchM > 0 ? 'var(--warn)' : 'var(--tx3)'}}>{fmtMins(attendance.lunchM || 0)}</div>
                    </div>
                    <div style={{padding:12,background:'rgba(6,182,212,0.1)',borderRadius:10,border:'1px solid rgba(6,182,212,0.3)',textAlign:'center'}}>
                      <div style={{fontSize:18}}>☕</div>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',margin:'4px 0',textTransform:'uppercase'}}>Coffee Break</div>
                      <div style={{fontSize:15,fontWeight:800,color:attendance.coffeeM > 0 ? '#06b6d4' : 'var(--tx3)'}}>{attendance.coffeeM > 0 ? `${attendance.coffeeM}m` : '00m'}</div>
                    </div>
                    <div style={{padding:12,background:'rgba(239,68,68,0.08)',borderRadius:10,border:'1px solid rgba(239,68,68,0.25)',textAlign:'center'}}>
                      <div style={{fontSize:18}}>🚬</div>
                      <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',margin:'4px 0',textTransform:'uppercase'}}>Yosi Break</div>
                      <div style={{fontSize:15,fontWeight:800,color:attendance.yosiM > 0 ? 'var(--danger)' : 'var(--tx3)'}}>{attendance.yosiM > 0 ? `${attendance.yosiM}m` : '00m'}</div>
                    </div>
                  </div>
                </div>

                {/* Rule 5: Provisional disclaimer */}
                <div style={{padding:12,background:'rgba(255,255,255,0.05)',borderRadius:8,fontSize:11,color:'var(--tx3)',lineHeight:1.6}}>
                  {attendance.hasLogout
                    ? '✅ Final record. System automatically deducts breaks logged during the shift. Standard: 8 hrs/day.'
                    : '⚠️ Provisional — data is incomplete until logout is recorded. Track your breaks using the timer.'
                  }
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

const IdleWatcher = ({user, onIdleOut}) => {
  const [idleSecs, setIdleSecs] = useState(0);
  const [showPopup, setShowPopup] = useState(false);
  const [popSecs, setPopSecs]     = useState(0);
  const lastAct = useRef(Date.now());

  const reset = useCallback(() => { lastAct.current = Date.now(); if (!showPopup) setIdleSecs(0); }, [showPopup]);
  useEffect(() => {
    const evts = ['mousemove','mousedown','keydown','touchstart','click','scroll'];
    evts.forEach(e => window.addEventListener(e, reset, {passive:true}));
    return () => evts.forEach(e => window.removeEventListener(e, reset));
  }, [reset]);

  useEffect(() => {
    const t = setInterval(() => {
      const s = Math.floor((Date.now() - lastAct.current) / 1000);
      setIdleSecs(s);
      if (s >= 1800 && !showPopup) { setShowPopup(true); setPopSecs(0); window.ActivityTracker.idleWarning(s); }
    }, 1000);
    return () => clearInterval(t);
  }, [showPopup]);

  useEffect(() => {
    if (!showPopup) return;
    const t = setInterval(() => setPopSecs(p => {
      const n = p + 1;
      if (n >= 120) { clearInterval(t); setShowPopup(false); onIdleOut && onIdleOut(idleSecs); }
      return n;
    }), 1000);
    return () => clearInterval(t);
  }, [showPopup]);

  const here = () => { setShowPopup(false); setIdleSecs(0); lastAct.current = Date.now(); window.ActivityTracker.idleDismissed(idleSecs); };
  const out  = () => { setShowPopup(false); setIdleSecs(0); lastAct.current = Date.now(); window.ActivityTracker.idleOut(idleSecs); onIdleOut && onIdleOut(idleSecs); };

  const grace = 120, pct = Math.min(100, (popSecs / grace) * 100);
  const mm = String(Math.floor(idleSecs/60)).padStart(2,'0'), ss = String(idleSecs%60).padStart(2,'0');

  if (!showPopup) return null;
  return (
    <div className="idle-overlay">
      <div className="idle-card">
        <div className="idle-icon">⏰</div>
        <div className="idle-title">Still there?</div>
        <div className="idle-msg">No activity for <strong>{Math.round(idleSecs/60)} minutes</strong>.<br/>Your session clock is still running.</div>
        <div className="idle-time">{mm}:{ss}</div>
        <div className="idle-btns">
          <button className="idle-here" onClick={here}>👋 I'm here</button>
          <button className="idle-out"  onClick={out}>🚶 I stepped away</button>
        </div>
        <div className="idle-prog-wrap"><div className="idle-prog-fill" style={{width:`${pct}%`,background:pct>70?'var(--danger)':'var(--warn)'}}/></div>
        <p style={{fontSize:10.5,color:'var(--tx3)',marginTop:9,fontWeight:600}}>Auto-dismissing in {grace-popSecs}s</p>
      </div>
    </div>
  );
};

const App = () => {
  const [page, setPage]           = useState('login');
  const [user, setUser]           = useState(null);
  const [loginTime, setLoginTime] = useState(null);
  const [tasks, setTasks]         = useState([]);
  const [activeTimer, setActiveTimer] = useState(null);
  const [elapsed, setElapsed]     = useState(0);
  const [dailyStats, setDailyStats] = useState({date: '', totalTime: '00:00:00', tasksLogged: 0, efficiency: '0%'});
  const [notif, setNotif]         = useState(null);
  const [notifHistory, setNotifHistory] = useState([]);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [showLanding, setShowLanding] = useState(true);  // FORCE LOGIN - Always require authentication on page load
  const [theme, setTheme] = useState(() => window.safeStorage.getItem('gh_theme') || 'gigahertz');

  const pushNotif = useCallback((msg, type) => {
    setNotif({msg, type});
    setNotifHistory(prev => [{id:Date.now(), msg, type, time:new Date()}, ...prev].slice(0, 10));
  }, []);

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    window.safeStorage.setItem('gh_theme', theme);
  }, [theme]);

  const toggleMenu = () => setSidebarOpen(prev => !prev);

  useEffect(() => {
    const saved = window.safeStorage.getItem('gh_user');
    const lt    = window.safeStorage.getItem('gh_login_time');
    // REMOVED AUTO-LOGIN: Always require fresh authentication
    // This prevents unauthorized access when sharing the AppScript link
  }, []);

  useEffect(() => {
    if (!activeTimer || activeTimer.isPaused) return;
    const t = setInterval(() => setElapsed(e => e + 1), 1000);
    return () => clearInterval(t);
  }, [activeTimer]);

  const loadTasks = async (u) => {
    // Tasks are loaded from ACTIVITY LOG when they're saved
    // No need to pre-load tasks on login
    // TASKLIST is used only for the dropdown in "Start Tracking"
  };

  const handleTasksChanged = (newTaskLocal = null) => {
    if (newTaskLocal) {
      setTasks(prev => [...prev, newTaskLocal].sort((a,b) =>
        cStr(b.date).localeCompare(cStr(a.date)) ||
        cStr(b.startTime).localeCompare(cStr(a.startTime))
      ));
    } else {
      loadTasks(user);
    }
  };

  const doLogin = (u) => {
    // Ensure new format: add id and firstName if missing
    if (!u.id && u.empId) u.id = u.empId;
    if (!u.firstName && u.name) u.firstName = u.name;
   
    const lt = new Date().toISOString();
    setUser(u); setLoginTime(lt);
    window.safeStorage.setItem('gh_user', JSON.stringify(u));
    window.safeStorage.setItem('gh_login_time', lt);
    window.ActivityTracker.login(u);
    window.ActivityTracker.setPage('dashboard');
    loadTasks(u);
    setPage('dashboard');
    pushNotif(`Welcome back, ${u.firstName}! 👋`, 'success');
  };

  const handleUpdateUser = (updatedUser) => {
    setUser(updatedUser);
    window.safeStorage.setItem('gh_user', JSON.stringify(updatedUser));
    window.ActivityTracker.setUser(updatedUser);
  };

  const doLogout = async () => {
    try {
      if (dailyStats) {
        await api.syncDailyStats(dailyStats);
      }
      window.ActivityTracker.logout();
      window.ActivityTracker.flush();
      setUser(null); setLoginTime(null); setTasks([]); setActiveTimer(null); setElapsed(0);
      window.safeStorage.removeItem('gh_user'); window.safeStorage.removeItem('gh_login_time');
      window.ActivityTracker.clearUser();
      setPage('login');
    } catch (e) {
      console.error(e);
      setUser(null);
      setPage('login');
    }
  };

  const handleIdleOut = (idleSecs) => {
    if (activeTimer && !activeTimer.isPaused) {
      setActiveTimer(p => ({...p, isPaused:true}));
      pushNotif(`⏸ Timer paused automatically — ${Math.round(idleSecs/60)} min idle`, 'error');
    }
  };

  const pages = ['dashboard','tasks','analytics','profile'];

  return (
    <>
      {notif && <Notif msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}
      {showLanding && !user && <LandingPage onGetStarted={()=>setShowLanding(false)} theme={theme} setTheme={setTheme}/>}
      {!showLanding && !user && page==='login'     && <LoginPage     onLogin={doLogin} theme={theme} setTheme={setTheme}/>}
     
      {pages.includes(page) && user && (
        <div className="layout">
          <Sidebar page={page} setPage={setPage} user={user} onLogout={doLogout} notifHistory={notifHistory} isOpen={sidebarOpen} setIsOpen={setSidebarOpen} theme={theme} setTheme={setTheme}/>
          <main className="main">
            {page==='dashboard' && <DashboardPage user={user} tasks={tasks} onTasksChanged={handleTasksChanged} activeTimer={activeTimer} setActiveTimer={setActiveTimer} elapsed={elapsed} setElapsed={setElapsed} loginTime={loginTime} pushNotif={pushNotif} toggleMenu={toggleMenu} dailyStats={dailyStats} setDailyStats={setDailyStats}/>}
            {page==='tasks'     && <TasksPage     user={user} tasks={tasks} onTasksChanged={handleTasksChanged} pushNotif={pushNotif} toggleMenu={toggleMenu}/>}
            {page==='analytics' && <AnalyticsPage user={user} tasks={tasks} toggleMenu={toggleMenu}/>}
            {page==='profile'   && <ProfilePage   user={user} tasks={tasks} onUpdateUser={handleUpdateUser} pushNotif={pushNotif} toggleMenu={toggleMenu}/>}
          </main>
          <IdleWatcher user={user} onIdleOut={handleIdleOut}/>
        </div>
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
