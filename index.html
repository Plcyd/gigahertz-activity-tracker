        );

      }

      [data-theme="independence"] {

      [data-theme="independence"] body {
        background: radial-gradient(
          circle at top right,
          #e639461a,
          #0d1117 40%
        );
        color: var(--tx);
      }

        filter: drop-shadow(0 0 12px rgba(230, 57, 70, 0.6));

        font-weight: 900;
        letter-spacing: 2px;
        text-transform: uppercase;
        text-shadow: 0 0 15px rgba(230, 57, 70, 0.4);
      }

        background: var(--card);

        border: 1px solid var(--bd);
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        border-radius: var(--rlg);
      }
      [data-theme="independence"] .auth-card {
        background: var(--card);
        backdrop-filter: blur(24px);
        border: 1px solid var(--bd);
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: var(--shl);
      }
      [data-theme="independence"] .form-input {
        background: #0d111799;
        border: 1px solid var(--bd);
        color: var(--tx);
        font-weight: 500;
        border-radius: var(--rsm);
        transition: all 0.2s ease;
      }
      [data-theme="independence"] .form-input:focus {
        border-color: #e63946;
        background: #0d1117e6;
        box-shadow: 0 0 0 4px #e6394626;
      }
      [data-theme="independence"]:before {
        content: "";
        position: fixed;
        inset: 0;
        background:
          radial-gradient(circle at 20% 20%, var(--pl) 0, transparent 40%),
          radial-gradient(circle at 80% 80%, var(--glow) 0, transparent 40%);
        pointer-events: none;
        z-index: -1;
      }

  /* Base bridging rules to maintain first HTML integrity */
  :root, [data-theme] {
    --sb: var(--card);
    --sbh: rgba(128, 128, 128, 0.15);
    --sb-border: var(--bd);
    --sb-tx: var(--tx);
    --sb-tx2: var(--tx2);
    --sb-tx3: var(--tx3);
    --ibg: var(--wh);
    --sh: 0 4px 24px rgba(0,0,0,.15);
    --shl: 0 12px 48px rgba(0,0,0,.3);
    --r: 16px; --rsm: 10px; --rlg: 20px;
    --th: var(--wh);
  }

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);background-attachment:fixed;color:var(--tx);min-height:100vh;transition:background .3s ease,color .3s ease;}
  body::before {content: '';position: fixed;inset: 0;background-image:url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M-200,600 C300,300 800,800 1300,400 C1800,0 2200,500 2500,400' fill='none' stroke='rgba(255,255,255,0.8)' stroke-width='3' filter='blur(4px)'/%3E%3C/svg%3E"),url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M-200,700 C400,900 700,200 1400,600 C2000,1000 2300,300 2600,500' fill='none' stroke='rgba(255,255,255,0.4)' stroke-width='6' filter='blur(8px)'/%3E%3C/svg%3E"),radial-gradient(circle at 60% 40%, rgba(255,255,255,0.8) 0px, transparent 4px),radial-gradient(circle at 20% 70%, rgba(255,255,255,0.6) 0px, transparent 3px),radial-gradient(circle at 80% 80%, rgba(255,255,255,0.9) 0px, transparent 5px);background-size: cover;background-position: center;z-index: -1;pointer-events: none;}
  input,select,button,textarea{font-family:inherit;}
  ::-webkit-scrollbar{width:6px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px;}
  *:focus-visible { outline: 2px solid var(--p); outline-offset: 2px; border-radius: 4px;}

  .auth-wrap{min-height:100vh;background:transparent;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden; padding:20px;}
  .auth-card{background:var(--wh);border-radius:var(--rlg);padding:42px 38px;width:100%;max-width:460px;box-shadow:var(--shl);position:relative;z-index:1;border:1px solid var(--bd); max-height: 90vh; overflow-y: auto;}
  .auth-logo{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:26px}
  .auth-title{font-size:22px;font-weight:800;color:var(--tx);text-align:center;margin-bottom:4px}
  .auth-sub{font-size:13px;color:var(--tx2);text-align:center;margin-bottom:26px}
  .form-group{margin-bottom:14px; position: relative;}
  .form-label{font-size:11px;font-weight:700;color:var(--tx2);margin-bottom:5px;display:block;letter-spacing:.05em;text-transform:uppercase}
  .form-input{width:100%;padding:11px 13px;border:1.5px solid var(--bd);border-radius:var(--rsm);font-size:14px;color:var(--tx);background:var(--ibg);outline:none;transition:all .2s ease}
  .form-input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(26,58,245,.12)}
  .form-input::placeholder{color:var(--tx3)}
  .weather-card{border-radius:12px;padding:18px 20px;margin-bottom:20px;background:var(--card);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--bd);box-shadow:var(--sh),inset 0 1px #fff6;transition:all .5s ease}
  .weather-temp{font-size:42px;font-weight:800;color:var(--p);line-height:1;font-family:Rajdhani,sans-serif;letter-spacing:-1px}
  .weather-icon{font-size:36px;filter:drop-shadow(0 2px 6px rgba(0, 0, 0, .2));animation:floatIcon 3s ease-in-out infinite}
  @keyframes floatIcon{0%,to{transform:translateY(0)}50%{transform:translateY(-5px)}}
  .weather-desc{font-size:13px;color:var(--tx3);font-weight:700;text-transform:capitalize;margin-top:4px}
  .weather-loc{font-size:11px;color:var(--tx3);font-weight:600;margin-top:2px;opacity:.8}
  .weather-update{font-size:9px;color:var(--tx3);font-weight:500;margin-top:8px;font-style:italic}
  .lightning-flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:9999}@keyframes bolt{0%{opacity:0}5%{opacity:.3}10%{opacity:0}15%{opacity:.2}20%{opacity:0}to{opacity:0}}

  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 800; cursor: pointer; transition: all 0.3s cubic-bezier(0.1, 0.9, 0.2, 1); border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 4px 12px #0003; backdrop-filter: blur(10px); user-select: none; }
  .btn-p { background: var(--btn); color: #fff; border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 6px 20px var(--glow), inset 0 1px #ffffff80; text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3); }
  .btn-p:hover { background: var(--btn-h); transform: translateY(-2px) scale(1.02); box-shadow: 0 10px 25px var(--glow), inset 0 2px #fff9; }
  .btn-p:active { transform: translateY(0) scale(0.98); }
  .btn-p:disabled { opacity: .6; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-aero { background: linear-gradient(180deg, #ffffff40 0, #ffffff1a); border: 1px solid rgba(255, 255, 255, 0.5); backdrop-filter: blur(20px); box-shadow: 0 4px 15px #0000001a, inset 0 1px #fff6; color: var(--tx); }
  .btn-aero:hover { background: linear-gradient(180deg, #fff6 0, #fff3); border-color: #ffffffb3; box-shadow: 0 8px 25px #00000026, inset 0 2px #ffffff80; }
  .btn-danger{background:linear-gradient(180deg,#ef4444 0,#dc2626 100%);color:#fff;border:1px solid rgba(255,255,255,0.4);box-shadow:0 6px 20px rgba(239,68,68,0.3),inset 0 1px #ffffff80;}
  .btn-danger:hover{transform: translateY(-2px) scale(1.02);box-shadow:0 10px 25px rgba(239,68,68,0.4),inset 0 2px #fff9;filter:brightness(1.1)}
  .btn-ghost{background:transparent;color:var(--tx2);border:1px solid var(--bd);box-shadow: 0 4px 12px #0003;backdrop-filter: blur(10px);}
  .btn-ghost:hover{background:var(--sbh);color:var(--tx);transform: translateY(-2px) scale(1.02);box-shadow: 0 8px 20px #0005, inset 0 1px #fff3;}
  .auth-link{font-size:13px;color:var(--tx2);text-align:center;margin-top:14px}
  .auth-link a{color:var(--p);font-weight:700;text-decoration:none;cursor:pointer}
  .err-box{background:var(--danger);color:#fff;border:1px solid rgba(239,68,68,.3);padding:10px 13px;border-radius:var(--rsm);font-size:13px;margin-bottom:13px}
  .pw-wrapper { position: relative; display: flex; width: 100%; }
  .pw-toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--tx3); display: flex; padding: 4px; border-radius: 4px; transition: .2s; }
  .pw-toggle-btn:hover { background: var(--bg); color: var(--tx); }

  .layout{display:flex;min-height:100vh;position:relative;}
  .sidebar{width:270px;height:100vh;background:var(--sb); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;border-right:1px solid var(--sb-border); transition:transform 0.3s ease;}
  .sb-logo{padding:24px 20px 10px 20px;display:flex;align-items:center;justify-content:center;}
  .sb-logo img {width: 100%; max-height: 60px; object-fit: contain;}
  .sb-nav{flex:1;padding:20px 16px;display:flex;flex-direction:column;gap:6px; overflow-y:auto;}
  .sb-nav::-webkit-scrollbar{width:5px;}
  .sb-nav::-webkit-scrollbar-track{background:transparent;}
  .sb-nav::-webkit-scrollbar-thumb{background:var(--sb-tx3); border-radius:99px;}
  .nav-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:12px;cursor:pointer;color:var(--sb-tx2);font-size:14.5px;font-weight:600;transition:all 0.2s ease; border: 1px solid transparent;}
  .nav-item:hover{background:var(--sbh);color:var(--sb-tx);}
  .nav-item.active{background:var(--pl);color:var(--p);border: 1px solid var(--p);font-weight:700;}
  .nav-item svg{flex-shrink:0;width:20px;height:20px;stroke-width:2.2;}
  .sb-bottom{padding:20px 16px;display:flex;flex-direction:column;gap:16px;}
  .theme-picker{display:flex;align-items:center;justify-content:center;gap:10px; padding-bottom: 8px;}
  .theme-circle{width:20px;height:20px;border-radius:50%;cursor:pointer;transition:transform 0.2s, box-shadow 0.2s; border:2px solid transparent;}
  .theme-circle:hover{transform:scale(1.15);}
  .theme-circle.active{border-color:var(--tx);transform:scale(1.15);box-shadow:0 4px 8px rgba(0,0,0,0.15);}
  .sb-user{padding:14px 16px;background:var(--pl);border:1px solid var(--p);border-radius:14px;display:flex;align-items:center;gap:14px;}
  .user-avatar{width:38px;height:38px;border-radius:50%;background:var(--p);display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:800;flex-shrink:0;box-shadow:0 4px 12px rgba(0,0,0,.25);}
  .user-info{flex:1;min-width:0;}
  .user-name{display:block;color:var(--sb-tx);font-size:13.5px;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2; margin-bottom:6px;}
  .user-details{display:flex;flex-wrap:wrap;gap:4px;}
  .user-detail-tag{font-size:9px;font-weight:800;padding:3px 6px;border-radius:4px;background:rgba(255,255,255,0.6);color:var(--p);white-space:nowrap;text-transform:uppercase;letter-spacing:0.05em;border:1px solid var(--p);}
  .action-btn{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-radius:12px;cursor:pointer;background:transparent;border:none;width:100%;transition:all 0.2s ease;}
  .action-btn:hover{background:var(--sbh);}
  .action-btn-left {display:flex;align-items:center;gap:14px;color:var(--sb-tx2);font-size:14.5px;font-weight:600;}
  .action-btn svg{flex-shrink:0;width:20px;height:20px;}
  .logout-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:12px 16px;border-radius:12px;cursor:pointer;color:#fff;font-size:15px;font-weight:700;background:var(--p);border:none;width:100%;transition:all 0.2s ease;box-shadow: 0 4px 14px rgba(0,0,0,.2);}
  .logout-btn:hover{filter:brightness(0.9);transform:translateY(-1px);box-shadow:0 6px 16px rgba(0,0,0,.35);}
  .logout-btn img{width:20px;height:20px;object-fit:contain; filter: brightness(0) invert(1);}
  .notif-panel {position:absolute; bottom:100%; left:50%; transform:translateX(-50%); width:270px; background:var(--card); border:1px solid var(--bd); border-radius:10px; box-shadow:0 12px 48px rgba(0,0,0,.15); padding:12px; display:none; max-height:280px; overflow-y:auto; z-index:1001; animation:slideUp 0.2s ease;}
  .action-btn-wrap:focus-within .notif-panel {display:block;}
  .notif-item {font-size:11px; padding:10px; border-bottom:1px solid var(--bd); color:var(--tx); line-height:1.5;}
  .notif-item:last-child {border-bottom:none;}
  .notif-time {font-size:9px; color:var(--tx3); margin-top:4px; font-weight:500;}
  .notif-badge {background:var(--danger); color:#fff; font-size:11px; font-weight:800; border-radius:50%; width:20px; height:20px; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(239,68,68,.3);}

  @keyframes slideUp { from{opacity:0;transform:translateX(-50%) translateY(8px);} to{opacity:1;transform:translateX(-50%) translateY(0);} }

  .main{margin-left:270px;flex:1;min-height:100vh;transition:margin-left 0.3s ease; display:flex; flex-direction:column;}
  .page{padding:30px 34px;max-width:1120px; width:100%; margin: 0 auto; flex:1;}
  .page-hdr{margin-bottom:24px; display:flex; justify-content:space-between; align-items:flex-end;}
  .page-title{font-size:26px;font-weight:800;color:var(--tx); letter-spacing:-0.5px; display:flex; align-items:center; gap:10px;}
  .page-sub{font-size:13px;color:var(--tx2);margin-top:4px}
  .page-date{font-size:12.5px;color:var(--tx2);margin-top:4px;display:flex;align-items:center;gap:5px; font-weight:600; background: var(--pl); color: var(--p); padding: 4px 12px; border-radius: 99px;}

  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
  .stat-card, .track-section, .recent-section, .chart-card, .table-wrap { background: var(--card); -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px); border-radius: var(--rlg); box-shadow: var(--sh); padding:22px 24px; border:1px solid var(--bd); transition: transform 0.2s ease, box-shadow 0.2s ease; }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shl); }
  .stat-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .stat-lbl{font-size:11.5px;color:var(--tx2);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em}
  .stat-val{font-size:28px;font-weight:800;color:var(--p);line-height:1; letter-spacing:-1px;}
  .stat-sub{font-size:11.5px;color:var(--tx3);margin-top:6px; font-weight:500;}
  .stat-clock{font-size:28px;font-weight:800;color:var(--p);font-variant-numeric:tabular-nums;letter-spacing:-.5px;line-height:1}
  .stat-live{display:flex;align-items:center;gap:6px;margin-top:6px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);animation:pulse 1.4s ease infinite}

  .track-title{font-size:15px;font-weight:800;color:var(--tx);margin-bottom:4px}

    function showBadge(state, text) {
      if (!_badgeEl) return;
      _badgeEl.className = `tracker-badge ${state}`;
      _badgeEl.querySelector('.tracker-label').textContent = text;
      _badgeEl.style.opacity = '1';
      clearTimeout(_badgeTimer);

      _badgeEl = document.createElement('div');
      _badgeEl.className = 'tracker-badge';

      _badgeEl.style.opacity = '0';

    function push(action, details, extra) {

      if (_user && (_user.role?.toUpperCase() === 'ADMIN' || _user.role?.toUpperCase() === 'SUPER ADMIN')) {
        return;
      }

      extra = extra || {};
      const event = {
        timestamp : new Date().toISOString(),

      try {
        const res = await api.batchLogActivities({ events: batch });

  const useWeather = () => {
    const [weather, setWeather] = React.useState({ data: null, status: 'LOADING' });

    React.useEffect(() => {
      let mounted = true;
      const fetchWeather = async () => {
        try {
          const lat = 14.59523;
          const lon = 120.988926;
          const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
          const json = await res.json();
          
          if (json?.current_weather && mounted) {
            const temp = Math.round(json.current_weather.temperature);
            const code = String(json.current_weather.weathercode);
            let state = "CLOUDY";
            
            if (["0", "1"].includes(code)) state = "SUNNY";
            else if (["51", "53", "55", "61", "63", "65", "80", "81", "82", "83"].includes(code)) state = "RAIN";
            else if (["95", "96", "99"].includes(code)) state = "STORM";
            
            if (json.current_weather.is_day === 0 && (state === "SUNNY" || state === "CLOUDY")) {
              state = "NIGHT";
            }

            setWeather({
              data: { temp, desc: state.toLowerCase(), state, loc: "Quiapo, Manila", lastUpdate: new Date().toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit'}) },
              status: 'READY'
            });
          }
        } catch (error) {
          console.error("Weather fetch failed", error);
          if (mounted) setWeather(prev => ({ ...prev, status: 'ERROR' }));
        }
      };

      fetchWeather();
      const interval = setInterval(fetchWeather, 120000);
      return () => { mounted = false; clearInterval(interval); };
    }, []);

    return weather;
  };

  // --- Haversine Distance Formula ---
  const calculateDistance = (lat1, lon1, lat2, lon2) => {
    const R = 6371e3;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLon / 2) * Math.sin(dLon / 2);
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return Math.round(R * c);
  };

  // --- Geo Engine Hook ---
  const useGeoStatus = () => {
    const [geo, setGeo] = React.useState({ status: 'LOADING', distance: null, coords: null });

    React.useEffect(() => {
      if (!navigator.geolocation) {
        setGeo({ status: 'UNAVAILABLE', distance: null, coords: null });
        return;
      }

      const watchId = navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude } = pos.coords;
          const distance = calculateDistance(14.59523, 120.988926, latitude, longitude);
          
          let status = "REMOTE";
          if (distance <= 50) status = "INSIDE GIGAHERTZ";
          else if (distance <= 217.56) status = "OFFICE";

          setGeo({ status, distance, coords: { lat: latitude, lng: longitude } });
        },
        () => setGeo(prev => ({ ...prev, status: 'UNAVAILABLE' })),
        { enableHighAccuracy: true }
      );
      return () => navigator.geolocation.clearWatch(watchId);
    }, []);

    return geo;
  };

  const CommandCenter = () => {
    const weather = useWeather();
    const geo = useGeoStatus();

    let geoCardClass = "weather-card aero-fade-in";
    if (geo.status === "INSIDE GIGAHERTZ") geoCardClass += " geo-card-inside";
    else if (geo.status === "OFFICE") geoCardClass += " geo-card-office";
    else if (geo.status === "REMOTE") geoCardClass += " geo-card-remote";

    const getWeatherIcon = (state) => {
      switch(state) {
        case 'SUNNY': return '☀️';
        case 'RAIN': return '🌧️';

        case 'NIGHT': return '🌙';

    };

    return (

                {geo.distance !== null ? `${geo.distance < 1000 ? geo.distance + 'm' : (geo.distance / 1000).toFixed(1) + 'km'} from HQ` : 'Searching...'}
              </div>
            </div>

          {geo.status === 'OFFICE' && <div style={{position:'absolute', bottom: 0, left: 0, right: 0, height: 3, background:'var(--p)'}} />}
          {geo.status === 'REMOTE' && <div style={{position:'absolute', bottom: 0, left: 0, right: 0, height: 3, background:'var(--warn)'}} />}

              </div>

            <div className="weather-icon">

      else             window.ActivityTracker.timerResume(activeTimer.taskName);
    };

    const handleInterruption = (reason, customName = null) => {
      if (!activeTimer || !reason) return;
      const interruptionTask = customName || INTERRUPTION_TYPES[reason];
      const displayReason = customName ? `${reason}: ${customName}` : reason;
      setPreviousTask({...activeTimer, originalElapsed:elapsed});
      setActiveInterruption({reason: displayReason, taskName:interruptionTask, startTime:nowHHMM()});
      window.ActivityTracker.custom('INTERRUPTION_START', `Interruption started: ${displayReason} - switched to "${interruptionTask}"`);
      startTimer(interruptionTask);
      setCustomReasonInput('');
    };

    const resumePreviousTask = async () => {
      if (!previousTask || !activeInterruption) return;
      const interruptionDuration = elapsed; // duration in seconds during interruption
    
      // Create ISO timestamps for interruption
      const now = new Date();
      const pauseStart = new Date();
      pauseStart.setSeconds(pauseStart.getSeconds() - interruptionDuration);
    
      // Log interruption to Google Sheets with correct payload format
      await api.logInterruption({
        taskName: previousTask.taskName,
        reason: activeInterruption.reason,
        pauseStart: pauseStart.toISOString(),
        resumeTime: now.toISOString(),
        durationMs: interruptionDuration * 1000
      });
    
      setActiveInterruption(null);
      window.ActivityTracker.custom('INTERRUPTION_END', `Interruption ended: ${activeInterruption.reason} - Logged ${Math.round(interruptionDuration/60)}m`);
    
      // FIX: Include interruption duration in elapsed time (don't reset to original)
      // Total elapsed = time before interruption + interruption duration
      const totalElapsedAfterInterruption = previousTask.originalElapsed + interruptionDuration;
      setActiveTimer({...previousTask, isPaused:false});
      setElapsed(totalElapsedAfterInterruption);
    
      const interruptionMins = Math.round(interruptionDuration / 60);
      pushNotif(`✓ Interruption logged (${interruptionMins}m). Resumed: \"${previousTask.taskName}\" (Total: ${fmtHHMMSS(totalElapsedAfterInterruption)})`, 'success');
    };

    const uploadAttachedFile = async (file) => {
      if (!file) return null;
      try {
        return await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            const base64 = e.target.result.split(',')[1];
            const uploadPayload = {
              fileName: file.name,
              fileData: base64,
              fileMimeType: file.type
            };
            try {
              const res = await api.uploadFile(uploadPayload);
              resolve(res?.fileUrl || res?.fileName || null);
            } catch (err) {
              console.error('Upload error:', err);
              resolve(null);
            }
          };
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(file);
        });
      } catch (err) {
        console.error('File read error:', err);
        return null;
      }
    };

    const stopTimer = async () => {
      if (!activeTimer) return;
    
      // Calculate actual elapsed time in seconds
      const totalSec = elapsed;
      const mins = totalSec < 60 ? 1 : Math.round(totalSec / 60);

      // Use stored start time and calculate end time as NOW
      const startTimeISO = activeTimer.startTimeISO || new Date().toISOString();
      const endTimeISO = new Date().toISOString();

      // Create task object for local display
      const newTask = {
        id: 'temp_' + Date.now(),
        userId: user.id,
        empId: user.empId,
        taskName: activeTimer.taskName,
        date: todayStr(),
        startTime: activeTimer.startStr,
        endTime: nowHHMM(),

        source: 'timer',
        remarks: remarks

      setRemarks('');

      // Upload attached file if present

      if (attachedFile) {

      // IMPORTANT: Call endTask to save to ACTIVITY LOG sheet
      const endTaskPayload = {
        taskName: activeTimer.taskName,
        startTime: startTimeISO,
        endTime: endTimeISO,
        activeDurationMs: totalSec * 1000,
        remarks: remarks,
        fileData: null,
        fileName: fileUrl,  // Pass the file URL directly
        fileMimeType: null
      };
    
      try {
        await api.endTask(endTaskPayload);
        pushNotif(`✓ "${newTask.taskName}" saved successfully!`, 'success');
        setTaskCount(taskCount + 1);  // Increment daily task count for sync
      } catch (err) {
        pushNotif(`Error saving task: ${err.message}`, 'error');

      }
    
      // Additional API calls
      api.timerStop({timerId:activeTimer.timerId, userId:user.id, empId:user.empId, taskName:activeTimer.taskName, durationSeconds:totalSec, savedAsTask:true});
      api.addTask(newTask);
    
      window.ActivityTracker.timerStop(activeTimer.taskName, totalSec);

    };

    const H=Math.floor(elapsed/3600), M=Math.floor((elapsed%3600)/60), S=elapsed%60;

    return (
      <div className="page">

        <CommandCenter />

          <span style={{fontSize:18}}>💡</span>
          <span>"{quote}"</span>
        </div>

        <div style={{marginBottom:28}}>
          <div className="stat-grid">
            <div className="stat-card" style={{position:'relative',overflow:'hidden'}}>
              <div className="stat-icon" style={{background:'var(--pl)'}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--p)" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
              <div className="stat-lbl">Session Time</div>
              <div className="stat-clock">{fmtHHMMSS(secs)}</div>
              <div className="stat-live"><div className="live-dot"/><span style={{fontSize:11,color:'var(--tx2)',fontWeight:600}}>{loginTime?`Since ${new Date(loginTime).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`:''}</span></div>
            </div>
            <div className="stat-card" style={{position:'relative',overflow:'hidden'}}>
              <div className="stat-icon" style={{background:'var(--pl)'}}><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--ok)" strokeWidth="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 012-2h11"/></svg></div>
              <div className="stat-lbl">Tasks Logged</div>
              <div className="stat-val" style={{color:'var(--ok)'}}>{taskCount}</div>
              <div className="stat-sub">{taskCount===1?'entry':'entries'} today • {fmtMins(totalMins)} tracked</div>

              <div className="stat-lbl">Session Efficiency</div>
              <div className="stat-val" style={{color:'var(--p)'}}>{sessionEfficiency}%</div>

  const TasksPage = ({user, tasks, onTasksChanged, pushNotif, toggleMenu}) => {
    const [sq, setSq] = useState('');
    const [sd, setSd] = useState('');
    const [ed, setEd] = useState('');
    const [animKey, setAnimKey] = useState(0);

    useEffect(() => {
      setAnimKey(prev => prev + 1);
    }, [sq, sd, ed]);
  
    const filtered = tasks.filter(t => {
      let m = true;
      if (sq && !(t.taskName||'').toLowerCase().includes(sq.toLowerCase())) m = false;
      const d = cStr(t.date);
      if (sd && d < sd) m = false;
      if (ed && d > ed) m = false;
      return m;
    });
    const totalMins = filtered.reduce((s,t) => s + Number(t.durationMinutes||0), 0);

    const handleRemarkChange = async (id, val) => {
      const res = await api.updateTaskRemark({ taskId:id, remarks:val });
      if (res.success) {
        onTasksChanged();
        window.ActivityTracker.remarkUpdated(id);
      }
    };

    return (
      <div className="page">
        <div className="page-hdr">
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <button className="mobile-toggle" onClick={toggleMenu}>☰</button>

              <p className="page-sub">View your complete time entry history</p>

          </div>
        </div>
        <div className="tm-hdr" style={{gap:16, display:'flex', flexDirection:'column'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,flexWrap:'wrap', width:'100%'}}>
            <div style={{display:'flex',flex:1,minWidth:250,gap:10}}>

            </div>
            <div className="date-filter">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--tx3)" strokeWidth="2.5"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              <input type="date" value={sd} onChange={e=>setSd(e.target.value)} title="Start Date" />
              <span style={{color:'var(--tx3)',fontSize:12,fontWeight:600}}>to</span>
              <input type="date" value={ed} onChange={e=>setEd(e.target.value)} title="End Date" />
              {(sd || ed) && <button onClick={()=>{setSd('');setEd('');}} style={{background:'none',border:'none',cursor:'pointer',color:'var(--tx3)',fontSize:16,fontWeight:800}} title="Clear dates">×</button>}
            </div>
            <button className="btn btn-ghost btn-sm" onClick={() => exportCSV(['Employee ID','Task Name','Date','Start Time','End Time','Duration','Remarks','Attached File','Sent To'], filtered.map(t=>[t.empId,t.taskName,cStr(t.date),cStr(t.startTime),cStr(t.endTime),t.durationMinutes,cStr(t.remarks),cStr(t.fileUrl),cStr(t.sentTo)]), 'task_management_export.csv')}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
              Export CSV
            </button>
          </div>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:12}}>
            <span className="total-badge">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
              Total: {fmtMins(totalMins)}
            </span>
            {(sq || sd || ed) && <span style={{fontSize:12.5,color:'var(--tx2)',fontWeight:600}}>{filtered.length} tasks matching filters</span>}
          </div>
        </div>
        <div className="table-wrap">
          {filtered.length === 0
            ? <div className="empty-state"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><p>No tasks found for this selection.</p></div>
            : <table className="gh-table">
                <thead>
                  <tr>
                    <th>Employee ID</th>
                    <th>Task Name</th>
                    <th>Date</th>
                    <th>Start</th>
                    <th>End</th>
                    <th>Duration</th>
                    <th>Remarks</th>
                    <th>Attached File</th>
                    <th>Sent To</th>
                  </tr>
                </thead>
                <tbody>
                  {filtered.map(t => (
                    <tr key={t.id + '_' + animKey} style={{animation: 'fadeIn 0.3s ease backwards'}}>
                      <td>{t.empId}</td>
                      <td style={{fontWeight:700}}>
                        <div style={{display:'flex',alignItems:'center'}}>
                          <div className="task-cat-dot" style={{background:getCategoryColor(t.taskName)}}></div>
                          {t.taskName}
                        </div>
                      </td>
                      <td>{fmtDate12(cStr(t.date))}</td>
                      <td>{fmt12(cStr(t.startTime))}</td>
                      <td>{fmt12(cStr(t.endTime))}</td>
                      <td><span className="dur-badge">{fmtMins(Number(t.durationMinutes)||0)}</span></td>

                            onFocus={e=>e.target.style.borderBottom='1px dashed var(--p)'}
                            onBlurCapture={e=>e.target.style.borderBottom='1px dashed transparent'}
                          />

                        </div>
                      </td>
                      <td>

                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>

  const AnalyticsPage = ({user, tasks, dailyStats, toggleMenu}) => {
    const barRef=useRef(null), doughnutRef=useRef(null), histRef=useRef(null);
    const barC=useRef(null),   doughnutC=useRef(null), histC=useRef(null);

    const [startDate, setStartDate] = useState(() => {
      const d = new Date(); d.setDate(d.getDate()-6);
      return d.toISOString().split('T')[0];
    });
    const [endDate, setEndDate] = useState(() => todayStr());

    const filteredTasks = tasks.filter(t => cStr(t.date) >= startDate && cStr(t.date) <= endDate);

    const getFocusData = () => {
      let focus=0, admin=0, breakTime=0;
      filteredTasks.forEach(t => {
        const m = Number(t.durationMinutes||0);
        if (/code|dev|design|plan|research|test|build/i.test(t.taskName))  focus += m;
        else if (/break|lunch|idle|away|social/i.test(t.taskName)) breakTime += m;
        else admin += m;
      });
      return { focus, admin, breakTime };
    };
    const { focus, admin, breakTime } = getFocusData();

    // 7 Day History Data
    const historyData = React.useMemo(() => {
        const data = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date(); d.setDate(d.getDate() - i);
            const ds = d.toISOString().split('T')[0];
            const dayMins = tasks.filter(t => cStr(t.date) === ds).reduce((s, t) => s + Number(t.durationMinutes || 0), 0);
            data.push({ date: ds, mins: dayMins });
        }
        return data;
    }, [tasks]);

    useEffect(() => {
      // Top 3 longest tasks logic
      const taskTotals = {};
      filteredTasks.forEach(t => {
        const n = t.taskName || 'Other';
        taskTotals[n] = (taskTotals[n] || 0) + Number(t.durationMinutes || 0);
      });
      const topTasks = Object.keys(taskTotals)
        .map(n => ({ name: n, mins: taskTotals[n] }))
        .sort((a, b) => b.mins - a.mins)
        .slice(0, 3);

      const gridColor='rgba(136,144,170,.15)', tickColor='var(--tx2)';

      if (barRef.current) {
        if (barC.current) barC.current.destroy();
        barC.current = new Chart(barRef.current, {
          type:'bar',
          data:{
            labels: topTasks.map(t => t.name.length > 15 ? t.name.substring(0, 15) + '...' : t.name),
            datasets:[{
              data: topTasks.map(t => t.mins / 60),
              backgroundColor: 'var(--p)',
              borderRadius: 6
            }]
          },
          options:{
            responsive:true,
            maintainAspectRatio:false,
            plugins:{legend:{display:false}},
            scales:{
              y:{grid:{color:gridColor},ticks:{callback:v=>`${v}h`,color:tickColor}},
              x:{grid:{display:false},ticks:{color:tickColor, maxTicksLimit: 3}}
            }
          }
        });
      }
    
      if (doughnutRef.current) {
        if (doughnutC.current) doughnutC.current.destroy();
        doughnutC.current = new Chart(doughnutRef.current, {
          type:'doughnut',
          data:{ labels:['Deep Work','Admin/Meetings','Breaks'], datasets:[{data:[focus,admin,breakTime],backgroundColor:['var(--p)','#9333ea','#fbbf24'],borderWidth:2,borderColor:'var(--card)'}] },
          options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{color:tickColor,font:{family:'Plus Jakarta Sans',size:11,weight:'600'}}}}, cutout:'75%' }
        });
      }

      if (histRef.current) {
          if (histC.current) histC.current.destroy();
          histC.current = new Chart(histRef.current, {
              type: 'bar',
              data: {
                  labels: historyData.map(d => d.date.slice(5)),
                  datasets: [{
                      label: 'Minutes',
                      data: historyData.map(d => d.mins),
                      backgroundColor: 'var(--p)',
                      borderRadius: 4
                  }]
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: false,
                  plugins: { legend: { display: false } },
                  scales: {
                      y: { grid: { color: gridColor }, ticks: { color: tickColor, callback: v => v + 'm' } },
                      x: { grid: { display: false }, ticks: { color: tickColor } }
                  }
              }
          });
      }

      return () => { barC.current?.destroy(); doughnutC.current?.destroy(); histC.current?.destroy(); };
    }, [filteredTasks, focus, admin, breakTime, startDate, endDate, historyData]);

    const handleExport = () => {
      exportCSV(['Employee ID','Task Name','Date','Start Time','End Time','Duration','Remarks'], filteredTasks.map(t=>[t.empId,t.taskName,cStr(t.date),cStr(t.startTime),cStr(t.endTime),t.durationMinutes,cStr(t.remarks)]), 'productivity_export.csv');
      window.ActivityTracker.csvExported(filteredTasks.length);
    };

    return (
      <div className="page">
        <div className="page-hdr" style={{flexWrap: 'wrap', gap: '20px'}}>
          <div style={{display:'flex', alignItems:'center', gap:10}}>
            <button className="mobile-toggle" onClick={toggleMenu}>☰</button>
            <div>
              <h1 className="page-title">Comprehensive Productivity Dashboard</h1>
              <p className="page-sub">AI-driven actionable insights and engagement analysis</p>
            </div>
          </div>
          <div style={{display:'flex',gap:10, alignItems:'center', flexWrap:'wrap'}}>

  const IdleWatcher = ({user, onIdleOut}) => {
    const [idleSecs, setIdleSecs] = useState(0);
    const [showPopup, setShowPopup] = useState(false);
    const [popSecs, setPopSecs]     = useState(0);
    const lastAct = useRef(Date.now());

    const reset = useCallback(() => { lastAct.current = Date.now(); if (!showPopup) setIdleSecs(0); }, [showPopup]);
    useEffect(() => {
      const evts = ['mousemove','mousedown','keydown','touchstart','click','scroll'];
      evts.forEach(e => window.addEventListener(e, reset, {passive:true}));
      return () => evts.forEach(e => window.removeEventListener(e, reset));
    }, [reset]);

    useEffect(() => {
      const t = setInterval(() => {
        const s = Math.floor((Date.now() - lastAct.current) / 1000);
        setIdleSecs(s);
        if (s >= 1800 && !showPopup) { setShowPopup(true); setPopSecs(0); window.ActivityTracker.idleWarning(s); }
      }, 1000);
      return () => clearInterval(t);
    }, [showPopup]);

    useEffect(() => {
      if (!showPopup) return;
      const t = setInterval(() => setPopSecs(p => {
        const n = p + 1;
        if (n >= 120) { clearInterval(t); setShowPopup(false); onIdleOut && onIdleOut(idleSecs); }
        return n;
      }), 1000);
      return () => clearInterval(t);
    }, [showPopup]);

    const here = () => { setShowPopup(false); setIdleSecs(0); lastAct.current = Date.now(); window.ActivityTracker.idleDismissed(idleSecs); };
    const out  = () => { setShowPopup(false); setIdleSecs(0); lastAct.current = Date.now(); window.ActivityTracker.idleOut(idleSecs); onIdleOut && onIdleOut(idleSecs); };

    const grace = 120, pct = Math.min(100, (popSecs / grace) * 100);
    const mm = String(Math.floor(idleSecs/60)).padStart(2,'0'), ss = String(idleSecs%60).padStart(2,'0');

    if (!showPopup) return null;
    return (
      <div className="idle-overlay">
        <div className="idle-card">
          <div className="idle-icon">⏰</div>
          <div className="idle-title">Still there?</div>
          <div className="idle-msg">No activity for <strong>{Math.round(idleSecs/60)} minutes</strong>.<br/>Your session clock is still running.</div>
          <div className="idle-time">{mm}:{ss}</div>
          <div className="idle-btns">
            <button className="idle-here" onClick={here}>👋 I'm here</button>
            <button className="idle-out"  onClick={out}>🚶 I stepped away</button>
          </div>
          <div className="idle-prog-wrap"><div className="idle-prog-fill" style={{width:`${pct}%`,background:pct>70?'var(--danger)':'var(--warn)'}}/></div>
          <p style={{fontSize:10.5,color:'var(--tx3)',marginTop:9,fontWeight:600}}>Auto-dismissing in {grace-popSecs}s</p>
        </div>
      </div>
    );
  };

      // Redirect based on role
      const isAdmin = u.role?.toUpperCase() === 'ADMIN' || u.role?.toUpperCase() === 'SUPER ADMIN';
      if (isAdmin && typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(url) {
            if (url) {
              window.top.location.href = url + '?page=admin';
            } else {
              setPage('admin');
            }
          })
          .withFailureHandler(function(err) {
            console.error('Redirect failed:', err);
            setPage('admin');
          })
          .getScriptUrl();
        return;
      }

      const destPage = isAdmin ? 'admin' : 'dashboard';
      window.ActivityTracker.setPage(destPage);
      loadTasks(u);
      setPage(destPage);
      pushNotif(`Welcome back, ${u.firstName}! 👋`, 'success');
    };

    const handleUpdateUser = (updatedUser) => {
      setUser(updatedUser);
      window.safeStorage.setItem('gh_user', JSON.stringify(updatedUser));
      window.ActivityTracker.setUser(updatedUser);
    };

    const doLogout = async () => {
      window.ActivityTracker.logout();
      window.ActivityTracker.flush();
      setUser(null); setLoginTime(null); setTasks([]); setActiveTimer(null); setElapsed(0);
      window.safeStorage.removeItem('gh_user'); window.safeStorage.removeItem('gh_login_time');
      window.ActivityTracker.clearUser();
      setPage('login');
    };

    const handleIdleOut = (idleSecs) => {
      if (activeTimer && !activeTimer.isPaused) {
        setActiveTimer(p => ({...p, isPaused:true}));
        pushNotif(`⏸ Timer paused automatically — ${Math.round(idleSecs/60)} min idle`, 'error');
      }
    };

    const pages = ['dashboard','tasks','analytics','profile', 'admin'];

    return (
      <>
        {notif && <Notif msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}
        {showLanding && !user && <LandingPage onGetStarted={()=>setShowLanding(false)} theme={theme} setTheme={setTheme}/>}
        {!showLanding && !user && page==='login'     && <LoginPage     onLogin={doLogin} theme={theme} setTheme={setTheme}/>}
      
        {pages.includes(page) && user && (
          <div className="layout">
            <Sidebar page={page} setPage={setPage} user={user} onLogout={doLogout} notifHistory={notifHistory} isOpen={sidebarOpen} setIsOpen={setSidebarOpen} theme={theme} setTheme={setTheme}/>
            <main className="main">
              {page==='dashboard' && <DashboardPage user={user} tasks={tasks} onTasksChanged={handleTasksChanged} activeTimer={activeTimer} setActiveTimer={setActiveTimer} elapsed={elapsed} setElapsed={setElapsed} loginTime={loginTime} pushNotif={pushNotif} toggleMenu={toggleMenu} dailyStats={dailyStats} setDailyStats={setDailyStats}/>}
              {page==='tasks'     && <TasksPage     user={user} tasks={tasks} onTasksChanged={handleTasksChanged} pushNotif={pushNotif} toggleMenu={toggleMenu}/>}
              {page==='analytics' && <AnalyticsPage user={user} tasks={tasks} dailyStats={dailyStats} toggleMenu={toggleMenu}/>}
              {page==='profile'   && <ProfilePage   user={user} tasks={tasks} onUpdateUser={handleUpdateUser} pushNotif={pushNotif} toggleMenu={toggleMenu} dailyStats={dailyStats}/>}
              {page==='admin'     && <AdminPage     user={user} toggleMenu={toggleMenu}/>}
            </main>
            <IdleWatcher user={user} onIdleOut={handleIdleOut}/>
          </div>
        )}
        {user && page !== 'login' && (
          <div className="mobile-nav">
            {[
              { id: 'dashboard', label: 'Home', icon: '🏠' },
              { id: 'tasks', label: 'Tasks', icon: '📝' },
              { id: 'analytics', label: 'Stats', icon: '📊' },
              { id: 'profile', label: 'Me', icon: '👤' },
              ...(user?.role?.toUpperCase() === 'ADMIN' || user?.role?.toUpperCase() === 'SUPER ADMIN' ? [{ id: 'admin', label: 'Admin', icon: '⚙️' }] : [])
            ].map(item => (
              <button 
                key={item.id} 
                className={`mob-nav-item ${page === item.id ? 'active' : ''}`}
                onClick={() => setPage(item.id)}
              >
                <div className="mob-icon">{item.icon}</div>
                <div>{item.label}</div>
              </button>
            ))}
          </div>
        )}
      </>
    );
  };

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  </body>
  </html>
