<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
    <title>Gigahertz Nexus v4.2 — Employee Hub</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRbPTtZwom3B0ZLIJZNusjlFz3ougRMWPHITQ&s">

    <!-- UI Core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ============================================================
           THEME SYSTEM — 10 ADVANCED THEMES
        ============================================================ */
        :root {
            --p:#1a73e8; --pd:#1557b0; --pl:#e8f0fe;
            --bg:#f8faff; --wh:#ffffff; --card:#ffffff;
            --tx:#1e293b; --tx2:#475569; --tx3:#94a3b8;
            --bd:#e2e8f0; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
            --g1:#f0f4ff; --g2:#dbeafe; --g3:#ede9fe;
            --glass-bg:rgba(255,255,255,0.85); --glass-border:rgba(255,255,255,0.9);
            --shadow:rgba(26,115,232,0.12);
        }
        [data-theme="dark"] {
            --p:#3b82f6; --pd:#2563eb; --pl:#1e3a8a;
            --bg:#0b1120; --wh:#111827; --card:#1e293b;
            --tx:#f8fafc; --tx2:#cbd5e1; --tx3:#64748b;
            --bd:#334155; --danger:#f87171; --ok:#4ade80; --warn:#fbbf24;
            --g1:#0b1120; --g2:#0f1f3d; --g3:#1a0b2e;
            --glass-bg:rgba(30,41,59,0.75); --glass-border:rgba(255,255,255,0.07);
            --shadow:rgba(59,130,246,0.2);
        }
        [data-theme="lavender"] { --p:#7c3aed; --pd:#6d28d9; --pl:#ede9fe; --bg:#f5f3ff; --wh:#ffffff; --tx:#1e1b4b; --glass-bg:rgba(255,255,255,0.85); --shadow:rgba(124,58,237,0.15); --g1:#f5f3ff; --g2:#ede9fe; --g3:#fce7f3; }
        [data-theme="forest"] { --p:#16a34a; --pd:#15803d; --pl:#dcfce7; --bg:#0a1f0f; --wh:#0f2d18; --tx:#dcfce7; --glass-bg:rgba(10,31,15,0.8); --shadow:rgba(22,163,74,0.2); --g1:#0a1f0f; --g2:#0f2d18; --g3:#1a3a22; }
        [data-theme="sunset"] { --p:#f97316; --pd:#ea580c; --pl:#fff7ed; --bg:#1a0a00; --wh:#2d1200; --tx:#fed7aa; --glass-bg:rgba(45,18,0,0.8); --shadow:rgba(249,115,22,0.25); --g1:#1a0a00; --g2:#2d1200; --g3:#3d1a00; }
        [data-theme="ocean"] { --p:#0ea5e9; --pd:#0284c7; --pl:#e0f2fe; --bg:#020d1a; --wh:#051929; --tx:#e0f2fe; --glass-bg:rgba(2,13,26,0.82); --shadow:rgba(14,165,233,0.25); --g1:#020d1a; --g2:#051929; --g3:#0a2540; }
        [data-theme="crimson"] { --p:#ef4444; --pd:#dc2626; --pl:#450a0a; --bg:#1a0505; --wh:#2d0a0a; --tx:#fecaca; --glass-bg:rgba(69,10,10,0.75); --shadow:rgba(239,68,68,0.25); --g1:#1a0505; --g2:#2d0a0a; --g3:#3f0f0f; }
        [data-theme="cyberpunk"] { --p:#f0abfc; --pd:#d946ef; --pl:#4a044e; --bg:#020617; --wh:#0f172a; --tx:#f5d0fe; --glass-bg:rgba(15,23,42,0.9); --shadow:rgba(217,70,239,0.3); --g1:#020617; --g2:#1e1b4b; --g3:#4c0519; }
        [data-theme="midnight"] { --p:#6366f1; --pd:#4338ca; --pl:#1e1b4b; --bg:#030712; --wh:#111827; --tx:#f9fafb; --glass-bg:rgba(17,24,39,0.9); --shadow:rgba(99,102,241,0.2); --g1:#030712; --g2:#111827; --g3:#1f2937; }
        [data-theme="gold"] { --p:#eab308; --pd:#ca8a04; --pl:#422006; --bg:#1c1917; --wh:#292524; --tx:#fef08a; --glass-bg:rgba(41,37,36,0.85); --shadow:rgba(234,179,8,0.2); --g1:#1c1917; --g2:#292524; --g3:#44403c; }

        /* GLOBALS */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 10% 20%, var(--g2) 0%, transparent 40%), 
                        radial-gradient(circle at 90% 80%, var(--g3) 0%, transparent 40%), var(--g1);
            background-attachment: fixed; color: var(--tx);
            min-height: 100vh; transition: background 0.5s, color 0.4s; overflow-x: hidden;
        }

        /* GLASSMORPHISM */
        .glass { background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--glass-border); box-shadow: 0 10px 40px var(--shadow); }
        .glass-dark { background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }

        /* FLOATING GIGAHERTZ WIDGET */
        .floating-gh-widget {
            position: fixed; bottom: 90px; right: 24px;
            width: 70px; height: 70px; z-index: 2000;
            border-radius: 20px; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fff; padding: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .floating-gh-widget:hover {
            transform: translateY(-15px) scale(1.1);
            box-shadow: 0 0 30px var(--p);
            filter: brightness(1.1);
        }
        .floating-gh-widget img { width: 100%; height: 100%; object-fit: contain; }
        @media (max-width: 1024px) { .floating-gh-widget { bottom: 100px; right: 16px; width: 60px; height: 60px; } }

        /* LAYOUT */
        .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; z-index: 100; transition: 0.3s; border-right: 1.5px solid var(--bd); }
        .main-content { margin-left: 280px; padding: 32px; transition: margin 0.3s; }
        @media (max-width: 1024px) { .sidebar { display: none; } .main-content { margin-left: 0; padding: 16px; padding-bottom: 110px; } }

        /* MOBILE NAV */
        .mobile-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; z-index: 1000; display: none; justify-content: space-around; align-items: center; padding-bottom: env(safe-area-inset-bottom); border-top: 1px solid var(--bd); background: var(--glass-bg); backdrop-filter: blur(25px); }
        @media (max-width: 1024px) { .mobile-nav { display: flex; } }

        .nav-icon-link {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            color: var(--tx3); font-size: 10px; font-weight: 800; text-transform: uppercase;
        }
        .nav-icon-link.active { color: var(--p); }

        /* BUTTONS */
        .btn-nexus { padding: 12px 24px; border-radius: 14px; font-weight: 800; font-size: 13px; display: inline-flex; align-items: center; gap: 10px; transition: 0.2s; cursor: pointer; border: none; }
        .btn-p { background: linear-gradient(135deg, var(--p), var(--pd)); color: #fff; box-shadow: 0 4px 15px var(--shadow); }
        .btn-p:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* INPUTS */
        .input-nexus { width: 100%; padding: 14px 18px; border-radius: 14px; background: rgba(0,0,0,0.04); border: 1.5px solid var(--bd); color: var(--tx); outline: none; font-weight: 600; }
        .input-nexus:focus { border-color: var(--p); box-shadow: 0 0 0 4px var(--pl); }

        /* ANIMATIONS */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        .anim-float { animation: float 4s ease-in-out infinite; }
        .fade-in { animation: fadeIn 0.4s ease-out both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* SPLASH */
        .splash { position: fixed; inset: 0; z-index: 9999; background: #0b1120; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .splash.hidden { display: none; }

        /* PRIORITY DOTS */
        .priority-dot { width: 8px; height: 8px; border-radius: 50%; }
        .prio-high { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .prio-med { background: #f59e0b; }
        .prio-low { background: #22c55e; }

        /* BADGES */
        .nexus-badge { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo, useCallback } = React;

        // --- MOCK DATA ---
        const PROJECT_CODES = ["GZ-2026-A1", "OPS-INTERNAL", "MARKET-EXP", "RMA-RECON", "CORE-UPGRADE"];
        const INITIAL_PRESENCE = [
            { name: "Rich J.", status: "active", id: 1 },
            { name: "Kyla C.", status: "active", id: 2 },
            { name: "Richie P.", status: "idle", id: 3 },
            { name: "Miyamura I.", status: "away", id: 4 },
        ];

        // --- SUB-COMPONENTS ---

        const FloatingLogoWidget = () => (
            <a href="https://www.gigahertz.com.ph/" target="_blank" className="floating-gh-widget shadow-p">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRurHiRjhAqL8xPFzjXHWgjpxNtpGagJSOG7A&s" alt="Gigahertz Portal" />
            </a>
        );

        const StatusIndicator = ({ status }) => {
            const colors = { active: 'bg-green-500', idle: 'bg-amber-500', away: 'bg-slate-500' };
            return <div className={`w-3 h-3 rounded-full ${colors[status] || 'bg-slate-500'} border-2 border-white`}></div>;
        };

        const AchievementCard = ({ title, icon, color }) => (
            <div className="glass p-4 rounded-2xl flex items-center gap-3">
                <div className={`w-10 h-10 rounded-xl flex items-center justify-center text-white ${color}`}>
                    <i className={`fa-solid ${icon}`}></i>
                </div>
                <div>
                    <p className="text-[10px] font-black opacity-40 uppercase">Unlocked</p>
                    <p className="text-xs font-bold">{title}</p>
                </div>
            </div>
        );

        // --- AUTH PORTAL ---
        const AuthPortal = ({ onLogin, theme, setTheme }) => {
            const [isRegister, setIsRegister] = useState(false);
            const [step, setStep] = useState(1);
            const [form, setForm] = useState({ empId: '', name: '', dept: 'IT / NEXUS', password: '' });
            const [photo, setPhoto] = useState(null);
            const videoRef = useRef(null);

            const startCamera = async () => {
                const s = await navigator.mediaDevices.getUserMedia({ video: true });
                if (videoRef.current) videoRef.current.srcObject = s;
            };

            const capture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 640; canvas.height = 480;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                setPhoto(canvas.toDataURL('image/jpeg'));
                videoRef.current.srcObject.getTracks().forEach(t => t.stop());
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900">
                    <div className="glass p-10 rounded-[40px] w-full max-w-md fade-in">
                        <div className="text-center mb-10">
                            <div className="w-20 h-20 bg-white p-4 rounded-3xl mx-auto mb-6 shadow-xl anim-float">
                                <img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" className="w-full h-full object-contain" />
                            </div>
                            <h1 className="text-3xl font-black tracking-tight">Nexus Entry</h1>
                            <p className="text-[10px] font-bold uppercase tracking-[0.2em] opacity-40 mt-2">v4.2.0 Internal Secure Hub</p>
                        </div>

                        {step === 1 ? (
                            <div className="space-y-4">
                                <input className="input-nexus" placeholder="Employee ID" value={form.empId} onChange={e => setForm({...form, empId: e.target.value})}/>
                                {isRegister && <input className="input-nexus" placeholder="Full Name" value={form.name} onChange={e => setForm({...form, name: e.target.value})}/>}
                                <input className="input-nexus" type="password" placeholder="Password" value={form.password} onChange={e => setForm({...form, password: e.target.value})}/>
                                <button className="btn-nexus btn-p w-full justify-center" onClick={() => isRegister ? setStep(2) : onLogin({...form, photo})}>
                                    {isRegister ? 'Next: Identity Verification' : 'Authenticate'}
                                </button>
                                <p className="text-center text-xs font-bold opacity-50 cursor-pointer pt-4" onClick={() => setIsRegister(!isRegister)}>
                                    {isRegister ? 'Already verified? Sign In' : 'New Employee? Register Identity'}
                                </p>
                            </div>
                        ) : (
                            <div className="text-center space-y-6">
                                <h3 className="font-black text-xl">Identity Scan</h3>
                                <div className="cam-box w-full aspect-square bg-black rounded-3xl overflow-hidden border-2 border-blue-500">
                                    {!photo ? <video ref={videoRef} className="w-full h-full object-cover" autoPlay playsInline muted /> : <img src={photo} className="w-full h-full object-cover"/>}
                                </div>
                                {!photo ? (
                                    <div className="flex flex-col gap-3">
                                        <button className="btn-nexus btn-p justify-center" onClick={startCamera}>Open Camera</button>
                                        {videoRef.current?.srcObject && <button className="btn-nexus bg-white text-black justify-center" onClick={capture}>Capture Face</button>}
                                    </div>
                                ) : (
                                    <div className="flex gap-2">
                                        <button className="btn-nexus btn-p flex-1 justify-center" onClick={() => onLogin({...form, photo})}>Complete Setup</button>
                                        <button className="btn-nexus bg-slate-500 text-white" onClick={() => { setPhoto(null); startCamera(); }}>Retake</button>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // --- MAIN APP ENGINE ---
        const NexusApp = ({ user, onLogout, theme, setTheme }) => {
            const [tab, setTab] = useState('home');
            const [loading, setLoading] = useState(true);
            const [tasks, setTasks] = useState([]);
            const [queue, setQueue] = useState([]);
            const [presence] = useState(INITIAL_PRESENCE);
            const [timer, setTimer] = useState({ active: false, seconds: 0, task: '', priority: 'med', project: PROJECT_CODES[0], paused: false });
            const [toast, setToast] = useState(null);
            const [idlePopup, setIdlePopup] = useState(false);
            const [lastMove, setLastMove] = useState(Date.now());

            useEffect(() => {
                setTimeout(() => setLoading(false), 2000);
                const handleActivity = () => setLastMove(Date.now());
                window.addEventListener('mousemove', handleActivity);
                const idleCheck = setInterval(() => {
                    if (Date.now() - lastMove > 300000 && timer.active && !timer.paused) { 
                        setTimer(prev => ({ ...prev, paused: true }));
                        setIdlePopup(true);
                    }
                }, 30000);
                return () => { window.removeEventListener('mousemove', handleActivity); clearInterval(idleCheck); };
            }, [lastMove, timer.active]);

            useEffect(() => {
                let int;
                if (timer.active && !timer.paused) {
                    int = setInterval(() => setTimer(p => ({ ...p, seconds: p.seconds + 1 })), 1000);
                }
                return () => clearInterval(int);
            }, [timer.active, timer.paused]);

            const triggerToast = (msg, type = 'success') => setToast({ msg, type });

            const startTracking = (name, prio = 'med', proj = PROJECT_CODES[0]) => {
                setTimer({ active: true, seconds: 0, task: name, priority: prio, project: proj, paused: false });
                triggerToast(`Tracking Shift: ${name}`);
            };

            const completeShift = () => {
                const finished = { 
                    id: Date.now(), 
                    name: timer.task, 
                    duration: Math.ceil(timer.seconds / 60), 
                    prio: timer.priority,
                    proj: timer.project,
                    date: new Date().toLocaleDateString()
                };
                setTasks([finished, ...tasks]);
                setTimer({ active: false, seconds: 0, task: '', paused: false });
                triggerToast("Shift logs synchronized.");
            };

            const generateReport = () => {
                const today = tasks.filter(t => t.date === new Date().toLocaleDateString());
                const totalMins = today.reduce((s, t) => s + t.duration, 0);
                alert(`Daily Shift Report:\n\nTasks Completed: ${today.length}\nTotal Time: ${Math.floor(totalMins/60)}h ${totalMins%60}m\nEfficiency Score: ${weeklyPulse.pct}%\n\nLogs ready for HR submission.`);
            };

            const weeklyPulse = useMemo(() => {
                const totalMins = tasks.reduce((acc, t) => acc + t.duration, 0);
                return { mins: totalMins, pct: Math.min(100, Math.round((totalMins / 2400) * 100)), ot: Math.max(0, (totalMins - 2400) / 60) };
            }, [tasks]);

            return (
                <div className="min-h-screen">
                    {loading && (
                        <div className="splash">
                            <div className="anim-float bg-white p-8 rounded-[40px] shadow-2xl">
                                <img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" className="w-24" />
                            </div>
                            <h2 className="text-white font-black mt-8 text-xl tracking-[0.3em]">NEXUS CORE</h2>
                        </div>
                    )}
                    {toast && <Toast {...toast} onDone={() => setToast(null)} />}
                    <FloatingLogoWidget />

                    {/* Desktop Sidebar */}
                    <aside className="sidebar glass p-8 flex flex-col justify-between">
                        <div>
                            <div className="flex items-center gap-4 mb-12">
                                <div className="bg-white p-2 rounded-xl w-10 h-10 shadow-lg">
                                    <img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" className="w-full h-full object-contain" />
                                </div>
                                <span className="font-black text-xl tracking-tighter">Nexus 4.2</span>
                            </div>
                            <nav className="space-y-3">
                                <div onClick={() => setTab('home')} className={`btn-nexus w-full ${tab === 'home' ? 'btn-p' : 'opacity-40 hover:opacity-100'}`}><i className="fa-solid fa-house"></i> Terminal</div>
                                <div onClick={() => setTab('tasks')} className={`btn-nexus w-full ${tab === 'tasks' ? 'btn-p' : 'opacity-40 hover:opacity-100'}`}><i className="fa-solid fa-layer-group"></i> My Ledger</div>
                                <div onClick={() => setTab('settings')} className={`btn-nexus w-full ${tab === 'settings' ? 'btn-p' : 'opacity-40 hover:opacity-100'}`}><i className="fa-solid fa-sliders"></i> Config</div>
                            </nav>

                            {/* Presence Widget */}
                            <div className="mt-12">
                                <p className="text-[10px] font-black uppercase tracking-widest opacity-40 mb-4">Department Presence</p>
                                <div className="space-y-4">
                                    {presence.map(p => (
                                        <div key={p.id} className="flex items-center justify-between">
                                            <span className="text-xs font-bold opacity-80">{p.name}</span>
                                            <StatusIndicator status={p.status} />
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                        <div className="space-y-4">
                            <AchievementCard title="Nexus Certified" icon="fa-award" color="bg-amber-500" />
                            <button className="btn-nexus bg-red-500/10 text-red-500 w-full justify-center" onClick={onLogout}><i className="fa-solid fa-power-off"></i> Disconnect</button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="main-content">
                        <header className="flex justify-between items-end mb-12 fade-in">
                            <div>
                                <h2 className="text-4xl font-black tracking-tight">{tab === 'home' ? 'Operations Terminal' : tab === 'settings' ? 'System Config' : 'History Ledger'}</h2>
                                <div className="flex items-center gap-3 mt-2">
                                    <nexus-badge className="bg-blue-500/10 text-blue-500 nexus-badge">Verified ID: {user.empId}</nexus-badge>
                                    <nexus-badge className="bg-green-500/10 text-green-500 nexus-badge">{user.dept}</nexus-badge>
                                </div>
                            </div>
                            <div className="text-right hidden lg:block">
                                <div className="glass px-6 py-3 rounded-2xl inline-block border-white/10 shadow-lg">
                                    <p className="text-xl font-black font-mono tracking-tighter" style={{color: 'var(--p)'}}>{new Date().toLocaleTimeString()}</p>
                                    <p className="text-[9px] font-black uppercase opacity-40 tracking-widest">{new Date().toLocaleDateString(undefined, {weekday:'long', month:'short', day:'numeric'})}</p>
                                </div>
                            </div>
                        </header>

                        {tab === 'home' && (
                            <div className="space-y-8 fade-in">
                                {/* Top Stats Widgets */}
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                    <div className="glass p-8 rounded-[40px] lg:col-span-2 relative overflow-hidden">
                                        <p className="text-[10px] font-black uppercase tracking-[0.3em] text-blue-500 mb-4">Productivity Pulse</p>
                                        <div className="flex justify-between items-end mb-4">
                                            <h3 className="text-4xl font-black">{weeklyPulse.pct}% Weekly Goal</h3>
                                            {weeklyPulse.ot > 0 && <span className="text-xs font-black text-amber-500 tracking-tighter">+ {weeklyPulse.ot.toFixed(1)}h Overtime</span>}
                                        </div>
                                        <div className="w-full bg-slate-200 dark:bg-white/5 h-3 rounded-full overflow-hidden">
                                            <div className="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-1000" style={{ width: `${weeklyPulse.pct}%` }}></div>
                                        </div>
                                        <p className="mt-4 text-xs font-bold opacity-60">You've tracked {Math.floor(weeklyPulse.mins/60)}h {weeklyPulse.mins%60}m of your 40h quota.</p>
                                        <i className="fa-solid fa-chart-line absolute top-6 right-8 text-6xl opacity-5"></i>
                                    </div>
                                    <div className="glass p-8 rounded-[40px] flex flex-col justify-center items-center text-center">
                                        <p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-40 mb-6">Pomodoro Cycles</p>
                                        <div className="w-20 h-20 bg-amber-500/10 rounded-full flex items-center justify-center text-amber-500 text-3xl font-black mb-4">4</div>
                                        <p className="text-sm font-bold leading-tight">Great focus today!<br/><span className="text-xs opacity-50 font-medium">Keep the momentum.</span></p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                    {/* Timer Engine */}
                                    <div className="glass p-10 rounded-[48px] text-center relative overflow-hidden">
                                        {timer.active ? (
                                            <div className="space-y-8">
                                                <div className="relative inline-block">
                                                    <svg width="220" height="220" className="timer-svg">
                                                        <circle cx="110" cy="110" r="100" fill="none" stroke="rgba(0,0,0,0.05)" strokeWidth="12" />
                                                        <circle cx="110" cy="110" r="100" fill="none" stroke="var(--p)" strokeWidth="12" 
                                                                strokeDasharray="628.3" strokeDashoffset={628.3 - (628.3 * (timer.seconds % 60)) / 60} 
                                                                className="timer-circle" strokeLinecap="round" />
                                                    </svg>
                                                    <div className="absolute inset-0 flex flex-col items-center justify-center">
                                                        <span className="text-4xl font-black font-mono tracking-tighter">
                                                            {Math.floor(timer.seconds / 3600).toString().padStart(2,'0')}:
                                                            {Math.floor((timer.seconds % 3600) / 60).toString().padStart(2,'0')}:
                                                            {(timer.seconds % 60).toString().padStart(2,'0')}
                                                        </span>
                                                        <p className="text-[10px] font-black uppercase opacity-40 mt-1">Live Telemetry</p>
                                                    </div>
                                                </div>
                                                <div>
                                                    <h3 className="text-2xl font-black">{timer.task}</h3>
                                                    <div className="flex justify-center gap-2 mt-3">
                                                        <nexus-badge className="bg-slate-500/10 text-slate-500 nexus-badge">{timer.project}</nexus-badge>
                                                        <nexus-badge className={`${timer.priority === 'high' ? 'bg-red-500/10 text-red-500' : 'bg-green-500/10 text-green-500'} nexus-badge`}>{timer.priority} prio</nexus-badge>
                                                    </div>
                                                </div>
                                                <div className="flex gap-4">
                                                    <button onClick={() => setTimer({...timer, paused: !timer.paused})} className="btn-nexus bg-amber-500/10 text-amber-500 flex-1 justify-center"><i className={`fa-solid ${timer.paused ? 'fa-play' : 'fa-pause'}`}></i> {timer.paused ? 'Resume' : 'Break'}</button>
                                                    <button onClick={completeShift} className="btn-nexus btn-p flex-1 justify-center"><i className="fa-solid fa-check"></i> End Shift</button>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="py-12 space-y-10">
                                                <div className="w-24 h-24 bg-blue-500/10 rounded-[32px] flex items-center justify-center mx-auto text-4xl text-blue-500 anim-float">
                                                    <i className="fa-solid fa-clock-rotate-left"></i>
                                                </div>
                                                <div className="max-w-xs mx-auto">
                                                    <h2 className="text-3xl font-black">Ready to Work?</h2>
                                                    <p className="opacity-60 font-bold text-sm mt-2 leading-relaxed">Stage a task in your queue or launch a live session now.</p>
                                                </div>
                                                <div className="space-y-3 max-w-sm mx-auto">
                                                    <input id="qT" className="input-nexus" placeholder="What's the goal for this shift?" />
                                                    <div className="flex gap-2">
                                                        <select id="qP" className="input-nexus flex-1 py-3 text-xs uppercase font-black">
                                                            {PROJECT_CODES.map(c => <option key={c} value={c}>{c}</option>)}
                                                        </select>
                                                        <button onClick={() => startTracking(document.getElementById('qT').value, 'med', document.getElementById('qP').value)} className="btn-nexus btn-p">Launch</button>
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                    </div>

                                    {/* Task Queue & Presence */}
                                    <div className="flex flex-col gap-6">
                                        <div className="glass p-8 rounded-[40px] flex-1">
                                            <div className="flex justify-between items-center mb-8">
                                                <h3 className="font-black text-lg">Smart Queue</h3>
                                                <button onClick={() => generateReport()} className="text-[10px] font-black uppercase text-blue-500 bg-blue-500/10 px-4 py-2 rounded-xl hover:bg-blue-500/20">Generate Summary Report</button>
                                            </div>
                                            <div className="space-y-4">
                                                {queue.length === 0 ? (
                                                    <div className="py-12 text-center opacity-20 flex flex-col items-center">
                                                        <i className="fa-solid fa-list-check text-4xl mb-4"></i>
                                                        <p className="font-bold italic text-sm">Queue is empty. Stage tasks to track later.</p>
                                                    </div>
                                                ) : queue.map(q => (
                                                    <div key={q.id} className="flex justify-between items-center p-4 rounded-2xl bg-white/5 border border-transparent hover:border-blue-500/20 transition-all">
                                                        <span className="font-bold">{q.name}</span>
                                                        <button onClick={() => { startTracking(q.name); setQueue(queue.filter(x => x.id !== q.id)); }} className="w-10 h-10 rounded-xl bg-blue-500/10 text-blue-500"><i className="fa-solid fa-play"></i></button>
                                                    </div>
                                                ))}
                                            </div>
                                            <button onClick={() => { const n = prompt("Task Name?"); if(n) setQueue([...queue, { id: Date.now(), name: n }]); }} className="w-full mt-6 py-4 border-2 border-dashed border-slate-500/20 rounded-2xl text-xs font-black uppercase tracking-widest opacity-40 hover:opacity-100 hover:border-blue-500/50 transition-all">+ Add Staged Task</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'tasks' && (
                            <div className="glass rounded-[48px] overflow-hidden fade-in">
                                <div className="p-8 border-b border-white/5 flex justify-between items-center">
                                    <h3 className="font-black text-xl">Shift Audit Ledger</h3>
                                    <button onClick={() => alert("CSV Exporting...")} className="btn-nexus bg-white/5 text-[10px] uppercase font-black tracking-widest px-4 py-2">Download Data Pack</button>
                                </div>
                                <div className="p-4 overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="text-[10px] font-black uppercase tracking-widest opacity-40">
                                                <th className="px-6 py-4">Task Shift</th>
                                                <th className="px-6 py-4">Project</th>
                                                <th className="px-6 py-4 text-center">Priority</th>
                                                <th className="px-6 py-4">Duration</th>
                                                <th className="px-6 py-4">Verified Date</th>
                                            </tr>
                                        </thead>
                                        <tbody className="text-sm font-bold">
                                            {tasks.map(t => (
                                                <tr key={t.id} className="border-t border-white/5 hover:bg-white/5 transition-all">
                                                    <td className="px-6 py-6">{t.name}</td>
                                                    <td className="px-6 py-6 opacity-60 font-mono text-xs">{t.proj}</td>
                                                    <td className="px-6 py-6 text-center">
                                                        <div className={`mx-auto priority-dot prio-${t.prio}`}></div>
                                                    </td>
                                                    <td className="px-6 py-6 text-blue-500">{t.duration}m</td>
                                                    <td className="px-6 py-6 opacity-40">{t.date}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                    {tasks.length === 0 && <p className="text-center py-20 opacity-20 font-black uppercase">No shifts logged in the current ledger</p>}
                                </div>
                            </div>
                        )}

                        {tab === 'settings' && (
                            <div className="max-w-2xl mx-auto space-y-10 fade-in">
                                <div className="glass p-10 rounded-[40px]">
                                    <h2 className="text-2xl font-black mb-8">Nexus Themes (10)</h2>
                                    <div className="theme-grid">
                                        {[
                                            {id:'dark',col:'#0b1120',n:'Midnight'},
                                            {id:'light',col:'#1a73e8',n:'Day'},
                                            {id:'lavender',col:'#7c3aed',n:'Nebula'},
                                            {id:'forest',col:'#16a34a',n:'Matrix'},
                                            {id:'sunset',col:'#f97316',n:'Aura'},
                                            {id:'ocean',col:'#0ea5e9',n:'DeepSea'},
                                            {id:'crimson',col:'#ef4444',n:'Fury'},
                                            {id:'cyberpunk',col:'#d946ef',n:'NeoTok'},
                                            {id:'midnight',col:'#6366f1',n:'Iris'},
                                            {id:'gold',col:'#eab308',n:'Crown'}
                                        ].map(t => (
                                            <div key={t.id} onClick={() => setTheme(t.id)} className={`theme-dot ${theme === t.id ? 'active' : ''}`} style={{ background: t.col }} title={t.n}>
                                                {theme === t.id && <i className="fa-solid fa-check text-white text-xs"></i>}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div className="glass p-10 rounded-[40px] space-y-6">
                                    <h2 className="text-2xl font-black">System Preferences</h2>
                                    <div className="flex justify-between items-center p-5 bg-white/5 rounded-3xl">
                                        <span className="font-bold">Automated Daily Report</span>
                                        <div className="w-12 h-6 bg-blue-500 rounded-full flex items-center px-1"><div className="w-4 h-4 bg-white rounded-full ml-auto"></div></div>
                                    </div>
                                    <div className="flex justify-between items-center p-5 bg-white/5 rounded-3xl opacity-50">
                                        <span className="font-bold">Hardware Acceleration</span>
                                        <div className="w-12 h-6 bg-slate-700 rounded-full flex items-center px-1"><div className="w-4 h-4 bg-white rounded-full"></div></div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Mobile Bottom Navigation */}
                    <nav className="mobile-nav">
                        <div onClick={() => setTab('home')} className={`nav-icon-link ${tab === 'home' ? 'active' : ''}`}>
                            <i className="fa-solid fa-home"></i>
                            <span>Hub</span>
                        </div>
                        <div onClick={() => setTab('tasks')} className={`nav-icon-link ${tab === 'tasks' ? 'active' : ''}`}>
                            <i className="fa-solid fa-database"></i>
                            <span>Audit</span>
                        </div>
                        <div className="relative -top-8">
                            <div onClick={() => {const n=prompt("Task Name?"); if(n) startTracking(n);}} className="w-16 h-16 rounded-full bg-blue-600 shadow-[0_10px_30px_rgba(26,115,232,0.5)] flex items-center justify-center text-white text-2xl border-4 border-[#0b1120]">
                                <i className="fa-solid fa-bolt"></i>
                            </div>
                        </div>
                        <div onClick={() => setTab('settings')} className={`nav-icon-link ${tab === 'settings' ? 'active' : ''}`}>
                            <i className="fa-solid fa-sliders"></i>
                            <span>Config</span>
                        </div>
                        <div onClick={() => window.open('https://www.gigahertz.com.ph/')} className="nav-icon-link opacity-40">
                            <i className="fa-solid fa-bag-shopping"></i>
                            <span>Shop</span>
                        </div>
                    </nav>

                    {/* Idle Modal */}
                    {idlePopup && (
                        <div className="fixed inset-0 z-[10000] flex items-center justify-center p-6 glass-dark backdrop-blur-3xl">
                            <div className="glass p-12 rounded-[48px] max-w-sm text-center shadow-[0_0_100px_rgba(0,0,0,0.5)]">
                                <div className="w-20 h-20 bg-amber-500 text-white rounded-full flex items-center justify-center text-3xl mx-auto mb-8 animate-pulse">
                                    <i className="fa-solid fa-mug-hot"></i>
                                </div>
                                <h2 className="text-3xl font-black mb-4">Taking a break?</h2>
                                <p className="opacity-60 font-bold mb-8 leading-relaxed text-sm">Nexus Core detected 5+ minutes of inactivity. Your session has been paused to ensure log accuracy.</p>
                                <button className="btn-nexus btn-p w-full justify-center" onClick={() => { setIdlePopup(false); setTimer(p => ({...p, paused: false})); setLastMove(Date.now()); }}>
                                    Resume Session
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- ROOT ENTRY ---
        const App = () => {
            const [user, setUser] = useState(null);
            const [theme, setTheme] = useState('dark');

            useEffect(() => { document.documentElement.setAttribute('data-theme', theme); }, [theme]);

            return user ? (
                <NexusApp user={user} onLogout={() => setUser(null)} theme={theme} setTheme={setTheme} />
            ) : (
                <AuthPortal onLogin={setUser} theme={theme} setTheme={setTheme} />
            );
        };

        const Root = ReactDOM.createRoot(document.getElementById('root'));
        Root.render(<App />);
    </script>
</body>
</html>
