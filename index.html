<!DOCTYPE html>
<html lang="en" data-theme="frutiger">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Gigahertz Nexus — v6.32</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
/* ===== THEME ENGINE ===== */
[data-theme="frutiger"]{--p:#1a6fd4;--pd:#1458b0;--pl:#deeeff;--bg:#dce9f7;--wh:#ffffff;--card:rgba(255,255,255,0.72);--tx:#0a2540;--tx2:#1e3a5f;--tx3:#5a7fa8;--bd:rgba(26,111,212,0.18);--danger:#e53e3e;--ok:#22c55e;--warn:#f59e0b;--glass-bg:rgba(255,255,255,0.62);--glass-border:rgba(255,255,255,0.88);--shadow:rgba(26,111,212,0.13);--sidebar-bg:rgba(240,248,255,0.88);--nav-active-bg:rgba(26,111,212,0.13);--nav-active-color:#1a6fd4;--header-bg:rgba(240,248,255,0.82);}
[data-theme="dark"]{--p:#3b82f6;--pd:#2563eb;--pl:#1e3a8a;--bg:#0f172a;--wh:#1e293b;--card:rgba(30,41,59,0.7);--tx:#f8fafc;--tx2:#cbd5e1;--tx3:#94a3b8;--bd:rgba(255,255,255,0.1);--danger:#f87171;--ok:#4ade80;--warn:#fbbf24;--glass-bg:rgba(30,41,59,0.6);--glass-border:rgba(255,255,255,0.12);--shadow:rgba(0,0,0,0.4);--sidebar-bg:rgba(15,23,42,0.96);--nav-active-bg:rgba(59,130,246,0.18);--nav-active-color:#3b82f6;--header-bg:rgba(15,23,42,0.92);}
[data-theme="midnight"]{--p:#8b5cf6;--pd:#7c3aed;--pl:#ede9fe;--bg:#020617;--wh:#0f172a;--card:rgba(15,23,42,0.7);--tx:#f8fafc;--tx2:#cbd5e1;--tx3:#64748b;--bd:rgba(255,255,255,0.1);--danger:#f87171;--ok:#4ade80;--warn:#fbbf24;--glass-bg:rgba(15,23,42,0.65);--glass-border:rgba(139,92,246,0.2);--shadow:rgba(0,0,0,0.6);--sidebar-bg:rgba(2,6,23,0.98);--nav-active-bg:rgba(139,92,246,0.18);--nav-active-color:#8b5cf6;--header-bg:rgba(2,6,23,0.92);}
[data-theme="forest"]{--p:#16a34a;--pd:#15803d;--pl:#dcfce7;--bg:#022c22;--wh:#064e3b;--card:rgba(6,78,59,0.7);--tx:#ecfdf5;--tx2:#a7f3d0;--tx3:#6ee7b7;--bd:rgba(255,255,255,0.1);--danger:#f87171;--ok:#4ade80;--warn:#fbbf24;--glass-bg:rgba(6,78,59,0.6);--glass-border:rgba(74,222,128,0.18);--shadow:rgba(0,0,0,0.4);--sidebar-bg:rgba(2,44,34,0.98);--nav-active-bg:rgba(22,163,74,0.18);--nav-active-color:#4ade80;--header-bg:rgba(2,44,34,0.92);}
[data-theme="ocean"]{--p:#0ea5e9;--pd:#0284c7;--pl:#e0f2fe;--bg:#082f49;--wh:#0c4a6e;--card:rgba(8,47,73,0.7);--tx:#f0f9ff;--tx2:#bae6fd;--tx3:#7dd3fc;--bd:rgba(14,165,233,0.2);--danger:#f87171;--ok:#4ade80;--warn:#fbbf24;--glass-bg:rgba(8,47,73,0.65);--glass-border:rgba(56,189,248,0.22);--shadow:rgba(0,0,0,0.5);--sidebar-bg:rgba(8,47,73,0.98);--nav-active-bg:rgba(14,165,233,0.18);--nav-active-color:#38bdf8;--header-bg:rgba(8,47,73,0.92);}
[data-theme="rose"]{--p:#e11d48;--pd:#be123c;--pl:#ffe4e6;--bg:#fff1f2;--wh:#ffffff;--card:rgba(255,255,255,0.75);--tx:#1e0a12;--tx2:#4c0519;--tx3:#9f1239;--bd:rgba(225,29,72,0.18);--danger:#e11d48;--ok:#22c55e;--warn:#f59e0b;--glass-bg:rgba(255,255,255,0.62);--glass-border:rgba(255,255,255,0.9);--shadow:rgba(225,29,72,0.12);--sidebar-bg:rgba(255,241,242,0.95);--nav-active-bg:rgba(225,29,72,0.1);--nav-active-color:#e11d48;--header-bg:rgba(255,241,242,0.92);}
[data-theme="amber"]{--p:#d97706;--pd:#b45309;--pl:#fef3c7;--bg:#fffbeb;--wh:#ffffff;--card:rgba(255,255,255,0.78);--tx:#451a03;--tx2:#78350f;--tx3:#a16207;--bd:rgba(217,119,6,0.18);--danger:#ef4444;--ok:#22c55e;--warn:#d97706;--glass-bg:rgba(255,255,255,0.65);--glass-border:rgba(255,255,255,0.9);--shadow:rgba(217,119,6,0.12);--sidebar-bg:rgba(255,251,235,0.95);--nav-active-bg:rgba(217,119,6,0.12);--nav-active-color:#d97706;--header-bg:rgba(255,251,235,0.92);}
[data-theme="matrix"]{--p:#22c55e;--pd:#16a34a;--pl:#052e16;--bg:#030a03;--wh:#0a1c0a;--card:rgba(10,28,10,0.8);--tx:#4ade80;--tx2:#86efac;--tx3:#bbf7d0;--bd:rgba(34,197,94,0.3);--danger:#f87171;--ok:#22c55e;--warn:#fbbf24;--glass-bg:rgba(10,28,10,0.7);--glass-border:rgba(34,197,94,0.25);--shadow:rgba(34,197,94,0.3);--sidebar-bg:rgba(3,10,3,0.98);--nav-active-bg:rgba(34,197,94,0.15);--nav-active-color:#4ade80;--header-bg:rgba(3,10,3,0.95);}
[data-theme="candy"]{--p:#ec4899;--pd:#db2777;--pl:#fce7f3;--bg:#fdf2f8;--wh:#ffffff;--card:rgba(255,255,255,0.78);--tx:#500724;--tx2:#831843;--tx3:#be185d;--bd:rgba(236,72,153,0.18);--danger:#dc2626;--ok:#22c55e;--warn:#f59e0b;--glass-bg:rgba(255,255,255,0.65);--glass-border:rgba(255,255,255,0.9);--shadow:rgba(236,72,153,0.14);--sidebar-bg:rgba(253,242,248,0.95);--nav-active-bg:rgba(236,72,153,0.1);--nav-active-color:#ec4899;--header-bg:rgba(253,242,248,0.92);}
[data-theme="light"]{--p:#1a73e8;--pd:#1557b0;--pl:#e8f0fe;--bg:#f0f4f8;--wh:#ffffff;--card:rgba(255,255,255,0.75);--tx:#0f172a;--tx2:#334155;--tx3:#64748b;--bd:rgba(0,0,0,0.1);--danger:#ef4444;--ok:#22c55e;--warn:#f59e0b;--glass-bg:rgba(255,255,255,0.6);--glass-border:rgba(255,255,255,0.85);--shadow:rgba(0,0,0,0.09);--sidebar-bg:rgba(240,244,248,0.96);--nav-active-bg:rgba(26,115,232,0.1);--nav-active-color:#1a73e8;--header-bg:rgba(240,244,248,0.9);}
[data-theme="retro"]{--p:#7c3aed;--pd:#6d28d9;--pl:#fdf4ff;--bg:#1c0d2e;--wh:#2d1b4e;--card:rgba(45,27,78,0.75);--tx:#f3e8ff;--tx2:#ddd6fe;--tx3:#c4b5fd;--bd:rgba(167,139,250,0.2);--danger:#f87171;--ok:#4ade80;--warn:#fbbf24;--glass-bg:rgba(45,27,78,0.65);--glass-border:rgba(167,139,250,0.22);--shadow:rgba(124,58,237,0.3);--sidebar-bg:rgba(28,13,46,0.98);--nav-active-bg:rgba(124,58,237,0.2);--nav-active-color:#c4b5fd;--header-bg:rgba(28,13,46,0.95);}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;height:100%}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;transition:background .4s ease,color .4s ease}
input,select,button,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p);border-radius:99px;opacity:.5}
::placeholder{color:var(--tx3)}
*:focus-visible{outline:2px solid var(--p);outline-offset:2px;border-radius:4px}
img{max-width:100%;height:auto}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.55}}
@keyframes timerGlow{0%,100%{text-shadow:0 0 12px color-mix(in srgb,var(--p) 60%,transparent)}50%{text-shadow:0 0 32px color-mix(in srgb,var(--p) 90%,transparent)}}
@keyframes barGrow{from{transform:scaleY(0)}to{transform:scaleY(1)}}
.anim-fade{animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both}
.anim-slide{animation:slideLeft .4s cubic-bezier(.16,1,.3,1) both}
body.no-anim *,body.no-anim *::before,body.no-anim *::after{animation:none!important;transition:none!important}

/* GLASS */
.glass{background:var(--glass-bg);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);border:1px solid var(--glass-border);box-shadow:0 8px 28px var(--shadow),inset 0 1px 0 rgba(255,255,255,.18);transition:all .3s ease;border-radius:20px}
.glass:hover{box-shadow:0 12px 36px var(--shadow),inset 0 1px 0 rgba(255,255,255,.25)}

/* BUTTONS */
.btn{padding:10px 20px;border-radius:12px;font-weight:800;font-size:13px;cursor:pointer;transition:all .25s ease;border:none;display:inline-flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.01em}
.btn-primary{background:linear-gradient(160deg,var(--p),var(--pd));color:#fff;box-shadow:0 3px 12px var(--shadow)}
.btn-primary:hover{filter:brightness(1.12);transform:translateY(-1px);box-shadow:0 6px 18px var(--shadow)}
.btn-primary:active{transform:translateY(0);filter:brightness(.98)}
.btn-primary:disabled{opacity:.55;cursor:not-allowed;transform:none}
.btn-ghost{background:rgba(128,128,128,.08);color:var(--tx2);border:1px solid var(--bd)}
.btn-ghost:hover{background:rgba(128,128,128,.15);color:var(--tx);transform:translateY(-1px)}
.btn-danger{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.25)}
.btn-danger:hover{background:var(--danger);color:#fff}
.btn-ok{background:rgba(34,197,94,.12);color:var(--ok);border:1px solid rgba(34,197,94,.25)}
.btn-ok:hover{background:var(--ok);color:#fff}
.btn-warn{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.25)}

/* INPUTS */
.input{width:100%;background:rgba(128,128,128,.08);border:1.5px solid var(--bd);border-radius:12px;padding:11px 14px;color:var(--tx);font-size:13px;font-weight:600;transition:all .25s ease}
.input:focus{border-color:var(--p);box-shadow:0 0 0 3px color-mix(in srgb,var(--p) 18%,transparent);background:rgba(128,128,128,.04)}
.input-label{display:block;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:6px}
select.input option{background:var(--wh);color:var(--tx)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.08em}
.badge-ok{background:rgba(34,197,94,.18);color:var(--ok);border:1px solid rgba(34,197,94,.3)}
.badge-warn{background:rgba(245,158,11,.18);color:var(--warn);border:1px solid rgba(245,158,11,.3)}
.badge-danger{background:rgba(239,68,68,.18);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.badge-info{background:color-mix(in srgb,var(--p) 15%,transparent);color:var(--p);border:1px solid color-mix(in srgb,var(--p) 28%,transparent)}
.tag-Admin{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.tag-Support{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.tag-Dev{background:rgba(168,85,247,.15);color:#c084fc;border:1px solid rgba(168,85,247,.25)}
.tag-Meeting{background:rgba(249,115,22,.15);color:#fb923c;border:1px solid rgba(249,115,22,.25)}
.tag-Operations{background:rgba(236,72,153,.15);color:#f472b6;border:1px solid rgba(236,72,153,.25)}

/* SPINNER */
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}

/* TABLE */
.table-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px;width:100%}
.nx-table{width:100%;min-width:560px;border-collapse:separate;border-spacing:0}
.nx-table th{padding:14px 20px;text-align:left;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);border-bottom:1px solid var(--bd);background:rgba(0,0,0,.05)}
.nx-table td{padding:14px 20px;border-bottom:1px solid var(--bd);font-size:13px;font-weight:600}
.nx-table tbody tr:hover td{background:rgba(128,128,128,.04);transition:background .15s}

/* LAYOUT */
.app-layout{display:flex;min-height:100vh;position:relative}
.sidebar{width:258px;height:100vh;background:var(--sidebar-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:100;border-right:1px solid var(--bd);transition:transform .3s cubic-bezier(.16,1,.3,1)}
.sidebar-logo-area{padding:20px 20px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:12px;flex-shrink:0}
.sidebar-logo-img{width:40px;height:40px;border-radius:10px;object-fit:contain;background:#fff;padding:4px;flex-shrink:0;border:1px solid var(--bd)}
.nav-section-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.14em;color:var(--tx3);padding:12px 18px 6px;display:block}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:all .22s ease;color:var(--tx2);border:none;background:transparent;width:100%;text-align:left;margin-bottom:2px}
.nav-item:hover{background:rgba(128,128,128,.1);color:var(--tx);transform:translateX(2px)}
.nav-item.active{background:var(--nav-active-bg);color:var(--nav-active-color);border:1px solid color-mix(in srgb,var(--p) 22%,transparent)}
.nav-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(128,128,128,.08);transition:all .22s}
.nav-item.active .nav-icon{background:linear-gradient(160deg,var(--p),var(--pd));color:#fff;box-shadow:0 3px 10px var(--shadow)}
.main-content{margin-left:258px;min-height:100vh;display:flex;flex-direction:column;width:calc(100% - 258px);transition:all .3s ease}
.top-header{background:var(--header-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-shrink:0;flex-wrap:wrap;gap:10px}
.content-area{padding:24px 28px;flex:1;display:flex;flex-direction:column;gap:20px}

/* MOBILE NAV */
.mobile-topbar{display:none;background:var(--header-bg);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);padding:12px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:90}
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--sidebar-bg);backdrop-filter:blur(24px);border-top:1px solid var(--bd);padding:8px 8px max(8px,env(safe-area-inset-bottom));overflow-x:auto;-webkit-overflow-scrolling:touch}
.mobile-nav::-webkit-scrollbar{display:none}
.mob-nav-row{display:flex;gap:4px;min-width:max-content;width:100%;justify-content:space-around}
.mob-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;border-radius:10px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;color:var(--tx3);border:none;background:transparent;flex-shrink:0;transition:all .2s}
.mob-nav-item.active{color:var(--p);background:var(--nav-active-bg)}
.mob-nav-item i{font-size:17px}

/* TOAST */
.toast-container{position:fixed;top:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:10px;max-width:340px;width:calc(100% - 40px)}
.toast{display:flex;align-items:center;gap:12px;padding:13px 16px;border-radius:14px;background:var(--glass-bg);backdrop-filter:blur(24px);border:1px solid var(--glass-border);box-shadow:0 10px 30px rgba(0,0,0,.25);font-size:13px;font-weight:700;color:var(--tx);animation:slideLeft .35s ease}
@media(max-width:640px){.toast-container{top:auto;bottom:90px;right:10px;width:calc(100% - 20px)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .25s ease}
.modal-box{background:var(--glass-bg);backdrop-filter:blur(28px);border:1px solid var(--glass-border);border-radius:24px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:fadeUp .35s cubic-bezier(.16,1,.3,1);box-shadow:0 24px 60px rgba(0,0,0,.4)}
@media(max-width:600px){.modal-box{max-width:100%;border-radius:20px 20px 0 0;max-height:92vh}.modal-overlay{align-items:flex-end;padding:0}}
.modal-header{padding:22px 26px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,.06);border-radius:24px 24px 0 0}
.modal-body{padding:24px 26px;display:flex;flex-direction:column;gap:16px}

/* PROGRESS BAR */
.progress-bar{height:7px;background:rgba(128,128,128,.15);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),var(--pd));border-radius:99px;transition:width 1s cubic-bezier(.16,1,.3,1)}

/* STAT CARDS */
.stat-card{display:flex;flex-direction:column;gap:10px;padding:20px;border-radius:18px;background:var(--glass-bg);backdrop-filter:blur(20px);border:1px solid var(--glass-border);box-shadow:0 4px 18px var(--shadow);transition:transform .25s ease,box-shadow .25s ease}
.stat-card:hover{transform:translateY(-3px);box-shadow:0 10px 30px var(--shadow)}
.stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;background:color-mix(in srgb,var(--p) 15%,transparent);color:var(--p)}

/* TIMER */
.timer-display{font-family:'Space Mono',monospace;font-size:44px;font-weight:700;color:var(--p);letter-spacing:3px;line-height:1}
.timer-running{animation:timerGlow 2s ease infinite}

/* CHART */
.bar-chart{display:flex;align-items:flex-end;gap:12px;height:140px}
.bar-item-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;flex:1}
.bar-fill{width:100%;border-radius:8px 8px 0 0;min-height:4px;background:linear-gradient(180deg,var(--p),var(--pd));transform-origin:bottom;animation:barGrow .8s cubic-bezier(.16,1,.3,1) both;box-shadow:0 -2px 8px color-mix(in srgb,var(--p) 40%,transparent)}
.bar-val{font-size:10px;font-weight:900;color:var(--p)}
.bar-label{font-size:9px;font-weight:800;color:var(--tx3);text-transform:uppercase;text-align:center}

/* TREND LINE */
.trend-svg{width:100%;overflow:visible}

/* QUEUE ITEM */
.queue-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:13px;background:rgba(128,128,128,.07);border:1px solid var(--bd);margin-bottom:6px;transition:all .2s}
.queue-item:hover{background:rgba(128,128,128,.12);border-color:color-mix(in srgb,var(--p) 30%,transparent)}

/* TOGGLE */
.toggle-wrap{position:relative;width:44px;height:24px;display:inline-block;flex-shrink:0}
.toggle-wrap input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;inset:0;border-radius:24px;background:rgba(128,128,128,.25);border:1px solid var(--bd);cursor:pointer;transition:.3s ease}
.toggle-slider::before{content:'';position:absolute;width:16px;height:16px;left:3px;top:3px;border-radius:50%;background:var(--tx3);transition:.3s ease}
input:checked+.toggle-slider{background:linear-gradient(90deg,var(--p),var(--pd));border-color:var(--pd)}
input:checked+.toggle-slider::before{transform:translateX(20px);background:#fff}

/* LOGO FIX - no white space on theme switch */
.logo-img-wrap{border-radius:10px;overflow:hidden;background:transparent;width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-img-wrap img{width:100%;height:100%;object-fit:contain;display:block}

const fmtDate=iso=>{if(!iso)return'';return new Date(iso+'T00:00:00').toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'2-digit',weekday:'short'})};
const fmtTS=iso=>{if(!iso)return'';const d=new Date(iso);return d.toLocaleString('en-PH',{month:'short',day:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',hour12:true})};
const calcDur=(s,e)=>{if(!s||!e)return 0;const[sh,sm]=s.split(':').map(Number);const[eh,em]=e.split(':').map(Number);return Math.max(0,parseFloat(((eh*60+em-sh*60-sm)/60).toFixed(2)))};
const getLvl=hrs=>{const h=hrs||0;const lv=Math.floor(h/20)+1;const pct=Math.min(100,((h-(lv-1)*20)/20)*100);return{level:lv,progress:pct,next:lv*20}};

/* ===== API ===== */
const api={
  _ok:null,
  async call(action,payload={}){
    if(action!=='login'){
      try{
        const r=await Promise.race([
          fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...payload}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),
          new Promise((_,rj)=>setTimeout(()=>rj(new Error('timeout')),8000))
        ]);
        if(r.ok){const d=await r.json();api._ok=true;return d;}
      }catch(e){api._ok=false;}
      return{success:true};
    }
    return api._local(payload);
  },
  _local(p){
    const id=(p.identifier||'').trim().toLowerCase();
    const pw=(p.password||'').trim();
    const emp=BASE_EMPLOYEES.find(e=>(e.email||'').toLowerCase()===id||(e.firstName||'').toLowerCase()===id||(e.employeeId||'').toLowerCase()===id||(e.fullName||'').toLowerCase()===id);
    if(emp&&emp.password===pw)return{success:true,user:{...emp,fullName:`${emp.firstName} ${emp.lastName}`}};
    return{success:false,error:'Invalid credentials'};
  },
  async ping(){
    try{const r=await Promise.race([fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'ping'}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),new Promise((_,rj)=>setTimeout(()=>rj(),5000))]);api._ok=r.ok;return r.ok;}catch{api._ok=false;return false;}

const AuthPortal=({onLogin,theme,setTheme})=>{

  },[]);

    const res=await api.call('login',{identifier:id.trim(),password:pw.trim()});

/* ===== TIMER ENGINE ===== */
const TimerEngine=({user,tasks,onSave,showToast})=>{
  const safeUser=user||{};
  const [active,setActive]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [queue,setQueue]=useState([]);
  const [customTask,setCustomTask]=useState('');
  const [selPreset,setSelPreset]=useState('');
  const [cat,setCat]=useState('Admin');
  const [customMode,setCustomMode]=useState(false);
  const tickRef=useRef(null);
  const elapsedRef=useRef(0);

  useEffect(()=>{
    const saved=LS.load(`timer_${safeUser.id}`);
    if(saved){
      setActive(saved.active);setQueue(saved.queue||[]);
      if(saved.active&&saved.active.status==='running'){
        const extra=Math.floor((Date.now()-new Date(saved.active.resumeAt||saved.active.startTime).getTime())/1000);
        const newEl=(saved.active.elapsedBase||0)+extra;
        setElapsed(newEl);elapsedRef.current=newEl;
      } else if(saved.active){
        setElapsed(saved.active.elapsedBase||0);elapsedRef.current=saved.active.elapsedBase||0;
      }
    }
  },[safeUser.id]);

  useEffect(()=>{LS.save(`timer_${safeUser.id}`,{active,queue});},[active,queue]);

  useEffect(()=>{
    if(active&&active.status==='running'){
      tickRef.current=setInterval(()=>{
        elapsedRef.current+=1;
        setElapsed(elapsedRef.current);
      },1000);
    } else {
      clearInterval(tickRef.current);
    }
    return()=>clearInterval(tickRef.current);
  },[active?.status]);

  const startNew=(name,c)=>{
    if(active&&active.status==='running'){
      const paused={...active,elapsedBase:elapsedRef.current,status:'paused'};
      setQueue(q=>[...q,paused]);
      showToast(`"${active.taskName.slice(0,22)}…" paused → queue`,'info');
    }
    const now=new Date().toISOString();
    const newT={taskName:name,category:c||cat,startTime:now,resumeAt:now,elapsedBase:0,status:'running'};
    setActive(newT);setElapsed(0);elapsedRef.current=0;
    setCustomTask('');setSelPreset('');setCustomMode(false);
    showToast(`Started: "${name.slice(0,28)}"`,'success');
  };

  const pauseActive=()=>{
    const el=elapsedRef.current;
    setActive(a=>({...a,elapsedBase:el,status:'paused'}));
    showToast('Timer paused','warn');
  };

  const resumeActive=()=>{
    const now=new Date().toISOString();
    setActive(a=>({...a,status:'running',resumeAt:now}));
    showToast('Timer resumed ▶','success');
  };

  const stopSave=async()=>{
    if(!active)return;
    const hrs=parseFloat((elapsedRef.current/3600).toFixed(2));
    if(hrs<0.01){showToast('Task too short (<1 min)','warn');return;}
    const d=new Date(active.startTime);
    const task={id:Date.now(),empId:safeUser.id,empName:`${safeUser.firstName||''} ${safeUser.lastName||''}`.trim(),taskName:active.taskName,category:active.category,date:d.toISOString().split('T')[0],startTime:`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,endTime:`${String(new Date().getHours()).padStart(2,'0')}:${String(new Date().getMinutes()).padStart(2,'0')}`,durationHours:hrs,month:d.getMonth()+1,year:d.getFullYear(),source:'Timer'};
    await api.call('logTask',task);
    onSave(task);showToast(`Saved ${hrs}h ✓`,'success');
    setActive(null);setElapsed(0);elapsedRef.current=0;
    LS.rm(`timer_${safeUser.id}`);
  };

  const resumeFromQueue=idx=>{
    const qt=queue[idx];
    if(active){
      const paused={...active,elapsedBase:elapsedRef.current,status:'paused'};
      setQueue(q=>{const nq=[...q];nq.splice(idx,1);return[...nq,paused];});
    } else {
      setQueue(q=>{const nq=[...q];nq.splice(idx,1);return nq;});
    }
    const now=new Date().toISOString();
    setActive({...qt,status:'running',resumeAt:now});
    setElapsed(qt.elapsedBase||0);elapsedRef.current=qt.elapsedBase||0;
    showToast(`Resumed: "${qt.taskName.slice(0,22)}"`,'success');
  };

  const discardQueue=idx=>setQueue(q=>{const nq=[...q];nq.splice(idx,1);return nq;});

  return(
    <div style={{display:'flex',flexDirection:'column',gap:14}}>
      {/* TIMER DISPLAY */}
      <div className="glass" style={{padding:'24px 26px',borderRadius:20}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:10}}>
          <div>
            <p style={{fontSize:10,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:5}}>⏱ Active Timer</p>
            {active?(<><p style={{fontSize:15,fontWeight:900,color:'var(--tx)'}}>{active.taskName}</p><span className={`badge tag-${active.category}`} style={{marginTop:6,display:'inline-flex'}}>{active.category}</span></>):<p style={{fontSize:13,color:'var(--tx3)',fontWeight:600}}>No task running.</p>}
          </div>
          {active&&<span className={`badge ${active.status==='running'?'badge-ok':'badge-warn'}`}>{active.status==='running'?'● Running':'⏸ Paused'}</span>}
        </div>
        <div style={{textAlign:'center',margin:'6px 0 18px'}}>
          <div className={`timer-display ${active?.status==='running'?'timer-running':''}`}>{fmtSeconds(elapsed)}</div>
          {active&&<p style={{fontSize:10,color:'var(--tx3)',marginTop:7,fontWeight:600}}>Started: {fmtTS(active.startTime)}</p>}
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',justifyContent:'center'}}>
          {active&&active.status==='running'&&<button className="btn btn-warn" onClick={pauseActive}><i className="fa-solid fa-pause"/> Pause</button>}
          {active&&active.status==='paused'&&<button className="btn btn-ok" onClick={resumeActive}><i className="fa-solid fa-play"/> Resume</button>}
          {active&&<button className="btn btn-primary" onClick={stopSave}><i className="fa-solid fa-floppy-disk"/> Stop & Save</button>}
        </div>
      </div>

      {/* START NEW */}
      <div className="glass" style={{padding:'20px 22px',borderRadius:20}}>
        <p style={{fontSize:12,fontWeight:900,color:'var(--tx)',marginBottom:14}}><i className="fa-solid fa-plus-circle" style={{color:'var(--p)',marginRight:6}}/>Start New Task</p>
        {active&&<div style={{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.25)',borderRadius:10,padding:'9px 13px',marginBottom:12,fontSize:12,fontWeight:700,color:'var(--warn)'}}><i className="fa-solid fa-info-circle" style={{marginRight:6}}/>Current task will be paused to queue.</div>}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {!customMode?(
            <div>
              <label className="input-label">Preset Task</label>
              <select className="input" value={selPreset} onChange={e=>{if(e.target.value==='__custom__'){setCustomMode(true);setSelPreset('');}else setSelPreset(e.target.value);}}>
                <option value="">— Choose preset —</option>
                {PRESET_TASKS.map((t,i)=><option key={i} value={t}>{t}</option>)}
                <option value="__custom__">✏️ Custom task...</option>
              </select>
            </div>
          ):(
            <div>
              <label className="input-label">Custom Task</label>
              <div style={{display:'flex',gap:8}}>
                <input className="input" value={customTask} onChange={e=>setCustomTask(e.target.value)} placeholder="Describe your task..." style={{flex:1}}/>
                <button className="btn btn-ghost" onClick={()=>{setCustomMode(false);setCustomTask('');}} style={{padding:'10px 12px',fontSize:12,whiteSpace:'nowrap'}}>Presets</button>
              </div>
            </div>
          )}
          <div>
            <label className="input-label">Category</label>
            <select className="input" value={cat} onChange={e=>setCat(e.target.value)}>{TASK_CATS.map(c=><option key={c}>{c}</option>)}</select>
          </div>
          <button className="btn btn-primary" style={{justifyContent:'center',padding:'12px'}}
            onClick={()=>{const name=customMode?customTask:selPreset;if(!name.trim())return showToast('Enter a task name','warn');startNew(name.trim(),cat);}}>
            <i className="fa-solid fa-play"/>{active?'Switch Task':'Start Timer'}
          </button>
        </div>
      </div>

      {/* QUEUE */}
      {queue.length>0&&(
        <div className="glass" style={{padding:'20px 22px',borderRadius:20}}>
          <p style={{fontSize:12,fontWeight:900,color:'var(--tx)',marginBottom:12}}><i className="fa-solid fa-layer-group" style={{color:'var(--p)',marginRight:6}}/>Queue ({queue.length})</p>
          {queue.map((qt,i)=>(
            <div key={i} className="queue-item">
              <div style={{flex:1,overflow:'hidden'}}>
                <p style={{fontSize:13,fontWeight:800,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{qt.taskName}</p>
                <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4}}>
                  <span className={`badge tag-${qt.category}`} style={{fontSize:8}}>{qt.category}</span>
                  <span style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:'var(--tx3)'}}>{fmtSeconds(qt.elapsedBase||0)}</span>
                </div>
              </div>
              <button className="btn btn-ok" style={{padding:'7px 12px',fontSize:12}} onClick={()=>resumeFromQueue(i)}><i className="fa-solid fa-play"/></button>
              <button className="btn btn-ghost" style={{padding:'7px 10px',fontSize:12,color:'var(--danger)'}} onClick={()=>discardQueue(i)}><i className="fa-solid fa-trash"/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ===== PRODUCTIVITY BREAKDOWN ===== */
const ProductivityBreakdown=({tasks})=>{
  const catData=useMemo(()=>{
    const totals={};
    (tasks||[]).forEach(t=>{const c=t.category||'Admin';totals[c]=(totals[c]||0)+(t.durationHours||0);});
    return Object.entries(totals).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([name,hrs])=>({name,hrs}));
  },[tasks]);
  const maxH=Math.max(...catData.map(c=>c.hrs),1);
  if(catData.length===0)return <p style={{fontSize:12,color:'var(--tx3)',textAlign:'center',padding:'20px 0'}}>No data yet.</p>;
  return(
    <div>
      <p style={{fontSize:10,fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:14}}>Top 3 Task Categories</p>
      <div className="bar-chart">
        {catData.map((c,i)=>(
          <div key={i} className="bar-item-wrap">
            <div className="bar-val">{c.hrs.toFixed(1)}h</div>
            <div className="bar-fill" style={{height:`${Math.max(8,(c.hrs/maxH)*110)}px`,background:`linear-gradient(180deg,${CAT_COLORS[c.name]||'var(--p)'},${CAT_COLORS[c.name]||'var(--pd)'})`,animationDelay:`${i*0.12}s`}}/>
            <div className="bar-label">{c.name}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ===== TREND ANALYSIS ===== */
const TrendAnalysis=({tasks})=>{
  const curYear=new Date().getFullYear();
  const data=MONTHS.map((_,i)=>({
    label:MONTHS[i],
    val:(tasks||[]).filter(t=>t.month===i+1&&t.year===curYear).reduce((s,t)=>s+(t.durationHours||0),0)
  }));
  const maxV=Math.max(...data.map(d=>d.val),1);
  const W=280,H=80,pad=10;
  const pts=data.map((d,i)=>[pad+(i/(data.length-1))*(W-2*pad),H-pad-(d.val/maxV)*(H-2*pad)]);
  const pathD=pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ');
  const areaD=`${pathD} L${pts[pts.length-1][0]},${H-pad} L${pts[0][0]},${H-pad} Z`;
  return(
    <div>
      <p style={{fontSize:10,fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:12}}>Trend Analysis — {curYear}</p>
      <svg viewBox={`0 0 ${W} ${H}`} className="trend-svg" style={{height:H}}>
        <defs>
          <linearGradient id="trendGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="var(--p)" stopOpacity=".35"/>
            <stop offset="100%" stopColor="var(--p)" stopOpacity="0"/>
          </linearGradient>
        </defs>
        <path d={areaD} fill="url(#trendGrad)"/>
        <path d={pathD} fill="none" stroke="var(--p)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(
          <g key={i}>
            <circle cx={p[0]} cy={p[1]} r="3" fill="var(--p)" stroke="var(--glass-bg)" strokeWidth="1.5"/>
          </g>
        ))}
        {data.map((d,i)=>(
          <text key={i} x={pts[i][0]} y={H-1} textAnchor="middle" fontSize="6" fill="var(--tx3)" fontWeight="700">{d.label.slice(0,1)}</text>
        ))}
      </svg>
    </div>
  );
};

const MainApp=({user:initUser,onLogoutReq,theme,setTheme})=>{
  const [user,setUser]=useState(initUser);
  const [view,setView]=useState('dashboard');
  const [tasks,setTasks]=useState(SEED_TASKS);
  const [projects,setProjects]=useState(SEED_PROJECTS);
  const [employees,setEmployees]=useState(BASE_EMPLOYEES);
  const [announcements,setAnnouncements]=useState(SEED_ANNOUNCEMENTS);
  const [leaveRequests,setLeaveRequests]=useState(SEED_LEAVES);
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null);
  const [modalData,setModalData]=useState(null);
  const [animations,setAnimations]=useState(true);
  const [afkVisible,setAfkVisible]=useState(false);
  const [afkCountdown,setAfkCountdown]=useState(120);
  const [sessionStart]=useState(new Date().toISOString());
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const safeUser=user||{};
  const isAdmin=safeUser.role==='ADMIN'||safeUser.role==='Super Admin';
  const todayISO=new Date().toISOString().split('T')[0];
  const todayTasks=(tasks||[]).filter(t=>t.empId===safeUser.id&&t.date===todayISO);
  const sessionMin=Math.max(1,Math.floor((Date.now()-new Date(sessionStart).getTime())/60000));
  const loggedMin=Math.round(todayTasks.reduce((s,t)=>s+(t.durationHours||0),0)*60);
  const productivityPct=Math.min(100,(loggedMin/sessionMin)*100);
  const myTotalHrs=(tasks||[]).filter(t=>t.empId===safeUser.id).reduce((s,t)=>s+(t.durationHours||0),0);
  const lvl=getLvl(myTotalHrs);
  const pendingLeaves=(leaveRequests||[]).filter(l=>l.status==='Pending').length;
  const dept=DEPARTMENTS.find(d=>d.id===safeUser.deptId)||{};

  /* AFK */
  const afkRef=useRef(null);const afkCDRef=useRef(null);
  const resetAFK=useCallback(()=>{
    if(afkVisible)return;
    clearTimeout(afkRef.current);
    afkRef.current=setTimeout(()=>{setAfkVisible(true);setAfkCountdown(120);},AFK_TIMEOUT*1000);
  },[afkVisible]);
  useEffect(()=>{
    const evts=['mousemove','keydown','click','touchstart','scroll'];
    evts.forEach(e=>document.addEventListener(e,resetAFK,{passive:true}));
    resetAFK();
    return()=>{evts.forEach(e=>document.removeEventListener(e,resetAFK));clearTimeout(afkRef.current);};
  },[resetAFK]);
  useEffect(()=>{
    if(afkVisible){
      afkCDRef.current=setInterval(()=>{
        setAfkCountdown(c=>{if(c<=1){clearInterval(afkCDRef.current);onLogoutReq(tasks,safeUser,productivityPct,sessionStart);return 0;}return c-1;});
      },1000);
    } else clearInterval(afkCDRef.current);
    return()=>clearInterval(afkCDRef.current);
  },[afkVisible]);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
  },[theme]);
  useEffect(()=>{
    if(animations)document.body.classList.remove('no-anim');
    else document.body.classList.add('no-anim');
  },[animations]);

  const showToast=useCallback((msg,type='info')=>setToasts(p=>[...p,{id:Date.now()+Math.random(),message:msg,type}]),[]);
  const removeToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  const showModal=useCallback((m,data=null)=>{setModalData(data);setModal(m);},[]);
  const closeModal=useCallback(()=>{setModal(null);setModalData(null);},[]);

    if(isEdit)setTasks(p=>p.map(t=>t.id===task.id?task:t));

  const handleDeleteTask=useCallback(id=>setTasks(p=>p.filter(t=>t.id!==id)),[]);

          {view==='mytasks'&&!isAdmin&&<MyTasksView user={safeUser} tasks={tasks} showModal={showModal} showToast={showToast} onDelete={handleDeleteTask} onClone={handleCloneTask}/>}
          {view==='leaves'&&<LeavesView user={safeUser} isAdmin={isAdmin} leaveRequests={leaveRequests} setLeaveRequests={setLeaveRequests} showModal={showModal} showToast={showToast}/>}
          {view==='announcements'&&<AnnView announcements={announcements} setAnnouncements={setAnnouncements} isAdmin={isAdmin} user={safeUser} showModal={showModal} showToast={showToast}/>}
          {view==='leaderboard'&&<LeaderboardView employees={employees} tasks={tasks}/>}
          {view==='projects'&&<ProjectsView projects={projects} setProjects={setProjects} showModal={showModal} showToast={showToast} isAdmin={isAdmin}/>}
          {view==='settings'&&<SettingsView theme={theme} setTheme={setTheme} animations={animations} setAnimations={setAnimations} showToast={showToast}/>}
        </div>

        <FooterLine/>
      </div>

      {/* MOBILE NAV */}
      <nav className="mobile-nav">
        <div className="mob-nav-row">
          {navItems.slice(0,5).map(item=>(
            <button key={item.id} className={`mob-nav-item ${view===item.id?'active':''}`} onClick={()=>{setView(item.id);setSidebarOpen(false);}}>
              <i className={`fa-solid ${item.icon}`}/>
              {item.label}
            </button>
          ))}
          <button className="mob-nav-item" onClick={()=>onLogoutReq(tasks,safeUser,productivityPct,sessionStart)} style={{color:'var(--danger)'}}>
            <i className="fa-solid fa-power-off"/>
            Out
          </button>
        </div>
      </nav>

      {/* MODALS */}
      {modal==='logTask'&&<LogTaskModal user={safeUser} onClose={closeModal} onSave={handleSaveTask} showToast={showToast} initial={modalData}/>}
      {modal==='leave'&&<LeaveModal user={safeUser} onClose={closeModal} onSave={r=>setLeaveRequests(p=>[r,...p])} showToast={showToast}/>}
      {modal==='announcement'&&<AnnModal user={safeUser} onClose={closeModal} onSave={a=>setAnnouncements(p=>[a,...p])} showToast={showToast}/>}
      {modal==='addProject'&&<ProjectModal onClose={closeModal} onSave={p=>setProjects(pp=>[p,...pp])} showToast={showToast}/>}
      {modal==='profile'&&(
        <ModalLayout title="My Profile" icon="fa-user" onClose={closeModal}>
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <Avatar emp={safeUser} size="lg"/>
              <div>
                <p style={{fontSize:19,fontWeight:900,color:'var(--tx)'}}>{safeUser.firstName} {safeUser.lastName}</p>
                <p style={{fontSize:11,fontWeight:700,color:'var(--p)',textTransform:'uppercase',letterSpacing:'.1em'}}>{safeUser.employeeId}</p>
                <p style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>{dept?.icon} {dept?.name} · {safeUser.role}</p>
              </div>
            </div>
            <div className="glass" style={{padding:'14px 18px'}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,fontWeight:800,marginBottom:7,color:'var(--tx3)'}}><span>XP Progress</span><span>{myTotalHrs.toFixed(1)} / {lvl.next}h</span></div>
              <div className="progress-bar"><div className="progress-fill" style={{width:`${lvl.progress}%`}}/></div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              {[{l:'Total Hours',v:`${myTotalHrs.toFixed(1)}h`},{l:'Level',v:`LVL ${lvl.level}`},{l:'Leave Balance',v:`${(safeUser.leaveBalance||10)-(safeUser.leavesUsed||0)}d`},{l:'Status',v:safeUser.status||'Active'}].map(s=>(
                <div key={s.l} style={{background:'rgba(128,128,128,.08)',borderRadius:12,padding:'12px 14px',textAlign:'center'}}>
                  <p style={{fontSize:18,fontWeight:900,color:'var(--p)'}}>{s.v}</p>
                  <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',color:'var(--tx3)',marginTop:3,letterSpacing:'.08em'}}>{s.l}</p>
                </div>
              ))}
            </div>
            <p style={{fontSize:11,color:'var(--tx3)',textAlign:'center',fontWeight:600}}>{safeUser.email}</p>
          </div>
        </ModalLayout>
      )}
    </>
  );
};

/* ===== ROOT ===== */
const RootApp=()=>{
  const [user,setUser]=useState(()=>LS.load('ghz_user'));
  const [theme,setTheme]=useState(()=>LS.load('ghz_theme','frutiger'));
  const [showSummary,setShowSummary]=useState(false);
  const [summaryData,setSummaryData]=useState(null);

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);

  const handleLogin=u=>{setUser(u);LS.save('ghz_user',u);};
  const handleTheme=t=>{setTheme(t);LS.save('ghz_theme',t);};
  const handleLogoutReq=(tasks,currentUser,productivityPct,sessionStart)=>{
    if(currentUser.role==='ADMIN'||currentUser.role==='Super Admin'){doLogout();}
    else{setSummaryData({tasks,user:currentUser,productivityPct,sessionStart});setShowSummary(true);}
  };
  const doLogout=()=>{setUser(null);setShowSummary(false);setSummaryData(null);LS.rm('ghz_user');};

  if(!user)return <AuthPortal onLogin={handleLogin} theme={theme} setTheme={handleTheme}/>;
  return(
    <>
      <MainApp user={user} onLogoutReq={handleLogoutReq} theme={theme} setTheme={handleTheme}/>
      {showSummary&&summaryData&&(
        <ShiftSummaryModal
          onConfirm={doLogout}
          onCancel={()=>setShowSummary(false)}
          tasks={summaryData.tasks}
          user={summaryData.user}
          sessionStart={summaryData.sessionStart}
          productivityPct={summaryData.productivityPct}
        />
      )}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<RootApp/>);
</script>
</body>
</html>
