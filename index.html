      <script>
        (function() {
          const updateFavicon = () => {
            const theme = document.documentElement.getAttribute("data-theme") || "sapphire";
            const lightThemes = ["light", "classic", "lavender", "rose-quartz", "sapphire-light"];
            const isLight = lightThemes.includes(theme);
            
            let link = document.querySelector("link[rel~='icon']");
            if (!link) {
              link = document.createElement("link");
              link.rel = "icon";
              document.head.appendChild(link);
            }
            const src = "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRIQLVcXIFS2902i6rjCRTxBPoxYJXvM6EIlg&s";
            
            const img = new Image();
            img.crossOrigin = "Anonymous";
            img.onload = function() {
                const canvas = document.createElement("canvas");
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0);
                let imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let data = imgData.data;
                for (let i = 0; i < data.length; i += 4) {
                    let brightness = (data[i] + data[i+1] + data[i+2]) / 3;
                    if (brightness > 200) {
                        data[i+3] = 0; 
                    } else {
                        if (isLight) {
                            data[i] = 26; data[i+1] = 111; data[i+2] = 212;
                        } else {
                            data[i] = 255; data[i+1] = 255; data[i+2] = 255;
                        }
                    }
                }
                ctx.putImageData(imgData, 0, 0);
                link.href = canvas.toDataURL("image/png");
            };
            img.onerror = function() {
              link.href = src;
            };
            img.src = src;
          };

          const updateSkeumorphism = () => {
            const theme = document.documentElement.getAttribute("data-theme") || "sapphire";
            const lightThemes = ["light", "classic", "lavender", "rose-quartz", "sapphire-light"];
            const isLight = lightThemes.includes(theme);
            
            let style = document.getElementById("skeu-override");
            if (!style) {
              style = document.createElement("style");
              style.id = "skeu-override";
              document.head.appendChild(style);
            }
            
            let css = "";
            if (isLight) {
              css = "\n.glass-panel, .card, .widget, .dashboard-card, .btn, .gh-card, .attendance-card, .task-card {\n   border-top: 1px solid rgba(255, 255, 255, 0.9) !important;\n   border-left: 1px solid rgba(255, 255, 255, 0.8) !important;\n   border-bottom: 1px solid rgba(0, 0, 0, 0.1) !important;\n   border-right: 1px solid rgba(0, 0, 0, 0.1) !important;\n   box-shadow: inset 1px 1px 3px rgba(255,255,255,0.8),\n               inset -1px -1px 3px rgba(0,0,0,0.02),\n               0 8px 16px rgba(0,0,0,0.08) !important;\n}\n";
            } else {
              css = "\n.glass-panel, .card, .widget, .dashboard-card, .btn, .gh-card, .attendance-card, .task-card {\n   border-top: 1px solid rgba(255, 255, 255, 0.15) !important;\n   border-left: 1px solid rgba(255, 255, 255, 0.1) !important;\n   border-bottom: 1px solid rgba(0, 0, 0, 0.4) !important;\n   border-right: 1px solid rgba(0, 0, 0, 0.3) !important;\n   box-shadow: inset 1px 1px 2px rgba(255,255,255,0.1),\n               inset -1px -1px 2px rgba(0,0,0,0.2),\n               0 10px 20px rgba(0,0,0,0.3) !important;\n}\n";
            }
            style.innerHTML = css;
          };

          const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
              if (mutation.attributeName === "data-theme") {
                updateFavicon();
                updateSkeumorphism();
              }
            });
          });
          
          window.addEventListener("DOMContentLoaded", () => {
            updateFavicon();
            updateSkeumorphism();
            observer.observe(document.documentElement, { attributes: true });
          });
        })();
      </script>
