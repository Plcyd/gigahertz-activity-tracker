<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>Gigahertz — Nexus Activity Engine v6</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ══ THEME VARIABLES ══ */
:root{
  --p:#1a3af5;--pd:#1228d4;--pl:#eef1ff;
  --sb:rgba(255,255,255,0.88);--sbh:rgba(26,58,245,0.08);--sb-border:rgba(0,0,90,0.06);
  --sb-tx:#0d1533;--sb-tx2:#4a5270;--sb-tx3:#8890aa;
  --bg:#e8ecf8;--wh:#fff;--card:rgba(255,255,255,0.92);
  --tx:#0d1533;--tx2:#4a5270;--tx3:#8890aa;
  --bd:#dde2f0;--danger:#ef4444;--dl:#fff0f0;--ok:#16a34a;--warn:#d97706;
  --sh:0 4px 24px rgba(26,58,245,.06);--shl:0 12px 48px rgba(26,58,245,.12);
  --r:16px;--rsm:10px;--rlg:20px;--th:#f2f5ff;--ibg:#fff;
  --glass-bg:rgba(255,255,255,0.72);--glass-border:rgba(255,255,255,0.5);
}
[data-theme="dark"]{
  --p:#4d6fff;--pd:#3d5de8;--pl:#1a2348;
  --sb:rgba(10,15,30,0.88);--sbh:rgba(255,255,255,0.06);--sb-border:rgba(255,255,255,0.05);
  --sb-tx:#dde4f5;--sb-tx2:#7d8eaa;--sb-tx3:#485268;
  --bg:#090e1e;--wh:#111827;--card:rgba(19,29,48,0.92);
  --tx:#dde4f5;--tx2:#7d8eaa;--tx3:#485268;
  --bd:#1e2a44;--danger:#f87171;--dl:#2d1117;--ok:#4ade80;--warn:#fbbf24;
  --sh:0 4px 24px rgba(0,0,0,.4);--shl:0 12px 48px rgba(0,0,0,.6);
  --th:#0e1526;--ibg:#0e1526;
  --glass-bg:rgba(15,23,42,0.72);--glass-border:rgba(255,255,255,0.09);
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden;}
input,select,button,textarea{font-family:inherit; color: var(--tx);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:99px;}

/* ══ SHARED GLASS ══ */
.glass-panel{background:var(--card);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--bd);box-shadow:var(--sh);}

/* ══ AUTH ══ */
.auth-wrap{min-height:100vh;background:linear-gradient(145deg,rgba(26,58,245,.1) 0%,var(--bg) 100%);display:flex;align-items:center;justify-content:center;position:relative;}
.auth-card{background:var(--wh);border-radius:var(--rlg);padding:42px 38px;width:460px;box-shadow:var(--shl);border:1px solid var(--bd);position:relative;z-index:10;}

/* ══ TITLES & TEXTS ══ */
.text-main{color:var(--tx);}
.text-sub{color:var(--tx2);}
.text-muted{color:var(--tx3);}

/* ══ POMODORO ══ */
.pomo-wrap{padding:16px;background:linear-gradient(135deg, var(--pd), var(--p));border-radius:18px;color:#fff;display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;box-shadow:0 8px 24px rgba(26,58,245,.35);}
.pomo-clock{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:800;}
.pomo-btn{background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 12px;border-radius:10px;cursor:pointer;font-weight:700;transition:.2s;}
.pomo-btn:hover{background:rgba(255,255,255,0.3);}

/* ══ PROFILE (SOCIAL MEDIA STYLE) ══ */
.profile-cover{height:180px;background:linear-gradient(45deg, var(--p), var(--tx3));border-radius:18px 18px 0 0;position:relative;}
.profile-main{margin-top:-60px;padding:0 24px 24px;}
.profile-avatar-large{width:120px;height:120px;border-radius:30px;border:5px solid var(--bg);background:var(--ibg);object-fit:cover;box-shadow:var(--shl);}
.profile-header-meta{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:20px;}
.social-stats{display:flex;gap:24px;padding:16px 0;border-bottom:1px solid var(--bd);}
.stat-box{text-align:center;}
.stat-box .count{font-size:18px;font-weight:800;display:block;color:var(--tx);}
.stat-box .label{font-size:11px;font-weight:700;color:var(--tx3);text-transform:uppercase;}
.feed-card{margin-top:16px;padding:18px;border-radius:16px;border:1px solid var(--bd);background:var(--card);}
.post-time{font-size:11px;color:var(--tx3);font-weight:600;}

/* ══ PRIVACY MODE ══ */
.privacy-active{filter:blur(8px);pointer-events:none;transition:filter .3s;}

/* ══ ACTIVITY TELEMETRY ══ */
.telemetry-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
.tel-chip{padding:10px;border-radius:12px;background:rgba(128,128,128,0.05);border:1px solid var(--bd);}
.tel-lbl{font-size:10px;font-weight:800;color:var(--tx3);display:block;margin-bottom:2px;}
.tel-val{font-weight:700;font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--tx);}

/* ══ REUSED UI ══ */
.sidebar{width:280px;height:100vh;position:fixed;left:0;top:0;background:var(--sb);backdrop-filter:blur(22px);border-right:1px solid var(--sb-border);display:flex;flex-direction:column;z-index:200;}
.main{margin-left:280px;flex:1;min-height:100vh;}
.stat-card{background:var(--card);padding:22px;border-radius:var(--rlg);border:1px solid var(--bd);box-shadow:var(--sh);}
.form-input{width:100%;padding:11px;background:var(--ibg);border:1px solid var(--bd);border-radius:10px;outline:none;}
.btn-p{background:var(--p);color:#fff;padding:12px 24px;border-radius:10px;font-weight:800;border:none;cursor:pointer;}
.badge-focus{background:rgba(26,58,245,0.15);color:var(--p);padding:2px 8px;border-radius:6px;font-size:10px;font-weight:800;}

/* ══ IDLE OVERLAY ══ */
.idle-overlay{position:fixed;inset:0;background:rgba(0,0,30,0.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:10000;}
.idle-card{background:var(--wh);padding:32px;border-radius:24px;width:400px;text-align:center;}

@media(max-width:1024px){ .sidebar{display:none;} .main{margin-left:0;} }

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ══ CONFIG ══ */
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxrJb3czrgVOUUO4va7-9arnCAg9s9NvtlDaFsfGZ3LbSEqdT_-6bet-W4IcPZ6tfiT/exec";

/* ══ HELPERS ══ */
const fmtHHMMSS = (s)=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;};
const todayStr = ()=>new Date().toISOString().split('T')[0];

/* ══ COMPONENTS ══ */

const Sidebar = ({page, setPage, user, onLogout}) => {
  const menu = [
    {id:'dashboard',l:'Dashboard',i:'fa-chart-pie'},
    {id:'activity',l:'Activities',i:'fa-list-check'},
    {id:'social',l:'My Profile',i:'fa-user-group'},
    {id:'analytics',l:'Insight Matrix',i:'fa-microchip'},
    {id:'settings',l:'Settings',i:'fa-gear'},
  ];
  return (
    <div className="sidebar">
      <div style={{padding:'24px', display:'flex', alignItems:'center', gap:'12px'}}>
        <div style={{width:'32px',height:'32px',background: 'var(--p)',borderRadius:'8px'}}/>
        <span style={{fontWeight:900, letterSpacing:'.1em', fontSize:14}}>NEXUS HUB</span>
      </div>
      <div style={{padding:'0 16px', flex:1}}>
        {menu.map(m=>(
          <div key={m.id} 
               onClick={()=>setPage(m.id)}
               className={`nav-item ${page===m.id?'active':''}`} 
               style={{
                 display:'flex', alignItems:'center', gap:'12px', padding:'12px 16px',
                 borderRadius:'12px', cursor:'pointer', marginBottom:'4px',
                 background: page===m.id?'rgba(26,58,245,0.1)':'transparent',
                 color: page===m.id?'var(--p)':'var(--sb-tx2)',
                 fontWeight: page===m.id?800:600, fontSize:'13.5px'
               }}>
            <i className={`fa-solid ${m.i}`}/> {m.l}
          </div>
        ))}
      </div>
      <div style={{padding:'16px', borderTop:'1px solid var(--sb-border)'}}>
        <div className="sb-user" style={{padding:'12px', background:'rgba(128,128,128,0.05)', borderRadius:'14px', display:'flex', alignItems:'center', gap:'10px'}}>
           <div className="user-avatar" style={{width:'36px',height:'36px',borderRadius:'10px', background:'var(--p)', color:'#fff', display:'flex', alignItems:'center', justify:'center', fontWeight:800}}>{user?.firstName?.[0]}</div>
           <div style={{overflow:'hidden'}}>
             <div style={{fontWeight:800, fontSize:'12px', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{user?.firstName}</div>
             <div style={{fontSize:'9px', fontWeight:700, color:'var(--tx3)'}}>{user?.dept}</div>
           </div>
        </div>
        <button onClick={onLogout} style={{width:'100%', padding:'10px', background:'var(--danger)', color:'#fff', border:'none', borderRadius:'10px', marginTop:'12px', fontWeight:800, cursor:'pointer'}}><i className="fa-solid fa-power-off"/> Log Out</button>
      </div>
    </div>
  );
};

const Pomodoro = ({pushNotif}) => {
  const [seconds, setSeconds] = useState(25 * 60);
  const [active, setActive] = useState(false);
  const [mode, setMode] = useState('Focus');

  useEffect(() => {
    let timer = null;
    if (active && seconds > 0) {
      timer = setInterval(() => setSeconds(s => s - 1), 1000);
    } else if (seconds === 0) {
      pushNotif(`Focus Session Complete! Take a break.`, 'success');
      setActive(false);
    }
    return () => clearInterval(timer);
  }, [active, seconds]);

  const toggle = () => setActive(!active);
  const reset = () => { setActive(false); setSeconds(mode === 'Focus' ? 25*60 : 5*60); };

  return (
    <div className="pomo-wrap">
      <div>
        <div style={{fontSize:'10px', fontWeight:800, opacity:.8, textTransform:'uppercase'}}>Focus Engine</div>
        <div className="pomo-clock">{Math.floor(seconds/60)}:{String(seconds%60).padStart(2,'0')}</div>
      </div>
      <div style={{display:'flex', gap:'8px'}}>
        <button className="pomo-btn" onClick={toggle}>{active ? 'Pause' : 'Start'}</button>
        <button className="pomo-btn" onClick={reset}><i className="fa-solid fa-rotate"/></button>
      </div>
    </div>
  );
}

const Dashboard = ({user, tasks, telemetry, setPage, pushNotif}) => {
  return (
    <div className="page" style={{animation:'fadeIn .3s ease'}}>
      <div className="page-hdr">
        <div><h1 className="page-title text-main">Activity Center</h1><p className="page-sub text-sub">Analyze and command your productivity stream.</p></div>
        <div className="page-date"><i className="fa-solid fa-calendar"/> {fmtDate12(todayStr())}</div>
      </div>

      <div style={{display:'grid', gridTemplateColumns:'2fr 1fr', gap:'24px'}}>
        <div>
           <div className="stat-grid" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
              <div className="stat-card">
                 <span className="stat-lbl text-sub">Efficiency Node</span>
                 <div className="stat-val" style={{color:'var(--p)'}}>{Math.round((telemetry.active/3600)*10)/10}h</div>
                 <div className="tel-lbl text-muted">Total Activity</div>
              </div>
              <div className="stat-card">
                 <span className="stat-lbl text-sub">Pulse Status</span>
                 <div className="stat-val" style={{color:'var(--ok)'}}>{tasks.length}</div>
                 <div className="tel-lbl text-muted">Tasks Synced</div>
              </div>
              <div className="stat-card">
                 <span className="stat-lbl text-sub">Engagement</span>
                 <div className="stat-val" style={{color:'var(--warn)'}}>{telemetry.idle > 0 ? Math.floor((telemetry.idle/3600)*60) : 0}m</div>
                 <div className="tel-lbl text-muted">Idle Period</div>
              </div>
           </div>

           <div className="glass-panel" style={{marginTop:'24px', padding:'24px', borderRadius:'18px'}}>
              <h3 style={{fontWeight:900, marginBottom:'16px'}}>Live System Telemetry</h3>
              <div className="telemetry-row">
                 <div className="tel-chip">
                    <span className="tel-lbl">Keyboard Interaction</span>
                    <span className="tel-val">{telemetry.activeCount} <span className="badge-focus">Events Detected</span></span>
                 </div>
                 <div className="tel-chip">
                    <span className="tel-lbl">Window focus status</span>
                    <span className="tel-val" style={{color: document.hasFocus() ? 'var(--ok)':'var(--danger)'}}>{document.hasFocus() ? 'CONNECTED' : 'DISCONNECTED'}</span>
                 </div>
              </div>
              <div style={{marginTop:'20px', fontSize:'12px', fontWeight:600, color:'var(--tx2)'}}>
                <i className="fa-solid fa-circle-info" style={{color:'var(--p)'}}/> Interaction detected in current node every second logs interaction point.
              </div>
           </div>
        </div>

        <div>
           <Pomodoro pushNotif={pushNotif} />
           <div className="glass-panel" style={{padding:'20px', borderRadius:'18px'}}>
              <h3 style={{fontSize:15, fontWeight:800, marginBottom:12}}>Network Suggestions</h3>
              <div className="feed-card" style={{padding:12, marginBottom:10}}>
                 <span style={{fontSize:12, fontWeight:700}}><i className="fa-solid fa-shield-halved"/> Privacy Protocol</span>
                 <p style={{fontSize:11, color:'var(--tx2)', marginTop:4}}>Privacy Mode hides your sensitive activity during breaks.</p>
              </div>
              {telemetry.idle > 120 && (
                <div className="feed-card" style={{padding:12, background:'var(--dl)', border:'1px solid var(--danger)'}}>
                  <span style={{fontSize:12, fontWeight:700, color:'var(--danger)'}}><i className="fa-solid fa-warning"/> Idle Alert</span>
                  <p style={{fontSize:11, color:'var(--danger)', opacity:0.8, marginTop:4}}>Inactivity exceeded 2 minutes. Sync is currently in secondary buffer.</p>
                </div>
              )}
           </div>
        </div>
      </div>
    </div>
  );
};

const SocialProfile = ({user, tasks}) => {
  const allMins = tasks.reduce((s,t)=>s + Number(t.durationMinutes||0), 0);
  const activityRate = tasks.length > 0 ? (allMins / tasks.length).toFixed(1) : 0;
  
  return (
    <div className="page" style={{animation:'fadeIn .3s ease'}}>
      <div className="glass-panel" style={{borderRadius:'22px', overflow:'hidden'}}>
        <div className="profile-cover">
          <button style={{position:'absolute', bottom:'16px', right:'16px', padding:'8px 16px', border:'none', borderRadius:'10px', background:'rgba(255,255,255,0.1)', color:'#fff', backdropFilter:'blur(4px)', fontWeight:800, fontSize:12, cursor:'pointer'}}>Edit Header</button>
        </div>
        <div className="profile-main">
          <div className="profile-header-meta">
            <img src={`https://ui-avatars.com/api/?name=${user?.firstName}+${user?.lastName}&background=random&size=120`} className="profile-avatar-large" />
            <div style={{display:'flex', gap:'12px'}}>
              <button className="btn-p"><i className="fa-solid fa-paper-plane"/> Share Matrix</button>
              <button style={{padding:'12px 18px', border:'1px solid var(--bd)', borderRadius:'12px', background:'var(--wh)', fontWeight:800, fontSize:13, cursor:'pointer'}}><i className="fa-solid fa-pen-to-square"/> Update Status</button>
            </div>
          </div>
          <div>
            <h1 className="text-main" style={{fontSize:'26px', fontWeight:900}}>{user?.firstName} {user?.lastName} <i className="fa-solid fa-circle-check" style={{color: 'var(--p)', fontSize:'16px'}}/></h1>
            <p className="text-sub" style={{fontWeight:600, fontSize:'14px'}}>System Operator @ Gigahertz Computing Hub · {user?.dept}</p>
          </div>
          <div className="social-stats">
            <div className="stat-box">
              <span className="count text-main">{Math.floor(allMins/1.5)}</span>
              <span className="label">Impact Score</span>
            </div>
            <div className="stat-box">
              <span className="count text-main">{tasks.length}</span>
              <span className="label">Activities</span>
            </div>
            <div className="stat-box">
              <span className="count text-main">{Math.floor(allMins/60)}</span>
              <span className="label">Hrs Focused</span>
            </div>
            <div className="stat-box">
              <span className="count text-main">924</span>
              <span className="label">Endorsements</span>
            </div>
          </div>

          <div style={{display:'grid', gridTemplateColumns:'1fr 1.5fr', gap:'24px', marginTop:'24px'}}>
             <div className="glass-panel" style={{padding:'20px', borderRadius:'18px', height:'fit-content'}}>
                <h3 className="text-main" style={{fontSize:'14px', fontWeight:900, marginBottom:'12px'}}>User Biometrics</h3>
                <p className="text-sub" style={{fontSize:'13px', lineHeight:'1.6'}}>{user?.bio || "This user prefers their engine specifics to be confidential. No system summary established."}</p>
                <div style={{marginTop:16, display:'flex', flexWrap:'wrap', gap:6}}>
                  <span className="badge-focus">JavaScript</span><span className="badge-focus">Logistics</span><span className="badge-focus">Support</span>
                </div>
             </div>
             <div>
                <h3 className="text-main" style={{fontSize:'14px', fontWeight:900}}>Operational Wall</h3>
                {tasks.slice(0,4).map(t => (
                  <div key={t.id} className="feed-card">
                    <div style={{display:'flex', gap:10}}>
                      <div className="user-avatar" style={{width:'40px',height:'40px',borderRadius:'12px', background:'var(--p)', display:'flex', items:'center', justify:'center', color:'#fff', fontWeight:900}}>{user?.firstName[0]}</div>
                      <div>
                        <div className="text-main" style={{fontWeight:800, fontSize:13}}>{user?.firstName} documented an accomplishment.</div>
                        <div className="post-time">{fmtDate12(t.date)} at {t.startTime}</div>
                      </div>
                    </div>
                    <div style={{marginTop:12, fontSize:14, color:'var(--tx2)', fontWeight:500}}>Completed: <strong>{t.taskName}</strong> in <strong>{t.durationMinutes} minutes</strong> using Nexus Buffer protocols. 🚀</div>
                  </div>
                ))}
             </div>
          </div>
        </div>
      </div>
    </div>
  );
};

const SettingsPage = ({theme, setTheme, onLogout}) => {
  const [privacy, setPrivacy] = useState(false);
  return (
    <div className="page" style={{animation:'fadeIn .3s ease'}}>
      <div className="page-hdr">
        <div><h1 className="page-title">Operational OS</h1><p className="page-sub">Configure the behavior of your Activity Hub.</p></div>
      </div>
      <div style={{maxWidth:600}}>
         <div className="stat-card" style={{marginBottom:16}}>
            <h3 style={{fontWeight:800, fontSize:16}}>Appearance Layer</h3>
            <div style={{display:'flex', gap:10, marginTop:12}}>
              {['light','dark','cyberpunk'].map(t=>(
                <div key={t} 
                     onClick={()=>setTheme(t)}
                     style={{padding:'12px', borderRadius:'12px', border: theme===t?'2px solid var(--p)':'1px solid var(--bd)', cursor:'pointer', flex:1, textAlign:'center', textTransform:'capitalize', fontWeight:800, fontSize:11, color: theme===t?'var(--p)':'var(--tx3)'}}>
                  {t}
                </div>
              ))}
            </div>
         </div>
         <div className="stat-card" style={{marginBottom:16}}>
            <div style={{display:'flex', justify:'space-between', alignItems:'center'}}>
               <div>
                 <h3 style={{fontWeight:800, fontSize:16}}><i className="fa-solid fa-ghost"/> Stealth Mode (Privacy)</h3>
                 <p className="text-muted" style={{fontSize:11, fontWeight:600}}>When active, idle alerts and sensitive app names are obfuscated.</p>
               </div>
               <div className={`toggle-switch ${privacy?'':'off'}`} onClick={()=>setPrivacy(!privacy)}><div className="toggle-knob"/></div>
            </div>
         </div>
         <div className="stat-card">
            <h3 style={{fontWeight:800, fontSize:16}}>Node Actions</h3>
            <button onClick={onLogout} style={{width:'100%', padding:12, border:'none', borderRadius:10, background:'var(--danger)', color:'#fff', fontWeight:800, marginTop:14, cursor:'pointer'}}><i className="fa-solid fa-plug-circle-xmark"/> De-Authorize Current Node</button>
         </div>
      </div>
    </div>
  );
}

const App = () => {
  const [page, setPage] = useState('login');
  const [user, setUser] = useState(null);
  const [tasks, setTasks] = useState([]);
  const [theme, setTheme] = useState(localStorage.getItem('gh_theme_n')||'dark');
  const [loginTime, setLoginTime] = useState(null);
  const [notif, setNotif] = useState(null);
  const [notifHistory, setNotifHistory] = useState([]);
  const [telemetry, setTelemetry] = useState({active: 0, idle: 0, activeCount: 0});
  const [lastActivity, setLastActivity] = useState(Date.now());
  const [activeTimer, setActiveTimer] = useState(null);
  const [elapsed, setElapsed] = useState(0);

  const pushNotif = (msg, type='success') => {
    setNotif({msg, type});
    setNotifHistory(p=>[{id:Date.now(), msg, type, time:new Date()}, ...p].slice(0,10));
  };

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('gh_theme_n', theme);
  },[theme]);

  // Track Interaction for Activity Telemetry
  useEffect(()=>{
    const handleAction = () => { setLastActivity(Date.now()); setTelemetry(t=>({...t, activeCount: t.activeCount+1})); };
    const events = ['mousemove','keydown','scroll','mousedown'];
    events.forEach(e=>window.addEventListener(e, handleAction));
    
    const ticker = setInterval(()=>{
      const now = Date.now();
      const diff = Math.floor((now - lastActivity)/1000);
      if(diff > 30){ setTelemetry(t=>({...t, idle: t.idle + 1})); }
      else { setTelemetry(t=>({...t, active: t.active + 1})); }
    }, 1000);

    return ()=>{
       events.forEach(e=>window.removeEventListener(e, handleAction));
       clearInterval(ticker);
    };
  },[lastActivity]);

  useEffect(() => {
    if(!activeTimer || activeTimer.isPaused) return;
    const it = setInterval(()=>setElapsed(e=>e+1),1000);
    return ()=>clearInterval(it);
  },[activeTimer]);

  const fetchTasks = async (uId) => {
    const sId = uId || user?.id;
    try {
      // Local fall-back + Simulated Script Connection
      const data = JSON.parse(localStorage.getItem('gh_tasks')||'[]').filter(x=>x.userId===(sId||'demo'));
      setTasks(data);
    } catch(e) {}
  };

  const onLogin = (u) => {
    setUser(u); setLoginTime(new Date().toISOString()); setPage('dashboard'); fetchTasks(u.id);
  };

  return (
    <>
      {notif && <Notif msg={notif.msg} type={notif.type} onDone={()=>setNotif(null)}/>}
      
      {page === 'login' && <LoginPage theme={theme} setTheme={setTheme} onLogin={onLogin} onRegister={()=>{}} onForgot={()=>{}}/>}

      {user && page !== 'login' && (
        <div className="layout">
          <Sidebar page={page} setPage={setPage} user={user} loginTime={loginTime} theme={theme} setTheme={setTheme} notifHistory={notifHistory} onLogout={()=>{setUser(null); setPage('login');}}/>
          <main className="main">
             {page === 'dashboard' && <Dashboard user={user} tasks={tasks} telemetry={telemetry} setPage={setPage} pushNotif={pushNotif} onTasksChanged={()=>fetchTasks()} activeTimer={activeTimer} setActiveTimer={setActiveTimer} elapsed={elapsed} setElapsed={setElapsed}/>}
             {page === 'social' && <SocialProfile user={user} tasks={tasks} />}
             {page === 'settings' && <SettingsPage theme={theme} setTheme={setTheme} onLogout={()=>{setUser(null); setPage('login');}}/>}
             <div style={{height:'100px'}}/>
          </main>
        </div>
      )}
    </>
  );
};

const fmtDate12 = (d)=>{if(!d)return'';const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});};

const LoginPage = ({onLogin, setTheme, theme}) => {
  const [eid, setEid] = useState('GHZ-0001');
  const [pw, setPw] = useState('izumipassword');

  return (

         <h1 style={{fontWeight:900, fontSize:'24px', letterSpacing:'-1px'}}>ACCESS NEXUS</h1>
         <p style={{fontSize:13, color:'var(--tx2)', marginBottom:20}}>Gigahertz Computing Operational Environment</p>
         <div className="form-group"><label className="form-label">Employee Key</label><input className="form-input" value={eid} onChange={e=>setEid(e.target.value)}/></div>
         <div className="form-group"><label className="form-label">Nexus Protocol PW</label><input className="form-input" type="password" value={pw} onChange={e=>setPw(e.target.value)}/></div>
         <button className="btn-p" style={{width:'100%', marginTop:10}} onClick={()=>{setLoading(true); setTimeout(()=>{onLogin({id:'demo',firstName:'Admin', lastName:'Nexus', dept:'OPERATIONS', bio:'Core Protocol Overseer', empId:'GHZ-0001'}); setLoading(false);},1000)}}>
           {loading?'SYCHRONIZING...':'INITIALIZE'}
         </button>
      </div>
    </div>
  );
};
