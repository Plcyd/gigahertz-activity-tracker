                /* ═══════════════════════════════════════════════════
           BASE RESET & TYPOGRAPHY
        ═══════════════════════════════════════════════════ */
                *, *::before, *::after {
                    box-sizing: border-box;
                    margin: 0;
                    padding: 0
                }

                html {
                    height: 100%;
                    -webkit-tap-highlight-color: transparent
                }

                body {
                    font-family: 'Plus Jakarta Sans',sans-serif;
                    background: var(--bg);
                    color: var(--tx);
                    min-height: 100vh;
                    overflow-x: hidden;
                    transition: background .35s ease,color .35s ease;
                    -webkit-font-smoothing: antialiased;
                    margin-left: 280px;
                }

                @media (max-width: 768px) {
                    body {
                        margin-left: 0;
                    }
                }

                input, select, button, textarea {
                    font-family: inherit;
                    outline: none
                }

                button {
                    cursor: pointer
                }

                ::-webkit-scrollbar {
                    width: 4px;
                    height: 4px
                }

                ::-webkit-scrollbar-track {
                    background: transparent
                }

                ::-webkit-scrollbar-thumb {
                    background: var(--p);
                    border-radius: 99px;
                    opacity: .5
                }

                ::placeholder {
                    color: var(--tx3);
                    opacity: .7
                }

                ::selection {
                    background: var(--p);
                    color: #fff
                }

                img {
                    max-width: 100%;
                    display: block
                }

                /* ═══════════════════════════════════════════════════
           ANIMATIONS
        ═══════════════════════════════════════════════════ */
                @keyframes fadeUp {
                    from {
                        opacity: 0;
                        transform: translateY(16px)
                    }

                    to {
                        opacity: 1;
                        transform: translateY(0)
                    }
                }

                @keyframes fadeIn {
                    from {
                        opacity: 0
                    }

                    to {
                        opacity: 1
                    }
                }

                @keyframes spin {
                    to {
                        transform: rotate(360deg)
                    }
                }

                @keyframes slideLeft {
                    from {
                        opacity: 0;
                        transform: translateX(20px)
                    }

                    to {
                        opacity: 1;
                        transform: translateX(0)
                    }
                }

                @keyframes pulse {
                    0%,100% {
                        opacity: 1
                    }

                    50% {
                        opacity: .5
                    }
                }

                @keyframes timerGlow {
                    0%,100% {
                        text-shadow: 0 0 20px color-mix(in srgb,var(--p) 50%,transparent)
                    }

                    50% {
                        text-shadow: 0 0 40px color-mix(in srgb,var(--p) 80%,transparent)
                    }
                }

                @keyframes barGrow {
                    from {
                        transform: scaleY(0)
                    }

                    to {
                        transform: scaleY(1)
                    }
                }

                @keyframes shimmer {
                    0% {
                        background-position: -200% 0
                    }

                    100% {
                        background-position: 200% 0
                    }
                }

                @keyframes badgePulse {
                    0%,100% {
                        box-shadow: 0 0 0 0 var(--glow)
                    }

                    70% {
                        box-shadow: 0 0 0 6px transparent
                    }
                }

                .anim-fade {
                    animation: fadeUp .45s cubic-bezier(.16,1,.3,1) both
                }

                .anim-slide {
                    animation: slideLeft .38s cubic-bezier(.16,1,.3,1) both
                }

                body.no-anim *, body.no-anim *::before, body.no-anim *::after {
                    animation: none !important;
                    transition: none !important
                }

                @media (max-width: 768px) {
    body { margin-left: 0; }
    .sidebar { transform: translateX(-100%); z-index: 5000; }
    .sidebar.open { transform: translateX(0); }
    .main { padding: 16px; width: 100vw; overflow-x: hidden; }
    
    /* Fix table overflow on mobile */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; width: 100%; border-radius: 12px; }
    .nx-table { min-width: 600px; }
    
    /* Stack grid items on mobile */
    .grid { grid-template-columns: 1fr !important; gap: 16px; }
    
    /* Fix modal sizing */
    .glass-panel, .glass { padding: 16px; width: 100%; border-radius: 16px; }
    
    /* Make typography fit */
    .text-4xl, .text-3xl { font-size: 24px !important; }
    .timer-digits { font-size: 38px !important; }
}

                /* ═══════════════════════════════════════════════════
           GLASS UTILITY
        ═══════════════════════════════════════════════════ */
                .glass {
                    background: var(--glass);
                    backdrop-filter: blur(22px) saturate(180%);
                    -webkit-backdrop-filter: blur(22px) saturate(180%);
                    border: 1px solid var(--gborder);
                    box-shadow: 0 6px 24px var(--shadow),inset 0 1px 0 rgba(255,255,255,.15);
                    border-radius: 18px;
                    transition: box-shadow .3s ease
                }

                    .glass:hover {
                        box-shadow: 0 10px 32px var(--shadow),inset 0 1px 0 rgba(255,255,255,.2)
                    }

                .card {
                    background: var(--card);
                    backdrop-filter: blur(18px);
                    border: 1px solid var(--gborder);
                    border-radius: 16px;
                    box-shadow: 0 4px 16px var(--shadow);
                    transition: transform .22s ease,box-shadow .22s ease
                }

                    .card:hover {
                        transform: translateY(-2px);
                        box-shadow: 0 8px 28px var(--shadow)
                    }

                /* ═══════════════════════════════════════════════════
           BUTTONS
        ═══════════════════════════════════════════════════ */
                .btn {
                    padding: 10px 18px;
                    border-radius: 11px;
                    font-weight: 800;
                    font-size: 13px;
                    cursor: pointer;
                    transition: all .22s ease;
                    border: none;
                    display: inline-flex;
                    align-items: center;
                    justify-content: center;
                    gap: 7px;
                    letter-spacing: .01em;
                    white-space: nowrap
                }

                .btn-aero {
                  background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, rgba(255,255,255,0.05) 100%);
                  backdrop-filter: blur(10px);
                  border: 1px solid rgba(255,255,255,0.3);
                  color: var(--tx);
                  font-weight: 800;
                  padding: 12px 24px;
                  border-radius: 12px;
                  width: 100%;
                  transition: all 0.3s ease;
                  box-shadow: 0 4px 15px var(--shadow);
                  text-transform: uppercase;
                  letter-spacing: 0.1em;
                  font-size: 13px;
                }
                .btn-aero:hover {
                  background: var(--btn);
                  color: #fff;
                  transform: translateY(-2px);
                  box-shadow: 0 8px 25px var(--glow);
                }

                .btn-primary {
                    background: var(--btn);
                    color: #fff;
                    box-shadow: 0 3px 12px var(--glow)
                }

                    .btn-primary:hover {
                        background: var(--btnH);
                        transform: translateY(-1px);
                        box-shadow: 0 6px 18px var(--glow)
                    }

                    .btn-primary:active {
                        transform: translateY(0)
                    }

                    .btn-primary:disabled {
                        opacity: .55;
                        cursor: not-allowed;
                        transform: none
                    }

                .btn-ghost {
                    background: rgba(128,128,128,.08);
                    color: var(--tx2);
                    border: 1px solid var(--bd)
                }

                    .btn-ghost:hover {
                        background: rgba(128,128,128,.15);
                        color: var(--tx);
                        transform: translateY(-1px)
                    }

                .btn-danger {
                    background: rgba(239,68,68,.12);
                    color: var(--danger);
                    border: 1px solid rgba(239,68,68,.25)
                }

                    .btn-danger:hover {
                        background: var(--danger);
                        color: #fff;
                        transform: translateY(-1px)
                    }

                .btn-ok {
                    background: rgba(34,197,94,.12);
                    color: var(--ok);
                    border: 1px solid rgba(34,197,94,.25)
                }

                    .btn-ok:hover {
                        background: var(--ok);
                        color: #fff;
                        transform: translateY(-1px)
                    }

                .btn-warn {
                    background: rgba(245,158,11,.12);
                    color: var(--warn);
                    border: 1px solid rgba(245,158,11,.25)
                }

                    .btn-warn:hover {
                        background: var(--warn);
                        color: #fff;
                        transform: translateY(-1px)
                    }

                .btn-sm {
                    padding: 7px 12px;
                    font-size: 11px;
                    border-radius: 9px
                }

                .btn-xs {
                    padding: 5px 9px;
                    font-size: 10px;
                    border-radius: 7px
                }

                .btn-icon {
                    width: 36px;
                    height: 36px;
                    padding: 0;
                    border-radius: 10px;
                    flex-shrink: 0
                }

                /* ═══════════════════════════════════════════════════
           INPUTS
        ═══════════════════════════════════════════════════ */
                .input {
                    width: 100%;
                    background: var(--ibg);
                    border: 1.5px solid var(--bd);
                    border-radius: 11px;
                    padding: 11px 14px;
                    color: var(--tx);
                    font-size: 13px;
                    font-weight: 600;
                    transition: all .22s ease
                }

                    .input:focus {
                        border-color: var(--p);
                        box-shadow: 0 0 0 3px color-mix(in srgb,var(--p) 15%,transparent);
                        background: var(--glass)
                    }

                .input-label {
                    display: block;
                    font-size: 10px;
                    font-weight: 900;
                    text-transform: uppercase;
                    letter-spacing: .12em;
                    color: var(--tx3);
                    margin-bottom: 6px
                }

                .form-group { margin-bottom: 16px; }
                .form-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: var(--tx2); margin-bottom: 6px; }
                .form-input { 
                  width: 100%; 
                  background: rgba(255,255,255,0.1); 
                  border: 1px solid rgba(255,255,255,0.2); 
                  border-radius: 10px; 
                  padding: 12px 14px; 
                  color: var(--tx); 
                  font-size: 13px; 
                  font-weight: 600; 
                  transition: all 0.2s ease;
                  outline: none;
                }
                .form-input:focus { 
                  background: rgba(255,255,255,0.15); 
                  border-color: var(--p); 
                  box-shadow: 0 0 0 3px rgba(30,80,200,0.2);
                }

                select.input option {
                    background: var(--wh);
                    color: var(--tx)
                }

                textarea.input {
                    resize: vertical
                }

                /* ═══════════════════════════════════════════════════
           BADGES & TAGS
        ═══════════════════════════════════════════════════ */
                .badge {
                    display: inline-flex;
                    align-items: center;
                    gap: 4px;
                    padding: 3px 9px;
                    border-radius: 99px;
                    font-size: 9px;
                    font-weight: 900;
                    text-transform: uppercase;
                    letter-spacing: .08em
                }

                .badge-ok {
                    background: rgba(34,197,94,.15);
                    color: var(--ok);
                    border: 1px solid rgba(34,197,94,.3)
                }

                .badge-warn {
                    background: rgba(245,158,11,.15);
                    color: var(--warn);
                    border: 1px solid rgba(245,158,11,.3)
                }

                .badge-danger {
                    background: rgba(239,68,68,.15);
                    color: var(--danger);
                    border: 1px solid rgba(239,68,68,.3)
                }

                .badge-info {
                    background: var(--pl);
                    color: var(--p);
                    border: 1px solid color-mix(in srgb,var(--p) 30%,transparent)
                }

                .tag-Admin {
                    background: rgba(59,130,246,.15);
                    color: #60a5fa;
                    border: 1px solid rgba(59,130,246,.25)
                }

                .tag-Support {
                    background: rgba(34,197,94,.15);
                    color: #4ade80;
                    border: 1px solid rgba(34,197,94,.25)
                }

                .tag-Dev {
                    background: rgba(168,85,247,.15);
                    color: #c084fc;
                    border: 1px solid rgba(168,85,247,.25)
                }

                .tag-Meeting {
                    background: rgba(249,115,22,.15);
                    color: #fb923c;
                    border: 1px solid rgba(249,115,22,.25)
                }

                .tag-Operations {
                    background: rgba(236,72,153,.15);
                    color: #f472b6;
                    border: 1px solid rgba(236,72,153,.25)
                }

                /* ═══════════════════════════════════════════════════
           SPINNER / LOADING
        ═══════════════════════════════════════════════════ */
                .spinner {
                    width: 16px;
                    height: 16px;
                    border: 2px solid rgba(255,255,255,.25);
                    border-top-color: #fff;
                    border-radius: 50%;
                    animation: spin .65s linear infinite;
                    display: inline-block;
                    flex-shrink: 0
                }

                .spinner-p {
                    border-color: var(--pl);
                    border-top-color: var(--p)
                }

                /* ═══════════════════════════════════════════════════
           TABLE
        ═══════════════════════════════════════════════════ */
                .table-wrap {
                    overflow-x: auto;
                    -webkit-overflow-scrolling: touch;
                    border-radius: 16px
                }

                .nx-table {
                    width: 100%;
                    min-width: 480px;
                    border-collapse: separate;
                    border-spacing: 0
                }

                    .nx-table th {
                        padding: 13px 18px;
                        text-align: left;
                        font-size: 9px;
                        font-weight: 900;
                        text-transform: uppercase;
                        letter-spacing: .1em;
                        color: var(--tx3);
                        border-bottom: 1px solid var(--bd);
                        background: rgba(0,0,0,.04);
                        white-space: nowrap
                    }

                    .nx-table td {
                        padding: 13px 18px;
                        border-bottom: 1px solid var(--bd);
                        font-size: 13px;
                        font-weight: 600;
                        vertical-align: middle
                    }

                    .nx-table tbody tr:last-child td {
                        border-bottom: none
                    }

                    .nx-table tbody tr:hover td {
                        background: var(--pl);
                        transition: background .15s
                    }

                /* ═══════════════════════════════════════════════════
           PROGRESS BAR
        ═══════════════════════════════════════════════════ */
                .progress {
                    height: 7px;
                    background: rgba(128,128,128,.15);
                    border-radius: 99px;
                    overflow: hidden
                }

                .progress-fill {
                    height: 100%;
                    background: var(--btn);
                    border-radius: 99px;
                    transition: width 1s cubic-bezier(.16,1,.3,1)
                }

                .progress-thin {
                    height: 4px
                }

                /* ═══════════════════════════════════════════════════
           STAT CARDS
        ═══════════════════════════════════════════════════ */
                .stat-card {
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                    padding: 18px;
                    border-radius: 16px;
                    background: var(--glass);
                    backdrop-filter: blur(18px);
                    border: 1px solid var(--gborder);
                    box-shadow: 0 4px 16px var(--shadow);
                    transition: transform .22s ease,box-shadow .22s ease
                }

                    .stat-card:hover {
                        transform: translateY(-3px);
                        box-shadow: 0 10px 28px var(--shadow)
                    }

                .stat-icon {
                    width: 40px;
                    height: 40px;
                    border-radius: 11px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 17px;
                    background: var(--pl);
                    color: var(--p);
                    flex-shrink: 0
                }

                /* ═══════════════════════════════════════════════════
           TIMER DISPLAY
        ═══════════════════════════════════════════════════ */
                .timer-digits {
                    font-family: 'Space Mono',monospace;
                    font-size: 46px;
                    font-weight: 700;
                    color: var(--p);
                    letter-spacing: 3px;
                    line-height: 1
                }

                .timer-running {
                    animation: timerGlow 2s ease infinite
                }

                .timer-md {
                    font-size: 32px;
                    letter-spacing: 2px
                }

                .timer-sm {
                    font-size: 20px;
                    letter-spacing: 1px
                }

                /* ═══════════════════════════════════════════════════
           APP LAYOUT
        ═══════════════════════════════════════════════════ */
                .app-wrap {
                    display: flex;
                    min-height: 100vh
                }

                .sidebar {
                    width: 256px;
                    height: 100vh;
                    background: var(--sidebar);
                    backdrop-filter: blur(20px);
                    -webkit-backdrop-filter: blur(20px);
                    display: flex;
                    flex-direction: column;
                    position: fixed;
                    top: 0;
                    left: 0;
                    z-index: 100;
                    border-right: 1px solid var(--bd);
                    transition: transform .3s cubic-bezier(.16,1,.3,1)
                }

                .main {
                    margin-left: 256px;
                    min-height: 100vh;
                    display: flex;
                    flex-direction: column;
                    width: calc(100% - 256px)
                }

                .top-bar {
                    background: var(--header);
                    backdrop-filter: blur(18px);
                    -webkit-backdrop-filter: blur(18px);
                    border-bottom: 1px solid var(--bd);
                    padding: 13px 24px;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    gap: 12px;
                    flex-wrap: wrap;
                    flex-shrink: 0;
                    position: sticky;
                    top: 0;
                    z-index: 50
                }

                .content {
                    padding: 22px 24px;
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    gap: 18px
                }

                .content-pb {
                    padding-bottom: 100px
                }

                /* SIDEBAR COMPONENTS */
                .sidebar-logo {
                    padding: 18px 18px 14px;
                    border-bottom: 1px solid var(--bd);
                    display: flex;
                    align-items: center;
                    gap: 11px;
                    flex-shrink: 0
                }

                .logo-wrap {
                    width: 38px;
                    height: 38px;
                    border-radius: 10px;
                    overflow: hidden;
                    flex-shrink: 0;
                    background: var(--ibg);
                    display: flex;
                    align-items: center;
                    justify-content: center
                }

                    .logo-wrap img {
                        width: 100%;
                        height: 100%;
                        object-fit: contain
                    }

                .nav-section {
                    font-size: 9px;
                    font-weight: 900;
                    text-transform: uppercase;
                    letter-spacing: .14em;
                    color: var(--tx3);
                    padding: 10px 16px 5px;
                    display: block
                }

                .nav-item {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    padding: 10px 13px;
                    border-radius: 11px;
                    font-size: 13px;
                    font-weight: 700;
                    cursor: pointer;
                    transition: all .2s ease;
                    color: var(--tx2);
                    border: none;
                    background: transparent;
                    width: 100%;
                    text-align: left;
                    margin-bottom: 2px;
                    position: relative
                }

                    .nav-item:hover {
                        background: rgba(128,128,128,.1);
                        color: var(--tx);
                        transform: translateX(2px)
                    }

                    .nav-item.active {
                        background: var(--pl);
                        color: var(--p);
                        border: 1px solid color-mix(in srgb,var(--p) 20%,transparent)
                    }

                .nav-icon {
                    width: 30px;
                    height: 30px;
                    border-radius: 8px;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-size: 13px;
                    flex-shrink: 0;
                    background: rgba(128,128,128,.08);
                    transition: all .2s
                }

                .nav-item.active .nav-icon {
                    background: var(--btn);
                    color: #fff;
                    box-shadow: 0 3px 8px var(--glow)
                }

                .nav-badge {
                    position: absolute;
                    right: 12px;
                    background: var(--danger);
                    color: #fff;
                    border-radius: 99px;
                    font-size: 9px;
                    font-weight: 900;
                    padding: 2px 6px;
                    animation: badgePulse 2s infinite
                }

                /* MOBILE NAV */
                .mob-topbar {
                    display: none;
                    background: var(--header);
                    backdrop-filter: blur(18px);
                    border-bottom: 1px solid var(--bd);
                    padding: 11px 14px;
                    align-items: center;
                    justify-content: space-between;
                    position: sticky;
                    top: 0;
                    z-index: 90;
                    gap: 10px
                }

                .mob-nav {
                    display: none;
                    position: fixed;
                    bottom: 0;
                    left: 0;
                    right: 0;
                    z-index: 200;
                    background: var(--sidebar);
                    backdrop-filter: blur(24px);
                    border-top: 1px solid var(--bd);
                    padding: 8px 6px max(8px,env(safe-area-inset-bottom));
                    overflow-x: auto;
                    -webkit-overflow-scrolling: touch
                }

                    .mob-nav::-webkit-scrollbar {
                        display: none
                    }

                .mob-row {
                    display: flex;
                    gap: 3px;
                    min-width: max-content;
                    width: 100%;
                    justify-content: space-around
                }

                .mob-item {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 3px;
                    padding: 6px 11px;
                    border-radius: 10px;
                    font-size: 9px;
                    font-weight: 800;
                    text-transform: uppercase;
                    letter-spacing: .05em;
                    cursor: pointer;
                    color: var(--tx3);
                    border: none;
                    background: transparent;
                    flex-shrink: 0;
                    transition: all .2s
                }

                    .mob-item.active {
                        color: var(--p);
                        background: var(--pl)
                    }

                    .mob-item i {
                        font-size: 18px
                    }

                /* SIDEBAR OVERLAY */
                .sidebar-overlay {
                    display: none;
                    position: fixed;
                    inset: 0;
                    background: rgba(0,0,0,.45);
                    z-index: 99;
                    backdrop-filter: blur(3px)
                }

                    .sidebar-overlay.show {
                        display: block
                    }

                /* ═══════════════════════════════════════════════════
           AUTH
        ═══════════════════════════════════════════════════ */
                .auth-bg {
                    min-height: 100vh;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 20px;
                    background: var(--bg)
                }

                .auth-card {
                    width: 100%;
                    max-width: 440px;
                    border-radius: 16px;
                    padding: 0;
                    overflow: hidden;
                    background: var(--glass);
                    backdrop-filter: blur(24px) saturate(1.5);
                    -webkit-backdrop-filter: blur(24px) saturate(1.5);
                    border: 1px solid var(--gborder);
                    box-shadow: 0 20px 60px var(--shadow), inset 0 1px 0 rgba(255,255,255,0.3);
                    animation: cardIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
                }
                @keyframes cardIn{from{opacity:0;transform:scale(0.92) translateY(16px);}to{opacity:1;transform:scale(1) translateY(0);}}

                .auth-titlebar{
                  background: var(--btn);
                  padding: 10px 16px;
                  display: flex; align-items: center; gap: 10px;
                  border-bottom: 1px solid var(--bd);
                  position: relative;
                }
                .auth-titlebar-dots{display: flex; gap: 6px; margin-left: auto;}
                .titlebar-dot{width: 13px; height: 13px; border-radius: 50%; cursor: pointer; box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);}
                .dot-close{background: linear-gradient(135deg,#ff8080,#ff3030);}
                .dot-min{background: linear-gradient(135deg,#ffe080,#ffaa00);}
                .dot-max{background: linear-gradient(135deg,#80ff80,#20cc20);}
                .auth-titlebar-title{font-size: 13px; font-weight: 700; color: #fff; letter-spacing: 0.03em; display: flex; align-items: center; gap: 8px;}

                .auth-body{padding: 28px 32px 24px;}
                .auth-logo-wrap{display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 22px;}
                .auth-logo-img{height: 52px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(30,80,200,0.3));}
                .auth-logo-tagline{font-size: 10px; font-weight: 700; letter-spacing: 0.15em; color: var(--tx3); text-transform: uppercase;}
                .auth-title{font-size: 20px; font-weight: 800; color: var(--tx); text-align: center; margin-bottom: 4px; letter-spacing: 0.04em;}
                .auth-sub{font-size: 12px; color: var(--tx3); text-align: center; margin-bottom: 20px;}

                /* ═══════════════════════════════════════════════════
           TOAST
        ═══════════════════════════════════════════════════ */
                .toast-wrap {
                    position: fixed;
                    top: 16px;
                    right: 16px;
                    z-index: 3000;
                    display: flex;
                    flex-direction: column;
                    gap: 8px;
                    max-width: 330px;
                    width: calc(100% - 32px);
                    pointer-events: none
                }

                .toast {
                    display: flex;
                    align-items: center;
                    gap: 11px;
                    padding: 12px 15px;
                    border-radius: 13px;
                    background: var(--glass);
                    backdrop-filter: blur(24px);
                    border: 1px solid var(--gborder);
                    box-shadow: 0 8px 24px rgba(0,0,0,.25);
                    font-size: 13px;
                    font-weight: 700;
                    color: var(--tx);
                    animation: slideLeft .3s ease;
                    pointer-events: all
                }

                /* ═══════════════════════════════════════════════════
           MODAL
        ═══════════════════════════════════════════════════ */
                .modal-bg {
                    position: fixed;
                    inset: 0;
                    z-index: 1000;
                    background: rgba(0,0,0,.55);
                    backdrop-filter: blur(6px);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 16px;
                    animation: fadeIn .22s ease
                }

                .modal {
                    background: var(--glass);
                    backdrop-filter: blur(28px);
                    border: 1px solid var(--gborder);
                    border-radius: 22px;
                    width: 100%;
                    max-width: 500px;
                    max-height: 92vh;
                    overflow-y: auto;
                    animation: fadeUp .32s cubic-bezier(.16,1,.3,1);
                    box-shadow: 0 24px 60px rgba(0,0,0,.4)
                }

                @media(max-width:600px) {
                    .modal {
                        max-width: 100%;
                        border-radius: 20px 20px 0 0;
                        max-height: 94vh
                    }

                    .modal-bg {
                        align-items: flex-end;
                        padding: 0
                    }
                }

                .modal-head {
                    padding: 20px 24px;
                    border-bottom: 1px solid var(--bd);
                    display: flex;
                    justify-content: space-between;
                    align-items: center;
                    background: rgba(0,0,0,.05);
                    border-radius: 22px 22px 0 0
                }

                .modal-body {
                    padding: 22px 24px;
                    display: flex;
                    flex-direction: column;
                    gap: 14px
                }

                /* ═══════════════════════════════════════════════════
           GAS STATUS PILL
        ═══════════════════════════════════════════════════ */
                .gas-pill {
                    display: inline-flex;
                    align-items: center;
                    gap: 6px;
                    padding: 5px 11px;
                    border-radius: 99px;
                    font-size: 10px;
                    font-weight: 800;
                    transition: all .3s
                }

                .gas-online {
                    background: rgba(34,197,94,.15);
                    color: var(--ok);
                    border: 1px solid rgba(34,197,94,.3)
                }

                .gas-offline {
                    background: rgba(239,68,68,.15);
                    color: var(--danger);
                    border: 1px solid rgba(239,68,68,.3)
                }

                .gas-checking {
                    background: rgba(245,158,11,.15);
                    color: var(--warn);
                    border: 1px solid rgba(245,158,11,.3)
                }

                .gas-dot {
                    width: 7px;
                    height: 7px;
                    border-radius: 50%;
                    flex-shrink: 0
                }

                .gas-dot-ok {
                    background: var(--ok);
                    animation: pulse 2s infinite
                }

                .gas-dot-err {
                    background: var(--danger)
                }

                .gas-dot-chk {
                    background: var(--warn);
                    animation: pulse 1s infinite
                }

                /* ═══════════════════════════════════════════════════
           AVATAR
        ═══════════════════════════════════════════════════ */
                .av {
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: 900;
                    color: #fff;
                    flex-shrink: 0;
                    overflow: hidden;
                    border: 2px solid var(--gborder)
                }

                .av-sm {
                    width: 34px;
                    height: 34px;
                    font-size: 12px
                }

                .av-md {
                    width: 46px;
                    height: 46px;
                    font-size: 16px
                }

                .av-lg {
                    width: 60px;
                    height: 60px;
                    font-size: 21px
                }

                /* ═══════════════════════════════════════════════════
           QUEUE ITEM
        ═══════════════════════════════════════════════════ */
                .queue-item {
                    display: flex;
                    align-items: center;
                    gap: 10px;
                    padding: 10px 14px;
                    border-radius: 12px;
                    background: var(--ibg);
                    border: 1px solid var(--bd);
                    margin-bottom: 6px;
                    transition: all .2s
                }

                    .queue-item:hover {
                        border-color: color-mix(in srgb,var(--p) 35%,transparent)
                    }

                /* ═══════════════════════════════════════════════════
           TOGGLE
        ═══════════════════════════════════════════════════ */
                .toggle-wrap {
                    position: relative;
                    width: 42px;
                    height: 23px;
                    display: inline-block;
                    flex-shrink: 0
                }

                    .toggle-wrap input {
                        opacity: 0;
                        width: 0;
                        height: 0;
                        position: absolute
                    }

                .toggle-sl {
                    position: absolute;
                    inset: 0;
                    border-radius: 23px;
                    background: rgba(128,128,128,.22);
                    border: 1px solid var(--bd);
                    cursor: pointer;
                    transition: .28s
                }

                    .toggle-sl::before {
                        content: '';
                        position: absolute;
                        width: 15px;
                        height: 15px;
                        left: 3px;
                        top: 3px;
                        border-radius: 50%;
                        background: var(--tx3);
                        transition: .28s
                    }

                input:checked + .toggle-sl {
                    background: var(--btn);
                    border-color: var(--pd)
                }

                    input:checked + .toggle-sl::before {
                        transform: translateX(19px);
                        background: #fff
                    }

                /* ═══════════════════════════════════════════════════
           KUDOS CARD
        ═══════════════════════════════════════════════════ */
                .kudos-card {
                    padding: 12px 14px;
                    background: var(--ibg);
                    border-radius: 12px;
                    border: 1px solid var(--bd);
                    font-size: 13px;
                    margin-bottom: 8px;
                    animation: fadeUp .3s ease
                }

                /* ═══════════════════════════════════════════════════
           CHARTS
        ═══════════════════════════════════════════════════ */
                .bar-chart {
                    display: flex;
                    align-items: flex-end;
                    gap: 10px;
                    height: 130px
                }

                .bar-wrap {
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    gap: 5px;
                    flex: 1
                }

                .bar-fill {
                    width: 100%;
                    border-radius: 7px 7px 0 0;
                    min-height: 4px;
                    background: var(--btn);
                    transform-origin: bottom;
                    animation: barGrow .75s cubic-bezier(.16,1,.3,1) both;
                    box-shadow: 0 -2px 8px var(--glow)
                }

                .bar-val {
                    font-size: 10px;
                    font-weight: 900;

// ═══════════════════════════════════════════════════
window.addEventListener('unhandledrejection', (event) => {
  if (event.reason && (event.reason.message === 'WebSocket closed without opened.' || event.reason.toString().includes('WebSocket'))) {
    event.preventDefault();
  }
});
window.onerror = function(message, source, lineno, colno, error) {
  if (message && (message.toString().includes('WebSocket') || message.toString().toLowerCase().includes('websocket'))) {
    return true; // Suppress
  }
};
// Suppress browser console warnings for web sockets
console.warn = (function(oldWarn) {
  return function() {
    if (arguments[0] && typeof arguments[0] === 'string' && arguments[0].includes('WebSocket')) return;
    oldWarn.apply(console, arguments);
  };
})(console.warn);

/* ═══════════════════════════════════════════════════

const ThemeEngine = {
  themes: ['gigahertz', 'midnight', 'forest', 'ocean', 'coffee', 'rosegold', 'sunset', 'sakura', 'corporate', 'nomad', 'planner', 'coffeeshop', 'library', 'frutiger', 'light', 'dark', 'rose', 'amber', 'matrix', 'candy', 'retro', 'aurora', 'neon', 'frost', 'lavender', 'red', 'cyberpunk', 'egypt', 'ddlc', 'synthwave', 'christmas', 'independence', 'summer', 'dididi', 'vaporwave', 'steampunk', 'dracula', 'nordtheme', 'gruvbox', 'onedark', 'serenity', 'monowork', 'pastel', 'industrial', 'scandinavian', 'retrooffice', 'neon-grid', 'zen', 'glass', 'grid', 'timeblock', 'goalboard', 'blueprint', 'whiteboard', 'calmblue', 'warm', 'etong'],
  currentIndex: 0,
  cycleInterval: null,
  
  setTheme: (name) => {
    document.body.className = 'theme-' + name;
    document.documentElement.setAttribute('data-theme', name);
    localStorage.setItem('ghz_theme', name);
  },
  
  init: () => {
    const saved = localStorage.getItem('ghz_theme') || 'gigahertz';
    ThemeEngine.setTheme(saved);
  },
  
  startCycling: (interval = 60000, shuffle = false) => {
    ThemeEngine.stopCycling();
    ThemeEngine.cycleInterval = setInterval(() => {
      if (shuffle) {
        const next = Math.floor(Math.random() * ThemeEngine.themes.length);
        ThemeEngine.setTheme(ThemeEngine.themes[next]);
      } else {
        const current = localStorage.getItem('ghz_theme') || 'gigahertz';
        let idx = ThemeEngine.themes.indexOf(current);
        idx = (idx + 1) % ThemeEngine.themes.length;
        ThemeEngine.setTheme(ThemeEngine.themes[idx]);
      }
    }, interval);
  },
  
  stopCycling: () => {
    if (ThemeEngine.cycleInterval) {
      clearInterval(ThemeEngine.cycleInterval);
      ThemeEngine.cycleInterval = null;
    }
  }
};
ThemeEngine.init();

};
const AFK_TIMEOUT=900;
const TASK_CATS=['Admin','Support','Meeting','Dev','Operations'];
const CAT_COLORS={Admin:'#3b82f6',Support:'#22c55e',Meeting:'#f97316',Dev:'#a855f7',Operations:'#ec4899'};

/* ═══════════════════════════════════════════════════
   LAPIS FRAMEWORK — Lua Web Framework Integration
═══════════════════════════════════════════════════ */
const LAPIS={
  // ════════════════════════════════════════════════
  // LAPIS ROUTING ENGINE
  // ════════════════════════════════════════════════
  routes:{},
  middleware:[],
  errorHandlers:{},
  
  // Register a route with HTTP method
  route:(method,path,handler)=>{
    const key=`${method.toUpperCase()} ${path}`;
    LAPIS.routes[key]=handler;
    console.log(`[LAPIS] Route registered: ${key}`);
  },
  
  // HTTP Verb shortcuts
  get:(path,handler)=>LAPIS.route('GET',path,handler),
  post:(path,handler)=>LAPIS.route('POST',path,handler),
  put:(path,handler)=>LAPIS.route('PUT',path,handler),
  delete:(path,handler)=>LAPIS.route('DELETE',path,handler),
  patch:(path,handler)=>LAPIS.route('PATCH',path,handler),
  
  // Match route and execute handler
  dispatch:(method,path,payload)=>{
    const key=`${method.toUpperCase()} ${path}`;
    if(LAPIS.routes[key]){
      try{
        return LAPIS.routes[key](payload);
      }catch(e){
        console.error(`[LAPIS] Route error on ${key}:`,e);
        return{error:true,message:e.message};
      }
    }
    return{error:true,message:`Route not found: ${key}`};
  },
  
  // ════════════════════════════════════════════════
  // LAPIS MIDDLEWARE ENGINE
  // ════════════════════════════════════════════════
  use:(middleware)=>{
    LAPIS.middleware.push(middleware);
    console.log(`[LAPIS] Middleware added: ${middleware.name||'anonymous'}`);
  },
  
  executeMiddleware:async(ctx)=>{
    for(const mw of LAPIS.middleware){
      const result=await mw(ctx);
      if(result===false)return false;
    }
    return true;
  },
  
  // ════════════════════════════════════════════════
  // LAPIS MODEL ENGINE
  // ════════════════════════════════════════════════
  models:{},
  
  model:(name,schema)=>{
    LAPIS.models[name]={
      schema,
      data:[],
      create:(obj)=>{
        const entry={id:Date.now(),...obj};
        LAPIS.models[name].data.push(entry);
        return entry;
      },
      find:(query)=>LAPIS.models[name].data.filter(e=>Object.keys(query).every(k=>e[k]===query[k])),
      findOne:(query)=>LAPIS.models[name].data.find(e=>Object.keys(query).every(k=>e[k]===query[k])),
      findById:(id)=>LAPIS.models[name].data.find(e=>e.id===id),
      update:(id,fields)=>{
        const idx=LAPIS.models[name].data.findIndex(e=>e.id===id);
        if(idx>-1){LAPIS.models[name].data[idx]={...LAPIS.models[name].data[idx],...fields};return LAPIS.models[name].data[idx];}
        return null;
      },
      delete:(id)=>{
        LAPIS.models[name].data=LAPIS.models[name].data.filter(e=>e.id!==id);
      },
      all:()=>LAPIS.models[name].data
    };
    console.log(`[LAPIS] Model created: ${name}`);
  },
  
  // ════════════════════════════════════════════════
  // LAPIS VALIDATOR ENGINE
  // ════════════════════════════════════════════════
  validators:{
    string:(v,opts={})=>typeof v==='string'&&(opts.minLength?v.length>=opts.minLength:true)&&(opts.maxLength?v.length<=opts.maxLength:true),
    email:(v)=>/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),
    number:(v,opts={})=>typeof v==='number'&&(opts.min?v>=opts.min:true)&&(opts.max?v<=opts.max:true),
    boolean:(v)=>typeof v==='boolean',
    array:(v,opts={})=>Array.isArray(v)&&(opts.minLength?v.length>=opts.minLength:true)&&(opts.maxLength?v.length<=opts.maxLength:true),
    required:(v)=>v!==null&&v!==undefined&&v!=='',
    custom:(v,fn)=>fn(v)
  },
  
  validate:(data,schema)=>{
    const errors={};
    for(const[field,rule] of Object.entries(schema)){
      if(!LAPIS.validators[rule.type]){
        errors[field]='Unknown validator type';
        continue;
      }
      if(!LAPIS.validators[rule.type](data[field],rule.opts)){
        errors[field]=rule.message||`${field} validation failed`;
      }
    }
    return{valid:Object.keys(errors).length===0,errors};
  },
  
  // ════════════════════════════════════════════════
  // LAPIS ERROR HANDLER
  // ════════════════════════════════════════════════
  handleError:(status,message,handler)=>{
    LAPIS.errorHandlers[status]={message,handler};
  },
  
  getError:(status)=>LAPIS.errorHandlers[status]||{message:'Unknown error',handler:()=>({error:true,status})},
  
  // ════════════════════════════════════════════════
  // LAPIS SESSION MANAGER
  // ════════════════════════════════════════════════
  sessions:{},
  
  createSession:(sessionId,data)=>{
    LAPIS.sessions[sessionId]={data,createdAt:Date.now(),lastAccess:Date.now()};
    return sessionId;
  },
  
  getSession:(sessionId)=>{
    if(LAPIS.sessions[sessionId]){
      LAPIS.sessions[sessionId].lastAccess=Date.now();
      return LAPIS.sessions[sessionId].data;
    }
    return null;
  },
  
  destroySession:(sessionId)=>{
    delete LAPIS.sessions[sessionId];
  },
  
  // ════════════════════════════════════════════════
  // LAPIS CACHING ENGINE
  // ════════════════════════════════════════════════
  cache:{},
  cacheExpiry:{},
  
  setCacheEntry:(key,value,ttl=3600)=>{
    LAPIS.cache[key]=value;
    if(ttl>0){
      LAPIS.cacheExpiry[key]=Date.now()+(ttl*1000);
    }
  },
  
  getCacheEntry:(key)=>{
    if(LAPIS.cacheExpiry[key]&&Date.now()>LAPIS.cacheExpiry[key]){
      delete LAPIS.cache[key];
      delete LAPIS.cacheExpiry[key];
      return null;
    }
    return LAPIS.cache[key]||null;
  },
  
  clearCache:()=>{LAPIS.cache={};LAPIS.cacheExpiry={};},
  
  // ════════════════════════════════════════════════
  // LAPIS HTTP CLIENT
  // ════════════════════════════════════════════════
  async request(method,url,data=null,headers={}){
    const opts={method,headers:{'Content-Type':'application/json',...headers}};
    if(data)opts.body=JSON.stringify(data);
    try{
      const res=await fetch(url,opts);
      const json=await res.json();
      return{status:res.status,data:json,ok:res.ok};
    }catch(e){
      return{error:true,message:e.message};
    }
  },
  
  get:(url,headers)=>LAPIS.request('GET',url,null,headers),
  post:(url,data,headers)=>LAPIS.request('POST',url,data,headers),
  put:(url,data,headers)=>LAPIS.request('PUT',url,data,headers),
  delete:(url,data,headers)=>LAPIS.request('DELETE',url,data,headers),
  
  // ════════════════════════════════════════════════
  // LAPIS UTILITIES

const getDist=(lat1,lon1,lat2,lon2)=>{const R=6371e3,p1=lat1*Math.PI/180,p2=lat2*Math.PI/180,dp=(lat2-lat1)*Math.PI/180,dl=(lon2-lon1)*Math.PI/180;const a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return Math.round(R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a)))};

/* ═══════════════════════════════════════════════════
   GAS API — with retry, offline queue, status, batch ops, and secret headers
═══════════════════════════════════════════════════ */
const GAS={
  status:'unknown', // 'online' | 'offline' | 'unknown' | 'checking'
  _queue:[],
  _listeners:[],
  _lastSyncTime:0,
  _syncInterval:5*60*1000, // Sync every 5 minutes if online
  _secretKey:'GIGAHERTZ_NEXUS_CORE_2026', // Secret header key for API security
  _batchBuffer:[],
  _batchTimeout:null,
  _batchSize:50, // Batch after 50 operations
  
  // Generate UUID for row identification
  generateUUID:()=>{
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
      const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);
      return v.toString(16);
    });
  },
  
  onStatus(fn){this._listeners.push(fn);},
  _emit(){this._listeners.forEach(fn=>fn(this.status));},
  
  // Batch operations - collect and send together
  addToBatch(action,payload){
    this._batchBuffer.push({action,payload,uuid:this.generateUUID()});
    if(this._batchBuffer.length>=this._batchSize){
      this.flushBatch();
    }else{
      clearTimeout(this._batchTimeout);
      this._batchTimeout=setTimeout(()=>this.flushBatch(),2000);
    }
  },
  
  async flushBatch(){
    if(this._batchBuffer.length===0)return;
    const batch=[...this._batchBuffer];
    this._batchBuffer=[];
    console.log(`[GAS-BATCH] Flushing ${batch.length} operations`);
    return await this._fetch({action:'batchOperations',operations:batch});
  },
  
  async _fetchGET(action,params={},retries=2){
    // Support for GET requests (used for read-only operations like retrospective logs)
    const url=GAS_CONFIG.webAppUrl||GAS_URL;
    const queryString=new URLSearchParams({action,...params}).toString();
    const fullUrl=`${url}?${queryString}`;
    
    for(let i=0;i<=retries;i++){
      try{
        const ctrl=new AbortController();
        const t=setTimeout(()=>ctrl.abort(),8000);
        
        console.log(`[FORM SUBMIT TRIGGERED] Action (GET): ${action}`);
        console.log('[DATA PREPARED]', JSON.stringify(params));
        console.log('[FETCH SENT]', fullUrl);
        
        const r=await fetch(fullUrl,{
          method:'GET',
          headers:{
            'Content-Type':'application/json'
          },
          signal:ctrl.signal
        });
        clearTimeout(t);
        if(r.ok){
          const d=await r.json();
          console.log("[RESPONSE RECEIVED]", d);
          if(this.status!=='online'){this.status='online';this._emit();}
          return d;
        }else{
          console.warn(`[GAS ERROR] ✗ ${action} failed with status ${r.status}`);
        }
      }catch(e){
        console.error(`[GAS NETWORK ERROR] On attempt ${i+1}:`,e.message);
        if(i<retries){await new Promise(r=>setTimeout(r,1200*(i+1)));}
      }
    }
    if(this.status!=='offline'){this.status='offline';this._emit();}
    return null;
  },
  
  async _fetch(payload,retries=2){
    // Ensure we're using the correct GAS URL
    const url=GAS_CONFIG.webAppUrl||GAS_URL;
    for(let i=0;i<=retries;i++){
      try{
        const ctrl=new AbortController();
        const t=setTimeout(()=>ctrl.abort(),8000);
        
        console.log(`[FORM SUBMIT TRIGGERED] Action: ${payload.action}`);
        console.log('[DATA PREPARED]', JSON.stringify(payload));
        console.log('[FETCH SENT]', url);
        
        const r=await fetch(url,{
          method:'POST',
          body:JSON.stringify({
            ...payload,
            _secret: this._secretKey,
            _requestId: this.generateUUID()
          }),
          headers:{
            'Content-Type':'application/json'
          },
          signal:ctrl.signal
        });
        clearTimeout(t);
        if(r.ok){
          const d=await r.json();
          console.log("[RESPONSE RECEIVED]", d);
          if(this.status!=='online'){this.status='online';this._emit();}
          return d;
        }else{
          console.warn(`[GAS ERROR] ✗ ${payload.action} failed with status ${r.status}`);
        }
      }catch(e){
        console.error(`[GAS NETWORK ERROR] On attempt ${i+1}:`,e.message);
        if(i<retries){await new Promise(r=>setTimeout(r,1200*(i+1)));}
      }
    }
    if(this.status!=='offline'){this.status='offline';this._emit();}
    return null;
  },
  
  async ping(){
    this.status='checking';this._emit();
    const r=await this._fetch({action:'ping',_uuid:this.generateUUID()},1);
    this.status=r?'online':'offline';this._emit();
    return this.status==='online';
  },
  
  async call(action,payload={}){
    if(typeof google!=='undefined'&&google.script&&google.script.run){
      return new Promise((resolve)=>{
        google.script.run.withSuccessHandler(res=>resolve(res)).withFailureHandler(err=>resolve({success:false,error:err.message}))[action](payload);
      });
    }
    
    // Attempt local API first if in development / local server environment
    try {
      const localRes = await fetch('/api/' + action, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (localRes.ok) return await localRes.json();
    } catch (e) {
      // Local API failed, fall through to GAS fetch
    }

    if(action==='login')return this._localLogin(payload);
    
    // Special handling for GET-based operations
    if(action==='getRetrospectiveLogs'){
      return await this._fetchGET('getRetrospectiveLogs',{days:payload.days||30},1);
    }

    // Build full request with action and UUID for deduplication
    const req={action,...payload,_ts:Date.now(),_sync:true,_uuid:this.generateUUID()};
    
    // Use batch for write operations
    if(['logTask','addLeave','postAnnouncement','addProject','clockIn','clockOut','updateLeave','updateProject','batchLogActivities','endSession'].includes(action)){
      this.addToBatch(action,payload);
      return {success:true,queued:true,offline:true,message:`${action} queued for batch sync`};
    }
    
    const r=await this._fetch(req);

    if(!r){
      // Queue for later sync - only queue CRUD operations, not reads
      if(['logTask','addLeave','postAnnouncement','addProject','clockIn','clockOut','updateLeave','updateProject','batchLogActivities','endSession'].includes(action)){
        this._queue.push(req);
        LS.save('ghz_sync_q',this._queue);
        console.log(`[GAS] Queued offline: ${action}. Queue size: ${this._queue.length}`);
      }
    }else if(r.success||r.offline){
      // Clear from queue if successful
      this._queue=this._queue.filter(q=>q._uuid!==req._uuid);
      LS.save('ghz_sync_q',this._queue);
    }

    return r||{success:true,offline:true,message:`${action} queued for sync`};
  },
  
  async syncQueue(showToast){
    await this.flushBatch(); // Flush any pending batch operations first
    
    if(this._queue.length===0){
      if(showToast)showToast('No pending records to sync.','info');
      return {synced:0,skipped:0};
    }

    console.log(`[GAS] Starting sync of ${this._queue.length} offline records...`);
    const q=[...this._queue];this._queue=[];
    let synced=0,failed=0;

    for(const item of q){
      const r=await this._fetch(item,1);
      if(r&&(r.success||r.offline)){
        synced++;
        console.log(`[GAS] ✓ Synced: ${item.action}`);
      }else{
        failed++;
        this._queue.push(item);
        console.warn(`[GAS] ✗ Failed to sync: ${item.action}, requeueing...`);
      }
    }

    LS.save('ghz_sync_q',this._queue);
    const msg=`Synced ${synced} record(s)${failed>0?` · ${failed} pending retry`:''}`;
    if(showToast)showToast(msg+(synced>0?' ✓':''),'success');
    return {synced,failed,pending:this._queue.length};
  },

  /* ════════════════════════════════════════════════════════════════════
     GEOLOCATION ENGINE — 300M OFFICE RADIUS CHECK
  ════════════════════════════════════════════════════════════════════ */
  geoConfig:{HQ_LAT:14.594898,HQ_LNG:120.988591,RADIUS_M:300},
  
  // Haversine formula: calculate distance between two points
  calcDistance:(lat1,lon1,lat2,lon2)=>{
    const R=6371000;const φ1=lat1*Math.PI/180;const φ2=lat2*Math.PI/180;const Δφ=(lat2-lat1)*Math.PI/180;const Δλ=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(Δφ/2)*Math.sin(Δφ/2)+Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)*Math.sin(Δλ/2);
    const c=2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));return Math.round(R*c);
  },
  
  // Determine office status based on distance
  getLocationStatus:(lat,lng)=>{
    const d=GAS.calcDistance(lat,lng,GAS.geoConfig.HQ_LAT,GAS.geoConfig.HQ_LNG);
    return{status:d<=GAS.geoConfig.RADIUS_M?'IN_OFFICE':'REMOTE',distance:d,withinOffice:d<=GAS.geoConfig.RADIUS_M};
  },
  
  // Get user location via browser Geolocation API
  getUserLocation:()=>new Promise((resolve,reject)=>{
    if(!navigator.geolocation)reject(new Error('Geolocation not supported'));
    navigator.geolocation.getCurrentPosition(
      p=>{const{latitude,longitude,accuracy}=p.coords;resolve({latitude,longitude,accuracy,success:true});},
      e=>{reject(new Error(`Geolocation error: ${e.message}`));},
      {enableHighAccuracy:true,timeout:10000,maximumAge:0}
    );
  }),
  
  // Perform geolocation check-in with office status
  geoCheckin:async function(){
    try{
      const user = LS.load('ghz_user_v9');
      if (!user) {
        // Skip if no user is logged in
        return {success: false, error: 'NO_USER'};
      }
      const pos=await this.getUserLocation();
      const{latitude,longitude,accuracy}=pos;
      const locStatus=this.getLocationStatus(latitude,longitude);
      const payload={
        action:'geolocationCheckin',
        empId: user.empId,
        latitude,longitude,accuracy,
        status:locStatus.status,distance:locStatus.distance,
        withinOffice:locStatus.withinOffice,workLocation:locStatus.withinOffice?'Gigahertz Office':'Remote',
        _uuid:this.generateUUID() // ← UUID for deduplication
      };
      const res=await this.call('geolocationCheckin',payload);
      console.log(`[GEO] Check-in for ${user.empId}: ${locStatus.status}`);
      return{success:true,status:locStatus.status,distance:locStatus.distance,withinOffice:locStatus.withinOffice,...res};
    }catch(e){
      console.error('[GEO] Check-in failed:',e.message);
      return{success:false,error:e.message};
    }
  },
  
  // Auto check-in every N minutes
  autoGeoCheckin:(intervalMins=5)=>{
    GAS.geoCheckin();
    return setInterval(()=>GAS.geoCheckin(),intervalMins*60*1000);
  },
  
  // Get location history with stats
  getGeoHistory:async function(days=30){
    try{
      const res=await this.call('getGeolocationHistory',{days});
      if(!res.success||!res.history)return{success:false,data:[],stats:{}};
      const hist=res.history||[];
      return{success:true,data:hist,stats:{
        total:hist.length,
        inOffice:hist.filter(h=>h.status==='IN_OFFICE').length,
        remote:hist.filter(h=>h.status==='REMOTE').length,
        'inOffice%':Math.round((hist.filter(h=>h.status==='IN_OFFICE').length/Math.max(1,hist.length))*100),
        avgDist:Math.round(hist.reduce((s,h)=>s+(h.distance||0),0)/Math.max(1,hist.length))
      }};
    }catch(e){
      console.error('[GEO-HISTORY] Error:',e);
      return{success:false,error:e.message};
    }
  }
};
