  const [cat,setCat]=useState('Admin');
  const [customMode,setCustomMode]=useState(false);
  const [interactions,setInteractions]=useState(0);
  const [idleTime,setIdleTime]=useState(0);
  const [emergency,setEmergency]=useState(false);
  const [pauseModal,setPauseModal]=useState(null);
  const [memNote,setMemNote]=useState('');
  const [prevTask,setPrevTask]=useState(null);
  const [taskHistory,setTaskHistory]=useState([]);
  const [sessionStart,setSessionStart]=useState(new Date());
  const [taskFilter,setTaskFilter]=useState('');
  const [showHistory,setShowHistory]=useState(false);
  const tickRef=useRef(null);
  const elRef=useRef(0);
  const idleRef=useRef(0);
  const lastActRef=useRef(Date.now());

  // Persist timer state
  useEffect(()=>{
    const saved=LS.load(`timer_${safe.id}`);
    if(saved){
      setQueue(saved.queue||[]);
      if(saved.active){
        setActive(saved.active);
        if(saved.active.status==='running'){
          const extra=Math.floor((Date.now()-new Date(saved.active.resumeAt||saved.active.startTime).getTime())/1000);
          const newEl=(saved.active.elapsedBase||0)+extra;
          elRef.current=newEl;setElapsed(newEl);
        }else{elRef.current=saved.active.elapsedBase||0;setElapsed(saved.active.elapsedBase||0);}
      }
    }
  },[safe.id]);

  useEffect(()=>{
    LS.save(`timer_${safe.id}`,{active,queue});
  },[active,queue]);

  useEffect(()=>{
    if(active&&active.status==='running'){
      tickRef.current=setInterval(()=>{
        elRef.current+=1;setElapsed(elRef.current);
        if(Date.now()-lastActRef.current>30000){idleRef.current+=1;setIdleTime(idleRef.current);}
      },1000);
    }else clearInterval(tickRef.current);
    return()=>clearInterval(tickRef.current);
  },[active?.status]);

  useEffect(()=>{
    const track=()=>{lastActRef.current=Date.now();setInteractions(p=>p+1);};
    window.addEventListener('mousemove',track,{passive:true});
    window.addEventListener('keydown',track,{passive:true});
    return()=>{window.removeEventListener('mousemove',track);window.removeEventListener('keydown',track);};
  },[]);

  const startNew=(name,c)=>{
    const now=new Date().toISOString();
    const hasAnd=name.includes('&&');
    const cn=hasAnd?name.split('&&')[0].trim():name.trim();
    const pred=AI.predictTime(cn);
    const subs=hasAnd?AI.breakdown(cn).map(s=>({name:s,done:false})):[];
    if(active&&active.status==='running'){
      setPrevTask({...active,elapsedBase:elRef.current});
      setQueue(q=>[{...active,elapsedBase:elRef.current,status:'paused'},...q]);
      // Add to task history for productivity calculation
      setTaskHistory(h=>[...h,{...active,elapsedBase:elRef.current,stoppedAt:now}]);
    }
    const d=new Date(now);
    const t={taskName:cn,category:c||cat,startTime:now,startDate:`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`,resumeAt:now,elapsedBase:0,status:'running',pred,subtasks:subs};
    setActive(t);elRef.current=0;setElapsed(0);idleRef.current=0;setIdleTime(0);setInteractions(0);
    setCustomTask('');setSelPreset('');setCustomMode(false);
    showToast(`Started: "${cn.slice(0,28)}" — AI estimates ${pred.est}min`,'success');
  };

  const reqPause=()=>{if(active)setPauseModal({...active});};
  const confPause=(reason)=>{
    const el=elRef.current;
    setQueue(p=>[{...pauseModal,elapsedBase:el,status:'paused',pauseReason:reason,mem:memNote,paused:true},...p]);
    setActive(null);setPauseModal(null);setMemNote('');
    if(prevTask){setActive({...prevTask,status:'running',resumeAt:new Date().toISOString()});elRef.current=prevTask.elapsedBase||0;setElapsed(elRef.current);setPrevTask(null);showToast(`Resumed: "${prevTask.taskName.slice(0,22)}"…`,'info');}
    else showToast('Task paused & queued.','warn');
  };

  const resumeQueue=(idx)=>{
    const qt=queue[idx];
    if(active){
      setQueue(p=>{const nq=[...p];nq.splice(idx,1);return[{...active,elapsedBase:elRef.current,status:'paused'},...nq];});
    }else setQueue(p=>{const nq=[...p];nq.splice(idx,1);return nq;});
    const now=new Date().toISOString();
    setActive({...qt,status:'running',resumeAt:now});
    elRef.current=qt.elapsedBase||0;setElapsed(elRef.current);
    showToast(`Resumed: "${qt.taskName.slice(0,22)}"…`,'success');
  };

  const discardQueue=(idx)=>setQueue(q=>{const n=[...q];n.splice(idx,1);return n;});

  const stop=async()=>{
    if(!active)return;
    const hrs=parseFloat((elRef.current/3600).toFixed(2));
    if(hrs<0.01){showToast('Task too short (< 1 min)','warn');return;}
    const fq=AI.focusQuality(elRef.current,idleRef.current,interactions);
    const d=new Date(active.startTime||Date.now());
    const now=new Date();
    // Calculate productivity score (all tasks / session duration * 100)
    const allTasks=[...taskHistory,{elapsedBase:elRef.current}];
    const totalTaskTime=allTasks.reduce((sum,t)=>sum+(t.elapsedBase||0),0);
    const sessionDuration=Math.floor((now-sessionStart)/1000);
    const productivity=sessionDuration>0?Math.round((totalTaskTime/sessionDuration)*100):0;
    const t={id:Date.now(),empId:safe.id,empName:`${safe.firstName||''} ${safe.lastName||''}`.trim(),taskName:active.taskName,category:active.category,date:d.toISOString().split('T')[0],startTime:active.startDate||`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`,endTime:`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`,durationHours:hrs,tasksCompleted:taskHistory.length+1,productivity:Math.min(100,productivity),month:d.getMonth()+1,year:d.getFullYear(),source:'Timer',focusQuality:fq};
    await GAS.call('logTask',t);
    onSave(t);showToast(`Saved ${hrs}h · Focus: ${fq}% · Productivity: ${Math.min(100,productivity)}% ✓`,'success');
    setActive(null);setElapsed(0);elRef.current=0;idleRef.current=0;setIdleTime(0);setInteractions(0);setTaskHistory([]);setSessionStart(new Date());
    LS.rm(`timer_${safe.id}`);
    setEmergency(false);
  };
  
  // Task dropdown with smart switching
  const taskOptions=useMemo(()=>{
    const recent=[...new Set(taskHistory.map(t=>t.taskName))].slice(0,5);
    const filtered=taskFilter.trim()?[...PRESET_TASKS,...recent].filter(t=>t.toLowerCase().includes(taskFilter.toLowerCase())):PRESET_TASKS;
    return filtered;
  },[taskFilter,taskHistory]);

  const togSub=(i)=>setActive(a=>{const st=[...a.subtasks];st[i].done=!st[i].done;return{...a,subtasks:st};});
  const fq=AI.focusQuality(elRef.current,idleRef.current,interactions);

  if(emergency&&active){
    return(
      <div className="emergency-overlay">
        <div style={{fontSize:12,color:'var(--danger)',fontWeight:900,letterSpacing:'2px',marginBottom:16,animation:'pulse 1.5s infinite'}}>⚡ EMERGENCY FOCUS MODE</div>
        <h1 style={{fontSize:28,fontWeight:900,marginBottom:8,textAlign:'center',maxWidth:500,padding:'0 16px'}}>{active.taskName}</h1>
        <div className="timer-digits timer-running" style={{margin:'24px 0',color:'#fff',textShadow:'none'}}>{fmtSec(elapsed)}</div>
        <div style={{display:'flex',gap:12}}>
          <button className="btn" style={{background:'var(--warn)',color:'#fff',padding:'12px 24px'}} onClick={()=>setEmergency(false)}><i className="fa-solid fa-arrow-left"/> Exit Mode</button>
          <button className="btn" style={{background:'var(--danger)',color:'#fff',padding:'12px 24px'}} onClick={stop}><i className="fa-solid fa-floppy-disk"/> Stop & Save</button>
        </div>
      </div>
    );
  }

  if(pauseModal){
    return(
      <div className="modal-bg">
        <div className="modal" style={{maxWidth:420}}>
          <div className="modal-head"><h3 style={{fontSize:16,fontWeight:900}}>⏸ Pause Context</h3><button onClick={()=>setPauseModal(null)} className="btn btn-ghost btn-icon"><i className="fa-solid fa-xmark"/></button></div>
          <div className="modal-body">
            <p style={{fontSize:12,color:'var(--tx3)',fontWeight:600}}>Why are you pausing? AI requires context for accurate tracking.</p>
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              {['Call','Chat','Urgent Issue','Distraction','Bio Break','Planned'].map(r=>(
                <button key={r} className="btn btn-ghost btn-sm" onClick={()=>confPause(r)}>{r}</button>
              ))}
            </div>
            <div>
              <label className="input-label">Focus Memory (optional)</label>
              <input className="input" placeholder='e.g. "Fix line 42 in auth.js"' value={memNote} onChange={e=>setMemNote(e.target.value)}/>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:'flex',flexDirection:'column',gap:13}}>
      {/* Active timer display */}
      <div className="glass" style={{padding:'20px 22px',borderRadius:18}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div style={{flex:1,minWidth:0}}>
            <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:5}}>⏱ Active Timer</p>
            {active?(
              <>
                <p style={{fontSize:14,fontWeight:900,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{active.taskName}</p>
                <div style={{display:'flex',gap:6,marginTop:5,flexWrap:'wrap'}}>
                  <span className={`badge tag-${active.category}`} style={{fontSize:8}}>{active.category}</span>
                  <span className={`badge ${active.status==='running'?'badge-ok':'badge-warn'}`} style={{fontSize:8}}>{active.status==='running'?'● LIVE':'⏸ PAUSED'}</span>
                </div>
              </>
            ):(
              <p style={{fontSize:13,color:'var(--tx3)',fontWeight:600,marginTop:4}}>No active task.</p>
            )}
          </div>
          {active&&<div style={{textAlign:'right'}}>
            <p style={{fontSize:9,fontWeight:800,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em'}}>AI Est.</p>
            <p style={{fontSize:16,fontWeight:900,color:'var(--p)'}}>{active.pred?.est||'—'}m</p>
          </div>}
        </div>
        <div style={{textAlign:'center',margin:'8px 0 16px'}}>
          <div className={`timer-digits ${active?.status==='running'?'timer-running':''}`}>{fmtSec(elapsed)}</div>
          {active&&active.status==='running'&&(
            <div style={{marginTop:8,display:'flex',gap:16,justifyContent:'center'}}>
              <div style={{fontSize:10,fontWeight:800,color:fq>70?'var(--ok)':fq>40?'var(--warn)':'var(--danger)'}}>Focus {fq}%</div>
              {idleTime>0&&<div style={{fontSize:10,fontWeight:800,color:'var(--warn)'}}>Idle {idleTime}s</div>}
            </div>
          )}
        </div>
        {/* Subtasks */}
        {active?.subtasks?.length>0&&(
          <div style={{background:'rgba(0,0,0,.04)',borderRadius:12,padding:12,marginBottom:12}}>
            <p style={{fontSize:9,fontWeight:900,color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:8}}>Auto-Subtasks</p>
            {active.subtasks.map((s,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:9,marginBottom:6,cursor:'pointer'}} onClick={()=>togSub(i)}>
                <div style={{width:15,height:15,borderRadius:4,border:`2px solid var(--p)`,background:s.done?'var(--p)':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {s.done&&<i className="fa-solid fa-check" style={{color:'#fff',fontSize:9}}/>}
                </div>
                <span style={{fontSize:12,fontWeight:700,color:s.done?'var(--tx3)':'var(--tx)',textDecoration:s.done?'line-through':''}}>{s.name}</span>
              </div>
            ))}
          </div>
        )}
        {/* Controls */}
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {active&&active.status==='running'&&<button className="btn btn-warn btn-sm" onClick={reqPause} style={{flex:1}}><i className="fa-solid fa-pause"/> Pause</button>}
          {active&&active.status==='paused'&&<button className="btn btn-ok btn-sm" onClick={()=>{setActive(a=>({...a,status:'running',resumeAt:new Date().toISOString()}));showToast('Resumed ▶','success');}} style={{flex:1}}><i className="fa-solid fa-play"/> Resume</button>}
          {active&&<button className="btn btn-primary btn-sm" onClick={stop} style={{flex:2}}><i className="fa-solid fa-floppy-disk"/> Stop & Save</button>}
          {active&&<button className="btn btn-danger btn-icon btn-sm" onClick={()=>setEmergency(true)} title="Emergency Focus"><i className="fa-solid fa-shield"/></button>}
        </div>
      </div>

      {/* Start new task */}
      <div className="glass" style={{padding:'18px 20px',borderRadius:18}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
          <p style={{fontSize:12,fontWeight:900,color:'var(--tx)',margin:0}}><i className="fa-solid fa-plus-circle" style={{color:'var(--p)',marginRight:6}}/>Start New Task</p>
          {taskHistory.length>0&&<button className="btn btn-ghost btn-sm" onClick={()=>setShowHistory(!showHistory)}><i className={`fa-solid fa-${showHistory?'chevron-up':'history'}`}/> {taskHistory.length}</button>}
        </div>
        {active&&<div style={{background:'rgba(245,158,11,.1)',border:'1px solid rgba(245,158,11,.25)',borderRadius:9,padding:'8px 12px',marginBottom:10,fontSize:11,fontWeight:700,color:'var(--warn)'}}><i className="fa-solid fa-info-circle" style={{marginRight:5}}/>Current task will pause & resume after.</div>}
        <div style={{display:'flex',flexDirection:'column',gap:9}}>
          <div>
            <label className="input-label">Task Dropdown</label>
            <div style={{position:'relative'}}>
              <input className="input" type="text" placeholder="Search or type task..." value={taskFilter} onChange={e=>setTaskFilter(e.target.value)} onKeyDown={e=>e.key==='Enter'&&taskFilter.trim()&&(startNew(taskFilter.trim(),cat),setTaskFilter(''))} style={{paddingRight:32}}/>
              <div style={{position:'absolute',right:8,top:'50%',transform:'translateY(-50%)',fontSize:12,color:'var(--tx3)'}}><i className="fa-solid fa-search"/></div>
            </div>
            {taskFilter&&taskOptions.length>0&&(
              <div style={{background:'var(--wh)',border:'1px solid var(--bd)',borderRadius:8,marginTop:6,maxHeight:200,overflowY:'auto',position:'absolute',width:'100%',left:0,zIndex:10}}>
                {taskOptions.map((t,i)=>(
                  <div key={i} onClick={()=>{startNew(t,cat);setTaskFilter('');}} style={{padding:'8px 12px',borderBottom:'1px solid var(--bd)',cursor:'pointer',fontSize:12,fontWeight:600,'&:hover':{background:'var(--pl)'}}}><i className="fa-solid fa-check" style={{marginRight:6,color:'var(--p)'}}/>{t}</div>
                ))}
                <div onClick={()=>{if(taskFilter.trim()){startNew(taskFilter.trim(),cat);setTaskFilter('');}}} style={{padding:'8px 12px',background:'var(--pl)',cursor:'pointer',fontSize:12,fontWeight:700,color:'var(--p)',textAlign:'center'}}><i className="fa-solid fa-plus"/> Create "{taskFilter}"</div>
              </div>
            )}
          </div>
          <div><label className="input-label">Category</label><select className="input" value={cat} onChange={e=>setCat(e.target.value)}>{TASK_CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <button className="btn btn-primary" style={{justifyContent:'center',padding:'11px'}} onClick={()=>{if(!taskFilter.trim())return showToast('Enter a task name','warn');startNew(taskFilter.trim(),cat);setTaskFilter('');}}>
            <i className="fa-solid fa-play"/>{active?'Switch Task':'Start Timer'}
          </button>
        </div>
      </div>
      
      {/* Task History & Productivity */}
      {showHistory&&taskHistory.length>0&&(
        <div className="glass" style={{padding:'16px 18px',borderRadius:18,background:'rgba(81,160,207,.08)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <p style={{fontSize:12,fontWeight:900,color:'var(--p)',margin:0}}>📊 Today's Tasks ({taskHistory.length})</p>
            <p style={{fontSize:11,fontWeight:700,color:'var(--tx3)',margin:0}}>Productivity: {Math.round((taskHistory.reduce((s,t)=>s+(t.elapsedBase||0),0)/Math.max(1,(new Date()-sessionStart)/1000))*100)}%</p>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:6,maxHeight:220,overflowY:'auto'}}>
            {taskHistory.map((t,i)=>{const m=Math.floor((t.elapsedBase||0)/60);return(
              <div key={i} style={{background:'rgba(255,255,255,.3)',borderRadius:8,padding:'8px 12px',fontSize:10,borderLeft:`3px solid var(--${CAT_COLORS[t.category]?'p':'warn'})`}}>
                <div style={{fontWeight:700,color:'var(--tx)',marginBottom:2}}>{i+1}. {t.taskName.slice(0,35)}</div>
                <div style={{fontSize:9,color:'var(--tx3)',display:'flex',justifyContent:'space-between'}}><span>{t.category}</span><span>{m}m</span></div>
              </div>
            );})}
          </div>
        </div>
      )}

      {/* Queue */}
      {queue.length>0&&(
        <div className="glass" style={{padding:'18px 20px',borderRadius:18}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:11}}>
            <p style={{fontSize:12,fontWeight:900,color:'var(--tx)'}}><i className="fa-solid fa-layer-group" style={{color:'var(--p)',marginRight:6}}/>Queue ({queue.length})</p>
          </div>
          {queue.map((qt,i)=>(
            <div key={i} className="queue-item">
              <div style={{flex:1,overflow:'hidden'}}>
                <p style={{fontSize:12,fontWeight:800,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{qt.taskName}</p>
                <div style={{display:'flex',gap:7,marginTop:3,alignItems:'center'}}>
                  <span className={`badge tag-${qt.category}`} style={{fontSize:8}}>{qt.category}</span>
                  <span style={{fontSize:10,fontFamily:"'Space Mono',monospace",color:'var(--tx3)'}}>{fmtSec(qt.elapsedBase||0)}</span>
                  {qt.mem&&<span style={{fontSize:10,color:'var(--tx2)',fontStyle:'italic',fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:100}}>"{qt.mem}"</span>}
                </div>
              </div>
              <button className="btn btn-ok btn-xs" onClick={()=>resumeQueue(i)}><i className="fa-solid fa-play"/></button>
              <button className="btn btn-ghost btn-xs" style={{color:'var(--danger)'}} onClick={()=>discardQueue(i)}><i className="fa-solid fa-trash"/></button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

/* ═══════════════════════════════════════════════════
   LOG TASK MODAL
═══════════════════════════════════════════════════ */
const LogTaskModal=({user,onClose,onSave,showToast,initial=null})=>{
  const today=new Date().toISOString().split('T')[0];
  const [form,setForm]=useState(initial||{taskName:'',category:'Admin',date:today,startTime:'08:00',endTime:'17:00',remarks:''});
  const [loading,setLoading]=useState(false);
  const dur=useMemo(()=>calcDur(form.startTime,form.endTime),[form.startTime,form.endTime]);
  const submit=async e=>{
    e.preventDefault();if(!form.taskName.trim()||dur<=0)return;
    setLoading(true);
    const d=new Date(form.date);
    const t={id:initial?.id||Date.now(),empId:user.id,empName:`${user.firstName||''} ${user.lastName||''}`.trim(),taskName:form.taskName.trim(),category:form.category,date:form.date,startTime:form.startTime,endTime:form.endTime,durationHours:dur,remarks:form.remarks,month:d.getMonth()+1,year:d.getFullYear(),source:'Manual'};
    await GAS.call('logTask',t);
    onSave(t,!!initial?.id);
    showToast(initial?.id?'Task updated!':'Task logged ✓','success');
    setLoading(false);onClose();
  };
  return(
    <ModalLayout title={initial?.id?'Edit Task':'Log Activity'} icon="fa-stopwatch" onClose={onClose}>
      <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:12}}>
        <div>
          <label className="input-label">Task Name *</label>
          <select className="input" style={{marginBottom:7}} value={PRESET_TASKS.includes(form.taskName)?form.taskName:'__custom__'} onChange={e=>{if(e.target.value!=='__custom__')setForm(p=>({...p,taskName:e.target.value}));}}>
            <option value="__custom__">✏️ Custom</option>
            {PRESET_TASKS.map((t,i)=><option key={i} value={t}>{t}</option>)}
          </select>
          <input className="input" value={form.taskName} onChange={e=>setForm(p=>({...p,taskName:e.target.value}))} placeholder="Task description..." required/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
          <div><label className="input-label">Category</label><select className="input" value={form.category} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>{TASK_CATS.map(c=><option key={c}>{c}</option>)}</select></div>
          <div><label className="input-label">Date</label><input className="input" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} max={today}/></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>
          <div><label className="input-label">Start</label><input className="input" type="time" value={form.startTime} onChange={e=>setForm(p=>({...p,startTime:e.target.value}))}/></div>
          <div><label className="input-label">End</label><input className="input" type="time" value={form.endTime} onChange={e=>setForm(p=>({...p,endTime:e.target.value}))}/></div>
        </div>
        <div className="glass" style={{padding:'11px 15px',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span style={{fontSize:12,fontWeight:700}}>Duration</span>
          <span style={{fontSize:20,fontWeight:900,color:dur>0?'var(--p)':'var(--danger)'}}>{dur>0?`${dur}h`:'—'}</span>
        </div>
        <div><label className="input-label">Remarks</label><textarea className="input" rows={2} value={form.remarks} onChange={e=>setForm(p=>({...p,remarks:e.target.value}))} placeholder="Optional..."/></div>
        <button type="submit" className="btn btn-primary" disabled={loading||dur<=0} style={{padding:'12px',justifyContent:'center'}}>
          {loading?<><span className="spinner"/> Saving...</>:<><i className="fa-solid fa-floppy-disk"/> Confirm Log</>}
        </button>
      </form>
    </ModalLayout>
  );
};

/* ═══════════════════════════════════════════════════
   ADMIN REGISTRATION MODAL
═══════════════════════════════════════════════════ */
const RegisterEmployeeModal = ({ onClose, onSuccess, showToast }) => {
  const [form, setForm] = useState({ empId:'', firstName:'', lastName:'', deptId:1, password:'', role:'EMPLOYEE' });
  const [loading, setLoading] = useState(false);
  const [showPw, setShowPw] = useState(false);

  const submit = async (e) => {
    e.preventDefault();
    if(!form.empId || !form.firstName || !form.lastName || !form.password) return;
    setLoading(true);

const ProductivityBreakdown=({tasks})=>{

    return Object.entries(t).sort((a,b)=>b[1]-a[1]).slice(0,4).map(([name,hrs])=>({name,hrs}));

const TrendChart=({tasks})=>{
  const yr=new Date().getFullYear();
  const data=MONTHS.map((_,i)=>({label:MONTHS[i],val:(tasks||[]).filter(t=>t.month===i+1&&t.year===yr).reduce((s,t)=>s+(t.durationHours||0),0)}));
  const maxV=Math.max(...data.map(d=>d.val),1);
  const W=260,H=72,pad=8;
  const pts=data.map((d,i)=>[pad+(i/(data.length-1))*(W-2*pad),H-pad-(d.val/maxV)*(H-2*pad)]);
  const pathD=pts.map((p,i)=>i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`).join(' ');
  const areaD=`${pathD} L${pts[pts.length-1][0]},${H-pad} L${pts[0][0]},${H-pad} Z`;
  return(
    <div>
      <p style={{fontSize:9,fontWeight:900,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--tx3)',marginBottom:10}}>Trend — {yr}</p>
      <svg viewBox={`0 0 ${W} ${H}`} className="trend-svg" style={{height:H}}>
        <defs><linearGradient id="tg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="var(--p)" stopOpacity=".3"/><stop offset="100%" stopColor="var(--p)" stopOpacity="0"/></linearGradient></defs>
        <path d={areaD} fill="url(#tg)"/>
        <path d={pathD} fill="none" stroke="var(--p)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
        {pts.map((p,i)=>(<circle key={i} cx={p[0]} cy={p[1]} r="2.5" fill="var(--p)" stroke="var(--glass)" strokeWidth="1.2"/>))}
        {data.map((d,i)=>(<text key={i} x={pts[i][0]} y={H-1} textAnchor="middle" fontSize="5.5" fill="var(--tx3)" fontWeight="700">{d.label.slice(0,1)}</text>))}
      </svg>
    </div>
  );
};

const WeatherWidget = () => {
  const [wx, setWx] = useState(null);
  const [loading, setLoading] = useState(true);
  
  useEffect(() => {
    const fetchWeather = async (lat, lon) => {
      try {
        const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
        const d = await r.json();
        setWx({ 
          temp: Math.round(d.current_weather.temperature), 
          desc: d.current_weather.weathercode <= 3 ? 'Clear' : 'Cloudy', 
          lat: lat.toFixed(2), 
          lon: lon.toFixed(2), 
          wind: d.current_weather.windspeed 
        });
      } catch(e) { 
        setWx({ temp: 28, desc: 'Stable', lat: '14.59', lon: '120.98', wind: 12 }); 
      } finally {
        setLoading(false);
      }
    };

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        pos => fetchWeather(pos.coords.latitude, pos.coords.longitude),
        () => fetchWeather(14.59, 120.98) // Fallback to Manila
      );
    } else {
      fetchWeather(14.59, 120.98);
    }
  }, []);

  if (loading) return <div className="stat-card" style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:100}}><div className="spinner" style={{borderColor:'var(--p)',borderTopColor:'transparent'}}></div></div>;
  
  return (
    <div className="stat-card" style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'15px 20px',background:'linear-gradient(135deg, var(--glass), rgba(255,255,255,0.1))'}}>
      <div>
        <div style={{fontSize:9,fontWeight:800,textTransform:'uppercase',color:'var(--tx3)',letterSpacing:'.07em',marginBottom:2}}>Current Weather</div>
        <div style={{fontSize:28,fontWeight:900,color:'var(--p)',lineHeight:1,fontFamily:"'Space Mono',monospace"}}>{wx.temp}°C</div>
        <div style={{fontSize:11,fontWeight:700,color:'var(--tx2)',marginTop:4}}>{wx.desc} · {wx.lat}N</div>
      </div>
      <div style={{textAlign:'right'}}>
        <i className={`fa-solid ${wx.temp > 25 ? 'fa-sun' : 'fa-cloud'}`} style={{fontSize:32,color:'var(--p)',filter:'drop-shadow(0 0 10px var(--glow))'}}/>
        <div style={{fontSize:10,fontWeight:600,color:'var(--tx3)',marginTop:5}}>💨 {wx.wind} km/h</div>
      </div>
    </div>
  );
};

const MyTasksView=({user,tasks,showModal,showToast,onDelete,onClone})=>{
  const safe=user||{};

  const [selM,setSelM]=useState(curM);const [selY,setSelY]=useState(curY);

  const myT=(tasks||[]).filter(t=>t.empId===safe.id);
  const todayISO=new Date().toISOString().split('T')[0];
  const filtered=useMemo(()=>myT.filter(t=>{
    if(t.month!==selM||t.year!==selY)return false;
    if(filterCat!=='All'&&t.category!==filterCat)return false;
    if(search.trim()){const q=search.toLowerCase();return(t.taskName||'').toLowerCase().includes(q)||(t.category||'').toLowerCase().includes(q);}
    return true;
  }).sort((a,b)=>new Date(b.date||0)-new Date(a.date||0)),[myT,selM,selY,search,filterCat]);

        <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
          <select className="input" value={selY} onChange={e=>setSelY(parseInt(e.target.value))} style={{width:'auto',padding:'8px 12px',fontSize:12}}>{yrs.map(y=><option key={y}>{y}</option>)}</select>

        </div>
      </div>
      <div style={{display:'flex',gap:5,overflowX:'auto',paddingBottom:3}}>
        {MONTHS.map((m,i)=>(
          <button key={i} onClick={()=>setSelM(i+1)} style={{padding:'6px 12px',borderRadius:9,fontSize:11,fontWeight:800,cursor:'pointer',transition:'all .18s',border:`1px solid ${selM===i+1?'var(--p)':'var(--bd)'}`,background:selM===i+1?'var(--pl)':'transparent',color:selM===i+1?'var(--p)':'var(--tx3)',whiteSpace:'nowrap',flexShrink:0}}>{m}</button>
        ))}
      </div>
      <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
        <div style={{position:'relative',flex:1,minWidth:200}}>
          <i className="fa-solid fa-magnifying-glass" style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--tx3)',fontSize:11}}/>
          <input className="input" style={{paddingLeft:33}} placeholder="Search tasks..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select className="input" value={filterCat} onChange={e=>setFilterCat(e.target.value)} style={{width:'auto',padding:'9px 12px',fontSize:12}}>
          <option value="All">All Categories</option>{TASK_CATS.map(c=><option key={c}>{c}</option>)}
        </select>
      </div>
      <div className="glass" style={{borderRadius:16,overflow:'hidden'}}>
        <div className="table-wrap">
          {filtered.length===0?(
            <div style={{padding:'44px',textAlign:'center',opacity:.38}}><i className="fa-solid fa-calendar-xmark" style={{fontSize:34,display:'block',marginBottom:10}}/><p style={{fontWeight:800,fontSize:13}}>No tasks found.</p></div>
          ):(
            <table className="nx-table">
              <thead><tr><th>Task</th><th>Category</th><th>Date</th><th>Hours</th><th></th></tr></thead>
              <tbody>{filtered.map(t=>(
                <tr key={t.id}>
                  <td style={{maxWidth:200}}><span style={{display:'block',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:700}}>{t.taskName}</span></td>
                  <td><span className={`badge tag-${t.category||'Admin'}`} style={{fontSize:8}}>{t.category}</span></td>
                  <td style={{fontSize:11,color:'var(--tx3)',fontWeight:600,whiteSpace:'nowrap'}}>{t.date}</td>
                  <td style={{color:'var(--p)',fontWeight:900,fontFamily:"'Space Mono',monospace"}}>{t.durationHours}h</td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-ghost btn-xs" onClick={()=>onClone(t)} title="Clone"><i className="fa-solid fa-copy"/></button>
                      {t.date===todayISO&&<button className="btn btn-ghost btn-xs" style={{color:'var(--danger)'}} onClick={()=>{if(window.confirm('Delete?')){onDelete(t.id);showToast('Deleted','info');}}}><i className="fa-solid fa-trash"/></button>}
                    </div>
                  </td>
                </tr>
              ))}</tbody>
            </table>
          )}
        </div>
        {filtered.length>0&&(
          <div style={{padding:'10px 18px',borderTop:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:5,background:'rgba(0,0,0,.04)'}}>

  );

/* LEAVE MODAL */
const LeaveModal=({user,onClose,onSave,showToast})=>{
  const today=new Date().toISOString().split('T')[0];
  const [form,setForm]=useState({type:'Vacation',startDate:today,endDate:today,reason:''});
  const [loading,setLoading]=useState(false);
  const days=useMemo(()=>{if(!form.startDate||!form.endDate)return 0;return Math.max(0,Math.ceil((new Date(form.endDate)-new Date(form.startDate))/(86400000))+1);},[form.startDate,form.endDate]);
  const submit=e=>{
    e.preventDefault();if(days<=0||!form.reason.trim())return;
    setLoading(true);
    const req={id:Date.now(),empId:user.id,empName:`${user.firstName||''} ${user.lastName||''}`.trim(),...form,days,status:'Pending',appliedDate:today};
    GAS.call('leaveRequest',req).catch(()=>{});
    onSave(req);showToast(`Leave submitted (${days}d)`,'success');setLoading(false);onClose();
  };

    <ModalLayout title="File Leave Request" icon="fa-umbrella-beach" onClose={onClose}>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:9}}>

          <div><label className="input-label">End</label><input className="input" type="date" value={form.endDate} onChange={e=>setForm(p=>({...p,endDate:e.target.value}))} min={form.startDate} required/></div>

const LeaderboardView=({employees,tasks})=>{
  const curM=new Date().getMonth()+1,curY=new Date().getFullYear();
  const [period,setPeriod]=useState('month');
  const safeE=employees||[];const safeT=tasks||[];
  const ranked=useMemo(()=>[...safeE].map(emp=>{
    const et=period==='month'?safeT.filter(t=>t.empId===emp.id&&t.month===curM&&t.year===curY):safeT.filter(t=>t.empId===emp.id&&t.year===curY);
    const hrs=et.reduce((s,t)=>s+(t.durationHours||0),0);
    return{...emp,hrs,taskCount:et.length,dept:DEPTS.find(d=>d.id===emp.deptId)||{}};
  }).filter(e=>e.hrs>0).sort((a,b)=>b.hrs-a.hrs).slice(0,20),[safeE,safeT,period,curM,curY]);
  const maxH=ranked[0]?.hrs||1;
  const medals=['🥇','🥈','🥉'];
  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:13}}>

        <div style={{display:'flex',gap:5}}>
          {['month','year'].map(p=>(<button key={p} onClick={()=>setPeriod(p)} style={{padding:'6px 12px',borderRadius:9,fontSize:11,fontWeight:800,cursor:'pointer',border:`1px solid ${period===p?'var(--p)':'var(--bd)'}`,background:period===p?'var(--pl)':'transparent',color:period===p?'var(--p)':'var(--tx3)',textTransform:'capitalize'}}>{p}</button>))}
        </div>
      </div>
      {ranked.length>=3&&(
        <div className="podium">
          {[ranked[1],ranked[0],ranked[2]].map((emp,i)=>emp?(
            <div key={emp.id} className={`podium-card ${i===1?'first':''}`}>
              <div style={{fontSize:22}}>{medals[i===1?0:i===0?1:2]}</div>
              <Avatar emp={emp} size={i===1?'md':'sm'}/>
              <div style={{textAlign:'center'}}>
                <p style={{fontSize:11,fontWeight:900}}>{emp.firstName} {emp.lastName?.split(' ')[0]||''}</p>
                <p style={{fontSize:9,color:'var(--tx3)',fontWeight:700,marginTop:2}}>{emp.dept?.icon} {emp.dept?.name}</p>
              </div>
              <p style={{fontSize:17,fontWeight:900,color:'var(--p)',fontFamily:"'Space Mono',monospace"}}>{emp.hrs.toFixed(1)}h</p>
            </div>
          ):null)}
        </div>
      )}
      <div className="glass" style={{borderRadius:16,overflow:'hidden'}}>
        {ranked.length===0?<div style={{padding:'44px',textAlign:'center',opacity:.38}}><p style={{fontWeight:700,fontSize:13}}>No data this period.</p></div>
        :ranked.map((emp,i)=>(
          <div key={emp.id} className="lb-row">
            <span style={{fontSize:i<3?17:12,fontWeight:900,width:26,textAlign:'center',flexShrink:0,color:i<3?'var(--p)':'var(--tx3)'}}>{i<3?medals[i]:`#${i+1}`}</span>
            <Avatar emp={emp} size="sm"/>
            <div style={{flex:1,overflow:'hidden'}}>
              <p style={{fontSize:12,fontWeight:800,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{emp.firstName} {emp.lastName}</p>
              <p style={{fontSize:10,color:'var(--tx3)',fontWeight:600,marginTop:1}}>{emp.dept?.icon} {emp.dept?.name} · {emp.taskCount} tasks</p>
            </div>
            <div style={{textAlign:'right',minWidth:76}}>
              <p style={{fontSize:15,fontWeight:900,color:'var(--p)',fontFamily:"'Space Mono',monospace"}}>{emp.hrs.toFixed(1)}h</p>
              <div style={{width:76,height:4,background:'rgba(128,128,128,.15)',borderRadius:99,marginTop:4}}>
                <div style={{width:`${(emp.hrs/maxH)*100}%`,height:'100%',background:'var(--btn)',borderRadius:99,transition:'width 1s ease'}}/>
              </div>

          </div>
        ))}
      </div>
    </div>
  );
};

const EnrollmentRequestsView = ({ showToast }) => {
  const [requests, setRequests] = React.useState([]);
  const [loading, setLoading] = React.useState(true);

  const fetchRequests = React.useCallback(async () => {
    setLoading(true);
    const res = await GAS.call('getPendingTrackerRequests');
    if (res.success) setRequests(res.requests || []);
    setLoading(false);
  }, []);

  React.useEffect(() => {
    fetchRequests();
  }, [fetchRequests]);

  const handleAction = async (id, action) => {
    const res = await GAS.call(action + 'TrackerRequest', { requestId: id, notes: 'Processed via Admin' });
    if (res.success) {
      showToast('Enrollment ' + action + ' successfully', 'success');
      fetchRequests();
    } else {
      showToast('Failed to ' + action, 'error');
    }
  };

  return (
    <div className="anim-fade">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          <div>
            <h2 style={{fontSize:22,fontWeight:900,color:'var(--p)'}}><i className="fa-solid fa-user-plus mr-2"/>Enrollment Requests</h2>
            <p style={{fontSize:11,color:'var(--tx3)',marginTop:3,fontWeight:600}}>Review access requests from new personnel.</p>
          </div>
          <button className="btn btn-ghost" onClick={fetchRequests} disabled={loading}><i className="fa-solid fa-rotate"/></button>
      </div>

      <div className="glass" style={{borderRadius:16, border:'1px solid var(--bd)', overflow:'hidden'}}>
        {loading ? <div style={{padding:40, textAlign:'center'}}><span className="spinner spinner-p"/></div> : (
          <table className="nx-table">
            <thead>
              <tr style={{background:'var(--pl)', color:'var(--p)', fontSize:10, textTransform:'uppercase'}}>
                <th style={{padding:12}}>Date</th>
                <th>Employee ID</th>
                <th>Full Name</th>
                <th>Department</th>
                <th>Intended Tasks</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {requests.map(r => (
                <tr key={r.id} style={{borderBottom:'1px solid var(--bd)'}}>
                  <td style={{fontSize:11, fontWeight:700, padding:12}}>{new Date(r.requestedAt).toLocaleDateString()}</td>
                  <td style={{fontSize:11, fontWeight:900}}>{r.employeeId}</td>
                  <td style={{fontSize:11, fontWeight:900}}>{r.employeeName}</td>
                  <td style={{fontSize:11}}>{r.department}</td>
                  <td style={{fontSize:11}}>{r.tasks}</td>

                      <button className="btn btn-ok btn-xs" onClick={() => handleAction(r.id, 'approve')}>Approve</button>

                  </td>
                </tr>
              ))}
              {requests.length === 0 && (
                <tr>
                  <td colSpan="6" style={{textAlign:'center', padding:40, fontSize:12, color:'var(--tx3)'}}>No pending enrollment requests.</td>
                </tr>
              )}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
};

const AdminScientificCalculator = () => {
    const [expr, setExpr] = React.useState('');
    const [result, setResult] = React.useState('');
    const handleBtn = (v) => {
        if (v === '=') {
            try {
                // Safety check for basic scientific functions
                const safeExpr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(').replace(/sqrt\(/g, 'Math.sqrt(').replace(/pow\(/g, 'Math.pow(').replace(/PI/g, 'Math.PI');
                setResult(eval(safeExpr));
            } catch (e) {
                setResult('Error');
            }
        } else if (v === 'C') {
            setExpr('');
            setResult('');
        } else {
            setExpr(p => p + v);
        }
    };
    const btns = ['7', '8', '9', '÷', 'C', '4', '5', '6', '×', '(', '1', '2', '3', '-', ')', '0', '.', '=', '+', 'pow(', 'sin(', 'cos(', 'tan(', 'sqrt(', 'PI'];
    return (
        <div className="glass p-5" style={{ maxWidth: 350, margin: '0 auto' }}>
            <div style={{ fontSize: 13, fontWeight: 900, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 7 }}><i className="fa-solid fa-calculator" style={{ color: 'var(--p)' }} /> Scientific Calculator</div>
            <div className="bg-black/20 p-4 mb-4 rounded-xl text-right font-mono min-h-[70px] break-all border border-white/10 shadow-inner">
                <div style={{ fontSize: 13, color: 'var(--tx3)', marginBottom: 4 }}>{expr || '0'}</div>
                <div style={{ fontSize: 24, fontWeight: 900, color: 'var(--p)' }}>{result || '0'}</div>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 8 }}>
                {btns.map(b => (
                    <button key={b} onClick={() => handleBtn(b)} className="btn btn-sm" style={{ fontSize: 11, padding: '10px 4px', fontWeight: 800, background: ['=', 'C'].includes(b) ? 'var(--p)' : 'var(--glass)', color: ['=', 'C'].includes(b) ? '#fff' : 'var(--tx)' }}>{b}</button>
                ))}
            </div>
        </div>
    );
};

const PersonnelAnalyticsView = ({ employees, tasks }) => {
    const [selectedEmp, setSelectedEmp] = React.useState(null);
    const empList = React.useMemo(() => (employees || []).filter(e => e.status !== 'Inactive'), [employees]);
    const stats = React.useMemo(() => {
        if (!selectedEmp) return null;
        const empTasks = (tasks || []).filter(t => t.empId === (selectedEmp.empId || selectedEmp.employeeId));
        const sortedTasks = [...empTasks].sort((a, b) => (b.durationMinutes || 0) - (a.durationMinutes || 0));
        const top3 = sortedTasks.slice(0, 3);
        const last7Days = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const ds = d.toISOString().split('T')[0];
            const dayTasks = empTasks.filter(t => t.date === ds);
            last7Days.push({ date: ds, mins: dayTasks.reduce((s, t) => s + (t.durationMinutes || 0), 0) });
        }
        return { top3, last7Days, totalMins: empTasks.reduce((s, t) => s + (t.durationMinutes || 0), 0) };
    }, [selectedEmp, tasks]);

    return (
        <div className="view-fade">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
                <div>
                    <h2 style={{ fontSize: 22, fontWeight: 900, color: 'var(--p)' }}><i className="fa-solid fa-chart-line mr-2" />Personnel Analytics</h2>

                <div className="glass p-4" style={{ maxHeight: '75vh', overflowY: 'auto' }}>

                        <div key={e.id} onClick={() => setSelectedEmp(e)} className="glass mb-2 p-3 cursor-pointer" style={{ border: selectedEmp?.id === e.id ? '1px solid var(--p)' : '1px solid var(--bd)', background: selectedEmp?.id === e.id ? 'var(--pl)' : 'transparent', transition: '0.2s' }}>
                            <div style={{ fontSize: 12, fontWeight: 900, color: selectedEmp?.id === e.id ? 'var(--p)' : 'var(--tx)' }}>{e.firstName} {e.lastName}</div>
                            <div style={{ fontSize: 10, color: 'var(--tx3)', fontWeight: 600 }}>{e.employeeId} · {e.dept}</div>
                        </div>
                    ))}
                </div>
                <div className="glass p-6">
                    {!selectedEmp ? (
                        <div style={{ textAlign: 'center', padding: '60px 0', color: 'var(--tx3)' }}>
                            <i className="fa-solid fa-user-gear" style={{ fontSize: 40, opacity: 0.3, marginBottom: 15, display: 'block' }} />

                    ) : (
                        <div>
                            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 30, borderBottom: '1px solid var(--bd)', paddingBottom: 20 }}>
                                <div>
                                    <h3 style={{ fontSize: 20, fontWeight: 900 }}>{selectedEmp.firstName} {selectedEmp.lastName}</h3>
                                    <p style={{ fontSize: 12, color: 'var(--tx3)', fontWeight: 700 }}>{selectedEmp.dept} · {selectedEmp.role}</p>
                                </div>
                                <div style={{ textAlign: 'right' }}>
                                    <div style={{ fontSize: 32, fontWeight: 900, color: 'var(--p)', fontFamily: "'Space Mono',monospace" }}>{(stats.totalMins / 60).toFixed(1)}h</div>
                                    <div style={{ fontSize: 11, fontWeight: 800, color: 'var(--tx3)', textTransform: 'uppercase' }}>Total Hours Logged</div>
                                </div>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: window.innerWidth > 768 ? '1fr 1fr' : '1fr', gap: 20 }}>
                                <div className="glass p-5">
                                    <h4 style={{ fontSize: 11, fontWeight: 900, marginBottom: 15, textTransform: 'uppercase', color: 'var(--tx3)', letterSpacing: '.05em' }}>Top 3 Longest Tasks</h4>

                                        <div key={i} className="mb-4 last:mb-0">

                                                <span>{t.taskName}</span>
                                                <span style={{ color: 'var(--p)' }}>{t.durationMinutes}m</span>
                                            </div>
                                            <div style={{ fontSize: 10, color: 'var(--tx3)', marginTop: 2 }}>Logged on {t.date}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="glass p-5">
                                    <h4 style={{ fontSize: 11, fontWeight: 900, marginBottom: 15, textTransform: 'uppercase', color: 'var(--tx3)', letterSpacing: '.05em' }}>7-Day Productivity Trend</h4>
                                    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height: 120 }}>

};

// Productivity Classification Engine
const ProductivityClassifier={
  classify(task,focusQuality,interruptions){
    if(!task||!task.durationHours)return'Neutral';
    const dur=task.durationHours;
    const fq=focusQuality||0;
    const intCount=interruptions||0;

    // Productive: high focus quality, few interruptions, normal duration
    if(fq>=75&&intCount<=2&&dur>=0.5)return'Productive';

    // Unproductive: low focus, many interruptions, very short
    if(fq<40||intCount>5||dur<0.25)return'Unproductive';

    // Neutral: everything else
    return'Neutral';
  },
  async enrichTask(task,focusQuality=80,interruptions=0){
    return{
      ...task,
      productivityClass:this.classify(task,focusQuality,interruptions),
      focusQuality,interruptions
    };
  }
};

// Advanced Analytics Engine
const Analytics={
  calculateDailyStats(tasks,empId=null){
    const filtered=empId?tasks.filter(t=>t.empId===empId):tasks;
    const today=new Date().toISOString().split('T')[0];
    const todayTasks=filtered.filter(t=>t.date===today);

    const total=todayTasks.reduce((s,t)=>s+(t.durationHours||0),0);
    const byCategory={};
    const byClass={Productive:0,Unproductive:0,Neutral:0};

    todayTasks.forEach(t=>{
      const cat=t.category||'General';
      byCategory[cat]=(byCategory[cat]||0)+(t.durationHours||0);
      if(t.productivityClass)byClass[t.productivityClass]=(byClass[t.productivityClass]||0)+(t.durationHours||0);
    });

    return{
      date:today,totalHours:total,taskCount:todayTasks.length,
      byCategory,byProductivityClass:byClass,
      avgTaskDuration:todayTasks.length>0?total/todayTasks.length:0
    };
  },
  calculateMonthlyStats(tasks,empId=null,month=null,year=null){
    const now=new Date();
    const m=month||now.getMonth()+1;
    const y=year||now.getFullYear();

    const filtered=empId?tasks.filter(t=>t.empId===empId):tasks;
    const monthTasks=filtered.filter(t=>{
      if(!t.date)return false;
      const d=new Date(t.date);
      return d.getMonth()+1===m&&d.getFullYear()===y;
    });

    const total=monthTasks.reduce((s,t)=>s+(t.durationHours||0),0);
    const tasksByWeek=[0,0,0,0,0];

    monthTasks.forEach(t=>{
      const d=new Date(t.date);
      const week=Math.floor((d.getDate()-1)/7);
      if(week<5)tasksByWeek[week]+=(t.durationHours||0);
    });

    return{
      period:`${['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][m-1]} ${y}`,
      totalHours:total,taskCount:monthTasks.length,
      avgPerDay:monthTasks.length>0?total/monthTasks.length:0,
      hoursByWeek:tasksByWeek
    };
  },
  getPeakHours(tasks,empId=null){
    const filtered=empId?tasks.filter(t=>t.empId===empId):tasks;
    const hourCounts={};

    filtered.forEach(t=>{
      if(t.startTime){
        const hr=parseInt(t.startTime.split(':')[0]);
        hourCounts[hr]=(hourCounts[hr]||0)+(t.durationHours||0);
      }
    });

    const sorted=Object.entries(hourCounts).sort((a,b)=>b[1]-a[1]);
    return sorted.slice(0,3).map(([hr,dur])=>({hour:parseInt(hr),duration:dur}));
  },
  getProductivityTrend(tasks,empId=null,days=7){
    const filtered=empId?tasks.filter(t=>t.empId===empId):tasks;
    const trend=[];

    for(let i=days-1;i>=0;i--){
      const d=new Date();
      d.setDate(d.getDate()-i);
      const dateStr=d.toISOString().split('T')[0];
      const dayTasks=filtered.filter(t=>t.date===dateStr);

      const prod=dayTasks.filter(t=>t.productivityClass==='Productive').reduce((s,t)=>s+(t.durationHours||0),0);
      const total=dayTasks.reduce((s,t)=>s+(t.durationHours||0),0);

      trend.push({date:dateStr,productive:prod,total,score:total>0?Math.round((prod/total)*100):0});
    }
    return trend;
  }
};

// Data Validation & Normalization
const DataValidator={
  validateTask(task){
    const errors=[];
    if(!task.taskName||task.taskName.trim()==='')errors.push('Task name required');
    if(!task.category||task.category.trim()==='')errors.push('Category required');
    if(!task.date||task.date.trim()==='')errors.push('Date required');
    if(task.durationHours!==undefined&&(isNaN(task.durationHours)||task.durationHours<0))errors.push('Invalid duration');
    return{valid:errors.length===0,errors};
  },
  validateLeaveRequest(leave){
    const errors=[];
    if(!leave.type)errors.push('Leave type required');
    if(!leave.startDate)errors.push('Start date required');
    if(!leave.endDate)errors.push('End date required');
    if(!leave.reason||leave.reason.trim()==='')errors.push('Reason required');
    if(new Date(leave.startDate)>new Date(leave.endDate))errors.push('Start date must be before end date');
    return{valid:errors.length===0,errors};
  },
  normalizeTask(task){
    return{
      ...task,
      taskName:(task.taskName||'').trim(),
      category:(task.category||'General').trim(),
      date:task.date||new Date().toISOString().split('T')[0],
      durationHours:Math.max(0,parseFloat(task.durationHours)||0),
      remarks:(task.remarks||'').trim(),
      source:task.source||'Manual'
    };
  }
};

// Batch Operations Helper
const BatchOps={
  async logMultipleTasks(tasks,empId){
    const validated=tasks.filter(t=>{
      const v=DataValidator.validateTask(t);
      return v.valid;
    });

    if(validated.length===0)return{success:false,error:'No valid tasks',logged:0};

    const results=[];
    for(const task of validated){
      const norm=DataValidator.normalizeTask({...task,empId});
      const r=await GAS.call('logTask',norm);
      results.push(r?.success||r?.offline);
    }

    return{success:true,logged:results.filter(Boolean).length,total:results.length};
  },
  async syncOfflineQueue(){
    if(GAS._queue.length===0)return{synced:0};
    let synced=0;
    const q=[...GAS._queue];GAS._queue=[];

    for(const item of q){
      const r=await GAS._fetch(item,1);
      if(r)synced++;
      else GAS._queue.push(item);
    }
    LS.save('ghz_sync_q',GAS._queue);
    return{synced,queued:GAS._queue.length};
  },
  async validateAndLogTasks(tasks){
    const valid=tasks.filter(t=>{
      const v=DataValidator.validateTask(t);
      return v.valid;
    }).map(t=>DataValidator.normalizeTask(t));

    return await Promise.all(valid.map(t=>GAS.call('logTask',t)));
  }
};
