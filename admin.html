/* ============================================================

:root {
  --p:#1a73e8; --pd:#1557b0; --pl:#e8f0fe;
  --bg:#f0f4ff; --wh:#ffffff; --card:#ffffff;
  --tx:#1e293b; --tx2:#475569; --tx3:#94a3b8;
  --bd:#e2e8f0; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  --g1:#f0f4ff; --g2:#dbeafe; --g3:#ede9fe;
  --glass-bg:rgba(255,255,255,0.82); --glass-border:rgba(255,255,255,0.9);
  --shadow:rgba(26,115,232,0.12);
}
[data-theme="dark"] {
  --p:#3b82f6; --pd:#2563eb; --pl:#1e3a8a;
  --bg:#0b1120; --wh:#111827; --card:#1e293b;
  --tx:#f8fafc; --tx2:#cbd5e1; --tx3:#64748b;
  --bd:#334155; --danger:#f87171; --ok:#4ade80; --warn:#fbbf24;
  --g1:#0b1120; --g2:#0f1f3d; --g3:#1a0b2e;

  --shadow:rgba(59,130,246,0.2);
}
[data-theme="red"] {
  --p:#ef4444; --pd:#dc2626; --pl:#450a0a;
  --bg:#1a0505; --wh:#2d0a0a; --card:#3f0f0f;
  --tx:#fecaca; --tx2:#fca5a5; --tx3:#f87171;
  --bd:#7f1d1d; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  --g1:#1a0505; --g2:#2d0a0a; --g3:#3f0f0f;
  --glass-bg:rgba(69,10,10,0.75); --glass-border:rgba(239,68,68,0.12);

  --p:#7c3aed; --pd:#6d28d9; --pl:#ede9fe;
  --bg:#f5f3ff; --wh:#ffffff; --card:#ffffff;
  --tx:#1e1b4b; --tx2:#4c1d95; --tx3:#7c3aed;
  --bd:#ddd6fe; --danger:#ef4444; --ok:#22c55e; --warn:#f59e0b;
  --g1:#f5f3ff; --g2:#ede9fe; --g3:#fce7f3;

}
[data-theme="forest"] {

  --g1:#0a1f0f; --g2:#0f2d18; --g3:#1a3a22;
  --glass-bg:rgba(10,31,15,0.8); --glass-border:rgba(22,163,74,0.2);
  --shadow:rgba(22,163,74,0.2);
}
[data-theme="sunset"] {
  --p:#f97316; --pd:#ea580c; --pl:#fff7ed;
  --bg:#1a0a00; --wh:#2d1200; --card:#3d1a00;
  --tx:#fed7aa; --tx2:#fdba74; --tx3:#fb923c;
  --bd:#7c2d12; --danger:#f87171; --ok:#4ade80; --warn:#fbbf24;
  --g1:#1a0a00; --g2:#2d1200; --g3:#3d1a00;
  --glass-bg:rgba(45,18,0,0.8); --glass-border:rgba(249,115,22,0.15);
  --shadow:rgba(249,115,22,0.25);
}
[data-theme="ocean"] {
  --p:#0ea5e9; --pd:#0284c7; --pl:#e0f2fe;
  --bg:#020d1a; --wh:#051929; --card:#0a2540;
  --tx:#e0f2fe; --tx2:#7dd3fc; --tx3:#38bdf8;
  --bd:#0c4a6e; --danger:#f87171; --ok:#4ade80; --warn:#fbbf24;
  --g1:#020d1a; --g2:#051929; --g3:#0a2540;
  --glass-bg:rgba(2,13,26,0.82); --glass-border:rgba(14,165,233,0.18);
  --shadow:rgba(14,165,233,0.25);
}

/* ============================================================
   GLOBALS
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:radial-gradient(ellipse at 10% 20%,var(--g2) 0%,transparent 55%),
             radial-gradient(ellipse at 90% 80%,var(--g3) 0%,transparent 55%),
             var(--g1);
  background-attachment:fixed;
  color:var(--tx);
  min-height:100vh;
  overflow-x:hidden;
  transition:background-color .5s,color .4s;
}
input,select,button,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p);opacity:.4;border-radius:99px}
::placeholder{color:var(--tx3)}

/* ============================================================
   GLASS / CARD / BUTTON
============================================================ */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  box-shadow:0 8px 32px var(--shadow);
  transition:all .3s;
}
.card{background:var(--card);border:1px solid var(--bd);border-radius:20px;transition:all .3s}
.btn{
  padding:10px 22px;border-radius:12px;font-weight:700;font-size:13px;
  cursor:pointer;transition:all .2s;border:none;display:inline-flex;
  align-items:center;gap:8px;letter-spacing:.02em;
}
.btn-primary{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;box-shadow:0 4px 16px var(--shadow)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 24px var(--shadow)}
.btn-primary:active{transform:translateY(1px)}
.btn-ghost{background:rgba(0,0,0,0.05);color:var(--tx2);border:1px solid var(--bd)}
.btn-ghost:hover{background:rgba(0,0,0,0.1);color:var(--tx)}
.btn-danger{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
.btn-danger:hover{background:#ef4444;color:#fff}

/* ============================================================
   INPUT FIELDS
============================================================ */
.input{
  width:100%;background:rgba(0,0,0,0.06);
  border:1.5px solid var(--bd);border-radius:12px;
  padding:11px 14px;color:var(--tx);font-size:14px;font-weight:500;
  transition:all .2s;
}
.input:focus{background:rgba(0,0,0,0.04);border-color:var(--p);box-shadow:0 0 0 3px color-mix(in srgb,var(--p) 15%,transparent)}
.input-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:6px}
.input-group{display:flex;flex-direction:column;gap:0}

/* ============================================================
   ANIMATIONS
============================================================ */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes bounceIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.anim-fade{animation:fadeUp .45s cubic-bezier(.4,0,.2,1) both}
.anim-slide{animation:slideLeft .35s cubic-bezier(.4,0,.2,1) both}
.anim-bounce{animation:bounceIn .4s cubic-bezier(.4,0,.2,1) both}
.floating{animation:float 4s ease-in-out infinite}
.spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite;display:inline-block}
.tab-nums{font-variant-numeric:tabular-nums}

/* ============================================================
   PROGRESS / BADGE
============================================================ */
.progress-bar{height:6px;background:rgba(0,0,0,0.1);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),#818cf8);border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.badge-active{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.badge-idle{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
.badge-absent{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}

/* ============================================================
   MODALS
============================================================ */
.modal-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;animation:fadeIn .2s ease;
}
.modal-box{
  background:var(--glass-bg);backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);border-radius:24px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  animation:bounceIn .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 32px 80px rgba(0,0,0,0.5);
}
@media(max-width:640px){
  .modal-box{max-width:100%;border-radius:20px 20px 0 0;margin-top:auto;max-height:92vh}
  .modal-overlay{align-items:flex-end;padding:0}
}

/* ============================================================
   SIDEBAR NAV
============================================================ */
.sidebar{
  width:250px;min-height:100vh;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border-right:1px solid var(--glass-border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;z-index:100;
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
.sidebar.hidden{transform:translateX(-100%)}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:14px;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:all .2s;color:var(--tx2);border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:rgba(0,0,0,0.06);color:var(--tx)}
.nav-item.active{background:linear-gradient(135deg,color-mix(in srgb,var(--p) 15%,transparent),color-mix(in srgb,var(--pd) 10%,transparent));color:var(--p);border:1px solid color-mix(in srgb,var(--p) 20%,transparent)}
.nav-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(0,0,0,0.06);transition:all .2s}
.nav-item.active .nav-icon{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;box-shadow:0 4px 12px var(--shadow)}

/* ============================================================
   MOBILE NAV BAR
============================================================ */
.mobile-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--glass-bg);backdrop-filter:blur(24px);
  border-top:1px solid var(--glass-border);
  display:none;padding:8px 0 max(8px,env(safe-area-inset-bottom));
  box-shadow:0 -8px 32px rgba(0,0,0,0.15);
}
.mob-nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;border-radius:12px;font-size:9px;font-weight:800;
  text-transform:uppercase;letter-spacing:.08em;cursor:pointer;
  color:var(--tx3);border:none;background:none;flex:1;transition:all .2s;
}
.mob-nav-item.active{color:var(--p)}
.mob-nav-item.active .mob-icon{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;box-shadow:0 4px 10px var(--shadow)}
.mob-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(0,0,0,0.06);transition:all .2s}

/* ============================================================
   MAIN CONTENT
============================================================ */
.main-content{margin-left:250px;min-height:100vh;padding:24px;transition:margin .35s}
@media(max-width:768px){
  .main-content{margin-left:0;padding:16px;padding-bottom:100px}
  .sidebar{display:none}
  .mobile-nav{display:flex}
  .desktop-only{display:none!important}
}

/* ============================================================
   TOAST
============================================================ */
.toast-container{position:fixed;top:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:10px;max-width:360px;width:calc(100% - 48px)}
.toast{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-radius:16px;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  box-shadow:0 12px 40px rgba(0,0,0,0.25);
  animation:slideLeft .3s cubic-bezier(.4,0,.2,1);
  font-size:13px;font-weight:600;
}
@media(max-width:640px){.toast-container{top:auto;bottom:90px;right:12px;width:calc(100% - 24px)}}

/* ============================================================
   AVATAR
============================================================ */
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden;border:2px solid var(--glass-border)}
.avatar img{width:100%;height:100%;object-fit:cover}
.av-sm{width:36px;height:36px;font-size:13px}
.av-md{width:44px;height:44px;font-size:16px}
.av-lg{width:64px;height:64px;font-size:24px}
.av-xl{width:88px;height:88px;font-size:32px}

/* ============================================================
   STAT CARD HOVER
============================================================ */
.stat-card{transition:transform .25s,box-shadow .25s;cursor:default}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 20px 48px var(--shadow)}

/* ============================================================
   TABLE
============================================================ */
.nx-table{width:100%;border-collapse:collapse}
.nx-table th{padding:12px 20px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);border-bottom:1px solid var(--bd)}
.nx-table td{padding:14px 20px;border-bottom:1px solid rgba(0,0,0,0.04);font-size:13px}
.nx-table tbody tr:hover td{background:rgba(0,0,0,0.03)}
[data-theme="dark"] .nx-table tbody tr:hover td,
[data-theme="red"] .nx-table tbody tr:hover td,
[data-theme="forest"] .nx-table tbody tr:hover td,
[data-theme="sunset"] .nx-table tbody tr:hover td,
[data-theme="ocean"] .nx-table tbody tr:hover td{background:rgba(255,255,255,0.03)}

/* ============================================================
   QUOTE BOX
============================================================ */
.quote-box{
  background:linear-gradient(135deg,color-mix(in srgb,var(--p) 8%,transparent),color-mix(in srgb,var(--pd) 5%,transparent));
  border:1px solid color-mix(in srgb,var(--p) 20%,transparent);
  border-radius:20px;padding:20px 24px;
  position:relative;overflow:hidden;
}
.quote-box::before{
  content:'"';font-size:120px;font-weight:900;
  color:var(--p);opacity:.08;
  position:absolute;top:-20px;left:10px;line-height:1;
  font-family:Georgia,serif;
}

/* ============================================================
   MONTH TABS
============================================================ */
.month-tab{
  padding:7px 14px;border-radius:10px;font-size:11px;font-weight:700;
  cursor:pointer;border:1px solid var(--bd);background:rgba(0,0,0,0.04);
  color:var(--tx3);transition:all .2s;white-space:nowrap;
}
.month-tab.active{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;border-color:transparent;box-shadow:0 4px 12px var(--shadow)}
.month-tab:hover:not(.active){border-color:var(--p);color:var(--p)}

/* ============================================================
   CAMERA / FACE CAPTURE
============================================================ */
.camera-container{border-radius:16px;overflow:hidden;background:#000;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;border:2px solid var(--bd)}
.camera-container video,.camera-container canvas,.camera-container img{width:100%;height:100%;object-fit:cover}

/* ============================================================
   PASSWORD STRENGTH
============================================================ */
.pw-strength{height:4px;border-radius:99px;margin-top:6px;transition:all .4s}
.pw-msg{font-size:11px;font-weight:600;margin-top:4px}

/* ============================================================
   LIVE CLOCK (FIXED)
============================================================ */
.live-clock{
  position:fixed;bottom:24px;right:24px;z-index:50;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);border-radius:16px;
  padding:10px 18px;box-shadow:0 8px 28px var(--shadow);
  font-variant-numeric:tabular-nums;cursor:default;
  transition:transform .2s;
}
.live-clock:hover{transform:scale(1.04)}
@media(max-width:768px){.live-clock{display:none}}

/* ============================================================
   LOADING SCREEN
============================================================ */
.loading-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
}
.logo-pulse{animation:float 2s ease-in-out infinite}

/* ============================================================
   SCROLLABLE X for mobile tables
============================================================ */
.table-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:16px}

/* ============================================================
   THEME PICKER CIRCLES
============================================================ */
.theme-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .2s;border:2px solid transparent}
.theme-dot:hover{transform:scale(1.2)}
.theme-dot.active{border-color:var(--tx);transform:scale(1.15)}

/* AUTH PORTAL */
.auth-bg{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 20% 30%,var(--g2),transparent 60%),
             radial-gradient(ellipse at 80% 70%,var(--g3),transparent 60%),
             var(--g1);
  padding:20px;
}
</style>

/* ================================================================
   API LAYER
================================================================ */
const api = {
  _gasOk: null,
  async call(action, payload={}) {
    if(action!=='login'){
      try{
        const res = await Promise.race([
          fetch(GAS_URL,{method:'POST',body:JSON.stringify({action,...payload}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),
          new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),8000))
        ]);
        if(res.ok){const data=await res.json();api._gasOk=true;return data;}
      }catch(e){api._gasOk=false;}
      return api._local(action,payload);
    }
    const local = api._localLogin(payload);
    if(local.success) return local;
    try{
      const res = await Promise.race([
        fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'login',...payload}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),
        new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')),6000))
      ]);
      if(res.ok){const data=await res.json();api._gasOk=true;if(data.success)return data;}
    }catch(e){api._gasOk=false;}
    return {success:false,error:'Invalid credentials.'};
  },
  _localLogin(p){
    const id=(p.identifier||'').trim().toLowerCase();
    const pw=(p.password||'').trim();
    const admin=ADMIN_ACCOUNTS.find(a=>(a.email.toLowerCase()===id||a.fullName.toLowerCase()===id)&&a.password===pw);
    if(admin)return{success:true,user:{...admin}};
    const emp=EMPLOYEES_INIT.find(e=>(e.email.toLowerCase()===id||e.fullName.toLowerCase()===id||e.firstName.toLowerCase()===id||e.employeeId.toLowerCase()===id)&&e.password===pw);
    if(emp)return{success:true,user:{...emp}};
    return{success:false};
  },
  _local(action,payload){
    return new Promise(r=>setTimeout(()=>{
      if(action==='logTask') r({success:true,taskId:'LOCAL-'+Date.now()});
      else if(action==='registerEmployee') r({success:true,employeeId:'GHTZ-'+Math.floor(Math.random()*9000+1000)});
      else if(action==='updateProfile') r({success:true});
      else if(action==='addProject') r({success:true});
      else r({success:true,data:[]});
    },250));
  },
  async ping(){
    try{
      const r=await Promise.race([fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'ping'}),headers:{'Content-Type':'text/plain;charset=utf-8'}}),new Promise((_,rej)=>setTimeout(()=>rej(),4000))]);
      api._gasOk=r.ok;
    }catch{api._gasOk=false;}
    return api._gasOk;
  }
};

function calcDuration(start,end){
  if(!start||!end)return 0;
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  return Math.max(0,parseFloat(((eh*60+em-sh*60-sm)/60).toFixed(2)));
}

function validatePassword(pw){
  const checks={length:pw.length>=8,upper:/[A-Z]/.test(pw),lower:/[a-z]/.test(pw),num:/[0-9]/.test(pw)};
  const score=Object.values(checks).filter(Boolean).length;
  return{checks,score,valid:score===4};
}

function exportToCSV(tasks,emp){
  const rows=[['Task Name','Date','Start Time','End Time','Duration (hrs)','Remarks']];
  tasks.forEach(t=>rows.push([`"${t.taskName}"`,t.date,t.startTime,t.endTime,t.durationHours,`"${t.remarks||''}"`]));
  const csv=rows.map(r=>r.join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`${emp.firstName}_${emp.lastName}_Tasks.csv`;
  a.click();
}

/* ================================================================
   MY PROFILE MODAL
================================================================ */
const MyProfileModal = ({user,onClose,onSave,showToast}) => {
  const [editing,setEditing]=useState(false);
  const [form,setForm]=useState({firstName:user.firstName,lastName:user.lastName,email:user.email||''});
  const [photo,setPhoto]=useState(user.facePhoto||null);
  const [cameraOn,setCameraOn]=useState(false);
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const streamRef=useRef(null);

  useEffect(()=>{
    if(!cameraOn)return;
    navigator.mediaDevices?.getUserMedia({video:true})
      .then(s=>{streamRef.current=s;if(videoRef.current){videoRef.current.srcObject=s;videoRef.current.play();}})
      .catch(()=>setCameraOn(false));
    return()=>{if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}};
  },[cameraOn]);

  const takePhoto=()=>{
    const v=videoRef.current;const c=canvasRef.current;
    c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);
    setPhoto(c.toDataURL('image/jpeg',0.8));
    if(streamRef.current){streamRef.current.getTracks().forEach(t=>t.stop());streamRef.current=null;}
    setCameraOn(false);
  };

  const save = async()=>{
    const updated={...user,...form,fullName:`${form.firstName} ${form.lastName}`,facePhoto:photo};
    await api.call('updateProfile',updated);
    onSave(updated);
    showToast('Profile updated!','success');
    onClose();
  };

  const dept=DEPARTMENTS.find(d=>d.id===user.deptId);
  const myTasks=TASKS_INIT.filter(t=>t.empId===user.id);
  const totalHrs=myTasks.reduce((s,t)=>s+(t.durationHours||0),0);

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">
        <div style={{padding:'24px 28px',borderBottom:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:18,fontWeight:900,color:'var(--tx)'}}>👤 My Profile</h2>
          <button onClick={onClose} className="btn btn-ghost" style={{padding:'6px 10px'}}><i className="fa-solid fa-xmark"></i></button>
        </div>
        <div style={{padding:28,display:'flex',flexDirection:'column',gap:20}}>
          {/* Avatar section */}
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <div style={{width:80,height:80,borderRadius:'50%',overflow:'hidden',border:'3px solid var(--p)',flexShrink:0}}>
              {photo?<img src={photo} style={{width:'100%',height:'100%',objectFit:'cover'}} alt="face"/>
                :<div style={{width:'100%',height:'100%',background:`linear-gradient(135deg,var(--p),var(--pd))`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,fontWeight:900,color:'#fff'}}>{getInitials(user)}</div>}
            </div>
            <div>
              <p style={{fontSize:18,fontWeight:900,color:'var(--tx)'}}>{user.firstName} {user.lastName}</p>
              <p style={{fontSize:11,fontWeight:700,color:'var(--p)',textTransform:'uppercase',letterSpacing:'.1em'}}>{user.employeeId}</p>
              <p style={{fontSize:11,color:'var(--tx3)',marginTop:2}}>{dept?.icon} {dept?.name} • {user.role}</p>
            </div>
          </div>

          {/* Stats */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
            {[{label:'Total Sessions',val:myTasks.length},{label:'Total Hours',val:totalHrs.toFixed(1)+'h'},{label:'Status',val:user.status}].map(s=>(
              <div key={s.label} className="glass" style={{padding:'12px',borderRadius:14,textAlign:'center'}}>
                <p style={{fontSize:18,fontWeight:900,color:'var(--p)'}}>{s.val}</p>
                <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--tx3)',marginTop:2}}>{s.label}</p>
              </div>
            ))}
          </div>

          {/* Edit form */}
          {editing?(
            <div style={{display:'flex',flexDirection:'column',gap:12}}>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <div>
                  <label className="input-label">First Name</label>
                  <input className="input" value={form.firstName} onChange={e=>setForm(p=>({...p,firstName:e.target.value}))}/>
                </div>
                <div>
                  <label className="input-label">Last Name</label>
                  <input className="input" value={form.lastName} onChange={e=>setForm(p=>({...p,lastName:e.target.value}))}/>
                </div>
              </div>
              <div>
                <label className="input-label">Email</label>
                <input className="input" type="email" value={form.email} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/>
              </div>
              {/* Camera */}
              <div>
                <label className="input-label">Update Face Photo</label>
                <div className="camera-container" style={{maxHeight:180}}>
                  {cameraOn&&<video ref={videoRef} autoPlay muted playsInline/>}
                  {photo&&!cameraOn&&<img src={photo} alt="face"/>}
                  {!cameraOn&&!photo&&<div style={{color:'var(--tx3)',textAlign:'center',padding:16}}><i className="fa-solid fa-camera text-3xl block mb-1"></i><p style={{fontSize:11}}>No photo</p></div>}
                  <canvas ref={canvasRef} style={{display:'none'}}/>
                </div>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  {!cameraOn&&<button type="button" className="btn btn-ghost" style={{fontSize:11,padding:'7px 12px'}} onClick={()=>setCameraOn(true)}><i className="fa-solid fa-video"></i> Camera</button>}
                  {cameraOn&&<button type="button" className="btn btn-primary" style={{fontSize:11,padding:'7px 12px'}} onClick={takePhoto}><i className="fa-solid fa-camera"></i> Capture</button>}
                  {photo&&<button type="button" className="btn btn-danger" style={{fontSize:11,padding:'7px 12px'}} onClick={()=>setPhoto(null)}><i className="fa-solid fa-trash"></i> Remove</button>}
                </div>
              </div>
              <div style={{display:'flex',gap:10,marginTop:4}}>
                <button className="btn btn-primary" onClick={save} style={{flex:1,justifyContent:'center'}}><i className="fa-solid fa-floppy-disk"></i> Save Changes</button>
                <button className="btn btn-ghost" onClick={()=>setEditing(false)}>Cancel</button>
              </div>
            </div>
          ):(
            <button className="btn btn-primary" onClick={()=>setEditing(true)} style={{justifyContent:'center'}}>
              <i className="fa-solid fa-pen"></i> Edit Profile
            </button>
          )}
        </div>
      </div>
    </div>
  );
};

================================================================ */
const LogTaskModal = ({user,onClose,onSave,showToast}) => {
  const today = new Date().toISOString().split('T')[0];
  const [form,setForm]=useState({taskName:'',date:today,startTime:'08:00',endTime:'17:00',remarks:''});
  const [loading,setLoading]=useState(false);

  const duration = useMemo(()=>calcDuration(form.startTime,form.endTime),[form.startTime,form.endTime]);

  const submit = async e => {
    e.preventDefault();
    if(!form.taskName.trim())return;
    setLoading(true);
    const d=new Date(form.date);
    const newTask={
      id:Date.now(),
      empId:user.id,
      taskName:form.taskName.trim(),
      date:form.date,
      startTime:form.startTime,
      endTime:form.endTime,
      durationHours:duration,
      remarks:form.remarks||'',
      month:d.getMonth()+1,
      year:d.getFullYear(),
      source:'Self-Log',
    };
    TASKS_INIT.unshift(newTask);
    await api.call('logTask',newTask);
    setLoading(false);
    onSave(newTask);
    showToast(`Task "${form.taskName}" logged (${duration}h)!`,'success');
    onClose();
  };

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-box">
        <div style={{padding:'24px 28px',borderBottom:'1px solid var(--bd)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:18,fontWeight:900,color:'var(--tx)'}}>⏱️ Log Task</h2>
          <button onClick={onClose} className="btn btn-ghost" style={{padding:'6px 10px'}}><i className="fa-solid fa-xmark"></i></button>
        </div>
        <form onSubmit={submit} style={{padding:28,display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <label className="input-label">Task Name <span style={{color:'var(--danger)'}}>*</span></label>
            <input className="input" value={form.taskName} onChange={e=>setForm(p=>({...p,taskName:e.target.value}))} placeholder="e.g. Processed monthly financial reports" required/>
          </div>
          <div>
            <label className="input-label">Date</label>
            <input className="input" type="date" value={form.date} onChange={e=>setForm(p=>({...p,date:e.target.value}))} max={today}/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              <label className="input-label">Start Time</label>
              <input className="input" type="time" value={form.startTime} onChange={e=>setForm(p=>({...p,startTime:e.target.value}))}/>
            </div>
            <div>
              <label className="input-label">End Time</label>
              <input className="input" type="time" value={form.endTime} onChange={e=>setForm(p=>({...p,endTime:e.target.value}))}/>
            </div>
          </div>
          {/* Live duration */}
          <div className="glass" style={{borderRadius:14,padding:'14px 18px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <span style={{fontSize:12,fontWeight:700,color:'var(--tx3)'}}>Auto-calculated Duration</span>
            <span style={{fontSize:24,fontWeight:900,color:'var(--p)'}}>{duration > 0 ? duration+'h' : '—'}</span>
          </div>
          <div>
            <label className="input-label">Remarks</label>
            <textarea className="input" rows={3} value={form.remarks} onChange={e=>setForm(p=>({...p,remarks:e.target.value}))} placeholder="Additional notes or observations..." style={{resize:'vertical'}}/>
          </div>
          <button type="submit" className="btn btn-primary" disabled={loading||duration<=0} style={{justifyContent:'center',padding:'13px'}}>
            {loading?<><span className="spinner"></span> Saving...</>:<><i className="fa-solid fa-clock"></i> Log Task</>}
          </button>
        </form>
      </div>
    </div>
  );
};

const MyTasksView = ({user,tasks,showModal,showToast}) => {
  const curMonth=new Date().getMonth()+1;
  const curYear=new Date().getFullYear();
  const [selMonth,setSelMonth]=useState(curMonth);
  const [selYear,setSelYear]=useState(curYear);

  const myTasks=tasks.filter(t=>t.empId===user.id);
  const filtered=useMemo(()=>myTasks.filter(t=>t.month===selMonth&&t.year===selYear)
    .sort((a,b)=>new Date(b.date)-new Date(a.date)),[myTasks,selMonth,selYear]);
  const totalHrs=filtered.reduce((s,t)=>s+(t.durationHours||0),0);

  const years=[...new Set(myTasks.map(t=>t.year))].sort((a,b)=>b-a);

  return(
    <div className="anim-fade" style={{display:'flex',flexDirection:'column',gap:16}}>

const MainApp = ({user:initUser,onLogout,theme,setTheme}) => {

  const [view,setView]=useState('dashboard');
  const [tasks,setTasks]=useState(TASKS_INIT);
  const [projects,setProjects]=useState(PROJECTS_INIT);
  const [employees]=useState(EMPLOYEES_INIT);
  const [toasts,setToasts]=useState([]);
  const [modal,setModal]=useState(null); // 'profile'|'logTask'|'addProject'|null
  const [logTaskTarget,setLogTaskTarget]=useState(null); // for admin logging on behalf of emp
  const [sidebarOpen,setSidebarOpen]=useState(false);

  const isAdmin=user.role==='ADMIN'||user.role==='Super Admin'||user.role==='Nexus Dev';

  useEffect(()=>{document.documentElement.setAttribute('data-theme',theme);},[theme]);

  const showToast = useCallback((message,type='info')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,message,type}]);
  },[]);
  const removeToast = useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);

  const showModal = useCallback(m=>setModal(m),[]);

  // Admin tabs
  const adminNavItems = [
    {id:'dashboard',icon:'fa-chart-pie',label:'Dashboard'},
    {id:'tracker',icon:'fa-satellite-dish',label:'Tracker'},
    {id:'directory',icon:'fa-address-book',label:'Directory'},
    {id:'projects',icon:'fa-folder-open',label:'Projects'},
    {id:'settings',icon:'fa-sliders',label:'Settings'},
  ];
  // Employee tabs
  const empNavItems = [
    {id:'dashboard',icon:'fa-gauge-high',label:'Home'},
    {id:'mytasks',icon:'fa-list-check',label:'My Tasks'},
    {id:'projects',icon:'fa-folder-open',label:'Projects'},
    {id:'settings',icon:'fa-sliders',label:'Settings'},
  ];
  const navItems = isAdmin ? adminNavItems : empNavItems;
  const dept=DEPARTMENTS.find(d=>d.id===user.deptId);

  const handleLogTaskForEmp = emp => {
    setLogTaskTarget(emp);
    setModal('logTaskAdmin');
  };

  const saveAdminTask = task => {
    setTasks(p=>[task,...p]);
  };

  return(
    <>
      <ToastSystem toasts={toasts} remove={removeToast}/>
      <LiveClock/>

      {/* SIDEBAR (desktop) */}
      <aside className={`sidebar ${sidebarOpen?'':'hidden'} lg:sidebar`} style={{transform:undefined}}>
        <div style={{padding:'16px',borderBottom:'1px solid var(--bd)',display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:36,height:36,borderRadius:10,overflow:'hidden',background:'#fff',padding:3,flexShrink:0}}>
            <img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" alt="Logo" style={{width:'100%',height:'99%',objectFit:'contain'}}/>
          </div>
          <div>
            <p style={{fontSize:12,fontWeight:900,color:'var(--tx)'}}>Gigahertz Nexus</p>
            <p style={{fontSize:9,color:'var(--p)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em'}}>v4.4/p>
          </div>
        </div>
        <nav style={{padding:'12px',flex:1,display:'flex',flexDirection:'column',gap:4}}>
          {navItems.map(item=>(
            <button key={item.id} className={`nav-item ${view===item.id?'active':''}`} onClick={()=>setView(item.id)}>
              <span className="nav-icon"><i className={`fa-solid ${item.icon}`}></i></span>
              {item.label}
            </button>
          ))}
        </nav>
        {/* User area */}
        <div style={{padding:'12px',borderTop:'1px solid var(--bd)'}}>
          <button className="nav-item" onClick={()=>setModal('profile')}>
            <span className="nav-icon" style={{background:'var(--p)',background:'linear-gradient(135deg,var(--p),var(--pd))'}}>
              {user.facePhoto?<img src={user.facePhoto} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:10}} alt="face"/>
                :<span style={{color:'#fff',fontSize:12,fontWeight:900}}>{getInitials(user)}</span>}
            </span>
            <div style={{overflow:'hidden',textAlign:'left'}}>
              <p style={{fontSize:12,fontWeight:700,color:'var(--tx)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.firstName} {user.lastName}</p>
              <p style={{fontSize:9,color:'var(--tx3)'}}>{dept?.name}</p>
            </div>
          </button>
          <button className="nav-item" onClick={onLogout} style={{color:'#f87171',marginTop:4}}>
            <span className="nav-icon" style={{background:'rgba(239,68,68,0.1)'}}><i className="fa-solid fa-power-off" style={{color:'#f87171'}}></i></span>
            Sign Out

        </div>
      </aside>

      {/* MOBILE TOP HEADER */}
      <div style={{display:'none'}} className="block md:hidden" id="mob-header">
        <div className="glass" style={{position:'fixed',top:0,left:0,right:0,zIndex:150,padding:'12px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid var(--bd)'}}>

            <button onClick={()=>setModal('profile')} style={{width:34,height:34,borderRadius:'50%',overflow:'hidden',border:'2px solid var(--p)',background:`linear-gradient(135deg,var(--p),var(--pd))`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontWeight:900,fontSize:13,cursor:'pointer'}}>

          <div style={{display:'flex',gap:10,alignItems:'center'}}>
            <button className="btn btn-primary" onClick={()=>setModal('logTask')}><i className="fa-solid fa-plus"></i> Log Task</button>
            <button className="btn btn-ghost" onClick={()=>setModal('profile')} style={{gap:8}}>
              <div style={{width:28,height:28,borderRadius:'50%',background:`linear-gradient(135deg,var(--p),var(--pd))`,display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,fontWeight:900}}>

        </div>

        {/* Views */}
        {view==='dashboard'&&isAdmin&&<AdminDashView employees={employees} tasks={tasks} showModal={showModal}/>}
        {view==='dashboard'&&!isAdmin&&<DashboardView user={user} tasks={tasks} showModal={showModal}/>}
        {view==='tracker'&&isAdmin&&<AdminTrackerView employees={employees} tasks={tasks} showToast={showToast}/>}
        {view==='directory'&&isAdmin&&<AdminDirectoryView employees={employees} tasks={tasks} showToast={showToast} onLogTaskForEmp={handleLogTaskForEmp}/>}
        {view==='mytasks'&&!isAdmin&&<MyTasksView user={user} tasks={tasks} showModal={showModal} showToast={showToast}/>}
        {view==='projects'&&<ProjectsView projects={projects} setProjects={setProjects} showModal={showModal} showToast={showToast} isAdmin={isAdmin}/>}
        {view==='settings'&&<SettingsView theme={theme} setTheme={setTheme} showToast={showToast}/>}
      </main>

      {/* MOBILE NAV */}
      <nav className="mobile-nav">

          <button key={item.id} className={`mob-nav-item ${view===item.id?'active':''}`} onClick={()=>setView(item.id)}>

      {/* Sidebar toggle for tablet */}
      <button onClick={()=>setSidebarOpen(p=>!p)} className="glass"
        style={{position:'fixed',top:16,left:16,zIndex:200,width:38,height:38,borderRadius:10,border:'none',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--tx)'}}>
        <i className="fa-solid fa-bars"></i>
      </button>

      {/* MODALS */}
      {modal==='profile'&&<MyProfileModal user={user} onClose={()=>setModal(null)} onSave={setUser} showToast={showToast}/>}
      {modal==='logTask'&&<LogTaskModal user={user} onClose={()=>setModal(null)} onSave={t=>setTasks(p=>[t,...p])} showToast={showToast}/>}
      {modal==='addProject'&&<AddProjectModal onClose={()=>setModal(null)} onSave={p=>setProjects(prev=>[p,...prev])} showToast={showToast}/>}
      {modal==='logTaskAdmin'&&logTaskTarget&&(
        <LogTaskModal user={logTaskTarget} onClose={()=>{setModal(null);setLogTaskTarget(null);}} onSave={saveAdminTask} showToast={showToast}/>
      )}
    </>
  );
};

/* ================================================================
   ROOT
================================================================ */
const App = () => {
  const [user,setUser]=useState(null);
  const [theme,setTheme]=useState('dark');
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',theme);
  },[theme]);

  const changeTheme = t => {
    setTheme(t);
    document.documentElement.setAttribute('data-theme',t);
  };

  // Splash screen
  useEffect(()=>{
    const t=setTimeout(()=>setLoading(false),1200);
    return()=>clearTimeout(t);
  },[]);

  if(loading){
    return(
      <div className="loading-screen">
        <div className="logo-pulse" style={{width:80,height:80,borderRadius:20,overflow:'hidden',background:'#fff',padding:8,boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
          <img src="https://contents.smsupermalls.com/data/uploads/2020/07/GIGAHERTZ_COMPUTER_SYSTEM.jpg" alt="Logo" style={{width:'100%',height:'100%',objectFit:'contain',borderRadius:12}}/>
        </div>
        <div style={{textAlign:'center'}}>
          <p style={{fontSize:22,fontWeight:900,color:'var(--tx)'}}>Gigahertz Nexus</p>
          <p style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--p)',marginTop:4}}>Activity Tracker v4.0</p>
        </div>
        <div style={{display:'flex',gap:8}}>
          {[0,1,2].map(i=><div key={i} style={{width:8,height:8,borderRadius:'50%',background:'var(--p)',animation:`pulse 1.2s ${i*.3}s infinite`}}></div>)}
        </div>
      </div>
    );
  }

  if(!user) return <AuthPortal onLogin={setUser} theme={theme} setTheme={changeTheme}/>;
  return <MainApp user={user} onLogout={()=>setUser(null)} theme={theme} setTheme={changeTheme}/>;
};

root.render(<App/>);
