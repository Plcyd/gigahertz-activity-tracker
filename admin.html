/* ============================================================
   GLOBALS & UI COMPONENTS
============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:radial-gradient(ellipse at 10% 20%,var(--g2) 0%,transparent 55%),
             radial-gradient(ellipse at 90% 80%,var(--g3) 0%,transparent 55%),
             var(--g1);
  background-attachment:fixed;
  color:var(--tx);
  min-height:100vh;
  overflow-x:hidden;
  transition:background-color .5s,color .4s;
}
input,select,button,textarea{font-family:inherit;outline:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--p);opacity:.4;border-radius:99px}

.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  box-shadow:0 8px 32px var(--shadow);
  transition:all .3s;
}
.card{background:var(--card);border:1px solid var(--bd);border-radius:20px;transition:all .3s}
.btn{
  padding:10px 22px;border-radius:12px;font-weight:700;font-size:13px;
  cursor:pointer;transition:all .2s;border:none;display:inline-flex;
  align-items:center;gap:8px;letter-spacing:.02em;
}
.btn-primary{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;box-shadow:0 4px 16px var(--shadow)}
.btn-primary:hover{filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 6px 24px var(--shadow)}
.btn-ghost{background:rgba(0,0,0,0.05);color:var(--tx2);border:1px solid var(--bd)}
.btn-danger{background:rgba(239,68,68,0.1);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
.btn-ok{background:rgba(34,197,94,0.1);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}

.input{
  width:100%;background:rgba(0,0,0,0.06);
  border:1.5px solid var(--bd);border-radius:12px;
  padding:11px 14px;color:var(--tx);font-size:14px;font-weight:500;
}
.input-label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);margin-bottom:6px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes bounceIn{0%{transform:scale(.8);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}

.anim-fade{animation:fadeUp .45s cubic-bezier(.4,0,.2,1) both}
.anim-slide{animation:slideLeft .35s cubic-bezier(.4,0,.2,1) both}
.spinner{width:20px;height:20px;border:3px solid rgba(255,255,255,0.25);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite;display:inline-block}

.progress-bar{height:6px;background:rgba(0,0,0,0.1);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--p),#818cf8);border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:99px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.badge-active{background:rgba(34,197,94,0.15);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.badge-idle{background:rgba(245,158,11,0.15);color:#fbbf24;border:1px solid rgba(245,158,11,0.3)}
.badge-absent{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}

.modal-overlay{
  position:fixed;inset:0;z-index:999;
  background:rgba(0,0,0,0.65);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:center;
  padding:16px;
}
.modal-box{
  background:var(--glass-bg);backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);border-radius:24px;
  width:100%;max-width:520px;max-height:90vh;overflow-y:auto;
  animation:bounceIn .35s cubic-bezier(.4,0,.2,1);
  box-shadow:0 32px 80px rgba(0,0,0,0.5);
}

.sidebar{
  width:250px;min-height:100vh;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border-right:1px solid var(--glass-border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;z-index:100;
}
.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:14px;
  font-size:13px;font-weight:700;cursor:pointer;
  transition:all .2s;color:var(--tx2);border:none;background:none;width:100%;text-align:left;
}
.nav-item:hover{background:rgba(0,0,0,0.06);color:var(--tx)}
.nav-item.active{background:linear-gradient(135deg,color-mix(in srgb,var(--p) 15%,transparent),color-mix(in srgb,var(--pd) 10%,transparent));color:var(--p);border:1px solid color-mix(in srgb,var(--p) 20%,transparent)}
.nav-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(0,0,0,0.06)}
.nav-item.active .nav-icon{background:linear-gradient(135deg,var(--p),var(--pd));color:#fff;box-shadow:0 4px 12px var(--shadow)}

.mobile-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--glass-bg);backdrop-filter:blur(24px);
  border-top:1px solid var(--glass-border);
  display:none;padding:8px 0;
  box-shadow:0 -8px 32px rgba(0,0,0,0.15);
  overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
}
.mob-nav-item{
  display:inline-flex;flex-direction:column;align-items:center;gap:3px;
  padding:6px 12px;font-size:9px;font-weight:800;text-transform:uppercase;
  color:var(--tx3);background:none;border:none;min-width: 72px;
}
.mob-nav-item.active{color:var(--p)}

.main-content{margin-left:250px;min-height:100vh;padding:24px}
@media(max-width:768px){
  .main-content{margin-left:0;padding:16px;padding-bottom:100px}
  .sidebar{display:none}
  .mobile-nav{display:flex}
  .desktop-only{display:none!important}
}

.toast-container{position:fixed;top:24px;right:24px;z-index:2000;display:flex;flex-direction:column;gap:10px;max-width:360px}
.toast{
  display:flex;align-items:center;gap:12px;
  padding:14px 18px;border-radius:16px;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);
  box-shadow:0 12px 40px rgba(0,0,0,0.25);
  animation:slideLeft .3s ease;
  font-size:13px;font-weight:600;
}

.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden;border:2px solid var(--glass-border)}
.avatar img{width:100%;height:100%;object-fit:cover}

.nx-table{width:100%;border-collapse:collapse}
.nx-table th{padding:12px 20px;text-align:left;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:var(--tx3);border-bottom:1px solid var(--bd)}
.nx-table td{padding:14px 20px;border-bottom:1px solid rgba(0,0,0,0.04);font-size:13px}

.quote-box{
  background:linear-gradient(135deg,color-mix(in srgb,var(--p) 8%,transparent),color-mix(in srgb,var(--pd) 5%,transparent));
  border:1px solid color-mix(in srgb,var(--p) 20%,transparent);
  border-radius:20px;padding:20px 24px;
}

.live-clock{
  position:fixed;bottom:24px;right:24px;z-index:50;
  background:var(--glass-bg);backdrop-filter:blur(20px);
  border:1px solid var(--glass-border);border-radius:16px;
  padding:10px 18px;box-shadow:0 8px 28px var(--shadow);
  font-variant-numeric:tabular-nums;
}
@media(max-width:768px){.live-clock{display:none}}

.theme-dot{width:28px;height:28px;border-radius:50%;cursor:pointer;transition:transform .2s;border:2px solid transparent}
.theme-dot.active{border-color:var(--tx);transform:scale(1.15)}

.bar-chart-container{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px}
.bar-item{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.bar-fill{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--p),var(--pd));min-height:4px;transition:height .8s cubic-bezier(.4,0,.2,1)}
.bar-label{font-size:9px;font-weight:700;color:var(--tx3)}

.camera-container{border-radius:16px;overflow:hidden;background:#000;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;position:relative;border:2px solid var(--bd)}
.camera-container video,.camera-container canvas,.camera-container img{width:100%;height:100%;object-fit:cover}

.loading-screen{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:20px;
}

.announce-card{
  background:linear-gradient(135deg,color-mix(in srgb,var(--p) 6%,transparent),color-mix(in srgb,var(--pd) 4%,transparent));
  border:1px solid color-mix(in srgb,var(--p) 18%,transparent);
  border-radius:16px;padding:16px 18px;
}
</style>

const fmtDate = iso => new Date(iso+'T00:00:00').toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'2-digit'});
const getInitials = emp => `${emp.firstName?.[0]||''}${emp.lastName?.[0]||''}`;
const getAvColor = id => ['from-blue-500','from-purple-500','from-emerald-500','from-orange-500'][id % 4];

const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function calcDuration(start,end){
  if(!start||!end)return 0;
  const [sh,sm]=start.split(':').map(Number);
  const [eh,em]=end.split(':').map(Number);
  return Math.max(0,parseFloat(((eh*60+em-sh*60-sm)/60).toFixed(2)));
}

const getLevelInfo = (totalHours) => {
  const hrs = totalHours || 0;
  const level = Math.floor(hrs / 20) + 1;
  const progress = ((hrs % 20) / 20) * 100;
  const nextLvlBase = level * 20;
  return { level, progress, nextLvlBase, hrs };
};

function getUpcomingBirthdays(employees, days=30) {
  const today = new Date();
  const results = [];
  employees.forEach(emp => {
    if(!emp.birthday) return;
    const [bm, bd] = emp.birthday.split('-').map(Number);
    const thisYear = new Date(today.getFullYear(), bm-1, bd);
    if(thisYear < today) thisYear.setFullYear(today.getFullYear()+1);
    const diff = Math.ceil((thisYear - today)/(1000*60*60*24));
    if(diff <= days) results.push({...emp, daysUntil: diff, birthdayDate: thisYear});
  });
  return results.sort((a,b)=>a.daysUntil-b.daysUntil);
}

const MiniBarChart = ({tasks}) => {
  const data = MONTHS.map((m,i) => {
    const hrs = tasks.filter(t => t.month === i+1).reduce((s,t)=>s+t.durationHours,0);
    return { label: m, val: hrs };
  });
  const max = Math.max(...data.map(d=>d.val), 1);
  return (
    <div className="bar-chart-container mt-4">
        {data.map(d => (
            <div key={d.label} className="bar-item">
                <div className="bar-fill" style={{height:`${(d.val/max)*100}%`}}></div>
                <div className="bar-label">{d.label[0]}</div>
            </div>
        ))}
    </div>
  );
};
